<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ニュース - テキーラ道場</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{margin:0;padding:0;}
body{
  background:#daf0e8;
  min-height:100vh;
  font-family:'Hiragino Mincho ProN','Yu Mincho',serif;
  overflow-y:auto;
  width:100%;
  color:#1a2e28;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 20% 20%, rgba(40,100,70,.10), transparent),
    radial-gradient(ellipse 60% 60% at 80% 80%, rgba(20,70,50,.07), transparent);
  pointer-events:none;
  z-index:0;
}
.wrap{
  position:relative;
  z-index:1;
  max-width:640px;
  margin:0 auto;
  padding:36px 18px 80px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.header-dark{
  width:calc(100% + 36px);
  margin-left:-18px;
  margin-right:-18px;
  margin-top:-36px;
  margin-bottom:28px;
  background:#0a0a0a;
  padding:22px 24px 20px;
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:space-between;
  position:relative;
  border-radius:0 0 20px 20px;
}
.header-dark::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 40%, rgba(180,120,20,.06), transparent),
    radial-gradient(ellipse 40% 40% at 20% 80%, rgba(120,60,0,.05), transparent);
  pointer-events:none;
  border-radius:0 0 20px 20px;
}
.header-site-name{
  font-size:18px;
  font-weight:700;
  color:#c8921e;
  letter-spacing:.05em;
  position:relative;
  z-index:1;
}
.header-back{
  font-size:13px;
  color:#c8921e;
  text-decoration:none;
  letter-spacing:.03em;
  position:relative;
  z-index:1;
  opacity:.85;
  transition:.15s;
}
.header-back:hover{opacity:1;text-decoration:underline;}

.page-title{
  width:100%;
  font-size:20px;
  font-weight:700;
  color:#1a3a28;
  letter-spacing:.08em;
  margin-bottom:18px;
  padding-bottom:10px;
  border-bottom:2px solid rgba(40,120,80,.18);
}

/* Filters */
.filters{
  width:100%;
  background:rgba(255,255,255,.68);
  border-radius:12px;
  border:1px solid rgba(40,120,80,.15);
  box-shadow:0 2px 10px rgba(20,80,50,.06);
  padding:14px 16px;
  margin-bottom:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.filter-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.filter-label{font-size:11px;color:#2a6b44;font-weight:700;letter-spacing:.1em;white-space:nowrap;}
.filter-search{
  flex:1;
  min-width:0;
  padding:7px 11px;
  border:1.5px solid rgba(40,120,80,.25);
  border-radius:7px;
  font-size:13px;
  font-family:'Hiragino Mincho ProN','Yu Mincho',serif;
  color:#1a2e28;
  background:#fff;
  outline:none;
  transition:.15s;
}
.filter-search:focus{border-color:rgba(40,120,80,.55);box-shadow:0 0 0 2px rgba(40,120,80,.08);}
.filter-search::placeholder{color:#a0bab0;}
.filter-select{
  padding:7px 10px;
  border:1.5px solid rgba(40,120,80,.25);
  border-radius:7px;
  font-size:13px;
  font-family:'Hiragino Mincho ProN','Yu Mincho',serif;
  color:#1a2e28;
  background:#fff;
  outline:none;
  cursor:pointer;
  transition:.15s;
}
.filter-select:focus{border-color:rgba(40,120,80,.55);}
.category-toggles{display:flex;flex-wrap:wrap;gap:6px;}
.cat-btn{
  padding:5px 6px;
  border-radius:5px;
  border:1.5px solid transparent;
  font-size:11px;
  font-weight:700;
  cursor:pointer;
  transition:.15s;
  font-family:'Hiragino Mincho ProN','Yu Mincho',serif;
  color:#fff;
  width:68px;
  text-align:justify;
  text-align-last:justify;
  text-justify:inter-character;
}
.cat-btn.off{
  background:#c8d8d0 !important;
  border-color:#b0c8be !important;
  color:#8a9e98;
}

/* Results bar */
.results-bar{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
  font-size:12px;
  color:#2a6b44;
  letter-spacing:.04em;
  min-height:22px;
}

/* News list */
.news-card{
  width:100%;
  background:rgba(255,255,255,.68);
  border-radius:12px;
  border:1px solid rgba(40,120,80,.15);
  box-shadow:0 2px 10px rgba(20,80,50,.06);
  overflow:hidden;
  margin-bottom:0;
}
.news-list{padding:2px 0;}
.news-item{
  display:flex;
  gap:10px;
  align-items:center;
  padding:12px 16px;
  border-bottom:1px solid rgba(40,120,80,.07);
  text-decoration:none;
  color:inherit;
  transition:.13s;
}
.news-item:last-child{border-bottom:none;}
.news-item.clickable{cursor:pointer;}
.news-item.clickable:hover{background:rgba(40,120,80,.05);}
.news-item.not-clickable{cursor:default;}
.news-badge{
  flex-shrink:0;
  font-size:10px;
  font-weight:300;
  padding:2px 6px;
  border-radius:3px;
  color:#fff;
  margin-top:1px;
  align-self:flex-start;
  display:inline-block;
  box-sizing:content-box;
  width:6em;
  text-align:justify;
  text-align-last:justify;
  text-justify:inter-character;
  letter-spacing:0;
}
.news-text{flex:1;min-width:0;}
.news-title-row{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;}
.news-title{font-size:14px;font-weight:600;color:#1a2e28;line-height:1.4;}
.news-new-badge{
  font-size:10px;
  font-weight:700;
  color:#fff;
  background:#e84040;
  padding:1px 5px;
  border-radius:3px;
  letter-spacing:.04em;
  white-space:nowrap;
  flex-shrink:0;
}
.news-date{font-size:11px;color:#6a9080;font-family:monospace;margin-top:3px;}
.news-date-right{
  flex-shrink:0;
  font-size:11px;
  color:#6a9080;
  font-family:monospace;
  white-space:nowrap;
  align-self:center;
  margin-left:4px;
}
.news-loading{padding:28px 16px;color:#7a9a8a;font-size:13px;text-align:center;}
.news-empty{padding:28px 16px;color:#7a9a8a;font-size:13px;text-align:center;}

/* Pagination */
.pagination{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  margin-top:16px;
  flex-wrap:wrap;
}
.page-btn{
  padding:6px 11px;
  border:1.5px solid rgba(40,120,80,.25);
  border-radius:6px;
  background:#fff;
  color:#1a5e3a;
  font-size:13px;
  cursor:pointer;
  font-family:'Hiragino Mincho ProN','Yu Mincho',serif;
  transition:.13s;
  min-width:36px;
  text-align:center;
}
.page-btn:hover:not(:disabled){background:rgba(40,120,80,.08);}
.page-btn:disabled{opacity:.38;cursor:default;}
.page-btn.active{background:#1a5e3a;color:#fff;border-color:#1a5e3a;}
.page-ellipsis{font-size:13px;color:#6a9080;padding:0 2px;align-self:center;}

/* Modal */
.news-modal-bg{
  position:fixed;inset:0;
  background:rgba(0,0,0,.55);
  z-index:9000;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.news-modal{
  background:#fff;
  border-radius:12px;
  max-width:560px;
  width:100%;
  max-height:80vh;
  overflow-y:auto;
  box-shadow:0 8px 40px rgba(0,0,0,.25);
}
.news-modal-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  padding:18px 20px 12px;
  border-bottom:1px solid #eee;
}
.news-modal-badge{flex-shrink:0;font-size:11px;font-weight:300;padding:3px 6px;border-radius:3px;color:#fff;margin-top:3px;display:inline-block;box-sizing:content-box;width:6em;text-align:justify;text-align-last:justify;text-justify:inter-character;}
.news-modal-title{flex:1;font-size:16px;font-weight:700;color:#1a2e28;line-height:1.4;}
.news-modal-date{flex-shrink:0;font-size:11px;color:#7a9a8a;font-family:monospace;margin-top:4px;white-space:nowrap;}
.news-modal-close{flex-shrink:0;width:28px;height:28px;border:none;background:rgba(0,0,0,.08);border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#555;}
.news-modal-close:hover{background:rgba(0,0,0,.15);}
.news-modal-body{padding:16px 20px 20px;font-size:14px;color:#2a2a2a;line-height:1.75;}
.news-modal-body h3{font-size:15px;margin:.8em 0 .3em;}
.news-modal-body h4{font-size:14px;margin:.6em 0 .2em;}
.news-modal-body ul,.news-modal-body ol{padding-left:1.4em;margin:.4em 0;}
.news-modal-body a{color:#1a5e3a;text-decoration:underline;}
.news-modal-body img{max-width:100%;height:auto;border-radius:4px;}
.news-modal-body hr{border:none;border-top:1px solid #e0e0e0;margin:.8em 0;}
.news-modal-body p{margin:.4em 0;}
</style>
</head>
<body>
<div class="wrap">

  <div class="header-dark">
    <span class="header-site-name">🥃 テキーラ道場</span>
    <a class="header-back" href="/index.html">← TOPへ</a>
  </div>

  <div class="page-title">ニュース</div>

  <div class="filters">
    <div class="filter-row">
      <span class="filter-label">検索</span>
      <input class="filter-search" type="text" id="f-keyword" placeholder="タイトル・内容で検索...">
      <select class="filter-select" id="f-period">
        <option value="">全件</option>
        <option value="1m">今月</option>
        <option value="3m">3カ月以内</option>
        <option value="6m">6カ月以内</option>
      </select>
    </div>
    <div class="filter-row">
      <span class="filter-label">カテゴリ</span>
      <div class="category-toggles" id="cat-toggles"></div>
    </div>
  </div>

  <div class="results-bar">
    <span id="results-range"></span>
    <span id="results-total"></span>
  </div>

  <div class="news-card">
    <div class="news-list" id="news-list">
      <div class="news-loading">読み込み中...</div>
    </div>
  </div>

  <div class="pagination" id="pagination"></div>

</div>

<!-- Modal -->
<div class="news-modal-bg" id="nm-bg" style="display:none" onclick="if(event.target===this)nmClose()">
  <div class="news-modal">
    <div class="news-modal-head">
      <span class="news-modal-badge" id="nm-badge"></span>
      <div style="flex:1;min-width:0;">
        <div class="news-modal-title" id="nm-title"></div>
        <div class="news-modal-date" id="nm-date"></div>
      </div>
      <button class="news-modal-close" onclick="nmClose()">✕</button>
    </div>
    <div class="news-modal-body" id="nm-body"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain: "tequiladojo.firebaseapp.com",
  projectId: "tequiladojo",
  storageBucket: "tequiladojo.firebasestorage.app",
  messagingSenderId: "56663296233",
  appId: "1:56663296233:web:c8cac2fcbeb4faa09e0878"
};

var NEWS_TYPES = {info:'お知らせ', event:'イベント', feature:'新機能', menu:'メニュー', newarrival:'新入荷', other:'その他'};
var NEWS_TYPE_COLORS = {info:'#378ADD', event:'#D4730A', feature:'#2CA44E', menu:'#8B5CF6', newarrival:'#F87171', other:'#64748B'};
var TYPE_KEYS = Object.keys(NEWS_TYPES);

var PAGE_SIZE = 20;

// State
var allDocs = [];         // all published+active docs
var filteredDocs = [];    // after applying filters
var currentPage = 1;
var activeCategories = {}; // key -> true/false
var debounceTimer = null;

// Initialize all categories ON
TYPE_KEYS.forEach(function(k){ activeCategories[k] = true; });

function g(id){ return document.getElementById(id); }

function stripHtml(html){
  if(!html) return '';
  return html.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
}

function formatDate(isoStr){
  if(!isoStr) return '';
  return isoStr.slice(0,10);
}

function isNew(isoStr){
  if(!isoStr) return false;
  var d = new Date(isoStr);
  var now = new Date();
  return (now - d) <= 3 * 24 * 60 * 60 * 1000;
}

// Build category toggle buttons
function buildCategoryToggles(){
  var wrap = g('cat-toggles');
  wrap.innerHTML = TYPE_KEYS.map(function(k){
    var color = NEWS_TYPE_COLORS[k];
    var label = NEWS_TYPES[k];
    return '<button class="cat-btn" data-key="'+k+'" style="background:'+color+';border-color:'+color+'" onclick="toggleCategory(\''+k+'\')">'
      + label
      + '</button>';
  }).join('');
}

function toggleCategory(key){
  activeCategories[key] = !activeCategories[key];
  var btn = g('cat-toggles').querySelector('[data-key="'+key+'"]');
  if(btn){
    if(activeCategories[key]){
      var color = NEWS_TYPE_COLORS[key];
      btn.style.background = color;
      btn.style.borderColor = color;
      btn.classList.remove('off');
    } else {
      btn.style.background = '';
      btn.style.borderColor = '';
      btn.classList.add('off');
    }
  }
  currentPage = 1;
  applyFilters();
}

function getPeriodThreshold(period){
  if(!period) return null;
  var now = new Date();
  if(period === '1m'){
    // same year+month as today
    return null; // handled separately
  }
  if(period === '3m'){
    var d = new Date(now);
    d.setMonth(d.getMonth() - 3);
    return d.toISOString();
  }
  if(period === '6m'){
    var d = new Date(now);
    d.setMonth(d.getMonth() - 6);
    return d.toISOString();
  }
  return null;
}

function applyFilters(){
  var keyword = (g('f-keyword').value || '').toLowerCase().trim();
  var period = g('f-period').value;

  // Determine if all categories are off -> treat as all on
  var anyOn = TYPE_KEYS.some(function(k){ return activeCategories[k]; });

  var now = new Date();
  var periodThreshold = getPeriodThreshold(period);

  filteredDocs = allDocs.filter(function(r){
    // Category filter
    if(anyOn && !activeCategories[r.type || 'other']){
      return false;
    }

    // Period filter
    if(period === '1m'){
      var d = r.publishStart || r.createdAt;
      if(!d) return false;
      var rd = new Date(d);
      if(rd.getFullYear() !== now.getFullYear() || rd.getMonth() !== now.getMonth()) return false;
    } else if(periodThreshold){
      var d = r.publishStart || r.createdAt || '';
      if(d < periodThreshold) return false;
    }

    // Keyword filter
    if(keyword){
      var title = (r.title || '').toLowerCase();
      var body = stripHtml(r.body).toLowerCase();
      if(title.indexOf(keyword) === -1 && body.indexOf(keyword) === -1) return false;
    }

    return true;
  });

  renderPage(1);
}

function renderPage(page){
  currentPage = page;
  var total = filteredDocs.length;
  var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if(currentPage > totalPages) currentPage = totalPages;

  var start = (currentPage - 1) * PAGE_SIZE;
  var end = Math.min(start + PAGE_SIZE, total);
  var pageItems = filteredDocs.slice(start, end);

  // Results bar
  if(total === 0){
    g('results-range').textContent = '';
    g('results-total').textContent = '0件';
  } else {
    g('results-range').textContent = (start+1) + '-' + end + '件';
    g('results-total').textContent = '全' + total + '件';
  }

  // News list
  var list = g('news-list');
  if(total === 0){
    list.innerHTML = '<div class="news-empty">該当するニュースはありません</div>';
  } else {
    // Store page items for modal access
    window._newsPageItems = pageItems;
    list.innerHTML = pageItems.map(function(r, i){
      var typeKey = r.type || 'other';
      var tc = NEWS_TYPE_COLORS[typeKey] || '#64748B';
      var tl = NEWS_TYPES[typeKey] || r.type || 'その他';
      var dateStr = formatDate(r.publishStart || r.createdAt);
      var hasBody = !!(r.body && stripHtml(r.body));
      var newBadge = isNew(r.publishStart || r.createdAt) ? '<span class="news-new-badge">NEW</span>' : '';
      return '<div class="news-item '+(hasBody?'clickable':'not-clickable')+'"'
        + (hasBody ? ' onclick="nmOpen('+i+')"' : '')
        + '>'
        + '<span class="news-badge" style="background:'+tc+'">'+tl+'</span>'
        + '<div class="news-text">'
          + '<div class="news-title-row">'
            + '<span class="news-title">'+(r.title||'')+'</span>'
            + newBadge
          + '</div>'
        + '</div>'
        + '<span class="news-date-right">'+(dateStr||'')+'</span>'
      + '</div>';
    }).join('');
  }

  // Pagination
  renderPagination(currentPage, totalPages);
}

function renderPagination(page, totalPages){
  var pg = g('pagination');
  if(totalPages <= 1){
    pg.innerHTML = '';
    return;
  }

  var html = '';

  // Prev button
  html += '<button class="page-btn" '+(page===1?'disabled':'')+' onclick="goPage('+(page-1)+')">← 前</button>';

  // Page number buttons (max 5, with ellipsis)
  var pages = [];
  if(totalPages <= 5){
    for(var i=1;i<=totalPages;i++) pages.push(i);
  } else {
    // Always show first, last, current, and neighbors
    var set = {};
    set[1] = true;
    set[totalPages] = true;
    set[page] = true;
    if(page > 1) set[page-1] = true;
    if(page < totalPages) set[page+1] = true;
    // Build sorted unique array
    pages = Object.keys(set).map(Number).sort(function(a,b){return a-b;});
    // Limit to 5
    while(pages.length > 5){
      // Remove page furthest from current
      var maxDist = -1, maxIdx = -1;
      for(var i=0;i<pages.length;i++){
        var dist = Math.abs(pages[i]-page);
        // Don't remove first or last
        if(pages[i]===1||pages[i]===totalPages) continue;
        if(dist > maxDist){ maxDist=dist; maxIdx=i; }
      }
      if(maxIdx===-1) break;
      pages.splice(maxIdx,1);
    }
  }

  var prev = 0;
  for(var i=0;i<pages.length;i++){
    var p = pages[i];
    if(prev && p > prev+1){
      html += '<span class="page-ellipsis">…</span>';
    }
    html += '<button class="page-btn'+(p===page?' active':'')+'" onclick="goPage('+p+')">'+p+'</button>';
    prev = p;
  }

  // Next button
  html += '<button class="page-btn" '+(page===totalPages?'disabled':'')+' onclick="goPage('+(page+1)+')">次 →</button>';

  pg.innerHTML = html;
}

function goPage(p){
  renderPage(p);
  // Scroll to top of list
  var card = document.querySelector('.news-card');
  if(card) card.scrollIntoView({behavior:'smooth', block:'start'});
}

// Modal
function nmOpen(i){
  var r = (window._newsPageItems || [])[i];
  if(!r) return;
  if(!r.body || !stripHtml(r.body)) return;
  var typeKey = r.type || 'other';
  var tc = NEWS_TYPE_COLORS[typeKey] || '#64748B';
  var tl = NEWS_TYPES[typeKey] || r.type || 'その他';
  var dateStr = formatDate(r.publishStart || r.createdAt);
  var badge = g('nm-badge');
  badge.textContent = tl;
  badge.style.background = tc;
  g('nm-title').textContent = r.title || '';
  g('nm-date').textContent = dateStr;
  g('nm-body').innerHTML = r.body || '';
  g('nm-bg').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function nmClose(){
  g('nm-bg').style.display = 'none';
  document.body.style.overflow = '';
}

document.addEventListener('keydown', function(e){ if(e.key==='Escape') nmClose(); });

// Filter event listeners
g('f-keyword').addEventListener('input', function(){
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(function(){
    currentPage = 1;
    applyFilters();
  }, 300);
});

g('f-period').addEventListener('change', function(){
  currentPage = 1;
  applyFilters();
});

// Load data from Firestore
function loadNews(){
  if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  var db = firebase.firestore();
  var now = new Date().toISOString();

  db.collection('news').get()
  .then(function(snap){
    allDocs = snap.docs
      .map(function(d){ return Object.assign({id: d.id}, d.data()); })
      .filter(function(r){
        if(!r.published) return false;
        if(r.publishStart && r.publishStart > now) return false;
        if(r.publishEnd && r.publishEnd < now) return false;
        return true;
      })
      .sort(function(a, b){
        var as = a.publishStart || a.createdAt || '';
        var bs = b.publishStart || b.createdAt || '';
        return bs.localeCompare(as);
      });

    applyFilters();
  })
  .catch(function(e){
    console.error('news load error:', e);
    g('news-list').innerHTML = '<div class="news-empty">読み込みに失敗しました</div>';
    g('results-range').textContent = '';
    g('results-total').textContent = '';
  });
}

// カスタム種別をFirestoreから読み込んでから初期化
function initWithCustomTypes(){
  if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  var db = firebase.firestore();
  db.collection('newsConfig').doc('types').get()
  .then(function(doc){
    if(doc.exists && doc.data()){
      var d = doc.data();
      if(d.colors){
        Object.assign(NEWS_TYPE_COLORS, d.colors);
      }
      if(d.customTypes){
        Object.keys(d.customTypes).forEach(function(k){
          var t = d.customTypes[k];
          NEWS_TYPES[k] = t.label;
          NEWS_TYPE_COLORS[k] = t.color || '#888888';
        });
        TYPE_KEYS = Object.keys(NEWS_TYPES);
        // カテゴリフィルタの初期状態を更新
        TYPE_KEYS.forEach(function(k){ if(!(k in activeCategories)) activeCategories[k] = true; });
      }
    }
  })
  .catch(function(){})
  .then(function(){
    buildCategoryToggles();
    loadNews();
  });
}

initWithCustomTypes();
</script>
</body>
</html>
