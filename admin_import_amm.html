async function doImport(){
  if(!confirm('ammDistilleries コレクションに152件を書き込みます。既存データは上書きされます。続行しますか？')) return;
  document.getElementById('btn-import').disabled=true;
  document.getElementById('status').textContent='書き込み中...';
  try{
    var batch=db.batch();
    RAW.forEach(function(r){
      var nom=r[2];
      var ref=db.collection('ammDistilleries').doc(nom);
      batch.set(ref,{
        nom:nom,
        distilleryName:r[1],
        rank:parseInt(r[0]),
        avgRating:parseFloat(r[3]),
        ratingCount:parseInt(r[4]),
        region:r[5],
        collectionDate:COLLECTION_DATE
      });
    });
    await batch.commit();
    document.getElementById('status').textContent='✅ 完了！152件を ammDistilleries に書き込みました。';
  }catch(e){
    document.getElementById('status').textContent='❌ エラー: '+e.message;
    document.getElementById('btn-import').disabled=false;
  }
}

async function doClear(){
  if(!confirm('ammDistilleries の全データを削除します。よろしいですか？')) return;
  document.getElementById('btn-clear').disabled=true;
  document.getElementById('status').textContent='削除中...';
  try{
    var snap=await db.collection('ammDistilleries').get();
    var batch=db.batch();
    snap.docs.forEach(function(d){batch.delete(d.ref);});
    await batch.commit();
    document.getElementById('status').textContent='✅ 全件削除しました（'+snap.size+'件）';
    document.getElementById('btn-clear').disabled=false;
  }catch(e){
    document.getElementById('status').textContent='❌ エラー: '+e.message;
    document.getElementById('btn-clear').disabled=false;
  }
}
</script>
</body>
</html>
