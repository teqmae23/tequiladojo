<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新規会員登録 | テキーラ道場</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
var FIREBASE_CONFIG = {
  apiKey:            "AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain:        "tequiladojo.firebaseapp.com",
  projectId:         "tequiladojo",
  storageBucket:     "tequiladojo.firebasestorage.app",
  messagingSenderId: "56663296233",
  appId:             "1:56663296233:web:c8cac2fcbeb4faa09e0878"
};
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#faf7f1;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;color:#18110a;min-height:100vh;}
.wrap{max-width:480px;margin:0 auto;padding:24px 16px 60px;}
.brand{text-align:center;padding:24px 0 8px;font-family:'Cormorant Garamond',serif;font-size:22px;color:#7a5610;letter-spacing:.1em;}
h1{text-align:center;font-size:16px;font-weight:600;color:#4a3820;margin-bottom:24px;}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.card-title{font-size:12px;font-weight:700;color:#9a8470;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;}
label{display:block;font-size:12px;color:#4a3820;margin-bottom:4px;margin-top:12px;}
label:first-of-type{margin-top:0;}
input,select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;color:#18110a;background:#fafaf8;outline:none;}
input:focus,select:focus{border-color:#c8921e;}
input[readonly]{background:#f0ebe0;color:#6a5840;cursor:default;}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:44px;}
.pw-eye{position:absolute;right:0;top:0;bottom:0;width:40px;background:none;border:none;cursor:pointer;font-size:16px;color:#9a8470;}
.required{color:#c00;margin-left:4px;}
.opt-note{font-size:11px;color:#888;margin-left:6px;}
.hint{font-size:11px;color:#9a8470;margin-top:3px;}
.err{color:#c00;font-size:12px;min-height:16px;margin-top:8px;}
.btn{width:100%;padding:14px;background:#c8921e;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;letter-spacing:.05em;}
.btn:disabled{opacity:.5;cursor:default;}
.btn:not(:disabled):hover{background:#a87010;}
.done{display:none;text-align:center;padding:32px 16px;}
.done-icon{font-size:48px;margin-bottom:16px;}
.done-id{font-size:28px;font-weight:700;color:#c8921e;letter-spacing:.1em;margin:12px 0;}
.done-note{font-size:13px;color:#4a3820;line-height:1.7;}
.back{display:block;text-align:center;margin-top:24px;color:#7a5610;font-size:13px;text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">🥃 テキーラ道場</div>
  <h1>新規会員登録</h1>

  <div id="form-area">
    <!-- ニックネーム -->
    <div class="card">
      <label>ニックネーム<span class="required">必須</span><span class="opt-note">（後から変更できます）</span></label>
      <input type="text" id="reg-nick" placeholder="テキーラ太郎" maxlength="20">
      <div class="hint">全角8文字（半角16文字）以内</div>
    </div>

    <!-- ログイン情報 -->
    <div class="card">
      <div class="card-title">ログイン情報 <span class="required">必須</span></div>
      <label>メールアドレス<span class="required">必須</span></label>
      <input type="email" id="reg-email" placeholder="example@email.com" autocomplete="email">
      <div class="hint">このメールアドレスでログインします</div>
      <label>パスワード <span class="required">*</span></label>
      <div class="pw-wrap">
        <input type="password" id="reg-pass" placeholder="8文字以上" autocomplete="new-password">
        <button class="pw-eye" type="button" onclick="togglePw('reg-pass',this)">👁</button>
      </div>
      <label>パスワード（確認） <span class="required">*</span></label>
      <div class="pw-wrap">
        <input type="password" id="reg-pass2" placeholder="もう一度入力" autocomplete="new-password">
        <button class="pw-eye" type="button" onclick="togglePw('reg-pass2',this)">👁</button>
      </div>
    </div>

    <div class="err" id="reg-err"></div>

    <!-- 来場履歴の引継ぎ（会員登録ボタンの直上） -->
    <div class="card" id="card-transfer">
      <label>引継コード<span class="opt-note">（※ゲスト来場済の方のみ）</span></label>
      <input type="text" id="reg-transfer" placeholder="XXXXXXXX" maxlength="8" autocomplete="off" style="text-transform:uppercase;letter-spacing:.15em;font-family:monospace">
      <div class="hint">来場時に発行された8桁のコードを入力してください</div>
    </div>

    <button class="btn" id="reg-btn" onclick="doRegister()">会員登録</button>
    <a href="/mypage.html" class="back">← ログインはこちら</a>
  </div>

  <div class="done" id="done-area">
    <div class="done-icon">🎉</div>
    <div style="font-size:14px;color:#4a3820;">登録完了！あなたの会員番号は</div>
    <div class="done-id" id="done-id">——</div>
    <div class="done-note" id="done-note">
      この番号とパスワードでログインできます。<br>
      ※ メモしておいてください
    </div>
    <a href="/mypage.html" class="btn" style="display:block;margin-top:24px;text-decoration:none;text-align:center;">マイページへ</a>
  </div>
</div>

<script>
if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
var auth = firebase.auth();
var db   = firebase.firestore();
var VIRTUAL_DOMAIN = '@tequiladojo.member';

// URL パラメータからニックネーム・引継コードをセット
(function(){
  var params=new URLSearchParams(window.location.search);
  var transfer=params.get('transfer');
  var nick=params.get('nick');

  if(nick){
    var nickEl=document.getElementById('reg-nick');
    if(nickEl){ nickEl.value=decodeURIComponent(nick); nickEl.readOnly=true; }
  }
  if(transfer){
    var el=document.getElementById('reg-transfer');
    if(el){ el.value=transfer.toUpperCase(); el.readOnly=true; }
  }
})();

function togglePw(id,btn){
  var el=document.getElementById(id);
  el.type=el.type==='password'?'text':'password';
  btn.textContent=el.type==='password'?'👁':'🙈';
}

function nickByteLen(s){
  var n=0;
  for(var i=0;i<s.length;i++) n+=(s.charCodeAt(i)>127)?2:1;
  return n;
}

function fetchNextMemberId(){
  var year=String(new Date().getFullYear()).slice(2);
  var ref=db.collection('counters').doc('members');
  return db.runTransaction(function(tx){
    return tx.get(ref).then(function(doc){
      var last=doc.exists?(doc.data().lastId||0):2;
      var next=last+1;
      tx.set(ref,{lastId:next},{merge:true});
      return year+String(next).padStart(4,'0');
    });
  });
}

function doRegister(){
  var pass     = document.getElementById('reg-pass').value;
  var pass2    = document.getElementById('reg-pass2').value;
  var nick     = document.getElementById('reg-nick').value.trim();
  var email    = document.getElementById('reg-email').value.trim();
  var transfer = (document.getElementById('reg-transfer')||{}).value;
  if(transfer) transfer=transfer.trim().toUpperCase();
  var err = document.getElementById('reg-err');
  var btn = document.getElementById('reg-btn');
  err.textContent='';

  if(!nick)              { err.textContent='ニックネームを入力してください'; return; }
  if(nickByteLen(nick)>16){ err.textContent='ニックネームは全角8文字以内'; return; }
  if(!email)             { err.textContent='メールアドレスを入力してください'; return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ err.textContent='正しいメールアドレスを入力してください'; return; }
  if(!pass)              { err.textContent='パスワードを入力してください'; return; }
  if(pass.length<8)      { err.textContent='パスワードは8文字以上'; return; }
  if(pass!==pass2)       { err.textContent='パスワードが一致しません'; return; }

  btn.disabled=true; btn.textContent='登録中...';

  if(transfer){
    doRegisterWithTransfer(transfer, pass, email, nick, err, btn);
  } else {
    doRegisterNew(pass, email, nick, err, btn);
  }
}

function doRegisterWithTransfer(transferCode, pass, email, nick, err, btn){
  var now=new Date().toISOString().slice(0,10);
  db.collection('tempRegistrations').doc(transferCode).get()
    .then(function(doc){
      if(!doc.exists){ throw new Error('引継コードが見つかりません'); }
      var d=doc.data();
      if(d.used){ throw new Error('引継コードは既に使用済みです'); }
      if(new Date(d.expiresAt)<new Date()){ throw new Error('引継コードの有効期限が切れています'); }
      var tempId=d.tempId;
      var guestNick=nick||d.nickname;
      return auth.createUserWithEmailAndPassword(email, pass)
        .then(function(cred){
          var uid=cred.user.uid;
          var as={url:'https://tequiladojo.com/member_register.html',handleCodeInApp:false};
          cred.user.sendEmailVerification(as).catch(function(){});
          var batch=db.batch();
          batch.update(db.collection('members').doc(tempId),{
            authUid:uid, email:email, nickname:guestNick,
            status:'pending', registeredAt:now, isGuest:false
          });
          batch.set(db.collection('memberIndex').doc(tempId),{email:email});
          batch.update(db.collection('tempRegistrations').doc(transferCode),{used:true});
          return batch.commit().then(function(){ return {memberId:tempId}; });
        });
    })
    .then(function(result){
      document.getElementById('form-area').style.display='none';
      document.getElementById('done-area').style.display='block';
      document.getElementById('done-id').textContent=result.memberId;
      var noteEl=document.getElementById('done-note');
      if(noteEl) noteEl.innerHTML='認証メールを送信しました。<br>メールのリンクをクリックして認証を完了してください。<br><br>認証後、マイページにログインできます。<br>来場履歴が引き継がれました。';
    })
    .catch(function(e){
      err.textContent='登録失敗: '+e.message;
      btn.disabled=false; btn.textContent='会員登録';
    });
}

function doRegisterNew(pass, email, nick, err, btn){
  var now=new Date().toISOString().slice(0,10);
  auth.createUserWithEmailAndPassword(email, pass)
    .then(function(cred){
      var uid=cred.user.uid;
      var as2={url:'https://tequiladojo.com/member_register.html',handleCodeInApp:false};
      cred.user.sendEmailVerification(as2).catch(function(){});
      return fetchNextMemberId().then(function(memberId){
        var batch=db.batch();
        batch.set(db.collection('memberIndex').doc(memberId),{email:email});
        batch.set(db.collection('members').doc(memberId),{
          authUid:uid, memberId:memberId, email:email,
          status:'pending', nickname:nick, registeredAt:now
        });
        return batch.commit().then(function(){ return {memberId:memberId}; });
      });
    })
    .then(function(result){
      document.getElementById('form-area').style.display='none';
      document.getElementById('done-area').style.display='block';
      document.getElementById('done-id').textContent=result.memberId;
      var note=document.getElementById('done-note');
      if(note) note.innerHTML='認証メールを送信しました。<br>メールのリンクをクリックして認証を完了してください。<br><br>認証後、マイページにログインできます。';
    })
    .catch(function(e){
      err.textContent='登録失敗: '+e.message;
      btn.disabled=false; btn.textContent='会員登録';
    });
}
</script>
</body>
</html>
