<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テキーラ道場 — 会員プラン</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
<script>
var FIREBASE_CONFIG={
  apiKey:"AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain:"tequiladojo.firebaseapp.com",
  projectId:"tequiladojo",
  storageBucket:"tequiladojo.firebasestorage.app",
  messagingSenderId:"56663296233",
  appId:"1:56663296233:web:c8cac2fcbeb4faa09e0878",
  measurementId:"G-KMS18946JQ"
};
</script>
<script src="/auth-role.js?v=20260714"></script>
<script src="/member-plan.js?v=20260722"></script>
<style>
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --cream:#faf7f1;--cream2:#f0ebe0;--cream3:#e4ddd0;--white:#fff;
  --red:#b03020;--teal:#1a6e58;
  --border:rgba(160,130,100,.18);--border2:rgba(160,130,100,.32);
  --shadow:0 1px 12px rgba(24,17,10,.07);--shadow-lg:0 6px 36px rgba(24,17,10,.13);
  --r:8px;--rl:14px;
  --serif:'Hiragino Mincho ProN','Yu Mincho',serif;
  --sans:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  --mono:'SFMono-Regular',Consolas,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh}
button{cursor:pointer;font-family:var(--sans)}
#login-screen{display:none;min-height:100vh;align-items:center;justify-content:center;padding:24px}
.lcard{width:100%;max-width:360px;background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);padding:40px 30px;box-shadow:var(--shadow-lg)}
.llogo{text-align:center;font-size:40px;margin-bottom:6px}
.lbrand{font-family:var(--serif);font-size:22px;color:var(--gold-d);letter-spacing:.1em;text-align:center}
.lsub{text-align:center;font-size:10px;letter-spacing:.18em;color:var(--ink3);margin-bottom:24px}
.lcard label{display:block;font-size:10px;color:var(--ink3);margin:12px 0 4px}
.lcard input{width:100%;padding:11px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--cream)}
.lerr{min-height:16px;font-size:12px;color:var(--red);margin-top:8px;text-align:center}
.lbtn{width:100%;margin-top:18px;padding:12px;background:var(--gold-d);color:var(--cream);border:none;border-radius:var(--r);font-size:13px}
.hdr{background:var(--ink);padding:0 16px;height:56px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:40}
.hdr-title{font-family:var(--serif);font-size:18px;color:var(--gold-l);letter-spacing:.06em}
.hdr-right{margin-left:auto}
.hdr-nav{padding:6px 11px;border:1px solid rgba(255,255,255,.16);border-radius:6px;color:var(--gold-l);font-size:11px;text-decoration:none}
#app{display:none}
.wrap{max-width:760px;margin:0 auto;padding:18px 14px 60px}
.banner{border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:16px}
.banner.ok{background:#e5f2ec;color:var(--teal);border:1px solid #b7dccb}
.banner.warn{background:#fbf1d5;color:var(--gold-d);border:1px solid #ecd9a0}
.cur{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:20px}
.cur-lbl{font-size:11px;color:var(--ink3)}
.cur-name{font-family:var(--serif);font-size:22px;color:var(--gold-d);margin-top:2px}
.cur-sub{font-size:12px;color:var(--ink3);margin-top:4px}
.cur-actions{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap}
.btn{border:none;border-radius:var(--r);padding:9px 15px;font-size:13px;font-weight:500}
.bp{background:var(--gold-d);color:var(--cream)}
.bg2{background:var(--cream2);color:var(--ink2);border:1px solid var(--border2)}
.sect-title{font-family:var(--serif);font-size:18px;color:var(--ink2);margin:0 2px 10px}
.plan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.pcard{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow);padding:16px 16px 18px;display:flex;flex-direction:column}
.pcard.current{border-color:var(--gold);box-shadow:0 0 0 2px rgba(200,146,30,.25)}
.pc-name{font-size:16px;font-weight:700}
.pc-price{font-family:var(--mono);font-size:18px;color:var(--gold-d);margin:6px 0 10px}
.pc-feats{list-style:none;margin:0 0 14px;padding:0;font-size:12px;color:var(--ink2);flex:1}
.pc-feats li{padding:3px 0;display:flex;gap:6px;align-items:center}
.pc-feats li.off{color:var(--ink3);opacity:.5}
.pc-btn{margin-top:auto;padding:10px;border-radius:var(--r);border:none;font-size:13px;font-weight:600;background:var(--gold-d);color:var(--cream)}
.pc-btn.cur{background:var(--cream2);color:var(--ink3);cursor:default}
.pc-badge{display:inline-block;font-size:10px;font-weight:700;color:#fff;background:var(--gold-d);border-radius:10px;padding:2px 8px;margin-bottom:6px}
.empty{text-align:center;color:var(--ink3);padding:40px 20px;font-size:13px;background:var(--white);border:1px dashed var(--cream3);border-radius:var(--rl)}
.note{font-size:11px;color:var(--ink3);margin-top:16px;line-height:1.7}
#toasts{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--ink);color:#fff;font-size:12px;padding:9px 14px;border-radius:8px;box-shadow:var(--shadow-lg);opacity:0;transform:translateY(8px);transition:.25s}
.toast.show{opacity:1;transform:none}
.toast.err{background:var(--red)}
</style>
</head>
<body>

<div id="login-screen">
  <div class="lcard">
    <div class="llogo">🎫</div>
    <div class="lbrand">テキーラ道場</div>
    <div class="lsub">会員プラン</div>
    <label>メールアドレス</label>
    <input type="email" id="lemail" autocomplete="username">
    <label>パスワード</label>
    <input type="password" id="lpass" autocomplete="current-password">
    <div class="lerr" id="lerr"></div>
    <button class="lbtn" id="lbtn">ログイン</button>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-title">🎫 会員プラン</div>
    <div class="hdr-right"><a class="hdr-nav" href="/member.html">マイページ</a></div>
  </div>
  <div class="wrap">
    <div id="banner"></div>
    <div class="cur" id="cur"></div>
    <div class="sect-title">プラン一覧</div>
    <div class="plan-grid" id="plan-grid"></div>
    <div class="empty" id="plan-empty" style="display:none;">現在ご案内できる有料プランはありません。</div>
    <div class="note">
      ・お支払いはクレジットカード（Stripe）による毎月の自動更新です。<br>
      ・解約は「サブスクを管理・解約」からいつでも可能です（次回更新日以降の課金が停止します）。<br>
      ・詳細は<a href="/tokushoho.html" style="color:var(--gold-d)">特定商取引法に基づく表記</a>をご確認ください。
    </div>
  </div>
</div>

<div id="toasts"></div>

<script>
firebase.initializeApp(FIREBASE_CONFIG);
var auth=firebase.auth(), db=firebase.firestore();
var fns=firebase.app().functions(); // us-central1（Stripe関数）
function g(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,type){
  var el=document.createElement('div'); el.className='toast'+(type?' '+type:''); el.textContent=msg;
  g('toasts').appendChild(el);
  requestAnimationFrame(function(){requestAnimationFrame(function(){el.classList.add('show');});});
  setTimeout(function(){el.classList.remove('show');setTimeout(function(){el.remove();},300);},3200);
}
function errMsg(e){ return (e&&e.message)?e.message:'エラーが発生しました'; }

var myMember={}, plans=[];

// ?checkout=success / cancel のバナー
(function(){
  var p=new URLSearchParams(location.search).get('checkout');
  if(p==='success') g('banner').innerHTML='<div class="banner ok">✓ お申し込みありがとうございます。反映まで少し時間がかかる場合があります。</div>';
  else if(p==='cancel') g('banner').innerHTML='<div class="banner warn">お手続きはキャンセルされました。</div>';
})();

AuthRole.requireMember(auth, function(user){
  g('app').style.display='block';
  init(user);
}, function(){ g('login-screen').style.display='flex'; });
g('lbtn').addEventListener('click',function(){
  auth.signInWithEmailAndPassword((g('lemail').value||'').trim(),g('lpass').value).catch(function(e){ g('lerr').textContent=e.message; });
});
g('lpass').addEventListener('keydown',function(e){ if(e.key==='Enter') g('lbtn').click(); });

async function init(user){
  try{
    var snap=await db.collection('members').where('authUid','==',user.uid).limit(1).get();
    myMember=snap.empty?{}:Object.assign({id:snap.docs[0].id},snap.docs[0].data());
    plans=await MemberPlan.loadPlans(db);
    render();
  }catch(e){ toast('読み込み失敗: '+errMsg(e),'err'); }
}

function render(){
  var eff=MemberPlan.effectivePlan(myMember, plans);
  var hasSub=(myMember.subscriptionStatus==='active');
  // 現在のプラン
  var subInfo='';
  if(myMember.subscriptionStatus){
    var st={active:'有効',past_due:'支払い遅延',canceled:'解約済み'}[myMember.subscriptionStatus]||myMember.subscriptionStatus;
    subInfo='サブスク状態：'+esc(st);
    if(myMember.subscriptionPeriodEnd&&myMember.subscriptionPeriodEnd.seconds){
      var d=new Date(myMember.subscriptionPeriodEnd.seconds*1000);
      subInfo+='　/　次回更新：'+d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
    }
  }
  g('cur').innerHTML='<div class="cur-lbl">現在のプラン</div>'
    +'<div class="cur-name">'+esc(eff?eff.name:'—')+'</div>'
    +(subInfo?'<div class="cur-sub">'+subInfo+'</div>':'')
    +'<div class="cur-actions">'
      +(hasSub?'<button class="btn bg2" onclick="openPortal()">サブスクを管理・解約</button>':'')
    +'</div>';

  // 購入可能プラン（Stripe Price ID があり有効なもの）
  var buyable=plans.filter(function(p){
    var active=(p.active===undefined||p.active===1||p.active==='1'||p.active===true);
    return active && p.stripePriceId && Number(p.level||0)>0;
  });
  if(!buyable.length){ g('plan-grid').innerHTML=''; g('plan-empty').style.display='block'; return; }
  g('plan-empty').style.display='none';
  g('plan-grid').innerHTML=buyable.map(function(p){
    var isCurrent=(eff&&eff.id===p.id);
    var feats=MemberPlan.FEATURES.map(function(f){
      var on=!!(p.features&&p.features[f.key]);
      return '<li class="'+(on?'':'off')+'">'+(on?'✓':'—')+' '+f.icon+' '+esc(f.label)+'</li>';
    }).join('');
    return '<div class="pcard'+(isCurrent?' current':'')+'">'
      +(isCurrent?'<span class="pc-badge">利用中</span>':'')
      +'<div class="pc-name">'+esc(p.name)+'</div>'
      +'<div class="pc-price">'+esc(p.priceLabel||'—')+'</div>'
      +'<ul class="pc-feats">'+feats+'</ul>'
      +(isCurrent
        ? '<button class="pc-btn cur" disabled>現在のプラン</button>'
        : '<button class="pc-btn" onclick="subscribe(\''+esc(p.id)+'\',this)">このプランに申し込む</button>')
    +'</div>';
  }).join('');
}

function subscribe(planId, btn){
  if(btn){ btn.disabled=true; btn.textContent='処理中…'; }
  fns.httpsCallable('createSubscriptionCheckout')({planId:planId, origin:location.origin})
    .then(function(res){
      if(res.data&&res.data.url){ location.href=res.data.url; }
      else { toast('セッションを作成できませんでした','err'); if(btn){btn.disabled=false;btn.textContent='このプランに申し込む';} }
    })
    .catch(function(e){ toast(errMsg(e),'err'); if(btn){btn.disabled=false;btn.textContent='このプランに申し込む';} });
}
function openPortal(){
  fns.httpsCallable('createCustomerPortal')({origin:location.origin})
    .then(function(res){ if(res.data&&res.data.url) location.href=res.data.url; else toast('ポータルを開けませんでした','err'); })
    .catch(function(e){ toast(errMsg(e),'err'); });
}
</script>
</body>
</html>
