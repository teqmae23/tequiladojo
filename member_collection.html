<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テキーラ道場 — バッジコレクション</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script>
var FIREBASE_CONFIG={
  apiKey:"AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain:"tequiladojo.firebaseapp.com",
  projectId:"tequiladojo",
  storageBucket:"tequiladojo.firebasestorage.app",
  messagingSenderId:"56663296233",
  appId:"1:56663296233:web:c8cac2fcbeb4faa09e0878",
  measurementId:"G-KMS18946JQ"
};
</script>
<script src="/auth-role.js?v=20260521"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --teal:#1a6e58;--teal-l:#e0f0eb;
  --red:#8c2818;--red-l:#fae8e4;
  --cream:#faf7f1;--cream2:#f0ebe0;--cream3:#e4ddd0;--white:#fff;
  --border:rgba(160,130,100,.18);--border2:rgba(160,130,100,.32);
  --shadow:0 1px 12px rgba(24,17,10,.07);--shadow-lg:0 6px 36px rgba(24,17,10,.13);
  --r:6px;--rl:12px;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Noto Sans JP',sans-serif;
  --mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh}
button{cursor:pointer;font-family:var(--sans)}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 30% 60%,rgba(200,146,30,.07),transparent),var(--cream)}
.lcard{width:100%;max-width:380px;background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);padding:44px 36px;box-shadow:var(--shadow-lg)}
.llogo{text-align:center;font-size:44px;margin-bottom:6px}
.lbrand{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--gold-d);letter-spacing:.14em;text-align:center;margin-bottom:2px}
.lsub{text-align:center;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:32px}
.lcard label{display:block;font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;margin-top:14px}
.lcard input{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--cream);color:var(--ink)}
.lcard input:focus{outline:none;border-color:var(--gold)}
.lerr{min-height:16px;font-size:12px;color:var(--red);margin-top:8px;text-align:center}
.lbtn{width:100%;margin-top:22px;padding:13px;background:var(--gold-d);color:var(--cream);border:none;border-radius:var(--r);font-size:13px;font-weight:500}
.lbtn:hover{background:var(--gold)}
.header{background:var(--ink);padding:14px 16px;display:flex;align-items:center;gap:12px}
.header-title{font-family:var(--serif);font-size:20px;color:rgba(255,255,255,.9);letter-spacing:.08em}
.header-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.main{max-width:760px;margin:0 auto;padding:20px 16px 60px}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:20px;margin-bottom:20px;box-shadow:var(--shadow)}
.btn{border:none;border-radius:var(--r);padding:8px 16px;font-size:12px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn.bs{background:var(--cream2);color:var(--ink2);border:1px solid var(--border2)}
.btn.bs:hover{background:var(--cream3)}
.btn.bp{background:var(--teal);color:var(--white)}
.btn.bp:hover{opacity:.85}
.btn.bg{background:var(--gold-d);color:var(--cream)}
.btn.bg:hover{opacity:.85}
/* Badge grid */
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:4px}
.badge-tile{border:2px solid var(--border2);border-radius:10px;padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;transition:border-color .2s,background .2s}
.badge-tile.earned{border-color:var(--gold);background:rgba(200,146,30,.06)}
.badge-tile.locked{opacity:.45;filter:grayscale(.6)}
.badge-icon{font-size:36px;line-height:1}
.badge-name{font-size:12px;font-weight:500;color:var(--ink2)}
.badge-desc{font-size:10px;color:var(--ink3);line-height:1.4}
.badge-date{font-size:10px;color:var(--teal);margin-top:2px}
.badge-lock{font-size:10px;color:var(--ink3);margin-top:2px}
/* Public toggle */
.pub-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.pub-status{font-size:13px;font-weight:500}
.pub-url{font-size:11px;color:var(--teal);word-break:break-all;margin-top:6px;display:none}
.toggle-switch{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute}
.toggle-knob{position:absolute;inset:0;border-radius:24px;background:var(--cream3);cursor:pointer;transition:.2s}
.toggle-knob:before{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:var(--white);top:3px;left:3px;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle-switch input:checked+.toggle-knob{background:var(--teal)}
.toggle-switch input:checked+.toggle-knob:before{transform:translateX(20px)}
/* Toast */
#toast-wrap{position:fixed;bottom:20px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:999}
.toast{background:var(--ink);color:#fff;padding:10px 16px;border-radius:var(--r);font-size:12px;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;max-width:320px}
.toast.show{opacity:1;transform:none}
.toast.inf{background:var(--teal)}
</style>
</head>
<body>

<div id="login-screen" style="display:none">
  <div class="lcard">
    <div class="llogo">🎖️</div>
    <div class="lbrand">TEQUILA DOJO</div>
    <div class="lsub">Badge Collection</div>
    <label>メールアドレス</label>
    <input type="email" id="lemail" placeholder="member@tequiladojo.member">
    <label>パスワード</label>
    <input type="password" id="lpass">
    <div class="lerr" id="lerr"></div>
    <button class="lbtn" id="lbtn">ログイン</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="header">
    <div>
      <div class="header-title">🎖️ バッジコレクション</div>
      <div class="header-sub" id="header-member-name"></div>
    </div>
  </div>
  <div class="main">

    <!-- 公開設定 -->
    <div class="card">
      <div style="font-size:13px;font-weight:500;color:var(--ink2);margin-bottom:12px">コレクションの公開設定</div>
      <div class="pub-bar">
        <label class="toggle-switch">
          <input type="checkbox" id="pub-toggle">
          <div class="toggle-knob"></div>
        </label>
        <div>
          <div class="pub-status" id="pub-status-text">非公開</div>
          <div style="font-size:10px;color:var(--ink3)">公開すると、URLを知っている人がコレクションを閲覧できます</div>
        </div>
      </div>
      <div class="pub-url" id="pub-url-area">
        公開URL: <span id="pub-url-text"></span>
        <button class="btn bs" style="padding:3px 10px;font-size:11px;margin-left:8px" id="btn-copy-url">コピー</button>
      </div>
    </div>

    <!-- バッジ一覧 -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div>
          <span style="font-size:15px;font-weight:500;color:var(--ink2)">取得バッジ</span>
          <span style="font-size:12px;color:var(--ink3);margin-left:8px" id="badge-count-label"></span>
        </div>
      </div>
      <div class="badge-grid" id="badge-grid"></div>
      <div id="badge-loading" style="color:var(--ink3);font-size:12px;padding:20px;text-align:center">読み込み中…</div>
    </div>

  </div>
</div>

<div id="toast-wrap"></div>

<script>
firebase.initializeApp(FIREBASE_CONFIG);
var auth=firebase.auth(), db=firebase.firestore();
var myMemberId=null, myMember=null;
var allBadges=[], myBadges=[];

function g(id){return document.getElementById(id);}
function gv(id){var e=g(id);return e?e.value:'';}
function toast(msg,type){
  var w=g('toast-wrap'),el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');el.textContent=msg;
  w.appendChild(el);
  requestAnimationFrame(function(){requestAnimationFrame(function(){el.classList.add('show');});});
  setTimeout(function(){el.classList.remove('show');setTimeout(function(){el.remove();},300);},3000);
}

AuthRole.requireMember(auth,async function(user){
  g('app').style.display='block';
  await loadMemberData(user);
},function(){
  g('login-screen').style.display='flex';
});
g('lbtn').addEventListener('click',function(){
  auth.signInWithEmailAndPassword(gv('lemail'),gv('lpass')).catch(function(e){g('lerr').textContent=e.message;});
});

async function loadMemberData(user){
  // 自分のメンバードキュメント取得
  var snap=await db.collection('members').where('authUid','==',user.uid).limit(1).get();
  if(snap.empty){
    g('badge-loading').textContent='会員情報が見つかりません';
    return;
  }
  myMember=Object.assign({id:snap.docs[0].id},snap.docs[0].data());
  myMemberId=myMember.memberId||myMember.id;
  g('header-member-name').textContent=myMember.nickname||myMember.name||myMemberId;

  // 公開設定の反映
  var isPublic=myMember.badgePublic===true;
  g('pub-toggle').checked=isPublic;
  updatePubUI(isPublic, myMember.badgeCollectionUrl||null);

  // バッジ読み込み
  await Promise.all([loadAllBadges(),loadMyBadges()]);
  renderBadgeGrid();
}

async function loadAllBadges(){
  var snap=await db.collection('badges').where('active','==',true).get();
  allBadges=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
  allBadges.sort(function(a,b){return a.id.localeCompare(b.id);});
}
async function loadMyBadges(){
  var snap=await db.collection('memberBadges').where('memberId','==',myMemberId).get();
  myBadges=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
}

function renderBadgeGrid(){
  var grid=g('badge-grid');
  g('badge-loading').style.display='none';
  var earnedMap={};
  myBadges.forEach(function(mb){earnedMap[mb.badgeId]=mb;});
  var earnedCount=myBadges.filter(function(mb){return allBadges.some(function(b){return b.id===mb.badgeId;});}).length;
  g('badge-count-label').textContent=earnedCount+' / '+allBadges.length;

  if(!allBadges.length){
    grid.innerHTML='<div style="color:var(--ink3);font-size:12px;grid-column:1/-1;padding:20px 0">バッジはまだ登録されていません</div>';
    return;
  }
  grid.innerHTML=allBadges.map(function(b){
    var mb=earnedMap[b.id];
    var earned=!!mb;
    var dt=mb&&mb.earnedAt?(mb.earnedAt.toDate?mb.earnedAt.toDate():new Date(mb.earnedAt)).toLocaleDateString('ja-JP'):'';
    return '<div class="badge-tile'+(earned?' earned':' locked')+'">'
      +'<div class="badge-icon">'+(b.icon||'🎖️')+'</div>'
      +'<div class="badge-name">'+esc(b.name)+'</div>'
      +(b.description?'<div class="badge-desc">'+esc(b.description)+'</div>':'')
      +(earned?'<div class="badge-date">'+dt+'</div>':'<div class="badge-lock">🔒 未取得</div>')
    +'</div>';
  }).join('');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── 静的HTML生成・Storage操作 ───────────────────────────────────
var storage=firebase.storage();

function collectionStoragePath(mid){
  return 'public/collections/'+mid+'.html';
}

function genCollectionHtml(memberName,allBadgesArg,earnedMap){
  var now=new Date().toLocaleDateString('ja-JP');
  var badgeRows=allBadgesArg.map(function(b){
    var mb=earnedMap[b.id];
    var earned=!!mb;
    var dt=mb&&mb.earnedAt?(mb.earnedAt.toDate?mb.earnedAt.toDate():new Date(mb.earnedAt)).toLocaleDateString('ja-JP'):'';
    return '<div style="border:2px solid '+(earned?'#c8921e':'#d0c8bc')+';border-radius:10px;padding:14px 10px;'
      +'display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;'
      +'background:'+(earned?'rgba(200,146,30,.06)':'#fff')+(earned?'':';opacity:.45;filter:grayscale(.5)')+';">'
      +'<div style="font-size:34px;line-height:1">'+(b.icon||'🎖️')+'</div>'
      +'<div style="font-size:12px;font-weight:600;color:#4a3820">'+esc(b.name)+'</div>'
      +(b.description?'<div style="font-size:10px;color:#9a8470;line-height:1.4">'+esc(b.description)+'</div>':'')
      +(earned?'<div style="font-size:10px;color:#1a6e58;margin-top:2px">取得: '+dt+'</div>'
               :'<div style="font-size:10px;color:#9a8470;margin-top:2px">🔒</div>')
    +'</div>';
  }).join('');

  var earnedCount=allBadgesArg.filter(function(b){return !!earnedMap[b.id];}).length;

  return '<!DOCTYPE html>\n<html lang="ja">\n<head>\n<meta charset="UTF-8">'
    +'<meta name="viewport" content="width=device-width,initial-scale=1">'
    +'<title>'+esc(memberName)+' のバッジコレクション — テキーラ道場</title>'
    +'<link rel="preconnect" href="https://fonts.googleapis.com">'
    +'<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">'
    +'<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:"Noto Sans JP",sans-serif;background:#faf7f1;color:#18110a;min-height:100vh}'
    +'.hero{background:#18110a;padding:28px 20px 22px;text-align:center}'
    +'.brand{font-family:"Cormorant Garamond",serif;font-size:22px;color:rgba(255,255,255,.9);letter-spacing:.12em}'
    +'.sub{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:3px}'
    +'.name{font-size:18px;color:#e8b84a;font-weight:500;margin-top:12px}'
    +'.cnt{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}'
    +'.main{max-width:700px;margin:0 auto;padding:20px 16px 50px}'
    +'.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}'
    +'.foot{text-align:center;font-size:10px;color:#9a8470;margin-top:30px}'
    +'</style></head><body>'
    +'<div class="hero">'
    +'<div class="brand">TEQUILA DOJO</div>'
    +'<div class="sub">Badge Collection</div>'
    +'<div class="name">'+esc(memberName)+'</div>'
    +'<div class="cnt">'+earnedCount+' / '+allBadgesArg.length+' バッジ取得済み</div>'
    +'</div>'
    +'<div class="main"><div class="grid">'+badgeRows+'</div>'
    +'<div class="foot">Generated: '+now+' — テキーラ道場</div></div>'
    +'</body></html>';
}

async function uploadCollectionHtml(mid){
  var earnedMap={};
  myBadges.forEach(function(mb){earnedMap[mb.badgeId]=mb;});
  var html=genCollectionHtml(myMember.nickname||myMember.name||mid, allBadges, earnedMap);
  var blob=new Blob([html],{type:'text/html;charset=utf-8'});
  var ref=storage.ref(collectionStoragePath(mid));
  await ref.put(blob,{contentType:'text/html;charset=utf-8',cacheControl:'no-cache'});
  return await ref.getDownloadURL();
}

async function deleteCollectionHtml(mid){
  try{
    await storage.ref(collectionStoragePath(mid)).delete();
  }catch(e){
    // ファイルが存在しない場合は無視
    if(e.code!=='storage/object-not-found') throw e;
  }
}

// ── 公開設定トグル ────────────────────────────────────────────────
function updatePubUI(isPublic, url){
  g('pub-status-text').textContent=isPublic?'公開中':'非公開';
  g('pub-status-text').style.color=isPublic?'var(--teal)':'var(--ink3)';
  var urlArea=g('pub-url-area');
  if(isPublic&&url){
    urlArea.style.display='block';
    g('pub-url-text').textContent=url;
  } else {
    urlArea.style.display='none';
  }
}

g('pub-toggle').addEventListener('change',async function(){
  var isPublic=this.checked;
  this.disabled=true;
  try{
    if(isPublic){
      var url=await uploadCollectionHtml(myMemberId);
      await db.collection('members').doc(myMember.id).update({badgePublic:true, badgeCollectionUrl:url});
      myMember.badgePublic=true; myMember.badgeCollectionUrl=url;
      updatePubUI(true, url);
      toast('コレクションを公開しました','inf');
    } else {
      await deleteCollectionHtml(myMemberId);
      await db.collection('members').doc(myMember.id).update({badgePublic:false, badgeCollectionUrl:null});
      myMember.badgePublic=false; myMember.badgeCollectionUrl=null;
      updatePubUI(false);
      toast('コレクションを非公開にしました（静的ページを削除しました）');
    }
  }catch(e){
    this.checked=!isPublic;
    toast('保存に失敗しました: '+e.message,'err');
  }
  this.disabled=false;
});

g('btn-copy-url').addEventListener('click',function(){
  var url=g('pub-url-text').textContent;
  navigator.clipboard.writeText(url).then(function(){toast('URLをコピーしました','inf');}).catch(function(){toast('コピーできませんでした');});
});
</script>
</body>
</html>
