<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>マイページ - テキーラ道場</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --red:#8c2818;--red-l:#fae8e4;
  --green:#1a6640;--green-l:#e4f2ea;
  --cream:#faf7f1;--cream2:#f0ebe0;--cream3:#e4ddd0;--white:#fff;
  --border:rgba(160,130,100,.18);--border2:rgba(160,130,100,.32);
  --shadow:0 1px 12px rgba(24,17,10,.07);--shadow-lg:0 6px 36px rgba(24,17,10,.13);
  --r:8px;--rl:14px;
  --serif:'Noto Sans JP',sans-serif;
  --sans:'Noto Sans JP',sans-serif;
  --mono:'DM Mono',monospace;
}
html,body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh}
button{cursor:pointer;font-family:var(--sans);border:none}
input,select{font-family:var(--sans)}

/* ─── ログイン画面 ─── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse 80% 60% at 30% 60%,rgba(200,146,30,.07),transparent),var(--cream)}
.lcard{width:100%;max-width:360px;background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);padding:40px 28px;box-shadow:var(--shadow-lg)}
.lbrand{font-family:var(--serif);font-size:24px;font-weight:600;color:var(--gold-d);letter-spacing:.14em;text-align:center;margin-bottom:6px}
.lsub{font-size:12px;color:var(--ink3);text-align:center;margin-bottom:28px}
.lcard label{display:block;font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;margin-top:14px}
.lcard input{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:var(--r);font-size:14px;background:var(--cream);color:var(--ink);outline:none}
.lcard input:focus{border-color:var(--gold)}
.lerr{min-height:16px;font-size:12px;color:var(--red);margin-top:8px;text-align:center}
.lbtn{width:100%;margin-top:20px;padding:13px;background:var(--gold-d);color:var(--cream);border-radius:var(--r);font-size:14px;font-weight:500;transition:background .15s}
.lbtn:hover{background:var(--gold)}
.lbtn:disabled{background:var(--cream3);color:var(--ink3);cursor:not-allowed}

/* ─── メイン ─── */
#main-screen{display:none}
.topbar{background:var(--ink);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.top-brand{font-size:14px;color:var(--gold-l);letter-spacing:.04em;flex:1;font-weight:500}
.top-home-btn{background:none;border:1px solid rgba(200,146,30,.6);color:var(--gold-l);padding:5px 12px;border-radius:var(--r);font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap;}
.top-home-btn:hover{background:rgba(200,146,30,.15);}
.top-logout{background:none;border:1px solid rgba(255,255,255,.35);color:rgba(255,255,255,.7);padding:5px 12px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;}
.top-logout:hover{border-color:rgba(255,255,255,.7);color:#fff;}
.top-logout:hover{border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.6)}

.container{max-width:600px;margin:0 auto;padding:16px}

/* プロフィールバー */
.profile-bar{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);flex-wrap:wrap}
.profile-avatar{width:48px;height:48px;border-radius:50%;background:var(--gold-d);color:var(--cream);font-family:var(--serif);font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.profile-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.profile-avatar svg{width:32px;height:32px;opacity:.85}
/* 左側：アイコン＋名前エリア */
.profile-left{display:flex;align-items:center;gap:14px;flex:1;min-width:0}
.profile-name-area{min-width:0}
.profile-name{font-size:17px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.profile-id{font-family:var(--mono);font-size:11px;color:var(--ink3);margin-top:2px}
.profile-badges{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
/* 会員区分バッジ */
.mem-badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:600;letter-spacing:.06em}
.mb-active{background:#e0f5e0;color:#1a6e1a;border:1px solid #7adf7a}
.mb-pending{background:#fff0dc;color:#b06000;border:1px solid #f0c080}
.mb-temp{background:#e0eeff;color:#1a3a8a;border:1px solid #80a8f0}
.mb-guest{background:#e8ddd0;color:#5a3a1a;border:1px solid #c0a080}
/* 認証メール再送ボタン */
.btn-resend{padding:2px 9px;border-radius:10px;font-size:10px;font-weight:500;background:none;border:1px solid var(--gold-d);color:var(--gold-d);cursor:pointer;white-space:nowrap}
.btn-resend:hover{background:var(--gold-d);color:var(--cream)}
/* 右側：CLASSと段位 */
.profile-right{margin-left:auto;text-align:left;display:flex;flex-direction:column;align-items:flex-start;gap:2px;flex-shrink:0}
.profile-right-label{font-size:9px;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.profile-stat-lbl{font-size:10px;color:var(--ink3);letter-spacing:.06em}
/* CLASSバッジ */
.class-badge{display:inline-block;padding:3px 10px;border-radius:14px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.class-blanco{background:#f5f5f5;color:#555;border:1px solid #ccc}
.class-reposado{background:#fff0dc;color:#b06000;border:1px solid #f0c080}
.class-anejo{background:#ffe0b0;color:#7a3800;border:1px solid #e09040}
.class-x-anejo{background:#3a1a00;color:#e8b84a;border:1px solid #7a5610}
/* 段位 */
.rank-badge{font-family:var(--mono);font-size:12px;color:var(--ink2);margin-top:2px}
/* フィルターを sec-header の下に移動するため非表示にしない */
.filter-bar-inner{padding:10px 0 4px;border-bottom:1px solid var(--cream3);margin-bottom:10px}

/* フィルター */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.fi{padding:8px 10px;border:1px solid var(--border2);border-radius:var(--r);background:var(--white);font-size:13px;color:var(--ink);outline:none}
.fi:focus{border-color:var(--gold)}
select.fi{min-width:80px}
.filter-label{font-size:12px;color:var(--ink3);white-space:nowrap}
.btn-filter-reset{padding:6px 12px;background:var(--cream2);border:1px solid var(--border2);border-radius:var(--r);font-size:12px;color:var(--ink3)}
.btn-filter-reset:hover{color:var(--ink);border-color:var(--gold)}

/* サマリーバー */
.summary-bar{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.sum-chip{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:8px 14px;font-size:12px;color:var(--ink3);flex:1;min-width:100px;text-align:center}
.sum-chip strong{display:block;font-family:var(--serif);font-size:18px;color:var(--gold-d);font-weight:600}

/* 来場リスト */
.sec-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--cream3)}
.sec-title{font-family:var(--serif);font-size:17px;font-weight:600}
.sec-count{background:var(--cream2);color:var(--ink3);font-size:11px;padding:2px 8px;border-radius:10px;font-family:var(--mono)}

.visit-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:box-shadow .15s}
.visit-card:hover{box-shadow:0 3px 16px rgba(24,17,10,.12)}
.visit-card.open{border-color:var(--gold-d)}
.visit-header{display:flex;align-items:center;gap:10px;padding:12px 14px}
.visit-date{font-size:15px;font-weight:600;color:var(--ink)}
.visit-time{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.visit-badges{display:flex;gap:5px;margin-left:4px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.badge-blind{background:#f3eaff;color:#6b3fa0}
.badge-items{background:var(--cream2);color:var(--ink3)}
.visit-amount{margin-left:auto;font-family:var(--serif);font-size:16px;font-weight:600;color:var(--gold-d);white-space:nowrap}
.visit-tequila{font-size:11px;color:var(--ink3);text-align:right;margin-top:1px}
.visit-chevron{font-size:12px;color:var(--ink3);margin-left:6px;transition:transform .2s;flex-shrink:0}
.visit-card.open .visit-chevron{transform:rotate(180deg)}

/* 注文詳細パネル */
.visit-detail{display:none;border-top:1px solid var(--border);background:var(--cream)}
.visit-card.open .visit-detail{display:block}
.og-item.og-item-cancelled{opacity:.5}
.og-item-cancelled-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--red-l);color:var(--red);border:1px solid var(--red);flex-shrink:0}

.order-group{border-bottom:1px solid var(--border)}
.order-group:last-child{border-bottom:none}
.og-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--cream2)}
.og-time{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.og-badge{font-size:10px;padding:1px 6px;border-radius:8px}
.og-together{font-size:11px;color:var(--teal);cursor:pointer;text-decoration:underline;text-underline-offset:2px;flex-shrink:0}
.og-together:hover{color:var(--gold-d)}
.together-popup{position:fixed;background:var(--white);border:1px solid var(--border2);border-radius:var(--r);padding:10px 14px;box-shadow:var(--shadow-lg);z-index:500;font-size:12px;min-width:120px;max-width:200px}
.together-popup-name{padding:3px 0;color:var(--ink2);display:flex;align-items:center;gap:6px}
.og-total{margin-left:auto;font-size:12px;font-weight:600;color:var(--gold-d)}
.og-items{}
.og-item{display:flex;align-items:center;padding:8px 14px 8px 24px;border-bottom:1px solid var(--border);gap:8px;font-size:13px}
.og-item:last-child{border-bottom:none}
.og-item-mark{font-size:14px;flex-shrink:0}
.og-item-name{flex:1;color:var(--ink)}
.og-item-qty{font-size:11px;color:var(--ink3);font-family:var(--mono)}
.og-item-price{font-size:12px;color:var(--gold-d);font-weight:500;white-space:nowrap}

/* ブラインド結果ボタン */
.blind-result-btn{margin:8px 14px 10px;display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f3eaff;border:1px solid #c9a8f0;border-radius:var(--r);cursor:pointer;font-size:12px;color:#6b3fa0;width:calc(100% - 28px)}
.blind-result-btn:hover{background:#ecdeff}
/* ブラインド結果テーブル（checkin.htmlと共通） */
.bpop-info{padding:8px 14px;background:var(--cream);font-size:12px;color:var(--ink2);border-bottom:1px solid var(--border)}
.bpop-table-wrap{overflow-x:auto}
.bpop-table{border-collapse:collapse;width:100%;font-size:12px}
.bpop-table th,.bpop-table td{border:1px solid var(--border2);padding:4px 3px;text-align:center;white-space:nowrap}
.bpop-table th{background:var(--cream2);font-size:10px;font-weight:600;color:var(--ink3)}
.bpop-table th.name-th{text-align:left;padding-left:8px}
.bpop-table td.name-td{text-align:left;padding-left:8px;font-weight:600;font-size:12px;min-width:60px}
.bpop-table td.correct{background:#d4edda}
.bpop-table td.wrong{background:#f8d7da}
.bpop-table td.score-td{font-family:var(--mono);font-weight:700;color:var(--gold-d)}
.bpop-legend{padding:8px 14px;background:var(--cream);border-top:1px solid var(--border)}
.bpop-legend-title{font-size:10px;font-weight:600;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.bpop-legend-row{display:flex;align-items:center;gap:6px;padding:2px 0;font-size:12px}
.bpop-legend-num{min-width:22px;text-align:center}

/* ブラインド結果モーダル */
#blind-modal{display:none;position:fixed;inset:0;background:rgba(24,17,10,.55);z-index:200;align-items:center;justify-content:center;padding:16px}
#blind-modal.open{display:flex}
.bm-panel{background:var(--white);border-radius:var(--rl);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.bm-header{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);gap:10px}
.bm-title{font-family:var(--serif);font-size:18px;font-weight:600;flex:1}
.bm-close{background:none;border:1px solid var(--border2);color:var(--ink3);padding:5px 10px;border-radius:var(--r);font-size:13px}
.bm-body{padding:16px}
.bm-score{text-align:center;padding:16px 0 20px;border-bottom:1px solid var(--border);margin-bottom:16px}
.bm-score-num{font-family:var(--serif);font-size:48px;font-weight:600;line-height:1}
.bm-score-num.win{color:var(--gold-d)}
.bm-score-num.lose{color:var(--ink3)}
.bm-score-lbl{font-size:13px;color:var(--ink3);margin-top:4px}
.bm-winner{font-size:12px;color:var(--green);font-weight:500;margin-top:8px}
.bm-ans-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.bm-ans-row:last-child{border-bottom:none}
.bm-ans-mark{font-size:16px;width:24px;text-align:center;flex-shrink:0}
.bm-ans-actual{flex:1;color:var(--ink2)}
.bm-ans-arrow{color:var(--ink3);font-size:11px}
.bm-ans-guess{flex:1;color:var(--ink3)}
.bm-ans-result{font-size:14px;flex-shrink:0}
.bm-ans-row.correct .bm-ans-guess{color:var(--green);font-weight:500}
.bm-ans-row.wrong .bm-ans-guess{color:var(--red)}

/* ローディング・空状態 */
.loading{text-align:center;padding:40px;color:var(--ink3);font-size:14px}
.empty{text-align:center;padding:40px 20px;color:var(--ink3);font-size:14px}
.empty-icon{font-size:32px;margin-bottom:10px}

/* データ確認バナー */
.debug-banner{background:#fff8e1;border:1px solid #f0c040;border-radius:var(--r);padding:10px 14px;margin-bottom:12px;font-size:12px;color:#7a5610;display:none}
.debug-banner.show{display:block}
</style>
</head>
<body>
<style id="auth-hide-style">
  #login-screen, #main-screen { visibility: hidden; }
</style>

<!-- ─── ログイン ─── -->
<div id="login-screen">
  <div class="lcard">
    <div class="lbrand">テキーラ道場</div>
    <div class="lsub">会員マイページ</div>
    <label>会員ID または メールアドレス</label>
    <input type="text" id="l-id" placeholder="26XXXX または メールアドレス" autocomplete="username">
    <label>パスワード</label>
    <div style="position:relative;">
      <input type="password" id="l-pw" placeholder="パスワード" autocomplete="current-password" style="width:100%;padding-right:44px;">
      <button type="button" onclick="var i=document.getElementById('l-pw');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁':'🙈';" style="position:absolute;right:0;top:0;bottom:0;width:40px;background:none;border:none;cursor:pointer;font-size:16px;">👁</button>
    </div>
    <div class="lerr" id="l-err"></div>
    <button class="lbtn" id="l-btn" onclick="doLogin()">ログイン</button>
    <div style="margin-top:16px;text-align:center;padding-top:14px;border-top:1px solid var(--border2);">
      <a href="/member_register.html" style="font-size:16px;color:#e07820;font-weight:700;text-decoration:none;">新規ユーザー登録はこちら</a>
    </div>
  </div>
</div>

<!-- ─── メイン ─── -->
<div id="main-screen">
  <div class="topbar">
    <span class="top-brand">テキーラ道場</span>
    <a href="/" class="top-home-btn">🏠 TOP</a>
    <button class="top-logout" onclick="doLogout()">ログアウト</button>
  </div>

  <div class="container">
    <!-- ページタイトル -->
    <div style="padding:4px 0 16px;border-bottom:2px solid var(--border2);margin-bottom:16px;display:flex;align-items:baseline;gap:10px">
      <span style="font-size:20px;font-weight:700;color:var(--ink);letter-spacing:.04em">会員マイページ</span>

    </div>
    <!-- プロフィールバー -->
    <div class="profile-bar" id="profile-bar">
      <!-- 左：アイコン＋ニックネーム＋会員ID -->
      <div class="profile-left">
        <div class="profile-avatar" id="prof-avatar" style="width:72px;height:72px;font-size:32px;">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" id="prof-avatar-svg">
            <circle cx="16" cy="11" r="6" fill="rgba(255,255,255,.8)"/>
            <ellipse cx="16" cy="26" rx="10" ry="7" fill="rgba(255,255,255,.8)"/>
          </svg>
        </div>
        <div class="profile-name-area">
          <div class="profile-name" id="prof-name">—</div>
          <div class="profile-id" id="prof-id" style="font-size:12px;color:var(--ink3);"></div>
          <div class="profile-badges" style="margin-top:4px;">
            <span id="prof-mem-badge" class="mem-badge mb-active">本会員</span>
            <button id="btn-resend-verify" class="btn-resend" style="display:none" onclick="resendVerifyEmail()">📧 認証メール再送</button>
          </div>
        </div>
      </div>
      <!-- 右：CLASSバッジ（タップで説明）＋区分バッジ ＋編集ボタン -->
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">
        <div id="prof-class-badge" class="class-badge class-blanco" onclick="showClassInfo()" style="cursor:pointer;" title="タップで説明">BLANCO</div>
        <div class="profile-stat-lbl" id="prof-class-lbl" style="text-align:right;">0回</div>
        <div class="rank-badge" id="prof-rank"></div>
        <a href="/member_register.html?edit=1" style="display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:11px;color:var(--gold-d);text-decoration:none;white-space:nowrap;">
          ✏️ 編集
        </a>
      </div>
    </div>


    <!-- データ確認バナー -->
    <div class="debug-banner" id="debug-banner"></div>

    <!-- サマリー -->
    <div class="summary-bar" id="summary-bar">
      <div class="sum-chip"><strong id="s-visits">—</strong>来場</div>
      <div class="sum-chip"><strong id="s-bottles">—</strong>試飲ボトル</div>
      <div class="sum-chip"><strong id="s-tequila">—</strong>テキーラml</div>
      <div class="sum-chip"><strong id="s-blind">—</strong>ブラインド</div>
    </div>

    <!-- 達成リストリンク -->
    <div style="margin-bottom:16px;">
      <a href="/" style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:linear-gradient(135deg,#0a0a0a,#1a1008);border-radius:10px;text-decoration:none;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.18);margin-bottom:10px;">
        <div>
          <div style="font-size:14px;font-weight:700;letter-spacing:.05em;">🏠 テキーラ道場オンライン TOP</div>
          <div style="font-size:11px;color:rgba(255,255,255,.55);margin-top:2px;">営業スケジュール・ニュース・アクセス</div>
        </div>
        <span style="font-size:20px;opacity:.7;">›</span>
      </a>
    </div>
    <div style="margin-bottom:16px;">
      <a href="/tastinglog.html" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(135deg,#0d3d2e,#1a6640);border-radius:10px;text-decoration:none;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.18);">
        <div>
          <div style="font-size:14px;font-weight:700;letter-spacing:.05em;">🥃 試飲達成リスト</div>
          <div style="font-size:11px;color:rgba(255,255,255,.65);margin-top:2px;">定番品のどれを飲んだか確認できます</div>
        </div>
        <span style="font-size:20px;opacity:.7;">›</span>
      </a>
    </div>

    <!-- 来場リスト -->
    <div class="sec-header">
      <span class="sec-title">来場履歴</span>

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(yymmdd){
  // "260521" → "2026年5月21日"
  if(!yymmdd||yymmdd.length<6)return yymmdd||'';
  const y=2000+parseInt(yymmdd.slice(0,2));
  const m=parseInt(yymmdd.slice(2,4));
  const d=parseInt(yymmdd.slice(4,6));
  return `${y}年${m}月${d}日`;
}
function fmtDateFull(yymmdd){
  if(!yymmdd||yymmdd.length<6)return yymmdd||'';
  const y=2000+parseInt(yymmdd.slice(0,2));
  const m=parseInt(yymmdd.slice(2,4));
  const d=parseInt(yymmdd.slice(4,6));
  const dow=['日','月','火','水','木','金','土'];
  const date=new Date(y,m-1,d);
  return `${y}年${m}月${d}日（${dow[date.getDay()]}）`;
}

}

async function initMyPage(user){
  document.getElementById('visit-list').innerHTML='<div class="loading">データを読み込み中...</div>';
  try{
    // 1. 会員情報取得（Auth UIDからmembersを検索）
    // Auth emailからmemberIdを取得
    const authEmail=user.email||'';
    let memberId=null;
    if(authEmail.endsWith('@tequiladojo.member')){
      // 仮想メール → 会員ID直接取得
      memberId=authEmail.replace('@tequiladojo.member','');
    } else if(authEmail){
      // 実メール → memberIndexから逆引き
      const idxSnap=await db.collection('memberIndex').where('email','==',authEmail).limit(1).get();
      if(!idxSnap.empty) memberId=idxSnap.docs[0].id;
    }

    // membersコレクションから取得
    let memberDoc=null;
    if(memberId){
      const snap=await db.collection('members').doc(memberId).get();
      if(snap.exists)memberDoc={id:snap.id,...snap.data()};
    }
    // fallback: authUidで検索
    if(!memberDoc){
      const snap=await db.collection('members').where('authUid','==',user.uid).limit(1).get();
      if(!snap.empty){
        memberDoc={id:snap.docs[0].id,...snap.docs[0].data()};
        memberId=memberDoc.memberId||snap.docs[0].id;
      }
    }
    // fallback2: emailで検索
    if(!memberDoc && authEmail && !authEmail.endsWith('@tequiladojo.member')){
      const snap=await db.collection('members').where('email','==',authEmail).limit(1).get();
      if(!snap.empty){
        memberDoc={id:snap.docs[0].id,...snap.docs[0].data()};
        memberId=memberDoc.memberId||snap.docs[0].id;
      }
    }
    currentMember=memberDoc;

    // 2. 表示名・プロフィール設定
    const name=(memberDoc&&(memberDoc.nickname||memberDoc.name))||(memberId&&memberId!=='会員'?memberId:'—');
    const initChar=name?name.charAt(0).toUpperCase():'?';
    // アバター：iconUrlがあれば画像、なければSVGシルエットのまま
    if(memberDoc?.iconUrl){
      const av=document.getElementById('prof-avatar');

    // 4. 来場・注文データ取得

    try{
      const bSnap=await db.collection('bottles').where('production','==','0').get();

async function loadMyData(memberId){
  const issues=[];
  console.log('[loadMyData] called with memberId:', memberId, typeof memberId);

  // productsはinitMyPageで取得済み

  // visits取得（memberId一致）
  const vSnap=await db.collection('visits')
    .where('memberId','==',memberId)
    .orderBy('visitDate','desc')
    .get().catch(async e=>{
      // インデックスなしでもOKなようにフォールバック
      console.warn('visits orderBy失敗、フォールバック:',e);
      return db.collection('visits').where('memberId','==',memberId).get();
    });

  allVisits=vSnap.docs.map(d=>({id:d.id,...d.data()}));

  // visitDateがない古いデータのチェック
  const noDate=allVisits.filter(v=>!v.visitDate&&!v.visitTime);
  if(noDate.length>0){
    issues.push(`${noDate.length}件の来場データに日時情報がありません（旧データ）`);
  }

  if(!allVisits.length){
    document.getElementById('visit-list').innerHTML='<div class="empty"><div class="empty-icon">🥃</div>来場履歴がありません</div>';
    updateSummary([]);
    showDebugBanner(issues);
    return;
  }

  // 来場日でソート（visitDateがない場合はIDから推定）
  allVisits.sort((a,b)=>{
    // 営業日付+営業時刻でソート（降順）
    const da=(a.visitDate||a.id.slice(0,6)||'')+(a.visitTime||'');
    const db2=(b.visitDate||b.id.slice(0,6)||'')+(b.visitTime||'');
    return db2.localeCompare(da);
  });

  // orders取得（visitKeyで各来場の注文を取得）
  // 件数が多い場合はbatch取得
  const visitIds=allVisits.map(v=>v.id);
  allOrders=[];

  // Firestoreのin句は最大30件なのでチャンク分割
  const chunks=[];
  for(let i=0;i<visitIds.length;i+=30)chunks.push(visitIds.slice(i,i+30));
  for(const chunk of chunks){
    const oSnap=await db.collection('orders').where('visitKey','in',chunk).get();
    oSnap.forEach(d=>allOrders.push({id:d.id,...d.data()}));
  }

  // ordersにvisitKeyがあるか確認
  const ordersNoVisit=allOrders.filter(o=>!o.visitKey&&!o.visitId);
  if(ordersNoVisit.length>0){
    issues.push(`${ordersNoVisit.length}件の注文データにvisitKeyがありません`);
  }


  // blindResults取得（batchIdで全員分 + groupIdでも取得）
  allBlindResults=[];
  const batchIds=[];
  allOrders.forEach(o=>{if(o.batchId&&!batchIds.includes(o.batchId))batchIds.push(o.batchId);});
  if(batchIds.length){
    const bChunks=[];
    for(let i=0;i<batchIds.length;i+=30)bChunks.push(batchIds.slice(i,i+30));
    for(const chunk of bChunks){
      const bSnap=await db.collection('blindResults').where('batchId','in',chunk).get();
      bSnap.forEach(d=>allBlindResults.push({id:d.id,...d.data()}));
    }
  }

  // blindResultsのcustomerIdから会員名をキャッシュ
  const customerIds=[...new Set(allBlindResults.map(r=>r.customerId).filter(id=>id&&!allMembersMap[id]))];
  for(const mid of customerIds){
    try{
      // publicProfiles優先、フォールバックはmembers
      const ppSnap=await db.collection('publicProfiles').doc(mid).get();
      if(ppSnap.exists&&ppSnap.data().nickname){
        allMembersMap[mid]={nickname:ppSnap.data().nickname};
      } else {
        const mSnap=await db.collection('members').doc(mid).get();
        if(mSnap.exists){const md=mSnap.data();allMembersMap[mid]={nickname:md.nickname||md.name||mid};}
      }
    }catch(e){}
  }
  // visitKey→memberIdのマッピング（blindResultsのvisitKeyから）
  const myVisitKeys2=new Set(allVisits.map(v=>v.id));
  const otherVisitKeys2=[...new Set(allBlindResults.map(r=>r.visitKey||r.visitId).filter(vk=>vk&&!myVisitKeys2.has(vk)))];
  if(otherVisitKeys2.length){
    const chunks3=[];
    for(let i=0;i<otherVisitKeys2.length;i+=30)chunks3.push(otherVisitKeys2.slice(i,i+30));
    for(const chunk of chunks3){
      const vSnap3=await db.collection('visits').where(firebase.firestore.FieldPath.documentId(),'in',chunk).get();
      vSnap3.docs.forEach(vd=>{
        const mid=vd.data().memberId;
        if(mid){
          allMembersMap['visit_'+vd.id]=mid;
          if(!allMembersMap[mid])allMembersMap[mid]={nickname:mid}; // 後でキャッシュ
        }
      });
    }
    // visitKeyで見つかったmemberIdの会員名も取得
    const newMids=[...new Set(otherVisitKeys2.map(vk=>allMembersMap['visit_'+vk]).filter(m=>m&&allMembersMap[m]?.nickname===m))];
    for(const mid of newMids){
      try{
        const mSnap=await db.collection('members').doc(mid).get();
        if(mSnap.exists){const md=mSnap.data();allMembersMap[mid]={nickname:md.nickname||md.name||mid};}
      }catch(e){}
    }
  }

  // _togetherMapをFirestoreから直接構築（allOrdersは自分のvisitのみなので直接取得）
  const myMidFinal=currentMember?.memberId||currentMember?.id;
  const myVisitKeysFinal=new Set(allVisits.map(v=>v.id));
  const batchToOtherNames={};

  // まずblindResultsから補完（既にallMembersMapに情報あり）
  allBlindResults.forEach(r=>{
    if(!r.batchId||r.customerId===myMidFinal)return;
    const mid=r.customerId;
    const info=mid?allMembersMap[mid]:null;
    const name=info?info.nickname:null;
    if(!name)return;
    if(!batchToOtherNames[r.batchId])batchToOtherNames[r.batchId]=[];
    if(!batchToOtherNames[r.batchId].includes(name))batchToOtherNames[r.batchId].push(name);
  });

  // batchIdでordersを取得して他visitKeyの名前を収集
  const allBatchIds=[...new Set(allOrders.map(o=>o.batchId).filter(Boolean))];
  if(allBatchIds.length){
    const bChunksT=[];
    for(let i=0;i<allBatchIds.length;i+=10)bChunksT.push(allBatchIds.slice(i,i+10));
    for(const chunk of bChunksT){
      const oSnap=await db.collection('orders').where('batchId','in',chunk).get();
      // 他visitKeyを収集
      const otherVkSet=new Set();
      oSnap.docs.forEach(d=>{
        const vk=d.data().visitKey||d.data().visitId;
        if(vk&&!myVisitKeysFinal.has(vk))otherVkSet.add(vk);
      });
      // visitKey→memberIdが未登録なら取得
      const unknownVks=[...otherVkSet].filter(vk=>!allMembersMap['visit_'+vk]);
      if(unknownVks.length){
        const vkChunks=[];
        for(let i=0;i<unknownVks.length;i+=30)vkChunks.push(unknownVks.slice(i,i+30));
        for(const vkChunk of vkChunks){
          const vSnap=await db.collection('visits').where(firebase.firestore.FieldPath.documentId(),'in',vkChunk).get();
          const newMids=[];
          vSnap.docs.forEach(vd=>{
            const mid=vd.data().memberId;
            if(mid){allMembersMap['visit_'+vd.id]=mid;if(!allMembersMap[mid]){allMembersMap[mid]={nickname:mid};newMids.push(mid);}}
          });
          for(const mid of newMids){
            try{const mSnap=await db.collection('members').doc(mid).get();if(mSnap.exists){const md=mSnap.data();allMembersMap[mid]={nickname:md.nickname||md.name||mid};}}catch(e){}
          }
        }
      }
      // batchToOtherNamesに登録
      oSnap.docs.forEach(d=>{
        const dat=d.data();
        const vk=dat.visitKey||dat.visitId;
        const bid=dat.batchId;
        if(!vk||!bid||myVisitKeysFinal.has(vk))return;
        const mid=allMembersMap['visit_'+vk];
        const info=mid?allMembersMap[mid]:null;
        const name=info?info.nickname:null;
        if(!name||mid===myMidFinal)return;
        if(!batchToOtherNames[bid])batchToOtherNames[bid]=[];
        if(!batchToOtherNames[bid].includes(name))batchToOtherNames[bid].push(name);
      });
    }
  }
  window._togetherMap=batchToOtherNames;

  showDebugBanner(issues);
}

function showDebugBanner(issues){
  const el=document.getElementById('debug-banner');
  if(issues.length){
    el.textContent='⚠️ データ確認: '+issues.join(' / ');
    el.classList.add('show');
  }else{
    el.classList.remove('show');
  }
}

// ─── フィルター ───
function initFilters(){
  const years=new Set();
  allVisits.forEach(v=>{
    const date=v.visitDate||v.id.slice(0,6)||'';
    if(date.length>=2)years.add('20'+date.slice(0,2));
  });
  const sel=document.getElementById('f-year');
  sel.innerHTML='<option value="">すべての年</option>';
  [...years].sort((a,b)=>b-a).forEach(y=>{
    sel.innerHTML+=`<option value="${y}">${y}年</option>`;
  });
}

function applyFilter(){
  const year=document.getElementById('f-year').value;
  const from=document.getElementById('f-from').value; // YYYY-MM-DD
  const to=document.getElementById('f-to').value;

  filteredVisits=allVisits.filter(v=>{
    const dateStr=v.visitDate||v.id.slice(0,6)||'';
    // YYMMDD → YYYY-MM-DD
    const iso=dateStr.length===6?`20${dateStr.slice(0,2)}-${dateStr.slice(2,4)}-${dateStr.slice(4,6)}`:'';
    if(year&&!iso.startsWith(year))return false;
    if(from&&iso<from)return false;
    if(to&&iso>to)return false;
    return true;
  });

  updateSummary(filteredVisits);
  renderVisitList(filteredVisits);
}

function resetFilter(){
  document.getElementById('f-year').value='';
  document.getElementById('f-from').value='';
  document.getElementById('f-to').value='';
  applyFilter();
}

// 会員区分バッジ更新
function updateMemBadge(doc){
  const badge=document.getElementById('prof-mem-badge');
  const resendBtn=document.getElementById('btn-resend-verify');
  if(!badge) return;
  if(resendBtn) resendBtn.style.display='none';
  // statusが未設定の場合はisGuest/isTempフラグで判断
  const st=doc?.status||null;
  const isGuest=doc?.isGuest===true;
  const isTemp=doc?.isTemp===true;
  if(st==='active' || (!st && !isGuest && !isTemp)){
    // statusがactiveまたは未設定かつフラグなし→本会員
    badge.textContent='本会員'; badge.className='mem-badge mb-active';
  } else if(st==='pending'){
    badge.textContent='認証待ち'; badge.className='mem-badge mb-pending';
    if(resendBtn) resendBtn.style.display='inline-block';
  } else if(st==='temp'||isTemp){
    badge.textContent='仮登録'; badge.className='mem-badge mb-temp';
  } else if(isGuest||st==='guest'){
    badge.textContent='ゲスト'; badge.className='mem-badge mb-guest';
  } else {
    badge.textContent='本会員'; badge.className='mem-badge mb-active';
  }
}

}

async function updateSummary(visits){
  const vIds=new Set(visits.map(v=>v.id));
  const orders=allOrders.filter(o=>vIds.has(o.visitKey||o.visitId));
  const totalAmt=orders.reduce((s,o)=>s+calcOrderAmt(o),0);
  const totalTq=orders.filter(o=>o.productType==='tequila'||o.productType==='other')
    .reduce((s,o)=>o.served!==0?s+(o.qty||0):s,0);
  const blindCount=allBlindResults.filter(r=>vIds.has(r.visitKey)).length;

  // 試飲ボトル数（tastinglogと同じくbottleData→bottleIdのIDベース照合）
  const allVIds=new Set(allVisits.map(v=>v.id));
  const allOrdersForMember=allOrders.filter(o=>allVIds.has(o.visitKey||o.visitId));
  const bdIds=new Set(
    allOrdersForMember
      .filter(o=>o.productType==='tequila'||o.productType==='other')
      .map(o=>o.productCode||o.productId)
      .filter(Boolean)
  );
  const drunkBottleIds=new Set();
  if(bdIds.size>0){
    const bdArr=[...bdIds];
    for(let bi=0;bi<bdArr.length;bi+=10){
      try{
        const bdSnap=await db.collection('bottleData')
          .where(firebase.firestore.FieldPath.documentId(),'in',bdArr.slice(bi,bi+10)).get();
        bdSnap.forEach(d=>{if(d.data().bottleId) drunkBottleIds.add(d.data().bottleId);});
      }catch(e){}
    }
  }
  const drunkRegular=allProducts.filter(p=>drunkBottleIds.has(p.id)).length;
  const totalRegular=allProducts.length;
  document.getElementById('s-bottles').textContent=totalRegular>0
    ? drunkRegular+'('+totalRegular+')'
    : drunkBottleIds.size+'(?)';

  document.getElementById('s-visits').textContent=visits.length;
  document.getElementById('s-tequila').textContent=totalTq+'ml';
  document.getElementById('s-blind').textContent=blindCount+'回';
  document.getElementById('list-count').textContent=visits.length+'件';
}

// ─── 来場リスト描画 ───
function renderVisitList(visits){
  const el=document.getElementById('visit-list');
  if(!visits.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div>該当する来場記録がありません</div>';
    return;
  }
  el.innerHTML=visits.map(v=>buildVisitCard(v)).join('');
}

function buildVisitCard(v){
  const dateStr=v.visitDate||v.id.slice(0,6)||'';
  const dateLabel=fmtDateFull(dateStr);
  const checkinTime=v.visitTime?fmtTime(v.visitTime):'';
  const checkoutTime=v.checkoutTime?'〜'+fmtTime(v.checkoutTime):'';

  // この来場の注文（全件）
  const orders=allOrders.filter(o=>(o.visitKey===v.id||o.visitId===v.id));
  const servedOrders=orders.filter(o=>o.served!==0&&o.served!=='0'); // 金額・ml集計はキャンセル除く
  const totalAmt=servedOrders.reduce((s,o)=>s+calcOrderAmt(o),0);
  const totalTq=servedOrders.filter(o=>o.productType==='tequila'||o.productType==='other').reduce((s,o)=>s+(o.qty||0),0);
  const hasBlind=orders.some(o=>o.blindId===1);
  const itemCount=servedOrders.length;

  return`<div class="visit-card" id="vc-${esc(v.id)}" onclick="toggleVisitCard('${esc(v.id)}')">
    <div class="visit-header">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="visit-date">${esc(dateLabel)}</span>
          <div class="visit-badges">
            ${itemCount?`<span class="badge badge-items">${itemCount}品</span>`:''}
          </div>
        </div>
        <div style="margin-top:3px;display:flex;gap:8px;align-items:center">
          <span class="visit-time">${esc(checkinTime)}${checkoutTime?'　'+checkoutTime:''}</span>
        </div>
      </div>
      <div>
        <div class="visit-amount">${fmtAmt(totalAmt)}</div>
        ${totalTq?`<div class="visit-tequila">${totalTq}ml</div>`:''}
      </div>
      <span class="visit-chevron">▼</span>
    </div>
    <div class="visit-detail" id="vd-${esc(v.id)}">
      ${buildOrderDetail(v.id)}
    </div>
  </div>`;
}

function toggleVisitCard(vid){
  const card=document.getElementById('vc-'+vid);
  if(!card)return;
  card.classList.toggle('open');
}

// ─── 注文詳細パネル ───
function buildOrderDetail(visitId){
  const orders=allOrders.filter(o=>(o.visitKey===visitId||o.visitId===visitId));
  if(!orders.length)return'<div class="empty" style="padding:20px">注文記録がありません</div>';

  // orderGroupIdでグループ化
  const gmap={};
  orders.forEach(o=>{
    const gid=o.orderGroupId||('solo_'+o.id);
    if(!gmap[gid])gmap[gid]=[];
    gmap[gid].push(o);
  });

  // batchIdでさらに束ねて時系列ソート
  const bmap={};
  Object.entries(gmap).forEach(([gid,items])=>{
    const sample=items[0];
    const bid=sample.batchId||('b_'+gid);
    if(!bmap[bid])bmap[bid]={bid,gid,batchId:sample.batchId||null,orderTime:sample.orderTime||'',groups:[],items:[]};
    bmap[bid].groups.push(gid);
    bmap[bid].items.push(...items);
    // 同じbatchの最初のgidを代表に
    if(!bmap[bid].repGid)bmap[bid].repGid=gid;
  });

  const batches=Object.values(bmap).sort((a,b)=>(a.orderTime||'').localeCompare(b.orderTime||''));

  return batches.map(b=>buildBatchBlock(b,visitId)).join('');
}

function buildBatchBlock(b,visitId){
  const time=b.orderTime?fmtTime(b.orderTime):'';
  const items=b.items;
  const isBlind=items.some(o=>o.blindId===1);

  // 同時注文の場合：一緒に注文した別の来場者名を取得
  let togetherLabel='';
  if(b.batchId){
    // batchId共通のordersで別visitKeyのものを探す
    const batchOrders=allOrders.filter(o=>o.batchId===b.batchId&&(o.visitKey!==visitId&&o.visitId!==visitId));
    const otherVisitKeys=[...new Set(batchOrders.map(o=>o.visitKey||o.visitId).filter(Boolean))];
  }
  // _togetherMapから名前を取得（loadMyData完了後に構築済み・if文の外）
  const togetherNames2=(window._togetherMap||{})[b.batchId||b.groups[0]]||[];
  if(togetherNames2.length) togetherLabel=`👥 ${togetherNames2.join('、')}と一緒`;

  // この注文グループのブラインド結果
  // blindResultをbatchIdベースで全員分取得
  const myMid=currentMember?.memberId||currentMember?.id;
  const blindResults4group=b.batchId
    ? allBlindResults.filter(r=>r.batchId===b.batchId)
    : allBlindResults.filter(r=>b.groups.some(g=>r.groupId===g||r.id===g));
  const blindResult=isBlind?(blindResults4group.find(r=>r.customerId===myMid)||blindResults4group[0]):null;

  // 注文アイテム（重複除去：batchで同じ商品が複数人分あるので代表1件）
  // batchの場合は代表グループ（最初のgid）の商品のみ表示
  const repGid=b.repGid||b.groups[0];
  const repItems=items.filter(o=>o.orderGroupId===repGid||(b.groups.length===1));
  const total=repItems.reduce((s,o)=>s+calcOrderAmt(o),0);

  const itemsHtml=repItems.map(o=>{
    // ブラインドマークは表示しない
    const isCancelled=(o.served===0||o.served==='0');
    const isUnserved=(o.served===1||o.served==='1');
    const amt=isCancelled||isUnserved?0:calcOrderAmt(o);
    return`<div class="og-item${isCancelled||isUnserved?' og-item-cancelled':''}">      <span class="og-item-name">${esc(o.productName)}</span>      <span class="og-item-qty">${o.qty}${o.unit||''}</span>      ${isCancelled?'<span class="og-item-cancelled-badge">キャンセル</span>'        :isUnserved?'<span class="og-item-cancelled-badge" style="background:var(--cream3);color:var(--ink3)">未提供</span>'        :`<span class="og-item-price">${fmtAmt(amt)}</span>`}    </div>`;
  }).join('');

  const allCorrect=blindResults4group.reduce((s,r)=>s+(r.correctCount||0),0);
  const allTotal=blindResults4group.reduce((s,r)=>s+(r.totalCount||0),0);
  const blindSummary=blindResults4group.length?`${allCorrect}/${allTotal}正解`:'';

  // ブラインドリンク
  const blindLink=isBlind
    ?`<span class="og-badge" style="background:#f3eaff;color:#6b3fa0;cursor:pointer;font-size:11px" onclick="event.stopPropagation();openBlindModal('${esc(b.repGid||b.groups[0])}','${esc(visitId)}')" title="ブラインド結果を見る">🎭 結果を表示</span>`
    :'';

  // 一緒に飲んだ人：「N人と一緒」クリックでポップアップ
  const batchKey=esc(b.batchId||b.groups[0]||'');
  const togetherChip=togetherNames2.length
    ?`<span class="og-together" onclick="showTogetherPopup(event,'${batchKey}')">${togetherNames2.length}人と一緒</span>`
    :'';

  return`<div class="order-group">
    <div class="og-header">
      <span class="og-time">${esc(time)}</span>
      ${blindLink}
      ${togetherChip}
      <span class="og-total">${fmtAmt(total)}</span>
    </div>
    <div class="og-items">${itemsHtml}</div>
  </div>`;
}

// ─── 一緒に飲んだ人ポップアップ ───
function showTogetherPopup(e, batchKey){
  e.stopPropagation();
  e.preventDefault();
  // 既存ポップアップを削除
  document.querySelectorAll('.together-popup').forEach(el=>el.remove());
  const names=(window._togetherMap||{})[batchKey]||[];
  if(!names.length)return;
  const popup=document.createElement('div');
  popup.className='together-popup';
  popup.innerHTML=names.map(n=>`<div class="together-popup-name">👤 ${n}</div>`).join('');
  document.body.appendChild(popup);
  // 位置調整（タッチ/クリック両対応）
  const tgt=e.currentTarget||e.target;
  const rect=tgt.getBoundingClientRect();
  popup.style.top=(rect.bottom+4+window.scrollY)+'px';
  popup.style.left=Math.min(rect.left+window.scrollX, window.innerWidth-210)+'px';
  // タッチ/クリックで閉じる
  setTimeout(()=>{
    function handler(ev){
      if(!popup.contains(ev.target)){popup.remove();}
      document.removeEventListener('click',handler);
      document.removeEventListener('touchend',handler);
    }
    document.addEventListener('click',handler);
    document.addEventListener('touchend',handler);
  },50);
}

// ─── ブラインド結果モーダル（全員分テーブル表示） ───
function openBlindModal(gid, visitId){
  // batchIdベースで全員分取得（同じbatchの全グループ）
  // gidに対応するbatchIdを特定
  const batchIdForGid=allOrders.find(o=>o.orderGroupId===gid)?.batchId;
  const results=batchIdForGid
    ? allBlindResults.filter(r=>r.batchId===batchIdForGid)
    : allBlindResults.filter(r=>r.groupId===gid||r.id===gid);
  const body=document.getElementById('blind-modal-body');
  const nums=['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩'];
  const MARK_COLOR={R:'#c0392b',G:'#1a6e3a',W:null,Y:'#b8860b',B:'#185FA5'};

  function markColor(markId){
    if(!markId)return'#666';
    const cc=markId.charAt(0);
    return cc==='W'?'#18110a':(MARK_COLOR[cc]||'#666');
  }
  function markSym(markId){
    if(!markId)return'?';
    const isDbl=markId.charAt(1)==='◎';
    const isW=markId.charAt(0)==='W';
    return isW?(isDbl?'○○':'○'):(isDbl?'●●':'●');
  }

  if(!results.length){
    body.innerHTML=`<div class="empty" style="padding:30px 0"><div class="empty-icon">🎭</div>結果未入力</div>`;
    document.getElementById('blind-modal').classList.add('open');
    return;
  }

  // マーク順序を収集
  const marksOrder=[];
  const marksProductMap={};
  results.forEach(r=>{
    (r.answers||[]).forEach(ans=>{
      const mk=ans.blindMarkId||'?';
      if(!marksOrder.includes(mk)){marksOrder.push(mk);marksProductMap[mk]=ans.actualProduct||'—';}
    });
  });

  // 会員名取得
  const myMid2=currentMember?.memberId||currentMember?.id;
  const memberNames=results.map(r=>{
    const mid=r.customerId;
    // 自分かチェック
    if(mid===myMid2)return currentMember?.nickname||currentMember?.name||mid||'—';
    const info=mid?allMembersMap[mid]:null;
    return info?info.nickname:(mid||'—');
  });

  // テーブルヘッダー
  // ウィナーマーク集計（各マークが何人に選ばれたか）
  const winnerCount={};
  results.forEach(r=>{if(r.winner)winnerCount[r.winner]=(winnerCount[r.winner]||0)+1;});

  const thMarks=marksOrder.map((mk,mi)=>{
    const c=markColor(mk); const s=markSym(mk);
    return`<th><div style="font-size:10px;color:var(--ink3)">${nums[mi]}</div><div style="color:${c};font-weight:700;font-size:12px">${s}</div></th>`;
  }).join('');
  const thead=`<thead><tr><th class="name-th">名前</th>${thMarks}<th>好</th><th>正解</th></tr></thead>`;

  // データ行
  const tbody=results.map((r,ri)=>{
    const ansMap={};
    (r.answers||[]).forEach(ans=>{ansMap[ans.blindMarkId||'?']=ans;});
    const cells=marksOrder.map(mk=>{
      const ans=ansMap[mk];
      if(!ans)return'<td>—</td>';
      const c=markColor(ans.guessMarkId||'');
      const s=markSym(ans.guessMarkId||'');
      return`<td class="${ans.isCorrect?'correct':'wrong'}" style="color:${c};font-weight:700">${s}</td>`;
    }).join('');
    // 好きなマーク（winner）をマーク記号で表示
    const winMk=r.winner||'';
    const winC=winMk?markColor(winMk):'#999';
    const winS=winMk?markSym(winMk):'—';
    const winDisp=winMk?`<span style="color:${winC};font-weight:700">${winS}</span>`:'—';
    const sc=`${r.correctCount||0}/${r.totalCount||0}`;
    const scColor=(r.correctCount||0)===(r.totalCount||0)?'var(--teal)':'var(--ink)';
    return`<tr><td class="name-td">${esc(memberNames[ri])}</td>${cells}<td>${winDisp}</td><td class="score-td" style="color:${scColor}">${sc}</td></tr>`;
  }).join('');

  // マーク対応表（ウィナー件数付き）
  const legendRows=marksOrder.map((mk,i)=>{
    const c=markColor(mk);const s=markSym(mk);
    const wc=winnerCount[mk]||0;
    const wcDisp=wc?`<span style="margin-left:auto;font-size:11px;color:var(--gold-d);font-weight:600">好 ${wc}票</span>`:'';
    return`<div class="bpop-legend-row"><span class="bpop-legend-num">${nums[i]}</span><span style="color:${c};font-weight:700;font-size:13px">${s}</span><span style="color:var(--ink2);flex:1">${esc(marksProductMap[mk])}</span>${wcDisp}</div>`;
  }).join('');

  body.innerHTML=`
    <div class="bpop-info">${memberNames.join('・')} | ${marksOrder.length}種 × ${results.length}名</div>
    <div class="bpop-table-wrap"><table class="bpop-table">${thead}<tbody>${tbody}</tbody></table></div>
    <div class="bpop-legend"><div class="bpop-legend-title">マーク対応表</div>${legendRows}</div>`;
  document.getElementById('blind-modal').classList.add('open');
}

function closeBlindModal(){
  document.getElementById('blind-modal').classList.remove('open');
}
document.getElementById('blind-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('blind-modal'))closeBlindModal();
});
</script>
