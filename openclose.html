<style>
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;

html{font-size:14px}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh}

input,select,textarea{font-family:var(--sans)}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 30% 60%,rgba(200,146,30,.07),transparent),var(--cream)}
.lcard{width:100%;max-width:380px;background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);padding:44px 36px;box-shadow:var(--shadow-lg)}
.llogo{text-align:center;font-size:44px;margin-bottom:6px}
.lbrand{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--gold-d);letter-spacing:.14em;text-align:center;margin-bottom:2px}
.lsub{text-align:center;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:32px}
.lcard label{display:block;font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;margin-top:14px}
.lcard input{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--cream);color:var(--ink)}
.lcard input:focus{outline:none;border-color:var(--gold)}
.lerr{min-height:16px;font-size:12px;color:var(--red);margin-top:8px;text-align:center}
.lbtn{width:100%;margin-top:22px;padding:13px;background:var(--gold-d);color:var(--cream);border:none;border-radius:var(--r);font-size:13px;font-weight:500}
.lbtn:hover{background:var(--gold)}
.topbar{background:var(--ink);padding:8px 16px 10px;display:flex;flex-direction:column;align-items:stretch;gap:3px}
.top-back{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:5px 10px;border-radius:var(--r);font-size:11px;text-decoration:none}
.top-back:hover{background:rgba(255,255,255,.2)}
.btn{display:inline-flex;align-items:center;gap:4px;padding:8px 14px;border-radius:var(--r);font-size:12px;font-weight:500;border:none;white-space:nowrap}
.bp{background:var(--gold-d);color:var(--cream)}.bp:hover{background:var(--gold)}
.bs{background:var(--cream2);color:var(--ink2);border:1px solid var(--border2)}.bs:hover{background:var(--cream3)}
.bd{background:var(--red-l);color:var(--red);border:1px solid rgba(140,40,24,.2)}.bd:hover{background:#f5d4ce}
.sm{padding:5px 10px;font-size:11px}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow)}
.fi,.fs{padding:9px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;color:var(--ink);background:var(--cream);width:100%}
.fi:focus,.fs:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,146,30,.1)}
#toasts{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{padding:10px 15px;border-radius:var(--r);font-size:12px;font-weight:500;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:6px;min-width:200px}
.tok{background:var(--teal);color:#fff}.terr{background:var(--red);color:#fff}.tinf{background:var(--gold-d);color:var(--cream)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:6px 12px;text-align:left;font-size:11px;font-weight:500;color:var(--ink3)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.mono{font-family:var(--mono);font-size:11px}
.dim{color:var(--ink3)}
.ec{text-align:center;color:var(--ink3);padding:20px!important}
</style>

<script>
if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
var auth=firebase.auth(), db=firebase.firestore();

function g(id){return document.getElementById(id);}
function gv(id){var el=g(id);return el?el.value.trim():"";}
function sv(id,val){var el=g(id);if(el)el.value=(val==null?"":val);}
function pad(n){return String(n).padStart(2,"0");}
function toast(msg,type){
  var el=document.createElement("div");
  el.className="toast t"+(type||"ok");
  el.textContent=(type==="err"?"✕ ":type==="inf"?"ℹ ":"✓ ")+msg;
  g("toasts").appendChild(el);
  setTimeout(function(){el.remove();},3000);
}
function nowStr(){
  // 営業時刻対応（日またぎ時は2400加算）
  if(currentOpenTime){
    return AuthRole.nowBusinessTime(currentOpenTime);
  }
  var d=new Date();return pad(d.getHours())+pad(d.getMinutes())+pad(d.getSeconds());
}
function todayStr6(){
  // 営業日付（日またぎ時は開店日付を引き継ぐ）
  if(currentOpenTime && currentSessionDate){
    return AuthRole.businessDate(currentOpenTime, currentSessionDate);
  }
  var d=new Date();return String(d.getFullYear()).slice(2)+pad(d.getMonth()+1)+pad(d.getDate());
}
function fmtHHMM(t){if(!t||t.length<4)return t||"—";return t.slice(0,2)+":"+t.slice(2,4);}

var storeStatus="closed";
var currentSessionId=null;
var currentOpenTime=null;   // 開店時刻（HHMMSS形式）
var currentSessionDate=null; // 開店日付（YYMMDD形式）
var currentLayoutId=null;   // レイアウトID
var currentTestMode=false;  // テストモード（trueなら公開ステータスに反映しない）
var breakIndex=0;
var layouts=[];
var members=[];

var RTDB_BASE='https://tequiladojo-default-rtdb.firebaseio.com';

// 公開用ステータスを書き込む（Firestore + RTDB両方）
function writePublicStatus(status, extra){
  // Firestoreへの書き込み（ログインユーザー向け）
  var fsData=Object.assign({status:status,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},extra||{});
  journaledSet('storeStatus','current',fsData)
    .catch(function(e){ console.error('storeStatus Firestore write failed:',e); });

  // RTDBへの書き込み（未ログインユーザーも読み取り可能 → index.html用）
  // RTDB側のルール: { "storeStatus": { ".read": true, ".write": "auth != null" } }
  var rtdbData=Object.assign({status:status,updatedAt:Date.now()},extra||{});
  if(!auth.currentUser){ return; }
  auth.currentUser.getIdToken().then(function(token){
    return fetch(RTDB_BASE+'/storeStatus.json?auth='+token,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(rtdbData)
    });
  }).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
  }).catch(function(e){
    console.warn('RTDB write skipped (RTDBが未有効または未設定の可能性):',e.message||e);
  });
}

var STATUS_LABEL={closed:"閉店中",open:"開店中",break:"休憩中"};
var STATUS_COLOR={closed:"color:#e44",open:"color:#2a9",break:"color:#c80"};

AuthRole.requireStaff(auth,
  function(user, role){
    g("login-screen").style.display="none";
    g("app").style.display="block";
    loadLayouts();
    loadMembers();
    restoreStoreState();
    loadTodayVisits();
    loadAttendance();
  },
  function(){
    g("login-screen").style.display="flex";
    g("app").style.display="none";
  }
);
g("lbtn").addEventListener("click",function(){
  var email=gv("lemail"),pass=g("lpass").value;
  g("lerr").textContent="";
  if(!email||!pass){g("lerr").textContent="入力してください";return;}
  g("lbtn").textContent="ログイン中...";
  auth.signInWithEmailAndPassword(email,pass)
    .then(function(){g("lbtn").textContent="ログイン";})
    .catch(function(e){g("lerr").textContent="ログイン失敗: "+e.message;g("lbtn").textContent="ログイン";});
});
g("lpass").addEventListener("keydown",function(e){if(e.key==="Enter")g("lbtn").click();});
g("btn-logout").addEventListener("click",function(){auth.signOut();});

function loadLayouts(){
  db.collection("layouts").get().then(function(snap){
    layouts=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    var sel=g("oc-layout-sel");
    var cur=sel.value;
    sel.innerHTML='<option value="">選択してください</option>'+
      layouts.map(function(l){return '<option value="'+l.id+'">'+l.name+' (MAX'+l.seats+'席)</option>';}).join("");
    if(cur) sel.value=cur;
  }).catch(function(e){toast("レイアウト読込失敗: "+e.message,"err");});
}

function loadMembers(){
  db.collection("members").get().then(function(snap){
    members=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
  });
}

g("oc-layout-sel").addEventListener("change",function(){
  var id=this.value;
  var disp=g("oc-layout-display");
  if(!id){disp.style.display="none";return;}
  var lay=layouts.find(function(l){return l.id===id;});
  if(!lay||!disp)return;
  disp.style.display="block";
  g("oc-layout-name").textContent=lay.name;
  g("oc-layout-seats").textContent="MAX "+lay.seats+"席";
  var wrap=g("oc-layout-img-wrap");
  wrap.innerHTML=lay.imageData?'<img src="'+lay.imageData+'" style="max-width:100%;max-height:200px;border-radius:6px;margin-bottom:12px">':'';
});

function applyStoreStatus(status){
  storeStatus=status;
  var badge=g("store-status-badge");
  if(badge){
    badge.textContent=STATUS_LABEL[status]||status;
    badge.style.cssText="font-size:13px;font-weight:500;padding:3px 10px;border-radius:20px;background:rgba(0,0,0,.06);"+STATUS_COLOR[status];
  }
  // 開店中の場合、開店時刻を右に表示
  var openTimeEl=g("store-open-time");
  if(openTimeEl){
    if(status==="open"&&currentOpenTime){
      var ot=currentOpenTime;
      var otStr=ot.slice(0,2)+":"+ot.slice(2,4);
      openTimeEl.textContent="開店 "+otStr;
      openTimeEl.style.display="inline";
    } else {
      openTimeEl.textContent="";
      openTimeEl.style.display="none";
    }
  }
  var btnOpen=g("btn-open-store"),btnBreak=g("btn-break-store"),btnClose=g("btn-close-store");
  if(!btnOpen)return;
  if(status==="open"){
    btnOpen.disabled=true;btnOpen.style.opacity="0.4";
    btnBreak.disabled=false;btnBreak.style.opacity="1";btnBreak.textContent="☕ 休憩";
    btnClose.disabled=false;btnClose.style.opacity="1";
  } else if(status==="break"){
    btnOpen.disabled=true;btnOpen.style.opacity="0.4";
    btnBreak.disabled=false;btnBreak.style.opacity="1";btnBreak.textContent="☕ 休憩終了";
    btnClose.disabled=true;btnClose.style.opacity="0.4";
  } else {
    btnOpen.disabled=false;btnOpen.style.opacity="1";
    btnBreak.disabled=true;btnBreak.style.opacity="0.4";btnBreak.textContent="☕ 休憩";
    btnClose.disabled=true;btnClose.style.opacity="0.4";
  }
  var det=g("oc-session-detail");
  if(det) det.textContent=currentSessionId?"セッションID: "+currentSessionId+" / "+(STATUS_LABEL[status]||status)+(currentTestMode?" [テストモード]":""):"営業セッションなし";
  var laySelEl=g("oc-layout-sel");
  if(laySelEl){
    var isClosed=(status==="closed");
    laySelEl.disabled=!isClosed;
    laySelEl.style.opacity=isClosed?"1":"0.5";
  }
  // テストモードチェックボックスはセッション中は変更不可
  var tmChk=g("oc-test-mode");
  var tmNote=g("oc-test-mode-note");
  var tmLabel=g("oc-test-mode-label");
  if(tmChk){
    var isIdle=(status==="closed");
    tmChk.disabled=!isIdle;
    if(tmLabel)tmLabel.style.opacity=isIdle?"1":"0.6";
    if(tmNote){
      if(!isIdle&&currentTestMode){tmNote.textContent="テストモード中：TOPページには非公開";}
      else{tmNote.textContent="チェック時：開店してもTOPページの表示は閉店中のまま";}
    }
  }
}

g("btn-open-store").addEventListener("click",function(){
  var layoutId=gv("oc-layout-sel");
  if(!layoutId){toast("座席レイアウトを選択してください","err");return;}
  var testMode=!!(g("oc-test-mode")&&g("oc-test-mode").checked);
  var today=todayStr6();
  db.collection("sessions").where("date","==",today).get()
    .then(function(snap){
      var existCount=snap.docs.length;
      if(existCount>0&&!confirm("本日すでに"+existCount+"件の営業データがあります。追加営業として登録しますか？"))return;
      var maxSeq=snap.docs.reduce(function(m,d){return Math.max(m,parseInt(d.id.slice(6))||0);}, -1);
      var seq=maxSeq+1;
      var sessionId=today+String(seq);
      var openTime=nowStr();
      return db.collection("sessions").doc(sessionId).set({
        date:today,
        openTime:openTime,closeTime:null,
        layoutId:layoutId,
        breakStart1:null,breakEnd1:null,
        breakStart2:null,breakEnd2:null,
        breakStart3:null,breakEnd3:null,
        guestCount:null,sales:null,memo:null,
        testMode:testMode||null
      }).then(function(){
        writeJournal('create','sessions',sessionId,null,{date:today,openTime:openTime,layoutId:layoutId});
        currentSessionId=sessionId;
        currentOpenTime=openTime;
        currentSessionDate=today;
        currentLayoutId=layoutId;
        currentTestMode=testMode;
        breakIndex=0;
        applyStoreStatus("open");
        if(!testMode) writePublicStatus('open',{layoutId:layoutId,sessionDate:today});
        toast("開店しました（"+openTime+"）"+(testMode?" [テストモード]":""));
        sv("oc-memo","");
        autoCheckinStaff(today, openTime);
      });
    }).catch(function(e){toast("開店処理失敗: "+e.message,"err");});
});

g("btn-break-store").addEventListener("click",function(){
  var t=nowStr();
  if(storeStatus==="open"){
    var resumeRaw=prompt("再開予定時刻を入力（例: 2100）","");
    var resumeTime=null;
    if(resumeRaw&&/^\d{3,4}$/.test(resumeRaw.trim())){
      resumeTime=resumeRaw.trim().padStart(4,'0')+'00';
    }
    db.collection("sessions").doc(currentSessionId).get()
      .then(function(doc){
        var d=doc.data();
        var idx=0;
        if(!d.breakStart1)idx=1;
        else if(!d.breakStart2)idx=2;
        else if(!d.breakStart3)idx=3;
        else{toast("休憩回数の上限（3回）に達しています","err");return;}
        breakIndex=idx;
        var upd={};upd["breakStart"+idx]=t;
        if(resumeTime) upd["breakResumeTime"+idx]=resumeTime;
        return journaledUpdate("sessions",currentSessionId,upd,d)
          .then(function(){
            applyStoreStatus("break");
            if(!currentTestMode) writePublicStatus('break',{breakResumeTime:resumeTime||null,sessionDate:currentSessionDate});
            toast("休憩開始（"+t+(resumeTime?" 再開予定:"+resumeTime.slice(0,2)+":"+resumeTime.slice(2,4):"")+"）");
          });
      }).catch(function(e){toast("休憩処理失敗: "+e.message,"err");});
  } else if(storeStatus==="break"){
    var upd={};upd["breakEnd"+breakIndex]=t;
    journaledUpdate("sessions",currentSessionId,upd)
      .then(function(){
        applyStoreStatus("open");
        if(!currentTestMode) writePublicStatus('open',{layoutId:currentLayoutId,sessionDate:currentSessionDate});
        toast("休憩終了（"+t+"）");
      })
      .catch(function(e){toast("休憩終了処理失敗: "+e.message,"err");});
  }
});

g("btn-close-store").addEventListener("click",function(){
  if(!currentSessionId){toast("営業セッションがありません","err");return;}
  if(!confirm("閉店処理を実行しますか？"))return;
  var closeTime=nowStr();
  var closingSessionId=currentSessionId;
  var closingDate=currentSessionDate;
  journaledUpdate("sessions",closingSessionId,{closeTime:closeTime})
    .then(function(){
      toast("閉店しました（"+closeTime+"）");
      autoCheckoutStaff(closeTime);
      currentSessionId=null;
      currentLayoutId=null;
      applyStoreStatus("closed");
      writePublicStatus('closed',{});
      // 来場数・売上合計をセッションに記録（セッション時間帯で絞り込み・IDプレフィックス補完）
      if(closingDate){
        var closingOpenTime=currentOpenTime;
        Promise.all([
          db.collection("visits").where("visitDate","==",closingDate).get(),
          db.collection("visits")
            .orderBy(firebase.firestore.FieldPath.documentId())
            .startAt(closingDate).endAt(closingDate+"99").get()
        ]).then(function(snaps){
          var seen={};var dayVisits=[];
          snaps.forEach(function(snap){snap.docs.forEach(function(d){if(!seen[d.id]){seen[d.id]=true;dayVisits.push(d.data());}});});
          var sesVisits=dayVisits;
          if(closingOpenTime){
            var openInt2=parseInt(closingOpenTime.slice(0,4))||0;
            var closeInt2=parseInt(closeTime.slice(0,4))||0;
            var overnight2=closeInt2>=2400||(closeInt2<openInt2&&openInt2>=1200&&closeInt2<600);
            var closeNorm2=closeInt2>=2400?closeInt2-2400:closeInt2;
            sesVisits=dayVisits.filter(function(v){
              if(!v.visitTime)return true;
              var vt=parseInt(v.visitTime.slice(0,4))||0;
              if(overnight2) return vt>=openInt2||(vt<1200&&vt<=closeNorm2);
              return vt>=openInt2&&vt<=closeInt2;
            });
          }
          var guestCount=sesVisits.filter(function(v){return !v.isStaff;}).length;
          var sales=sesVisits.reduce(function(s,v){return s+(v.amount||0);},0);
          journaledUpdate("sessions",closingSessionId,{guestCount:guestCount,sales:sales})
            .catch(function(e){console.warn("セッション集計更新失敗:",e);});
          // バッジ自動判定（バックグラウンド実行）
          autoProcessBadges(db,sesVisits,closingSessionId);
        }).catch(function(e){console.warn("来場データ取得失敗:",e);});
      }
    }).catch(function(e){toast("閉店処理失敗: "+e.message,"err");});
});

g("btn-oc-save-memo").addEventListener("click",function(){
  if(!currentSessionId){toast("営業セッションがありません","err");return;}
  journaledUpdate("sessions",currentSessionId,{memo:gv("oc-memo")||null})
    .then(function(){toast("備考を保存しました");})
    .catch(function(e){toast("保存失敗: "+e.message,"err");});
});

function restoreStoreState(){
  db.collection("sessions").get()
    .then(function(snap){
      if(snap.empty){applyStoreStatus("closed");writePublicStatus('closed',{});return;}
      var docs=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      docs.sort(function(a,b){
        var ka=(a.date||"")+(a.openTime||"");
        var kb=(b.date||"")+(b.openTime||"");
        return kb.localeCompare(ka);
      });
      var d=docs[0];
      if(d.closeTime){currentSessionId=null;currentOpenTime=null;currentSessionDate=null;currentLayoutId=null;applyStoreStatus("closed");writePublicStatus('closed',{});return;}
      currentSessionDate=d.date||null;
      currentSessionId=d.id||d.sessionId;
      currentOpenTime=d.openTime||null;
      currentLayoutId=d.layoutId||null;
      currentTestMode=!!(d.testMode);
      var tmChk=g("oc-test-mode");if(tmChk)tmChk.checked=currentTestMode;
      var memoEl=g("oc-memo");if(memoEl)memoEl.value=d.memo||"";
      var fields=[d.breakStart1,d.breakEnd1,d.breakStart2,d.breakEnd2,d.breakStart3,d.breakEnd3];
      var filled=fields.filter(function(f){return f;}).length;
      if(filled===1||filled===3||filled===5){
        if(filled>=4)breakIndex=3;
        else if(filled>=2)breakIndex=2;
        else breakIndex=1;
        applyStoreStatus("break");
        var bResume=d['breakResumeTime'+breakIndex]||null;
        if(!currentTestMode) writePublicStatus('break',{breakResumeTime:bResume,sessionDate:currentSessionDate});
      } else {
        applyStoreStatus("open");
        if(!currentTestMode) writePublicStatus('open',{layoutId:currentLayoutId,sessionDate:currentSessionDate});
      }
    }).catch(function(e){console.error("restoreStoreState error:",e);});
}

function loadTodayVisits(){
  var today=todayStr6();
  db.collection("visits").where("visitDate","==",today).get()
    .then(function(snap){
      var list=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      list.sort(function(a,b){return (a.visitTime||"").localeCompare(b.visitTime||"");});
      renderOcList(list);
    }).catch(function(e){toast("来店データ読込失敗: "+e.message,"err");});
}

function getMemberName(memberId){
  if(!memberId)return "（非会員）";
  var m=members.find(function(x){return x.id===memberId||x.memberId===memberId;});
  return m?(m.nickname||m.name||memberId):"ID:"+memberId;
}

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function loadAttendance(){
  var today=todayStr6();
  var list=g('oc-attendance-list');
  if(!list)return;
  try{
    var memSnap=await db.collection('members').where('role','in',['owner','staff']).get();
    var attSnap=await db.collection('attendance').where('date','==',today).get();
    var mems=memSnap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    var atts={};
    attSnap.docs.forEach(function(d){var dd=d.data();atts[dd.memberId]=dd;});
    if(!mems.length){list.innerHTML='<div style="color:var(--ink3)">スタッフ未登録</div>';return;}
    list.innerHTML=mems.map(function(m){
      var att=atts[m.id]||atts[m.memberId]||null;
      var role=(m.role||'').toLowerCase()==='owner'?'OWNER':'STAFF';
      var status=att&&att.checkInTime&&!att.checkOutTime?'出勤中':att&&att.checkOutTime?'退勤済':'未出勤';
      var color=status==='出勤中'?'var(--teal)':status==='退勤済'?'var(--ink3)':'var(--ink3)';
      var timeStr=att&&att.checkInTime?(att.checkInTime.slice(0,2)+':'+att.checkInTime.slice(2,4)):'';
      return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">'
        +'<span style="font-size:12px;font-weight:500;flex:1">'+esc(m.nickname||m.name||m.id)+'</span>'
        +'<span style="font-size:10px;background:rgba(0,0,0,.07);padding:1px 6px;border-radius:3px;color:var(--ink3)">'+role+'</span>'
        +'<span style="font-size:12px;color:'+color+';font-weight:500">'+status+(timeStr?' '+timeStr:'')+'</span>'
        +'</div>';
    }).join('');
  }catch(e){list.textContent='読み込み失敗';}
}

function renderOcList(list){
  var tb=g("tb-oc-checkin");if(!tb)return;
  var regular=list.filter(function(r){return !r.isStaff;});
  if(!regular.length){tb.innerHTML='<tr><td colspan="4" class="ec">本日の来店者はいません</td></tr>';return;}
  var active=regular.filter(function(r){return !r.checkoutTime;});
  var done=regular.filter(function(r){return !!r.checkoutTime;});
  var sorted=active.concat(done);
  tb.innerHTML=sorted.map(function(r){
    var style=r.checkoutTime?"opacity:.4":"";
    return '<tr style="'+style+'">'
      +'<td class="mono dim">'+fmtHHMM(r.visitTime)+(r.checkoutTime?' → '+fmtHHMM(r.checkoutTime):"")+'</td>'
      +'<td class="mono dim">'+(r.memberId||"—")+'</td>'
      +'<td>'+getMemberName(r.memberId)+'</td>'
      +'<td style="text-align:center;font-family:var(--mono);font-size:11px">'+(r.checkinGroupId||"—")+'</td>'
    +'</tr>';
  }).join("");
}

async function autoCheckinStaff(today, openTime){
  try{
    var attSnap=await db.collection('attendance').where('date','==',today).get();
    var checkedInIds=[];
    attSnap.forEach(function(d){
      var a=d.data();
      if(a.checkInTime&&!a.checkOutTime)checkedInIds.push(a.memberId);
    });
    if(!checkedInIds.length)return;
    // 既存のスタッフvisitを確認（重複防止）
    var existSnap=await db.collection('visits')
      .where('visitDate','==',today).where('isStaff','==',true).get();
    var existIds=new Set();
    existSnap.forEach(function(d){var v=d.data();if(v.memberId)existIds.add(v.memberId);});
    var batch=db.batch();
    var cnt=0;
    checkedInIds.forEach(function(mid,idx){
      if(existIds.has(mid))return;
      var docId=today+'S'+mid;
      batch.set(db.collection('visits').doc(docId),{
        visitDate:today,visitTime:openTime,
        seq:9990+idx,memberId:mid,isStaff:true,
        tequilaAmount:0,amount:0,checkoutTime:null,checkoutPayTime:null
      });
      cnt++;
    });
    if(cnt>0){
      await batch.commit();
      checkedInIds.forEach(function(mid,idx){
        if(existIds.has(mid))return;
        writeJournal('create','visits',today+'S'+mid,null,{visitDate:today,visitTime:openTime,memberId:mid,isStaff:true});
      });
      toast('スタッフ'+cnt+'名を自動チェックイン','inf');
      loadTodayVisits();
    }
  }catch(e){toast('スタッフ自動チェックイン失敗: '+e.message,'err');}
}

async function autoCheckoutStaff(closeTime){
  var today=todayStr6();
  try{
    var snap=await db.collection('visits')
      .where('visitDate','==',today).where('isStaff','==',true).get();
    var batch=db.batch();
    var cnt=0;
    var _acJournal=[];
    snap.forEach(function(d){
      var v=d.data();
      if(!v.checkoutTime){
        batch.update(db.collection('visits').doc(d.id),{checkoutTime:closeTime});
        _acJournal.push({id:d.id,before:{checkoutTime:v.checkoutTime||null},after:{checkoutTime:closeTime}});
        cnt++;
      }
    });
    if(cnt>0){
      await batch.commit();
      _acJournal.forEach(function(j){ writeJournal('update','visits',j.id,j.before,j.after); });
      toast('スタッフ'+cnt+'名を自動退場','inf');
    }
  }catch(e){toast('スタッフ自動退場失敗: '+e.message,'err');}
}

// ── バッジ自動判定（閉店後バックグラウンド実行）─────────────────
async function autoProcessBadges(db,sesVisits,sessionId){
  try{
    // バッジマスタ・ボトルマスタ取得
    var results=await Promise.all([
      db.collection('badges').where('active','==',true).get(),
      db.collection('bottles').get()
    ]);
    var activeBadges=results[0].docs.map(function(d){return Object.assign({id:d.id},d.data());})
      .filter(function(b){return b.type==='1'&&(b.bottleIds||[]).length;});
    if(!activeBadges.length)return;

    var thresholds={};
    results[1].docs.forEach(function(d){
      var b=d.data();thresholds[d.id]=(b.minTasting===1||b.minTasting==='1')?5:10;
    });

    // セッション参加会員のIDリスト（スタッフ除く）
    var memberIds=[...new Set(
      sesVisits.filter(function(v){return !v.isStaff&&v.memberId;}).map(function(v){return v.memberId;})
    )];
    if(!memberIds.length)return;

    // 既存バッジ取得（対象会員分）
    var existSet=new Set();
    for(var mi=0;mi<memberIds.length;mi+=10){
      var chunk=memberIds.slice(mi,mi+10);
      var mbSnap=await db.collection('memberBadges').where('memberId','in',chunk).get();
      mbSnap.docs.forEach(function(d){var dd=d.data();existSet.add(dd.memberId+'|'+dd.badgeId);});
    }

    var totalAwarded=0;
    var newBadgeNames=[];
    for(var i=0;i<memberIds.length;i++){
      var mid=memberIds[i];

      // 全来場歴取得
      var visSnap=await db.collection('visits').where('memberId','==',mid).get().catch(function(){return{docs:[]};});
      var vkeys=visSnap.docs.map(function(d){return d.id;});
      if(!vkeys.length)continue;

      // 注文集約（bottleDataId→qty）
      var bdQty={};
      for(var j=0;j<vkeys.length;j+=30){
        var vchunk=vkeys.slice(j,j+30);
        var ordSnap=await db.collection('orders').where('visitKey','in',vchunk).get().catch(function(){return{docs:[]};});
        ordSnap.docs.forEach(function(d){
          var o=d.data();
          if(o.deleted===1||o.served===0||!o.productCode)return;
          if(o.productType==='tequila'||o.productType==='other'){
            bdQty[o.productCode]=(bdQty[o.productCode]||0)+(o.qty||0);
          }
        });
      }

      // bottleDataId→bottleId変換
      var bdIds=Object.keys(bdQty);
      var bottleQty={};
      for(var k=0;k<bdIds.length;k+=30){
        var bchunk=bdIds.slice(k,k+30);
        var bdSnap=await db.collection('bottleData')
          .where(firebase.firestore.FieldPath.documentId(),'in',bchunk).get().catch(function(){return{docs:[]};});
        bdSnap.docs.forEach(function(d){
          var bd=d.data();
          if(bd.bottleId&&bdQty[d.id]) bottleQty[bd.bottleId]=(bottleQty[bd.bottleId]||0)+bdQty[d.id];
        });
      }

      // バッジ判定・付与
      var batch=db.batch();var cnt=0;var _badgeJournal=[];
      for(var bi=0;bi<activeBadges.length;bi++){
        var badge=activeBadges[bi];
        if(existSet.has(mid+'|'+badge.id))continue;
        var ok=(badge.bottleIds||[]).every(function(bid){
          return (bottleQty[bid]||0)>=(thresholds[bid]!==undefined?thresholds[bid]:10);
        });
        if(ok){
          batch.set(db.collection('memberBadges').doc(mid+'_'+badge.id),{
            memberId:mid,badgeId:badge.id,
            earnedAt:firebase.firestore.FieldValue.serverTimestamp(),
            sessionId:sessionId,source:'auto'
          });
          _badgeJournal.push({id:mid+'_'+badge.id,data:{memberId:mid,badgeId:badge.id,sessionId:sessionId,source:'auto'}});
          existSet.add(mid+'|'+badge.id);
          newBadgeNames.push(badge.icon+badge.name);
          cnt++;totalAwarded++;
        }
      }
      if(cnt>0){
        await batch.commit();
        _badgeJournal.forEach(function(j){ writeJournal('create','memberBadges',j.id,null,j.data); });
        _badgeJournal=[];
      }
    }
    if(totalAwarded>0){
      toast('🎖️ バッジ付与: '+newBadgeNames.join(' / '),'inf');
      // 公開設定の会員の静的コレクションページを再生成
      regeneratePublicCollections(db, memberIds, activeBadges, thresholds).catch(function(e){console.warn('静的ページ再生成失敗:',e);});
    }
  }catch(e){console.warn('バッジ自動判定失敗:',e);}
}

async function regeneratePublicCollections(db, memberIds, activeBadges, thresholds){
  var storage=firebase.storage();
  for(var i=0;i<memberIds.length;i++){
    var mid=memberIds[i];
    // メンバードキュメント取得（公開設定確認）
    var memSnap=await db.collection('members').where('memberId','==',mid).limit(1).get().catch(function(){return{empty:true};});
    if(memSnap.empty)continue;
    var mem=Object.assign({id:memSnap.docs[0].id},memSnap.docs[0].data());
    if(!mem.badgePublic)continue;

    var memberName=mem.nickname||mem.name||mid;
    // バッジマスタ取得
    var badgesSnap=await db.collection('badges').where('active','==',true).get().catch(function(){return{docs:[]};});
    var allBadges=badgesSnap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    allBadges.sort(function(a,b){return a.id.localeCompare(b.id);});
    // 取得済みバッジ
    var mbSnap=await db.collection('memberBadges').where('memberId','==',mid).get().catch(function(){return{docs:[]};});
    var earnedMap={};
    mbSnap.docs.forEach(function(d){var dd=d.data();earnedMap[dd.badgeId]=dd;});

    var now=new Date().toLocaleDateString('ja-JP');
    var earnedCount=allBadges.filter(function(b){return !!earnedMap[b.id];}).length;
    var rows=allBadges.map(function(b){
      var mb=earnedMap[b.id]; var earned=!!mb;
      var dt=mb&&mb.earnedAt?(mb.earnedAt.toDate?mb.earnedAt.toDate():new Date(mb.earnedAt)).toLocaleDateString('ja-JP'):'';
      var n=String(b.name||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      var desc=String(b.description||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return '<div style="border:2px solid '+(earned?'#c8921e':'#d0c8bc')+';border-radius:10px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;background:'+(earned?'rgba(200,146,30,.06)':'#fff')+(earned?'':';opacity:.45;filter:grayscale(.5)')+';">'
        +'<div style="font-size:34px">'+(b.icon||'🎖️')+'</div>'
        +'<div style="font-size:12px;font-weight:600;color:#4a3820">'+n+'</div>'
        +(desc?'<div style="font-size:10px;color:#9a8470">'+desc+'</div>':'')
        +(earned?'<div style="font-size:10px;color:#1a6e58">取得: '+dt+'</div>':'<div style="font-size:10px;color:#9a8470">🔒</div>')
        +'</div>';
    }).join('');
    var mn=String(memberName).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var html='<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>'+mn+' のバッジコレクション — テキーラ道場</title>'
      +'<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">'
      +'<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:"Noto Sans JP",sans-serif;background:#faf7f1;min-height:100vh}'
      +'.hero{background:#18110a;padding:28px 20px 22px;text-align:center}'
      +'.brand{font-family:"Cormorant Garamond",serif;font-size:22px;color:rgba(255,255,255,.9);letter-spacing:.12em}'
      +'.sub{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:3px}'
      +'.name{font-size:18px;color:#e8b84a;font-weight:500;margin-top:12px}.cnt{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}'
      +'.main{max-width:700px;margin:0 auto;padding:20px 16px 50px}'
      +'.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}'
      +'.foot{text-align:center;font-size:10px;color:#9a8470;margin-top:30px}</style></head><body>'
      +'<div class="hero"><div class="brand">TEQUILA DOJO</div><div class="sub">Badge Collection</div>'
      +'<div class="name">'+mn+'</div><div class="cnt">'+earnedCount+' / '+allBadges.length+' バッジ取得済み</div></div>'
      +'<div class="main"><div class="grid">'+rows+'</div><div class="foot">Generated: '+now+' — テキーラ道場</div></div></body></html>';

    var blob=new Blob([html],{type:'text/html;charset=utf-8'});
    var ref=storage.ref('public/collections/'+mid+'.html');
    await ref.put(blob,{contentType:'text/html;charset=utf-8',cacheControl:'no-cache'});
    var url=await ref.getDownloadURL();
    await journaledUpdate('members',mem.id,{badgeCollectionUrl:url},{badgeCollectionUrl:mem.badgeCollectionUrl||null});
  }
}
