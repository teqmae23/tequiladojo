<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>注文ID移行ツール</title>
<style>
body{font-family:sans-serif;padding:20px;max-width:800px;margin:0 auto;}
h2{color:#7a5610;}
.log{background:#f5f5f0;border:1px solid #ddd;padding:12px;border-radius:6px;font-family:monospace;font-size:12px;white-space:pre-wrap;max-height:400px;overflow-y:auto;margin-top:12px;}
.btn{background:#7a5610;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;margin:6px 4px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-danger{background:#c0392b;}
input{padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px;}
label{font-size:13px;color:#555;}
.warn{background:#fff3cd;border:1px solid #ffc107;padding:10px;border-radius:4px;margin-bottom:12px;}
</style>
</head>
<body>
<h2>注文ID移行ツール（自動採番ID → 日付+連番形式）</h2>
<div class="warn">⚠ このツールは注文ドキュメントIDを書き直します。実行前に必ずバックアップを確認してください。</div>

<div style="margin-bottom:12px;">
  <label>対象日付（YYMMDD）：</label>
  <input id="target-date" maxlength="6" placeholder="260629" style="width:100px;">
  &nbsp;
  <button class="btn" onclick="previewMigration()">プレビュー</button>
  <button class="btn btn-danger" id="btn-exec" onclick="executeMigration()" disabled>実行（書き換え）</button>
</div>

<div class="log" id="log">ログがここに表示されます</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain: "tequiladojo.firebaseapp.com",
  projectId: "tequiladojo",
  appId: "1:56663296233:web:c8cac2fcbeb4faa09e0878"
});
var db = firebase.firestore();
var _plan = [];

function log(msg){ var el=document.getElementById('log'); el.textContent+=msg+'\n'; el.scrollTop=el.scrollHeight; }
function clearLog(){ document.getElementById('log').textContent=''; }

async function fetchOrdersForDate(date){
  // 1. 旧形式: doc ID が date で始まる9桁
  var snap1 = await db.collection('orders')
    .orderBy(firebase.firestore.FieldPath.documentId())
    .startAt(date).endAt(date+'~').get().catch(()=>({docs:[]}));
  // 2. 自動採番形式: orderDate フィールドで検索
  var snap2 = await db.collection('orders').where('orderDate','==',date).get().catch(()=>({docs:[]}));

  var seen = new Set();
  var orders = [];
  snap1.docs.forEach(function(d){ if(!seen.has(d.id)){seen.add(d.id);orders.push({id:d.id,...d.data()});} });
  snap2.docs.forEach(function(d){ if(!seen.has(d.id)){seen.add(d.id);orders.push({id:d.id,...d.data()});} });
  return orders;
}

function isSequentialId(id, date){ return new RegExp('^'+date+'\\d{3}$').test(id); }

async function previewMigration(){
  clearLog();
  var date = document.getElementById('target-date').value.trim();
  if(!/^\d{6}$/.test(date)){ log('日付を6桁で入力してください（例: 260629）'); return; }

  log('対象日付: '+date+' の注文を取得中...');
  var orders = await fetchOrdersForDate(date);
  log('取得件数: '+orders.length+'件');

  // 自動採番IDのものを抽出
  var autoIdOrders = orders.filter(function(o){ return !isSequentialId(o.id, date); });
  var seqIdOrders  = orders.filter(function(o){ return  isSequentialId(o.id, date); });

  log('既に連番IDの注文: '+seqIdOrders.length+'件');
  log('移行が必要な注文（自動採番ID）: '+autoIdOrders.length+'件');

  if(!autoIdOrders.length){ log('\n移行対象なし。終了します。'); _plan=[]; document.getElementById('btn-exec').disabled=true; return; }

  // 時系列ソート（orderTime昇順、同じならorderGroupId昇順）
  autoIdOrders.sort(function(a,b){
    var ta=a.orderTime||'9999', tb=b.orderTime||'9999';
    if(ta!==tb) return ta.localeCompare(tb);
    return (a.orderGroupId||'').localeCompare(b.orderGroupId||'');
  });

  // 既存連番の最大値を確認
  var maxExistingSeq = seqIdOrders.reduce(function(m,o){
    return Math.max(m, parseInt(o.id.slice(6))||0);
  }, 0);
  log('\n既存連番の最大値: '+maxExistingSeq);

  _plan = autoIdOrders.map(function(o, i){
    var newSeq = maxExistingSeq + i + 1;
    var newId  = date + String(newSeq).padStart(3,'0');
    return { oldId: o.id, newId: newId, data: o };
  });

  log('\n【移行プラン】');
  _plan.forEach(function(p){
    log('  '+p.oldId+' → '+p.newId
      +'  ('+p.data.orderTime+'  '+p.data.productName+'  グループ:'+p.data.orderGroupId+')');
  });

  document.getElementById('btn-exec').disabled=false;
  log('\n問題なければ「実行」ボタンを押してください。');
}

async function executeMigration(){
  if(!_plan.length){ log('先にプレビューを実行してください。'); return; }
  document.getElementById('btn-exec').disabled=true;
  log('\n--- 移行実行開始 ---');

  var errors=0;
  for(var i=0; i<_plan.length; i++){
    var p=_plan[i];
    try{
      // 1. 新IDでdocを作成
      var newData = Object.assign({}, p.data);
      delete newData.id; // id はdocのkey、フィールドには不要
      await db.collection('orders').doc(p.newId).set(newData);
      log('['+( i+1)+'/'+_plan.length+'] 作成: '+p.newId+' ✓');

      // 2. cocktailOrders があれば更新
      var cSnap = await db.collection('cocktailOrders').where('orderId','==',p.oldId).get().catch(()=>({docs:[]}));
      if(!cSnap.empty){
        for(var j=0; j<cSnap.docs.length; j++){
          await cSnap.docs[j].ref.update({orderId: p.newId});
          log('   cocktailOrders 更新: '+cSnap.docs[j].id);
        }
      }

      // 3. 旧docを削除
      await db.collection('orders').doc(p.oldId).delete();
      log('   削除: '+p.oldId+' ✓');
    }catch(e){
      log('   エラー ['+p.oldId+']: '+e.message);
      errors++;
    }
  }

  log('\n--- 完了 ---');
  log('成功: '+(_plan.length-errors)+'件 / エラー: '+errors+'件');
  _plan=[];
}
</script>
</body>
</html>
