<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テキーラ道場 — 製法・設備 分類マスタ管理</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
var FIREBASE_CONFIG={
  apiKey:"AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain:"tequiladojo.firebaseapp.com",
  projectId:"tequiladojo",
  storageBucket:"tequiladojo.firebasestorage.app",
  messagingSenderId:"56663296233",
  appId:"1:56663296233:web:c8cac2fcbeb4faa09e0878"
};
</script>
<script src="/auth-role.js?v=20260714"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --cream:#F1EFE8;--cream2:#E8E4D8;--cream3:#DDD8C8;
  --red:#b03020;--green:#1a6640;
  --sans:'Noto Sans JP',sans-serif;--serif:'Cormorant Garamond',serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:var(--sans);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#login-screen{display:none;align-items:center;justify-content:center;height:100vh;}
.lcard{background:#fff;border:1px solid var(--cream3);border-radius:10px;padding:32px 28px;width:100%;max-width:360px;box-shadow:0 4px 20px rgba(0,0,0,.08);}
.lcard h2{font-family:var(--serif);font-size:22px;color:var(--gold-d);margin-bottom:4px;}
.lcard .lsub{font-size:12px;color:var(--ink3);margin-bottom:20px;}
.lcard label{display:block;font-size:11px;color:var(--ink3);margin:14px 0 4px;}
.lcard input{width:100%;padding:9px 11px;border:1px solid var(--cream3);border-radius:5px;font-size:13px;font-family:var(--sans);}
#lerr{font-size:12px;color:var(--red);margin-top:8px;min-height:16px;}
.lbtn{width:100%;margin-top:18px;padding:10px;background:var(--gold-d);color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;}
#app{display:none;flex-direction:column;height:100vh;}
.hdr{background:var(--ink);padding:0 16px;display:flex;align-items:center;gap:12px;height:48px;flex-shrink:0;}
.hdr-logo{font-family:var(--serif);font-size:16px;color:var(--gold-l);letter-spacing:.04em;}
.hdr-sub{font-size:11px;color:var(--ink3);margin-left:4px;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.hdr-user{font-size:11px;color:var(--ink3);font-family:var(--mono);}
.hdr-btn{padding:4px 10px;border:1px solid rgba(255,255,255,.2);border-radius:5px;background:transparent;color:var(--gold-l);font-size:11px;cursor:pointer;}
.hdr-link{color:var(--gold-l);font-size:12px;text-decoration:none;opacity:.75;}
.ctrl{background:var(--cream2);border-bottom:1px solid var(--cream3);padding:8px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.cbtn{padding:5px 12px;border:1px solid var(--cream3);border-radius:5px;background:#fff;color:var(--ink2);font-size:12px;cursor:pointer;}
.cbtn:hover{border-color:var(--gold);}
.cbtn.primary{background:var(--gold-d);color:#fff;border-color:var(--gold-d);}
.cbtn.danger{color:var(--red);border-color:#e0a89e;}
#ctrl-msg{font-size:12px;color:var(--ink3);margin-left:auto;}
#wrap{flex:1;overflow-y:auto;padding:14px 16px 40px;}
.cls-card{background:#fff;border:1px solid var(--cream3);border-radius:8px;padding:12px 14px;margin-bottom:12px;}
.cls-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.cls-label{font-size:15px;font-weight:600;color:var(--ink);border:1px solid transparent;border-radius:4px;padding:2px 6px;}
.cls-label:focus{outline:none;border-color:var(--gold);background:var(--cream2);}
.cls-key{font-family:var(--mono);font-size:11px;color:var(--ink3);}
.cls-field{font-family:var(--mono);font-size:10px;color:#fff;background:var(--gold-d);border-radius:4px;padding:1px 6px;}
.cls-del{margin-left:auto;font-size:11px;color:var(--red);border:1px solid var(--cream3);border-radius:4px;background:#fff;padding:3px 8px;cursor:pointer;}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--cream2);border:1px solid var(--cream3);border-radius:14px;padding:3px 6px 3px 10px;font-size:12px;}
.chip button{border:none;background:none;color:var(--red);cursor:pointer;font-size:13px;line-height:1;padding:0 2px;}
.add-row{display:flex;gap:6px;align-items:center;}
.add-row input{flex:1;max-width:280px;padding:5px 9px;border:1px solid var(--cream3);border-radius:5px;font-size:12px;font-family:var(--sans);}
.add-row button{padding:5px 12px;border:1px solid var(--cream3);border-radius:5px;background:#fff;font-size:12px;cursor:pointer;}
.sec-title{font-family:var(--serif);font-size:18px;color:var(--gold-d);margin:18px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--cream3);}
.other-card{background:#fff8ee;border:1px solid #f0d48a;border-radius:8px;padding:12px 14px;}
.other-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--cream3);font-size:12px;}
.other-row:last-child{border-bottom:none;}
.other-val{flex:1;font-family:var(--mono);}
.other-cnt{color:var(--ink3);font-size:11px;}
.other-row select{font-size:12px;padding:3px 5px;border:1px solid var(--cream3);border-radius:5px;}
.other-row button{font-size:11px;padding:3px 9px;border:1px solid var(--cream3);border-radius:5px;background:#fff;cursor:pointer;}
.note{font-size:12px;color:var(--ink3);line-height:1.6;margin-bottom:10px;}
.unsaved{color:var(--red);font-weight:600;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="lcard">
    <h2>テキーラ道場</h2>
    <div class="lsub">オーナーとしてログインしてください</div>
    <label>メールアドレス</label><input id="l-email" type="email" autocomplete="username">
    <label>パスワード</label><input id="l-pass" type="password" autocomplete="current-password">
    <div id="lerr"></div>
    <button class="lbtn" id="l-btn">ログイン</button>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-logo">テキーラ道場</div>
    <div class="hdr-sub">製法・設備 分類マスタ管理（オーナー限定）</div>
    <div class="hdr-right">
      <span class="hdr-user" id="hdr-user"></span>
      <a class="hdr-link" href="admin_amm_tree.html">🌵 AMMツリー →</a>
      <button class="hdr-btn" id="btn-logout">ログアウト</button>
    </div>
  </div>
  <div class="ctrl">
    <button class="cbtn primary" id="btn-save" onclick="doSave()">💾 保存</button>
    <button class="cbtn" id="btn-scan" onclick="scanOther()">🔍 データ内の未分類値をスキャン</button>
    <button class="cbtn" id="btn-addcls" onclick="addClass()">＋ 分類を追加</button>
    <button class="cbtn danger" id="btn-reset" onclick="resetDefault()">初期リストに戻す</button>
    <span id="ctrl-msg"></span>
  </div>
  <div id="wrap">
    <div class="note">
      製法・設備の値をこの分類マスタで管理します。会員の抽出条件はこのマスタに沿って表示され、<b>マスタに無い値は自動的に「その他」</b>に入ります。「未分類値をスキャン」で実データ中の未登録値を洗い出し、各分類へ手動で割り振れます。
    </div>
    <div id="classes"></div>
    <div class="sec-title">未分類（その他）— 実データ中でマスタに無い値</div>
    <div class="other-card" id="other-card"><div class="note" style="margin:0;">「🔍 データ内の未分類値をスキャン」を押すと、ammBottleDetails / ammDistilleryDetails を走査して未登録の値を一覧表示します。</div></div>
  </div>
</div>

<script>
if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
var auth=firebase.auth(), db=firebase.firestore();
function escH(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// フィールド対応: key=分類キー, field=Firestoreのフィールド名（ボトル/蒸留所共通のことが多い）
var DEFAULT_CLASSES=[
  {key:'category', label:'カテゴリー', field:'category', values:['100% agave','Mixto']},
  {key:'cooking', label:'糖化', field:'cooking', values:['Acid-Thermal Hydrolysis','Autoclave (high pressure)','Autoclave (low pressure)','Autoclave (post diffuser)','Boiling Tank','Stone/Brick Ovens']},
  {key:'extraction', label:'搾汁', field:'extraction', values:['Diffuser','Earthen Pit','Hand Crushed','Roller Mill','Screw Mill','Tahona']},
  {key:'fermentation', label:'発酵', field:'fermentation', values:['Cement Tank','Champagne Yeast','Classical music','Closed fermentation','Fermentation with fibers','Fermentation without fibers','Open-air fermentation','Proprietary yeast','Spontaneous fermentation','Wood tanks/pipones']},
  {key:'distillation', label:'蒸留', field:'still', values:['Column','Copper Pot','Filipino Style (wood/copper)','Stainless Pot w/Copper Coil','Stainless Steel Pot','Stainless steel tanks','Stainless/Copper Hybrid']},
  {key:'aging', label:'熟成', field:'aging', values:['Amburana barrels','American White Oak barrels','Beer Casks','Bourbon barrels','Canadian Oak','Cognac casks','Custom hybrid barrels','Double Barrel','French Oak barrels','Hungarian Oak barrels','Jackfruit Barrels','Japanese Oak','New barrels','Oak barrels','Pipones','Port casks','Rum barrels','Rye barrels','Scotch barrels','Sherry casks','Single Barrel','Used barrels','Whisky barrels','Wine casks','Wood chips']},
  {key:'waterSource', label:'水源', field:'waterSource', values:['Deep well water','Distilled water','Natural spring water','Rain water']}
];

var classes=[]; // 現在の編集中マスタ

function clone(o){ return JSON.parse(JSON.stringify(o)); }
function msg(t,c){ var e=document.getElementById('ctrl-msg'); e.textContent=t; e.className=c||''; }

// ── ログイン ──
document.getElementById('l-btn').addEventListener('click',async function(){
  var em=document.getElementById('l-email').value.trim(), pw=document.getElementById('l-pass').value;
  document.getElementById('lerr').textContent=''; this.disabled=true;
  try{ await auth.signInWithEmailAndPassword(em,pw); }
  catch(e){ document.getElementById('lerr').textContent=e.message; this.disabled=false; }
});
document.getElementById('l-pass').addEventListener('keydown',function(e){ if(e.key==='Enter') document.getElementById('l-btn').click(); });
document.getElementById('btn-logout').addEventListener('click',function(){ auth.signOut(); });

function tokens(v){ if(v==null) return []; return String(v).split(/[\n;]+/).map(function(s){return s.trim().replace(/^,+/,'').replace(/,+$/,'').trim();}).filter(Boolean); }

// ── マスタ読み込み ──
function loadClasses(){
  msg('読み込み中...');
  db.collection('masterMeta').doc('equipmentClasses').get().then(function(d){
    if(d.exists && Array.isArray(d.data().classes) && d.data().classes.length){
      classes=clone(d.data().classes);
      msg('読み込み完了（保存済みマスタ）');
    }else{
      classes=clone(DEFAULT_CLASSES);
      msg('保存済みマスタが無いため初期リストを表示中（保存で確定）','unsaved');
    }
    renderClasses();
  }).catch(function(e){ msg('読み込み失敗: '+e.message); });
}

function renderClasses(){
  var root=document.getElementById('classes'); root.innerHTML='';
  classes.forEach(function(cls,ci){
    var card=document.createElement('div'); card.className='cls-card';
    var head=document.createElement('div'); head.className='cls-head';
    var lab=document.createElement('span'); lab.className='cls-label'; lab.contentEditable='true'; lab.textContent=cls.label;
    lab.addEventListener('input',function(){ cls.label=lab.textContent.trim(); });
    head.appendChild(lab);
    var key=document.createElement('span'); key.className='cls-key'; key.textContent=cls.key; head.appendChild(key);
    var fld=document.createElement('span'); fld.className='cls-field'; fld.textContent='field: '+(cls.field||'—'); head.appendChild(fld);
    var del=document.createElement('button'); del.className='cls-del'; del.textContent='分類を削除';
    del.onclick=function(){ if(confirm('分類「'+cls.label+'」を削除しますか？')){ classes.splice(ci,1); renderClasses(); } };
    head.appendChild(del);
    card.appendChild(head);
    var chips=document.createElement('div'); chips.className='chips';
    (cls.values||[]).forEach(function(v,vi){
      var chip=document.createElement('span'); chip.className='chip';
      var t=document.createElement('span'); t.textContent=v; chip.appendChild(t);
      var x=document.createElement('button'); x.textContent='×'; x.title='削除';
      x.onclick=function(){ cls.values.splice(vi,1); renderClasses(); };
      chip.appendChild(x); chips.appendChild(chip);
    });
    if(!(cls.values||[]).length){ var em=document.createElement('span'); em.className='fc-empty'; em.textContent='（値なし）'; chips.appendChild(em); }
    card.appendChild(chips);
    var addr=document.createElement('div'); addr.className='add-row';
    var inp=document.createElement('input'); inp.placeholder='値を追加して Enter';
    inp.addEventListener('keydown',function(e){ if(e.key==='Enter'){ addVal(cls,inp.value); inp.value=''; } });
    var ab=document.createElement('button'); ab.textContent='追加'; ab.onclick=function(){ addVal(cls,inp.value); inp.value=''; };
    addr.appendChild(inp); addr.appendChild(ab); card.appendChild(addr);
    root.appendChild(card);
  });
}
function addVal(cls,v){ v=String(v||'').trim(); if(!v) return; if(!cls.values) cls.values=[]; if(cls.values.indexOf(v)<0){ cls.values.push(v); renderClasses(); } }

function addClass(){
  var label=prompt('分類名（例: 熟成樽）'); if(!label) return;
  var key=prompt('キー（英数字。例: aging2）', label.toLowerCase().replace(/[^a-z0-9]/g,'')||('cls'+classes.length)); if(!key) return;
  var field=prompt('対応するデータのフィールド名（cooking/extraction/fermentation/still/aging/waterSource/category など。無ければ空欄）','')||'';
  classes.push({key:key.trim(), label:label.trim(), field:field.trim(), values:[]});
  renderClasses();
}

function resetDefault(){ if(confirm('編集中の内容を破棄して初期リストに戻します。よろしいですか？')){ classes=clone(DEFAULT_CLASSES); renderClasses(); msg('初期リストに戻しました（保存で確定）','unsaved'); } }

function doSave(){
  msg('保存中...');
  // key重複チェック
  var seen={}; for(var i=0;i<classes.length;i++){ var k=classes[i].key; if(!k){ msg('キーが空の分類があります','unsaved'); return; } if(seen[k]){ msg('キーが重複: '+k,'unsaved'); return; } seen[k]=1; }
  db.collection('masterMeta').doc('equipmentClasses').set({
    classes:classes, updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){ msg('✓ 保存しました'); }).catch(function(e){ msg('保存失敗: '+e.message,'unsaved'); });
}

// ── 未分類（その他）スキャン ──
function scanOther(){
  var card=document.getElementById('other-card');
  card.innerHTML='<div class="note" style="margin:0;">スキャン中...</div>';
  Promise.all([
    db.collection('ammBottleDetails').get(),
    db.collection('ammDistilleryDetails').get().catch(function(){return {docs:[]};})
  ]).then(function(res){
    // 設備値はスペース結合のため、マスタ値を部分一致で除去し「残余（未分類）」を抽出
    function residual(cls, str){
      var s=' '+String(str==null?'':str).replace(/\s+/g,' ')+' ';
      (cls.values||[]).slice().sort(function(a,b){return String(b).length-String(a).length;}).forEach(function(v){
        if(v && s.indexOf(v)>=0) s=s.split(v).join(' ');
      });
      return s.replace(/\s+/g,' ').replace(/^[\s,]+|[\s,]+$/g,'');
    }
    var byField={}; // field -> {residualValue:count}
    function collect(docs){ docs.forEach(function(d){ var v=d.data(); classes.forEach(function(cls){ if(!cls.field) return; var str=v[cls.field]; if(str==null||str==='') return; var r=residual(cls,str); if(!r) return;
      r.split(/[,;]+/).map(function(s){return s.trim();}).filter(Boolean).forEach(function(val){ if(!byField[cls.field]) byField[cls.field]={}; byField[cls.field][val]=(byField[cls.field][val]||0)+1; }); }); }); }
    collect(res[0].docs); collect(res[1].docs);
    // byField は「マスタに無い残余値」のみ
    var rows=[]; // {value, field, count, clsKey}
    classes.forEach(function(cls){
      if(!cls.field) return;
      var fmap=byField[cls.field]||{};
      Object.keys(fmap).forEach(function(val){ rows.push({value:val, field:cls.field, count:fmap[val], clsKey:cls.key}); });
    });
    // 同じ(value,field)の重複を除去
    var seen={}, uniq=[];
    rows.forEach(function(r){ var k=r.field+'|'+r.value; if(seen[k]) return; seen[k]=1; uniq.push(r); });
    uniq.sort(function(a,b){ return b.count-a.count; });
    if(!uniq.length){ card.innerHTML='<div class="note" style="margin:0;">未分類の値はありません（すべてマスタに登録済み）。</div>'; return; }
    card.innerHTML='<div class="note" style="margin-bottom:8px;">'+uniq.length+' 件の未分類値。会員表示では「その他」に入ります。分類を選んで割り振ってください（割当後は保存が必要）。</div>';
    uniq.forEach(function(r){
      var row=document.createElement('div'); row.className='other-row';
      var v=document.createElement('span'); v.className='other-val'; v.textContent=r.value; row.appendChild(v);
      var c=document.createElement('span'); c.className='other-cnt'; c.textContent='field:'+r.field+' ・'+r.count+'件'; row.appendChild(c);
      var sel=document.createElement('select');
      classes.forEach(function(cls){ var o=document.createElement('option'); o.value=cls.key; o.textContent=cls.label; if(cls.key===r.clsKey) o.selected=true; sel.appendChild(o); });
      row.appendChild(sel);
      var btn=document.createElement('button'); btn.textContent='この分類に追加';
      btn.onclick=function(){ var cls=classes.filter(function(x){return x.key===sel.value;})[0]; if(cls){ addVal(cls,r.value); row.style.opacity='.4'; btn.disabled=true; btn.textContent='追加済（要保存）'; msg('「'+r.value+'」を '+cls.label+' に追加（保存で確定）','unsaved'); } };
      row.appendChild(btn);
      card.appendChild(row);
    });
  }).catch(function(e){ card.innerHTML='<div class="note" style="margin:0;color:var(--red)">スキャン失敗: '+escH(e.message)+'</div>'; });
}

// ── 認証 ──
AuthRole.requireOwner(auth, function(user){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('hdr-user').textContent=user.email||'';
  loadClasses();
}, function(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
});
</script>
</body>
</html>
