<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>会員ページ - テキーラ道場</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --red:#8c2818;--red-l:#fae8e4;
  --green:#1a6640;--green-l:#e4f2ea;
  --cream:#faf7f1;--cream2:#f0ebe0;--cream3:#e4ddd0;--white:#fff;
  --border:rgba(160,130,100,.18);--border2:rgba(160,130,100,.32);
  --shadow:0 1px 12px rgba(24,17,10,.07);--shadow-lg:0 6px 36px rgba(24,17,10,.13);
  --r:8px;--rl:14px;
  --serif:'Noto Sans JP',sans-serif;
  --sans:'Noto Sans JP',sans-serif;
  --mono:'DM Mono',monospace;
}
html,body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh}
button{cursor:pointer;font-family:var(--sans);border:none}
input,select{font-family:var(--sans)}

/* ─── ログイン画面 ─── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse 80% 60% at 30% 60%,rgba(200,146,30,.07),transparent),var(--cream)}
.lcard{width:100%;max-width:360px;background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);padding:40px 28px;box-shadow:var(--shadow-lg)}
.lbrand{font-family:var(--serif);font-size:24px;font-weight:600;color:var(--gold-d);letter-spacing:.14em;text-align:center;margin-bottom:6px}
.lsub{font-size:12px;color:var(--ink3);text-align:center;margin-bottom:28px}
.lcard label{display:block;font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;margin-top:14px}
.lcard input{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:var(--r);font-size:14px;background:var(--cream);color:var(--ink);outline:none}
.lcard input:focus{border-color:var(--gold)}
.lerr{min-height:16px;font-size:12px;color:var(--red);margin-top:8px;text-align:center}
.lbtn{width:100%;margin-top:20px;padding:13px;background:var(--gold-d);color:var(--cream);border-radius:var(--r);font-size:14px;font-weight:500;transition:background .15s}
.lbtn:hover{background:var(--gold)}
.lbtn:disabled{background:var(--cream3);color:var(--ink3);cursor:not-allowed}

/* ─── メイン ─── */
#main-screen{display:none}
.topbar{background:var(--ink);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.top-brand{font-size:14px;color:var(--gold-l);letter-spacing:.04em;flex:1;font-weight:500}
.top-home-btn{background:none;border:1px solid rgba(200,146,30,.6);color:var(--gold-l);padding:5px 12px;border-radius:var(--r);font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap;}
.top-home-btn:hover{background:rgba(200,146,30,.15);}
.top-logout{background:none;border:1px solid rgba(255,255,255,.35);color:rgba(255,255,255,.7);padding:5px 12px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;}
.top-logout:hover{border-color:rgba(255,255,255,.7);color:#fff;}

.container{max-width:600px;margin:0 auto;padding:16px}

/* ページタイトル */
.page-title{padding:4px 0 16px;border-bottom:2px solid var(--border2);margin-bottom:18px;display:flex;align-items:baseline;gap:10px}
.page-title-main{font-size:20px;font-weight:700;color:var(--ink);letter-spacing:.04em}
.page-title-sub{font-size:12px;color:var(--ink3)}

/* セクション見出し */
.sec-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--cream3)}
.sec-title{font-family:var(--serif);font-size:17px;font-weight:600}

/* 動画 */
.video-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--shadow);margin-bottom:8px}
.video-wrap{position:relative;width:100%;padding-bottom:56.25%;background:#000}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.video-empty{padding:40px 20px;text-align:center;color:var(--ink3);font-size:14px;background:var(--cream2)}
.video-note{font-size:11px;color:var(--ink3);margin:8px 2px 24px;line-height:1.6}

/* オーナー用: 動画ID編集 */
.owner-edit{background:#fff8e1;border:1px solid #f0c040;border-radius:var(--r);padding:12px 14px;margin-bottom:24px}
.owner-edit-title{font-size:11px;font-weight:700;color:#7a5610;letter-spacing:.06em;margin-bottom:8px}
.owner-edit-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.owner-edit-row input{flex:1;min-width:180px;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--white);color:var(--ink);outline:none}
.owner-edit-row input:focus{border-color:var(--gold)}
.owner-edit-btn{padding:8px 16px;background:var(--gold-d);color:var(--cream);border-radius:var(--r);font-size:13px;font-weight:600}
.owner-edit-btn:hover{background:var(--gold)}
.owner-edit-msg{font-size:11px;color:var(--green);margin-top:6px;min-height:14px}
.owner-edit-hint{font-size:10px;color:var(--ink3);margin-top:6px;line-height:1.5}

/* ナビカード（マイページ等） */
.nav-card{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:10px;text-decoration:none;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.18);margin-bottom:12px}
.nav-card-mypage{background:linear-gradient(135deg,#0d3d2e,#1a6640)}
.nav-card-map{background:linear-gradient(135deg,#5c3310,#8a4f1e)}
.nav-card-menu{background:linear-gradient(135deg,#6b4a10,#b8860b)}
.nav-card-video{background:linear-gradient(135deg,#3a1e40,#7a2e6e)}
.nav-card-plan{background:linear-gradient(135deg,#7a5610,#c8921e)}
.nav-card-title{font-size:15px;font-weight:700;letter-spacing:.05em}
.nav-card-desc{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px}
.nav-card-chev{font-size:20px;opacity:.7}
.nav-card-soon{background:linear-gradient(135deg,#6f6a63,#928b80);cursor:default;opacity:.9}
.nav-card-badge{font-size:11px;font-weight:700;background:rgba(255,255,255,.22);padding:3px 11px;border-radius:12px;white-space:nowrap;letter-spacing:.04em}
.nav-card.locked{opacity:.72;filter:grayscale(.25)}
.nav-card-badge.lock{background:rgba(0,0,0,.30)}
.plan-badge{display:none;font-size:11px;font-weight:700;color:#3a2410;background:#e8b84a;padding:3px 12px;border-radius:12px;margin-left:8px;vertical-align:middle}
</style>
</head>
<body>
<style id="auth-hide-style">
  #login-screen, #main-screen { visibility: hidden; }
</style>

<!-- ─── ログイン ─── -->
<div id="login-screen">
  <div class="lcard">
    <div class="lbrand">テキーラ道場</div>
    <div class="lsub">会員ページ</div>
    <label>会員ID または メールアドレス</label>
    <input type="text" id="l-id" placeholder="26XXXX または メールアドレス" autocomplete="username">
    <label>パスワード</label>
    <div style="position:relative;">
      <input type="password" id="l-pw" placeholder="パスワード" autocomplete="current-password" style="width:100%;padding-right:44px;">
      <button type="button" onclick="var i=document.getElementById('l-pw');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁':'🙈';" style="position:absolute;right:0;top:0;bottom:0;width:40px;background:none;border:none;cursor:pointer;font-size:16px;">👁</button>
    </div>
    <div class="lerr" id="l-err"></div>
    <button class="lbtn" id="l-btn" onclick="doLogin()">ログイン</button>
    <div style="margin-top:16px;text-align:center;padding-top:14px;border-top:1px solid var(--border2);">
      <a href="/member_register2.html" style="font-size:16px;color:#e07820;font-weight:700;text-decoration:none;">新規ユーザー登録はこちら</a>
    </div>
  </div>
</div>

<!-- ─── メイン ─── -->
<div id="main-screen">
  <div class="topbar">
    <span class="top-brand">テキーラ道場オンライン</span>
    <a href="/" class="top-home-btn">🏠 TOP</a>
    <button class="top-logout" onclick="doLogout()">ログアウト</button>
  </div>

  <div class="container">
    <div class="page-title">
      <span class="page-title-main">会員ページ</span>
      <span class="page-title-sub">Members Only</span>
      <span class="plan-badge" id="plan-badge"></span>
    </div>

    <!-- 会員メニュー -->
    <div class="sec-header">
      <span class="sec-title">📋 会員メニュー</span>
    </div>
    <a href="/mypage.html" class="nav-card nav-card-mypage">
      <div>
        <div class="nav-card-title">🥃 会員マイページ</div>
        <div class="nav-card-desc">来場履歴・試飲記録・プロフィールを確認</div>
      </div>
      <span class="nav-card-chev">›</span>
    </a>
    <a href="/member_subscription.html" class="nav-card nav-card-plan">
      <div>

      </div>
      <span class="nav-card-chev">›</span>
    </a>
    <a href="/menu.html" class="nav-card nav-card-menu" data-feature="menu">
      <div>
        <div class="nav-card-title">📖 オンラインメニュー</div>
        <div class="nav-card-desc">テキーラ・カクテル等のメニューを閲覧</div>
      </div>
      <span class="nav-card-chev">›</span>
    </a>
    <a href="/member_map.html" class="nav-card nav-card-map" data-feature="map">
      <div>
        <div class="nav-card-title">🗺 蒸留所マップ</div>
        <div class="nav-card-desc">飲んだ蒸留所をマップで確認</div>
      </div>
      <span class="nav-card-chev">›</span>

    </div>
    <a href="/tequila_movie.html" class="nav-card nav-card-video">
      <div>
        <div class="nav-card-title">🎥 テキーラ動画</div>
        <div class="nav-card-desc">会員限定のテキーラ動画を視聴（工事中）</div>

      <span class="nav-card-badge">🚧 工事中</span>

    <!-- 隠しリンク: PTDデータ閲覧（★） -->
    <div style="text-align:center;margin-top:26px;">
      <a href="/member_ptd.html" aria-label="★" title="" style="color:var(--cream3);font-size:13px;text-decoration:none;opacity:.5;letter-spacing:0;">★</a>

<!-- Firebase SDK 10.12.0 -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
<script src="/member-plan.js?v=20260722"></script>
<script>
// ─── Firebase初期化 ───
firebase.initializeApp({
  apiKey:"AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain:"tequiladojo.firebaseapp.com",
  projectId:"tequiladojo",
  storageBucket:"tequiladojo.firebasestorage.app",
  messagingSenderId:"56663296233",
  appId:"1:56663296233:web:c8cac2fcbeb4faa09e0878"
});
const auth=firebase.auth();
const db=firebase.firestore();
const fbFunctions=firebase.app().functions('asia-northeast1');

// ─── ログイン ───
document.getElementById('l-id').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('l-pw').focus();});
document.getElementById('l-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function doLogin(){
  const raw=(document.getElementById('l-id').value||'').trim();
  const pw=document.getElementById('l-pw').value;
  const btn=document.getElementById('l-btn');
  const err=document.getElementById('l-err');
  if(!raw||!pw){err.textContent='IDとパスワードを入力してください';return;}
  btn.disabled=true;btn.textContent='ログイン中...';err.textContent='';
  try{
    if(!raw.includes('@')){
      // 会員IDログイン: ID→メール解決とパスワード検証はサーバー側で実施
      const res=await fbFunctions.httpsCallable('loginWithMemberId')({memberId:raw,password:pw});
      await auth.signInWithCustomToken(res.data.token);
    }else{
      await auth.signInWithEmailAndPassword(raw,pw);
    }
    // onAuthStateChangedが以降を処理
  }catch(e){
    let msg='ログインできませんでした';
    if(e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'||e.code==='auth/user-not-found'
      ||e.code==='functions/unauthenticated'||e.code==='functions/invalid-argument')msg='IDまたはパスワードが正しくありません';
    else if(e.code==='auth/too-many-requests'||e.code==='functions/resource-exhausted')msg='しばらく時間をおいてお試しください';
    err.textContent=msg;
    btn.disabled=false;btn.textContent='ログイン';
  }
}

function doLogout(){
  auth.signOut().then(function(){ window.location.href='/'; });
}

// ─── 認証状態監視 ───
auth.onAuthStateChanged(async user=>{
  if(user){
    var _hs=document.getElementById('auth-hide-style'); if(_hs)_hs.remove();
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-screen').style.display='block';
    await initMemberPage(user);
  }else{
    var _hs2=document.getElementById('auth-hide-style'); if(_hs2)_hs2.remove();
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('main-screen').style.display='none';
    document.getElementById('l-btn').disabled=false;
    document.getElementById('l-btn').textContent='ログイン';
    document.getElementById('l-err').textContent='';
  }
});

// ─── YouTube動画ID抽出（IDそのまま / URL両対応） ───
function extractYouTubeId(raw){
  raw=String(raw||'').trim();
  if(!raw) return '';
  // すでにID形式（11文字前後の英数字_-）ならそのまま
  if(/^[A-Za-z0-9_-]{6,20}$/.test(raw)) return raw;
  // 各種URLからv=... / youtu.be/... / embed/... を抽出
  var m=raw.match(/[?&]v=([A-Za-z0-9_-]+)/)
       ||raw.match(/youtu\.be\/([A-Za-z0-9_-]+)/)
       ||raw.match(/\/embed\/([A-Za-z0-9_-]+)/)
       ||raw.match(/\/shorts\/([A-Za-z0-9_-]+)/);
  return m?m[1]:'';
}

// ─── オーナー判定 ───
async function isOwnerRole(user){
  // 1. Custom Claims
  try{
    var tok=await user.getIdTokenResult();
    if(tok.claims.role==='owner') return true;
  }catch(e){}
  // 2. staffRoles/{uid}
  try{
    var doc=await db.collection('staffRoles').doc(user.uid).get();
    if(doc.exists && doc.data().role==='owner') return true;
  }catch(e){}
  return false;
}

// ─── 会員ページ初期化 ───
// 動画は現在準備中（会員メニューにリンク無しの「準備中」カードのみ表示）。
// 公開再開時はここで settings/memberVideo を読み込んで埋め込む形に戻す。
async function initMemberPage(user){
  // 会員グレードに応じて機能カードを出し分け（ゲート）
  try{
    var snap=await db.collection('members').where('authUid','==',user.uid).limit(1).get();
    var myMember=snap.empty?{}:Object.assign({id:snap.docs[0].id},snap.docs[0].data());
    var plans=await MemberPlan.loadPlans(db);
    applyPlanGate(myMember, plans);
  }catch(e){
    // 失敗時はフェイルオープン（素の表示を維持）
    console.warn('plan gate skipped:', e&&e.message);
  }
}

function applyPlanGate(member, plans){
  var badge=document.getElementById('plan-badge');
  // プラン未定義なら何もしない（現行の全機能表示を維持）
  if(!plans || !plans.length){ if(badge) badge.style.display='none'; return; }
  var eff=MemberPlan.effectivePlan(member, plans);
  if(badge && eff){
    badge.textContent=eff.name||'';
    if(eff.color) badge.style.background=eff.color;
    badge.style.display='inline-block';
  }
  var cards=document.querySelectorAll('.nav-card[data-feature]');
  Array.prototype.forEach.call(cards, function(card){
    var key=card.getAttribute('data-feature');
    if(MemberPlan.hasFeature(eff, key)) return; // 解放済み
    lockCard(card, key, plans);
  });
}

function lockCard(card, key, plans){
  card.classList.add('locked');
  var need=plans.filter(function(p){return MemberPlan.hasFeature(p,key);})
    .sort(function(a,b){return (Number(a.level)||0)-(Number(b.level)||0);})[0];
  var label=need?(need.name+'以上'):'上位会員';
  var tail=card.querySelector('.nav-card-chev, .nav-card-badge');
  if(tail){ tail.className='nav-card-badge lock'; tail.textContent='🔒 '+label; }
  card.addEventListener('click', function(e){
    e.preventDefault();
    alert('この機能は「'+label+'」の会員向けです。');
  });
}

function renderVideo(videoId){
  var wrap=document.getElementById('video-wrap');
  if(!wrap) return;
  if(videoId){
    wrap.innerHTML='<iframe src="https://www.youtube.com/embed/'+encodeURIComponent(videoId)
      +'?rel=0" title="360°動画" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>';
  }else{
    wrap.innerHTML='<div class="video-empty">動画は準備中です。</div>';
  }
}

// ─── オーナー: 動画ID保存 ───
async function saveVideoId(){
  var msg=document.getElementById('video-id-msg');
  var raw=document.getElementById('video-id-input').value;
  var id=extractYouTubeId(raw);
  if(raw.trim() && !id){
    msg.style.color='var(--red)';
    msg.textContent='動画IDを認識できませんでした。IDまたはURLを確認してください。';
    return;
  }
  msg.style.color='var(--ink3)';
  msg.textContent='保存中...';
  try{
    await db.collection('settings').doc('memberVideo').set({
      youtubeId:id,
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true});
    document.getElementById('video-id-input').value=id;
    renderVideo(id);
    msg.style.color='var(--green)';
    msg.textContent=id?'✓ 保存しました':'✓ 動画をクリアしました';
  }catch(e){
    msg.style.color='var(--red)';
    msg.textContent='保存に失敗しました: '+(e.message||'');
  }
}
</script>
</body>
</html>
