<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ブランド詳細 — テキーラ道場</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>

  apiKey:"AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain:"tequiladojo.firebaseapp.com",
  projectId:"tequiladojo",
  storageBucket:"tequiladojo.firebasestorage.app",
  messagingSenderId:"56663296233",
  appId:"1:56663296233:web:c8cac2fcbeb4faa09e0878"
};
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --cream:#F1EFE8;--cream2:#E8E4D8;--cream3:#DDD8C8;
  --teal:#1a6e58;
  --sans:'Noto Sans JP',sans-serif;--serif:'Cormorant Garamond',serif;--mono:'DM Mono',monospace;
  --r:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:var(--sans);min-height:100vh;}

/* ── Header ── */
.hdr{background:var(--ink);padding:0 20px;display:flex;align-items:center;gap:12px;height:52px;}
.hdr-logo{font-family:var(--serif);font-size:17px;color:var(--gold-l);letter-spacing:.04em;}
.hdr-sub{font-size:11px;color:var(--ink3);margin-top:1px;}
.hdr-nav{margin-left:auto;display:flex;gap:12px;align-items:center;}
.hdr-nav a{color:var(--gold-l);font-size:12px;text-decoration:none;opacity:.8;}
.hdr-nav a:hover{opacity:1;}

/* ── Container ── */
.page{max-width:860px;margin:0 auto;padding:28px 16px 60px;}

/* ── Hero ── */
.hero{margin-bottom:28px;}
.hero-id{font-family:var(--mono);font-size:12px;color:var(--ink3);letter-spacing:.08em;margin-bottom:6px;}
.hero-es{font-family:var(--serif);font-size:32px;font-weight:500;color:var(--ink);line-height:1.2;margin-bottom:4px;}
.hero-ja{font-size:15px;color:var(--ink3);margin-bottom:10px;}
.badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
.badge-st-0{background:rgba(26,110,88,.1);color:var(--teal);}
.badge-st-1{background:rgba(74,56,32,.08);color:var(--ink3);}
.badge-st-2{background:rgba(200,146,30,.1);color:var(--gold-d);}
.badge-type{background:rgba(24,17,10,.06);color:var(--ink2);}

/* ── Divider ── */
.divider{border:none;border-top:1px solid var(--cream3);margin:20px 0;}

/* ── Info grid ── */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px;}
.info-card{background:var(--cream2);border-radius:var(--r);padding:12px 14px;}
.info-label{font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.info-val{font-size:14px;color:var(--ink);}
.info-val a{color:var(--gold-d);text-decoration:none;}
.info-val a:hover{text-decoration:underline;}
.info-val.mono{font-family:var(--mono);}

/* ── Links ── */
.links-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;}
.ext-link{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--cream3);background:var(--cream2);color:var(--ink);font-size:12px;text-decoration:none;transition:.15s;}
.ext-link:hover{border-color:var(--gold);color:var(--gold-d);}

/* ── Distillery link ── */
.dis-link{display:inline-flex;align-items:center;gap:8px;padding:12px 16px;border-radius:var(--r);border:1px solid var(--cream3);background:var(--cream2);text-decoration:none;color:var(--ink);transition:.15s;margin-bottom:28px;}
.dis-link:hover{border-color:var(--gold);background:var(--cream3);}
.dis-link-nom{font-family:var(--mono);font-size:11px;color:var(--ink3);}
.dis-link-name{font-size:14px;font-weight:500;}
.dis-link-arrow{margin-left:auto;color:var(--ink3);font-size:14px;}

/* ── Bottles ── */
.bottle-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:28px;}
.bottle-table th{text-align:left;font-size:10px;font-weight:600;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;padding:6px 10px;border-bottom:2px solid var(--cream3);}
.bottle-table td{padding:9px 10px;border-bottom:1px solid var(--cream3);vertical-align:middle;}
.bottle-table tr:last-child td{border-bottom:none;}
.bottle-table tr:hover td{background:var(--cream2);}
.bt-name-es{font-weight:500;color:var(--ink);}
.bt-name-ja{font-size:11px;color:var(--ink3);}
.bt-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:500;}
.bt-serving-0{background:rgba(26,110,88,.1);color:var(--teal);}
.bt-serving-1{background:rgba(74,56,32,.08);color:var(--ink3);}
.bt-prod-1{background:rgba(200,146,30,.1);color:var(--gold-d);}

/* ── State ── */
.state-msg{text-align:center;padding:80px 20px;color:var(--ink3);font-size:14px;}

@media(max-width:520px){.hero-es{font-size:24px;}}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-logo">テキーラ道場</div>
    <div class="hdr-sub">ブランド詳細</div>
  </div>
  <nav class="hdr-nav">
    <a id="back-dis" href="distilleries.html">← 蒸留所マップ</a>
    <a href="index.html">ホーム</a>
  </nav>
</div>

<div class="page" id="page-content">
  <div class="state-msg" id="state-msg">読み込み中...</div>
</div>

<script>
if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
var auth=firebase.auth();
var db=firebase.firestore();

var STATUS_LABEL={0:'稼働中',1:'終売',2:'移転'};
var STATUS_CLASS={0:'badge-st-0',1:'badge-st-1',2:'badge-st-2'};
var TYPE_LABEL={0:'蒸留所ブランド',1:'委託ブランド'};

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

function render(brand,dis,bottles,classMap){
  var st=String(brand.brandStatus||'0');
  var tp=String(brand.brandType||'0');

  document.title=(brand.brandEs||brand.id)+' — テキーラ道場';

  // update back link
  if(brand.distilleryId){
    var backEl=document.getElementById('back-dis');
    backEl.href='distillery.html?nom='+encodeURIComponent(brand.distilleryId);
    backEl.textContent='← 蒸留所詳細へ';
  }

  var html='';

  // Hero
  html+='<div class="hero">';
  html+='<div class="hero-id">Brand ID: '+esc(brand.id)+'</div>';
  html+='<div class="hero-es">'+esc(brand.brandEs||'—')+'</div>';
  if(brand.brandJa) html+='<div class="hero-ja">'+esc(brand.brandJa)+'</div>';
  html+='<div class="badge-row">';
  html+='<span class="badge '+(STATUS_CLASS[st]||'badge-st-0')+'">'+(STATUS_LABEL[st]||'—')+'</span>';
  html+='<span class="badge badge-type">'+(TYPE_LABEL[tp]||'—')+'</span>';
  html+='</div>';
  html+='</div>';

  // Distillery link
  if(dis){
    html+='<hr class="divider">';
    html+='<div style="font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;">蒸留所</div>';
    html+='<a class="dis-link" href="distillery.html?nom='+encodeURIComponent(dis.id)+'">';
    html+='<div><div class="dis-link-nom">NOM '+(dis.nom||dis.id)+'</div>';
    html+='<div class="dis-link-name">'+(dis.nomJa||dis.nomEs||'—')+'</div></div>';
    html+='<div class="dis-link-arrow">→</div>';
    html+='</a>';
  }

  // Info
  var infoCards='';
  if(brand.foundedYear) infoCards+='<div class="info-card"><div class="info-label">創設年</div><div class="info-val mono">'+esc(String(brand.foundedYear))+'年</div></div>';

  if(infoCards){
    html+='<hr class="divider">';
    html+='<div class="info-grid">'+infoCards+'</div>';
  }

  // Links
  var linksHtml='';
  if(brand.annUrl) linksHtml+='<a class="ext-link" href="'+esc(brand.annUrl)+'" target="_blank" rel="noopener">📋 ANNブランドページ</a>';
  if(brand.ammUrl) linksHtml+='<a class="ext-link" href="'+esc(brand.ammUrl)+'" target="_blank" rel="noopener">🌵 Agave Matchmaker</a>';
  if(brand.infoUrl) linksHtml+='<a class="ext-link" href="'+esc(brand.infoUrl)+'" target="_blank" rel="noopener">🔗 詳細情報</a>';
  if(linksHtml){
    html+='<hr class="divider">';
    html+='<div class="links-row">'+linksHtml+'</div>';
  }

  // Bottles
  html+='<hr class="divider">';
  html+='<div style="font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;">ボトル</div>';
  if(!bottles||!bottles.length){
    html+='<div style="font-size:12px;color:var(--ink3);margin-bottom:24px;">登録なし</div>';
  } else {
    var sorted=bottles.slice().sort(function(a,b){return (a.bottleId||'').localeCompare(b.bottleId||'');});
    html+='<table class="bottle-table"><thead><tr><th>ボトル名</th><th>クラス</th><th>ABV</th><th>状態</th></tr></thead><tbody>';
    sorted.forEach(function(bt){
      var cls=classMap&&bt.classId?classMap[bt.classId]||bt.classId:bt.classId||'—';
      var abv=bt.abv?bt.abv+'%':'—';
      var serving=String(bt.servingStatus||'0');
      var servingLabel=serving==='0'?'提供中':'提供終了';
      html+='<tr>';
      html+='<td><div class="bt-name-es">'+esc(bt.bottleEs||'—')+'</div>';
      if(bt.bottleJa) html+='<div class="bt-name-ja">'+esc(bt.bottleJa)+'</div>';
      if(bt.production==='1'||bt.production===1) html+=' <span class="bt-badge bt-prod-1">限定</span>';
      html+='</td>';
      html+='<td>'+esc(cls)+'</td>';
      html+='<td>'+esc(abv)+'</td>';
      html+='<td><span class="bt-badge bt-serving-'+serving+'">'+servingLabel+'</span></td>';
      html+='</tr>';
    });
    html+='</tbody></table>';
  }

  document.getElementById('page-content').innerHTML=html;
}

function loadBrand(){
  var params=new URLSearchParams(location.search);
  var id=params.get('id');
  if(!id){
    document.getElementById('state-msg').textContent='ブランドIDが指定されていません。';
    return;
  }
  var disId=id.length>=4?id.slice(0,4):null;
  Promise.all([
    db.collection('brands').doc(id).get(),
    disId?db.collection('distilleries').doc(disId).get():Promise.resolve(null),
    db.collection('bottles').where('brandId','==',id).get(),
    db.collection('classes').get()
  ]).then(function(results){
    var snap=results[0];
    if(!snap.exists){
      document.getElementById('state-msg').textContent='ブランド「'+id+'」のデータが見つかりません。';
      return;
    }
    var brand=Object.assign({id:snap.id},snap.data());
    var disSnap=results[1];
    var dis=disSnap&&disSnap.exists?Object.assign({id:disSnap.id},disSnap.data()):null;
    var bottles=results[2].docs.map(function(d){return Object.assign({id:d.id},d.data());});
    var classMap={};
    results[3].docs.forEach(function(d){var c=d.data(); classMap[d.id]=c.classEs||c.className||d.id;});
    render(brand,dis,bottles,classMap);
  }).catch(function(e){
    document.getElementById('state-msg').textContent='読み込み失敗: '+e.message;
  });
}

var _authDone=false;
auth.onAuthStateChanged(function(user){
  if(_authDone) return; _authDone=true;
  if(user){loadBrand();return;}
  auth.signInAnonymously().then(loadBrand).catch(loadBrand);
});
</script>
</body>
</html>
