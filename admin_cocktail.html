<style>
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --teal:#1a6e58;--teal-l:#e0f0eb;
  --red:#8c2818;--red-l:#fae8e4;
  --purple:#5a2d82;--purple-l:#f0e8f8;
  --cream:#faf7f1;--cream2:#f0ebe0;--cream3:#e4ddd0;--white:#fff;
  --border:rgba(160,130,100,.18);--border2:rgba(160,130,100,.32);
  --shadow:0 1px 12px rgba(24,17,10,.07);--shadow-lg:0 6px 36px rgba(24,17,10,.13);
  --r:6px;--rl:12px;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Noto Sans JP',sans-serif;
  --mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh}
button{cursor:pointer;font-family:var(--sans)}
input,select,textarea{font-family:var(--sans)}

#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--cream)}
.lcard{width:100%;max-width:380px;background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);padding:44px 36px;box-shadow:var(--shadow-lg)}
.llogo{text-align:center;font-size:44px;margin-bottom:6px}
.lbrand{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--gold-d);letter-spacing:.14em;text-align:center;margin-bottom:2px}
.lsub{text-align:center;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:32px}
.lcard label{display:block;font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;margin-top:14px}
.lcard input{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--cream);color:var(--ink)}
.lcard input:focus{outline:none;border-color:var(--gold)}
.lerr{min-height:16px;font-size:12px;color:var(--red);margin-top:8px;text-align:center}
.lbtn{width:100%;margin-top:22px;padding:13px;background:var(--gold-d);color:var(--cream);border:none;border-radius:var(--r);font-size:13px;font-weight:500}
.lbtn:hover{background:var(--gold)}

#app{display:none;min-height:100vh}
.topbar{background:var(--ink);position:sticky;top:0;z-index:200}
.topbar-row1{display:flex;align-items:center;padding:8px 20px;gap:8px}
.tbrand{font-family:var(--serif);font-size:18px;color:var(--gold-l);letter-spacing:.1em;white-space:nowrap}
.tuser{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0}
.temail{font-size:10px;color:rgba(255,255,255,.3);font-family:var(--mono)}
.tlogout{padding:5px 12px;border:1px solid rgba(255,255,255,.14);border-radius:var(--r);background:none;color:rgba(255,255,255,.38);font-size:11px}
.tlogout:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.65)}

.topbar-row2{display:flex;align-items:center;padding:2px 12px 6px;gap:2px;border-top:1px solid rgba(255,255,255,.08);flex-wrap:nowrap;overflow-x:auto}
.tab{padding:5px 14px;border:none;background:none;color:rgba(255,255,255,.5);font-size:12px;font-weight:500;border-radius:var(--r);white-space:nowrap;cursor:pointer}
.tab:hover{color:rgba(255,255,255,.82);background:rgba(255,255,255,.08)}
.tab.active{color:var(--gold-l);background:rgba(200,146,30,.18)}

.content{padding:28px;max-width:1100px;margin:0 auto}
.page{display:none}.page.active{display:block}
.phead{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.ptitle{font-family:var(--serif);font-size:28px;font-weight:500;color:var(--gold-d)}
.pdesc{font-size:11px;color:var(--ink3);margin-top:2px}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow)}
.toolbar{display:flex;gap:8px;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.sbox{display:flex;align-items:center;gap:6px;border:1px solid var(--border2);border-radius:var(--r);padding:6px 10px;flex:1;min-width:160px;background:var(--cream)}
.sbox input{border:none;background:none;font-size:12px;color:var(--ink);width:100%}
.sbox input:focus{outline:none}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{border-bottom:1px solid var(--border2)}
th{padding:10px 12px;text-align:left;font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(200,146,30,.025)}
.mono{font-family:var(--mono);font-size:11px}
.dim{color:var(--ink3)}
.acts{display:flex;gap:5px;justify-content:flex-end}
.ec{text-align:center;color:var(--ink3);padding:32px!important}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.bg-teal{background:var(--teal-l);color:var(--teal);border:1px solid rgba(26,110,88,.3)}
.bg-gray{background:var(--cream2);color:var(--ink3);border:1px solid var(--border2)}
.btn{display:inline-flex;align-items:center;gap:4px;padding:8px 14px;border-radius:var(--r);font-size:12px;font-weight:500;border:none;white-space:nowrap}
.bp{background:var(--gold-d);color:var(--cream)}.bp:hover{background:var(--gold)}
.bs{background:var(--cream2);color:var(--ink2);border:1px solid var(--border2)}.bs:hover{background:var(--cream3)}
.bg2{background:none;color:var(--ink2);border:1px solid var(--border2)}.bg2:hover{background:var(--cream)}
.bd{background:var(--red-l);color:var(--red);border:1px solid rgba(140,40,24,.2)}.bd:hover{background:#f5d4ce}
.sm{padding:5px 10px;font-size:11px}
.mbg{position:fixed;inset:0;background:rgba(24,17,10,.52);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.mbg.open{display:flex}
.modal{background:var(--white);border-radius:var(--rl);width:100%;max-width:600px;max-height:94vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.mhead{display:flex;justify-content:space-between;align-items:center;padding:20px 24px 16px;border-bottom:1px solid var(--border)}
.mtitle{font-family:var(--serif);font-size:21px;font-weight:600;color:var(--gold-d)}
.mx{background:none;border:none;font-size:22px;color:var(--ink3);line-height:1;padding:0 4px}.mx:hover{color:var(--ink)}
.mbody{padding:20px 24px}
.mfoot{display:flex;justify-content:flex-end;gap:8px;padding:14px 24px 20px;border-top:1px solid var(--border)}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fl{font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase}
.req{color:var(--red);margin-left:2px}
.fi,.fs{padding:9px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;color:var(--ink);background:var(--cream);width:100%}
.fi:focus,.fs:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,146,30,.1)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.frow.c3{grid-template-columns:1fr 1fr 1fr}
.fsep{border:none;border-top:1px solid var(--border);margin:14px 0}
.keybox{background:var(--ink);border-radius:var(--r);padding:10px 14px;font-family:var(--mono);font-size:14px;color:var(--gold-l);letter-spacing:.12em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.klabel{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase;margin-left:auto;white-space:nowrap}
#toasts{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{padding:10px 15px;border-radius:var(--r);font-size:12px;font-weight:500;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:6px;min-width:200px}
.tok{background:var(--teal);color:#fff}.terr{background:var(--red);color:#fff}.tinf{background:var(--gold-d);color:var(--cream)}
.cbg{position:fixed;inset:0;background:rgba(24,17,10,.52);z-index:2000;display:none;align-items:center;justify-content:center}
.cbg.open{display:flex}
.ccard{background:var(--white);border-radius:var(--rl);padding:28px;max-width:340px;width:100%;box-shadow:var(--shadow-lg);text-align:center}
.cmsg{font-size:14px;margin-bottom:20px;color:var(--ink2);line-height:1.7}
.cacts{display:flex;gap:8px;justify-content:center}
.sub-grid{display:grid;grid-template-columns:1fr 80px 80px;gap:8px;align-items:end;margin-bottom:6px}
.sub-label{font-size:10px;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;align-self:center}
</style>

<!-- カクテルモーダル -->

    <div class="mhead">

<script>
if (!firebase.apps.length) { firebase.initializeApp(FIREBASE_CONFIG); }
var auth = firebase.auth();
var db   = firebase.firestore();

function g(id){ return document.getElementById(id); }
function gv(id){ var el=g(id); return el?el.value.trim():""; }
function sv(id,v){ var el=g(id); if(el) el.value=v; }
function esc(s){ if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

var currentUser=null;
var cache={cocktail:[],submats:[]};
var editId={cocktail:null,submat:null};
var _confirmCb=null;

// ━━━ 認証 ━━━
AuthRole.requireStaff(auth, function(user){
  currentUser=user;
  g('login-screen').style.display='none';
  g('app').style.display='block';
  if(g('temail')) g('temail').textContent=user.email;
  loadAll();
});
g('lbtn').addEventListener('click',function(){
  var em=gv('lemail'),pw=gv('lpass');
  g('lerr').textContent='';
  if(!em||!pw){g('lerr').textContent='メールとパスワードを入力してください';return;}
  g('lbtn').textContent='ログイン中...';
  auth.signInWithEmailAndPassword(em,pw)
    .then(function(){ g('lbtn').textContent='ログイン'; })
    .catch(function(e){g('lerr').textContent='ログイン失敗: '+e.message; g('lbtn').textContent='ログイン';});
});
g('lpass').addEventListener('keydown',function(e){ if(e.key==='Enter') g('lbtn').click(); });
g('btn-logout').addEventListener('click',function(){ auth.signOut(); });

// ━━━ タブ ━━━
function switchTab(name, el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  if(el) el.classList.add('active');
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  var pg=g('page-'+name); if(pg) pg.classList.add('active');
}

// ━━━ データ読み込み ━━━
function loadAll(){
  Promise.all([
    db.collection('cocktailMaster').get(),
    db.collection('subMaterials').get()
  ]).then(function(snaps){
    cache.cocktail=[];
    snaps[0].forEach(function(d){ cache.cocktail.push(Object.assign({id:d.id},d.data())); });
    cache.cocktail.sort(function(a,b){ return a.id<b.id?-1:1; });
    cache.submats=[];
    snaps[1].forEach(function(d){ cache.submats.push(Object.assign({id:d.id},d.data())); });
    cache.submats.sort(function(a,b){ return (a.name||'')<(b.name||'')?-1:1; });
    renderCocktails();
    renderSubmats();
  }).catch(function(e){ toast('読込失敗: '+e.message,'err'); });
}

// ━━━ カクテルリスト ━━━
function calcSubCost(r){
  var total=0;
  for(var i=1;i<=5;i++){
    var sid=r['sub'+i+'Id'],qty=parseFloat(r['sub'+i+'Qty'])||0;
    if(sid&&qty){var sm=cache.submats.find(function(s){return s.id===sid;});if(sm&&sm.unitPrice)total+=sm.unitPrice*qty;}
  }
  return total;
}
function renderCocktails(){
  var q=(gv('s-cocktail')||'').toLowerCase();
  var showInactive=g('f-cocktail-inactive')&&g('f-cocktail-inactive').checked;
  var list=cache.cocktail.filter(function(r){
    if(!showInactive && !r.active) return false;
    if(q && (r.name||'').toLowerCase().indexOf(q)<0) return false;
    return true;
  });
  var tb=g('tb-cocktail');
  if(!list.length){ tb.innerHTML='<tr><td colspan="7" class="ec">データがありません</td></tr>'; return; }
  tb.innerHTML=list.map(function(r){
    var subs=[],subTotal=0;
    for(var i=1;i<=5;i++){
      var sid=r['sub'+i+'Id'],qty=parseFloat(r['sub'+i+'Qty'])||0;
      if(sid){
        var sm=cache.submats.find(function(s){return s.id===sid;});
        var cost=sm&&sm.unitPrice&&qty?Math.round(sm.unitPrice*qty):0;
        subTotal+=cost;
        subs.push(esc((sm?sm.name:sid))+(qty?' ×'+qty:'')+( cost?' <span style="color:var(--ink3)">¥'+cost+'</span>':''));
      }
    }
    var badge=r.active?'<span class="badge bg-teal">提供中</span>':'<span class="badge bg-gray">非公開</span>';
    return '<tr>'
      +'<td class="mono">'+esc(r.id)+'</td>'
      +'<td style="font-weight:600">'+esc(r.name||'—')+'</td>'
      +'<td class="mono">'+((r.spiritMl!=null)?r.spiritMl+'ml':'—')+'</td>'
      +'<td style="font-size:11px">'+( subs.length?subs.join('<br>'):'<span class="dim">—</span>')+'</td>'
      +'<td class="mono" style="text-align:right">'+(subTotal?'¥'+subTotal:'—')+'</td>'
      +'<td>'+badge+'</td>'
      +'<td><div class="acts">'
        +'<button class="btn bs sm" onclick="openCocktailModal(\''+esc(r.id)+'\')">編集</button>'
        +'<button class="btn bd sm" onclick="confirmDel(\'cocktail\',\''+esc(r.id)+'\',\''+esc(r.name||r.id)+'\')">削除</button>'
      +'</div></td>'
    +'</tr>';
  }).join('');
}

// ━━━ 副材料リスト ━━━
function renderSubmats(){
  var q=(gv('s-submat')||'').toLowerCase();
  var list=cache.submats.filter(function(r){
    if(q && (r.name||'').toLowerCase().indexOf(q)<0) return false;
    return true;
  });
  var tb=g('tb-submats');
  if(!list.length){ tb.innerHTML='<tr><td colspan="5" class="ec">データがありません</td></tr>'; return; }
  tb.innerHTML=list.map(function(r){
    return '<tr>'
      +'<td class="mono">'+esc(r.id)+'</td>'
      +'<td style="font-weight:600">'+esc(r.name||'—')+'</td>'
      +'<td class="mono">¥'+((r.unitPrice!=null)?r.unitPrice:'—')+'</td>'
      +'<td>'+esc(r.unit||'—')+'</td>'
      +'<td><div class="acts">'
        +'<button class="btn bs sm" onclick="openSubmatModal(\''+esc(r.id)+'\')">編集</button>'
        +'<button class="btn bd sm" onclick="confirmDel(\'submat\',\''+esc(r.id)+'\',\''+esc(r.name||r.id)+'\')">削除</button>'
      +'</div></td>'
    +'</tr>';
  }).join('');
}

// ━━━ カクテルモーダル ━━━
function buildSubRows(r){
  var html='<div style="display:grid;grid-template-columns:1fr 64px 68px 68px;gap:6px;margin-bottom:4px;">'
    +'<div class="fl">副材料</div><div class="fl" style="text-align:right">量</div>'
    +'<div class="fl" style="text-align:right">単価</div><div class="fl" style="text-align:right">小計</div>'
  +'</div>';
  for(var i=1;i<=5;i++){
    var sid=r?r['sub'+i+'Id']||'':'';
    var qty=r&&r['sub'+i+'Qty']!=null?r['sub'+i+'Qty']:'';
    var opts=cache.submats.map(function(s){
      return '<option value="'+esc(s.id)+'"'+(sid===s.id?' selected':'')+'>'+esc(s.name)+'</option>';
    }).join('');
    html+='<div style="display:grid;grid-template-columns:1fr 64px 68px 68px;gap:6px;margin-bottom:6px;align-items:center;">'
      +'<select class="fs" id="cm-sub'+i+'id" onchange="updateSubRow('+i+')">'
        +'<option value="">（なし）</option>'+opts
      +'</select>'
      +'<input class="fi" type="number" min="0" step="any" id="cm-sub'+i+'qty" placeholder="量" value="'+esc(String(qty))+'" oninput="updateSubRow('+i+')" style="text-align:right;">'
      +'<div id="cm-sub'+i+'price" style="font-size:11px;color:var(--ink3);text-align:right;font-family:var(--mono);">—</div>'
      +'<div id="cm-sub'+i+'total" style="font-size:11px;font-weight:600;text-align:right;font-family:var(--mono);">—</div>'
    +'</div>';
  }
  html+='<div style="display:flex;justify-content:flex-end;align-items:center;gap:10px;padding-top:6px;border-top:1px solid var(--border);margin-top:4px;">'
    +'<span style="font-size:11px;color:var(--ink3);">副材料合計</span>'
    +'<span id="cm-sub-grand" style="font-size:13px;font-weight:600;font-family:var(--mono);">¥0</span>'
  +'</div>';
  return html;
}
function updateSubRow(i){
  var sid=gv('cm-sub'+i+'id');
  var qty=parseFloat(gv('cm-sub'+i+'qty'))||0;
  var sm=sid?cache.submats.find(function(s){return s.id===sid;}):null;
  var up=sm&&sm.unitPrice!=null?sm.unitPrice:null;
  var cost=up!=null&&qty?Math.round(up*qty):null;
  g('cm-sub'+i+'price').textContent=up!=null?'¥'+up+'/'+esc(sm.unit||'単位'):'—';
  g('cm-sub'+i+'total').textContent=cost!=null?'¥'+cost:'—';
  updateSubGrand();
}
function updateSubGrand(){
  var total=0;
  for(var i=1;i<=5;i++){
    var sid=gv('cm-sub'+i+'id');
    var qty=parseFloat(gv('cm-sub'+i+'qty'))||0;
    if(sid&&qty){var sm=cache.submats.find(function(s){return s.id===sid;});if(sm&&sm.unitPrice)total+=Math.round(sm.unitPrice*qty);}
  }
  if(g('cm-sub-grand')) g('cm-sub-grand').textContent='¥'+total;
}

function nextCocktailId(){
  var max=0;
  cache.cocktail.forEach(function(r){
    var n=parseInt((r.id||'').replace(/^C8/,''))||0;
    if(n>max)max=n;
  });
  return 'C8'+String(max+1).padStart(4,'0');
}

function openCocktailModal(id){
  editId.cocktail=id||null;
  var r=id?cache.cocktail.find(function(x){return x.id===id;}):null;
  g('cocktail-modal-title').textContent=id?'カクテル編集':'カクテル新規登録';
  var newId=id||(r?r.id:nextCocktailId());
  g('disp-cocktail-id').textContent=newId;
  sv('cm-name',r?r.name||'':'');
  sv('cm-spirit-ml',r&&r.spiritMl!=null?r.spiritMl:'');
  g('cm-active').checked=r?!!r.active:true;
  g('sub-rows').innerHTML=buildSubRows(r);
  for(var i=1;i<=5;i++) updateSubRow(i);
  openM('m-cocktail');
}

g('btn-save-cocktail').addEventListener('click',function(){
  var name=gv('cm-name');
  var ml=gv('cm-spirit-ml');
  if(!name){ toast('カクテル名は必須です','err'); return; }
  if(!ml){ toast('酒量(ml)は必須です','err'); return; }
  var id=editId.cocktail||nextCocktailId();
  var data={
    name:name,
    spiritMl:parseFloat(ml)||0,
    active:g('cm-active').checked
  };
  for(var i=1;i<=5;i++){
    data['sub'+i+'Id']=gv('cm-sub'+i+'id')||null;
    var qv=gv('cm-sub'+i+'qty');
    data['sub'+i+'Qty']=qv!==''?(parseFloat(qv)||0):null;
  }
  db.collection('cocktailMaster').doc(id).set(data,{merge:true})
    .then(function(){
      toast(editId.cocktail?'カクテルを更新しました':'カクテルを登録しました（'+id+'）');
      closeM('m-cocktail');
      loadAll();
    })
    .catch(function(e){ toast('保存失敗: '+e.message,'err'); });
});

// ━━━ 副材料モーダル ━━━
function openSubmatModal(id){
  editId.submat=id||null;
  var r=id?cache.submats.find(function(x){return x.id===id;}):null;
  g('submat-modal-title').textContent=id?'副材料編集':'副材料新規登録';
  sv('sm-name',r?r.name||'':'');
  sv('sm-price',r&&r.unitPrice!=null?r.unitPrice:'');
  sv('sm-unit',r?r.unit||'':'');
  openM('m-submat');
}

g('btn-save-submat').addEventListener('click',function(){
  var name=gv('sm-name');
  var price=gv('sm-price');
  if(!name){ toast('副材料名は必須です','err'); return; }
  if(price===''){ toast('単価は必須です','err'); return; }
  var data={name:name, unitPrice:parseFloat(price)||0, unit:gv('sm-unit')||''};
  var ref=editId.submat?db.collection('subMaterials').doc(editId.submat):db.collection('subMaterials').doc();
  ref.set(data,{merge:true})
    .then(function(){
      toast(editId.submat?'副材料を更新しました':'副材料を登録しました');
      closeM('m-submat');
      loadAll();
    })
    .catch(function(e){ toast('保存失敗: '+e.message,'err'); });
});

// ━━━ 削除 ━━━
function confirmDel(type, id, label){
  g('confirm-msg').textContent='「'+label+'」を削除しますか？この操作は取り消せません。';
  _confirmCb=function(){
    var col=type==='cocktail'?'cocktailMaster':'subMaterials';
    db.collection(col).doc(id).delete()
      .then(function(){ toast('削除しました'); loadAll(); })
      .catch(function(e){ toast('削除失敗: '+e.message,'err'); });
    closeCfm();
  };
  g('confirm-bg').classList.add('open');
}
g('confirm-ok').addEventListener('click',function(){ if(_confirmCb)_confirmCb(); });
g('confirm-cancel').addEventListener('click',closeCfm);
function closeCfm(){ g('confirm-bg').classList.remove('open'); _confirmCb=null; }

// ━━━ モーダル開閉 ━━━
function openM(id){ g(id).classList.add('open'); }
function closeM(id){ g(id).classList.remove('open'); }
document.querySelectorAll('.mbg').forEach(function(bg){
  bg.addEventListener('click',function(e){ if(e.target===bg) bg.classList.remove('open'); });
});

// ━━━ トースト ━━━
function toast(msg,type){
  var el=document.createElement('div');
  el.className='toast '+(type==='err'?'terr':type==='inf'?'tinf':'tok');
  el.textContent=msg;
  g('toasts').appendChild(el);
  setTimeout(function(){ el.remove(); },3200);
}
</script>
</body>
</html>
