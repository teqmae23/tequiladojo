<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蒸留所詳細 — テキーラ道場</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
var FIREBASE_CONFIG={
  apiKey:"AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain:"tequiladojo.firebaseapp.com",
  projectId:"tequiladojo",
  storageBucket:"tequiladojo.firebasestorage.app",
  messagingSenderId:"56663296233",
  appId:"1:56663296233:web:c8cac2fcbeb4faa09e0878"
};
</script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --cream:#F1EFE8;--cream2:#E8E4D8;--cream3:#DDD8C8;
  --red:#b03020;--teal:#1a6e58;
  --sans:'Noto Sans JP',sans-serif;--serif:'Cormorant Garamond',serif;--mono:'DM Mono',monospace;
  --r:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:var(--sans);min-height:100vh;}

/* ── Header ── */
.hdr{background:var(--ink);padding:0 20px;display:flex;align-items:center;gap:12px;height:52px;}
.hdr-logo{font-family:var(--serif);font-size:17px;color:var(--gold-l);letter-spacing:.04em;}
.hdr-sub{font-size:11px;color:var(--ink3);margin-top:1px;}
.hdr-nav{margin-left:auto;display:flex;gap:12px;align-items:center;}
.hdr-nav a{color:var(--gold-l);font-size:12px;text-decoration:none;opacity:.8;}
.hdr-nav a:hover{opacity:1;}

/* ── Container ── */
.page{max-width:860px;margin:0 auto;padding:28px 16px 60px;}

/* ── Hero ── */
.hero{margin-bottom:28px;}
.hero-nom{font-family:var(--mono);font-size:12px;color:var(--ink3);letter-spacing:.08em;margin-bottom:6px;}
.hero-ja{font-family:var(--serif);font-size:32px;font-weight:500;color:var(--ink);line-height:1.2;margin-bottom:4px;}
.hero-es{font-size:14px;color:var(--ink3);margin-bottom:10px;}
.hero-full{font-size:12px;color:var(--ink3);font-style:italic;}
.badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;letter-spacing:.02em;}
.badge-scale0{background:rgba(200,146,30,.12);color:var(--gold-d);}
.badge-scale1{background:rgba(176,48,32,.1);color:var(--red);}
.badge-contract0{background:rgba(26,110,88,.1);color:var(--teal);}
.badge-contract1{background:rgba(26,110,88,.15);color:var(--teal);}
.badge-contract2{background:rgba(74,56,32,.08);color:var(--ink3);}

/* ── Divider ── */
.divider{border:none;border-top:1px solid var(--cream3);margin:20px 0;}

/* ── Info grid ── */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px;}
.info-card{background:var(--cream2);border-radius:var(--r);padding:12px 14px;}
.info-label{font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.info-val{font-size:14px;color:var(--ink);}
.info-val a{color:var(--gold-d);text-decoration:none;}
.info-val a:hover{text-decoration:underline;}
.info-val.mono{font-family:var(--mono);}

/* ── Methods section ── */
.sec-title{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.method-group{margin-bottom:20px;}
.method-label{font-size:12px;font-weight:500;color:var(--ink2);margin-bottom:6px;}
.method-tags{display:flex;flex-wrap:wrap;gap:6px;}
.method-tag{background:var(--cream2);border:1px solid var(--cream3);color:var(--ink);font-size:12px;padding:3px 10px;border-radius:20px;}
.method-tag-none{font-size:12px;color:var(--ink3);}

/* ── Brands ── */
.brand-list{display:flex;flex-direction:column;gap:8px;margin-bottom:28px;}
.brand-card{background:var(--cream2);border-radius:var(--r);padding:12px 16px;}
.brand-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
.brand-name-es{font-size:15px;font-weight:500;color:var(--ink);text-decoration:none;}
.brand-name-es:hover{color:var(--gold-d);text-decoration:underline;}
.brand-name-ja{font-size:12px;color:var(--ink3);}
.brand-st{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;margin-left:auto;}
.brand-st-0{background:rgba(26,110,88,.1);color:var(--teal);}
.brand-st-1{background:rgba(74,56,32,.08);color:var(--ink3);}
.brand-st-2{background:rgba(200,146,30,.1);color:var(--gold-d);}
.brand-links{display:flex;gap:6px;flex-wrap:wrap;}

/* ── Links ── */
.links-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;}
.ext-link{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--cream3);background:var(--cream2);color:var(--ink);font-size:12px;text-decoration:none;transition:.15s;}
.ext-link:hover{border-color:var(--gold);color:var(--gold-d);}

/* ── Mini map ── */
#mini-map{height:280px;border-radius:var(--r);overflow:hidden;margin-bottom:28px;border:1px solid var(--cream3);}

/* ── Loading / Error ── */
.state-msg{text-align:center;padding:80px 20px;color:var(--ink3);font-size:14px;}

/* ── Responsive ── */
@media(max-width:520px){
  .hero-ja{font-size:24px;}
  .info-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-logo">テキーラ道場</div>
    <div class="hdr-sub">蒸留所詳細</div>
  </div>
  <nav class="hdr-nav">
    <a href="distilleries.html">← マップへ</a>
    <a href="index.html">ホーム</a>
  </nav>
</div>

<div class="page" id="page-content">
  <div class="state-msg" id="state-msg">読み込み中...</div>
</div>

<script>
if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
var auth=firebase.auth();
var db=firebase.firestore();

// ── ラベル定義 ──────────────────────────────────────────────────
var SAC_LABELS=['マンポステリア','アウトクラベ','直火','酵素分解等','その他'];
var EXT_LABELS=['ローラーミル','タオナ','スクリューミル','ディフューザー','ハンドクラッシュ','その他'];
var FER_LABELS=['金属製','木桶','セメント','その他'];
var YEA_LABELS=['天然酵母','独自酵母','その他'];
var STI_LABELS=['銅製単式','ステンレス製単式','ステンレス製単式＋銅部品','連続式','その他'];

var SCALE_LABELS={0:'小中規模',1:'大規模'};
var CONTRACT_LABELS={0:'委託製造 ○',1:'委託製造 ◎',2:'委託製造 ×'};
var SCALE_BADGE={0:'badge-scale0',1:'badge-scale1'};
var CONTRACT_BADGE={0:'badge-contract0',1:'badge-contract1',2:'badge-contract2'};

function decodeMethod(str,labels){
  if(!str||!str.trim()) return [];
  return str.split(',').map(Number).filter(function(i){return i>=0&&i<labels.length;}).map(function(i){return labels[i];});
}

function esc(s){ var d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }

// ── Render ───────────────────────────────────────────────────────
function render(dis,loc,dist,brands){
  var nom=dis.nom||dis.id||'—';
  var locName=loc?esc(loc.locationName):'—';
  var distName=dist?esc(dist.districtName):'—';
  var scale=parseInt(dis.scale)||0;
  var contract=parseInt(dis.contract)||0;

  var sacTags=decodeMethod(dis.sacMethod,SAC_LABELS);
  var extTags=decodeMethod(dis.extMethod,EXT_LABELS);
  var ferTags=decodeMethod(dis.ferMethod,FER_LABELS);
  var yeaTags=decodeMethod(dis.yeastType,YEA_LABELS);
  var stiTags=decodeMethod(dis.stillType,STI_LABELS);

  function tags(arr){
    if(!arr.length) return '<span class="method-tag-none">—</span>';
    return arr.map(function(t){return '<span class="method-tag">'+esc(t)+'</span>';}).join('');
  }
  function infoCard(label,val){
    return '<div class="info-card"><div class="info-label">'+label+'</div><div class="info-val">'+val+'</div></div>';
  }
  function extLinkHtml(url,label,icon){
    return url?'<a class="ext-link" href="'+esc(url)+'" target="_blank" rel="noopener">'+icon+' '+label+'</a>':'';
  }

  var badgeRow='';
  badgeRow+='<span class="badge '+CONTRACT_BADGE[contract]+'">'+(CONTRACT_LABELS[contract]||'—')+'</span>';

  var infoCards='';
  infoCards+=infoCard('所在地',locName);
  infoCards+=infoCard('地区',distName);
  if(dis.foundedYear) infoCards+=infoCard('操業開始','<span class="mono">'+esc(String(dis.foundedYear))+'年</span>');
  if(dis.parentCompany) infoCards+=infoCard('親会社',esc(dis.parentCompany)+(dis.parentCountry?' <span style="font-size:11px;color:var(--ink3)">('+esc(dis.parentCountry)+')</span>':''));
  if(dis.latitude&&dis.longitude) infoCards+=infoCard('座標','<span class="mono" style="font-size:12px">'+parseFloat(dis.latitude).toFixed(5)+', '+parseFloat(dis.longitude).toFixed(5)+'</span>');

  var linksHtml=''
    +extLinkHtml(dis.webUrl,'公式サイト','🌐')
    +extLinkHtml(dis.ammUrl,'Agave Matchmaker','🌵')
    +extLinkHtml(dis.mapUrl,'Googleマップで写真を見る','🗺');

  var html='';

  // Hero
  html+='<div class="hero">';
  html+='<div class="hero-nom">NOM '+esc(nom)+'</div>';
  html+='<div class="hero-ja">'+(dis.nomJa?esc(dis.nomJa):'—')+'</div>';
  html+='<div class="hero-es">'+(dis.nomEs?esc(dis.nomEs):'')+'</div>';
  if(dis.fullName&&dis.fullName!==dis.nomEs) html+='<div class="hero-full">'+esc(dis.fullName)+'</div>';
  html+='<div class="badge-row">'+badgeRow+'</div>';
  html+='</div>';

  // Info cards
  html+='<hr class="divider">';
  html+='<div class="info-grid">'+infoCards+'</div>';

  // Links
  if(linksHtml) html+='<div class="links-row">'+linksHtml+'</div>';

  // Brands
  var BRAND_ST_LABEL={0:'稼働中',1:'終売',2:'移転'};
  var BRAND_ST_CLASS={0:'brand-st-0',1:'brand-st-1',2:'brand-st-2'};
  html+='<hr class="divider">';
  html+='<div class="sec-title">ブランド</div>';
  if(!brands||!brands.length){
    html+='<div style="font-size:12px;color:var(--ink3);margin-bottom:24px;">登録なし</div>';
  } else {
    html+='<div class="brand-list">';
    brands.sort(function(a,b){return (a.seq||'').localeCompare(b.seq||'');}).forEach(function(b){
      var st=String(b.brandStatus||'0');
      html+='<div class="brand-card">';
      html+='<div class="brand-top">';
      html+='<a class="brand-name-es" href="brand.html?id='+encodeURIComponent(b.id)+'">'+esc(b.brandEs||'—')+'</a>';
      if(b.brandJa) html+='<span class="brand-name-ja">'+esc(b.brandJa)+'</span>';
      html+='<span class="brand-st '+(BRAND_ST_CLASS[st]||'brand-st-0')+'">'+(BRAND_ST_LABEL[st]||'—')+'</span>';
      html+='</div>';
      var blinks='';
      if(b.annUrl) blinks+='<a class="ext-link" href="'+esc(b.annUrl)+'" target="_blank" rel="noopener">📋 ANNブランドページ</a>';
      if(b.ammUrl) blinks+='<a class="ext-link" href="'+esc(b.ammUrl)+'" target="_blank" rel="noopener">🌵 AMM</a>';
      if(b.infoUrl) blinks+='<a class="ext-link" href="'+esc(b.infoUrl)+'" target="_blank" rel="noopener">🔗 詳細情報</a>';
      if(blinks) html+='<div class="brand-links">'+blinks+'</div>';
      html+='</div>';
    });
    html+='</div>';
  }

  // Production methods
  html+='<hr class="divider">';
  html+='<div class="sec-title">製造工程</div>';
  html+='<div class="method-group"><div class="method-label">糖化</div><div class="method-tags">'+tags(sacTags)+'</div></div>';
  html+='<div class="method-group"><div class="method-label">搾汁</div><div class="method-tags">'+tags(extTags)+'</div></div>';
  html+='<div class="method-group"><div class="method-label">発酵槽</div><div class="method-tags">'+tags(ferTags)+'</div></div>';
  html+='<div class="method-group"><div class="method-label">酵母</div><div class="method-tags">'+tags(yeaTags)+'</div></div>';
  html+='<div class="method-group"><div class="method-label">蒸留器</div><div class="method-tags">'+tags(stiTags)+'</div></div>';

  // Mini map (rendered after inserting HTML)
  var hasCoords=!!(parseFloat(dis.latitude)&&parseFloat(dis.longitude));
  if(hasCoords){
    html+='<hr class="divider">';
    html+='<div class="sec-title">場所</div>';
    html+='<div id="mini-map"></div>';
  }

  document.getElementById('page-content').innerHTML=html;
  document.title=(dis.nomJa||dis.nomEs||'NOM '+nom)+' — テキーラ道場';

  // Draw mini map
  if(hasCoords){
    var lat=parseFloat(dis.latitude), lng=parseFloat(dis.longitude);
    var miniMap=L.map('mini-map',{zoomControl:true,scrollWheelZoom:false}).setView([lat,lng],13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom:18
    }).addTo(miniMap);
    var icon=L.divIcon({
      html:'<div style="width:14px;height:14px;border-radius:50%;background:#c8921e;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>',
      iconSize:[20,20],iconAnchor:[10,10],className:''
    });
    L.marker([lat,lng],{icon:icon}).addTo(miniMap)
      .bindPopup('<b>'+(dis.nomJa||dis.nomEs||'NOM '+nom)+'</b>').openPopup();
  }
}

// ── Load ─────────────────────────────────────────────────────────
function loadDistillery(){
  var params=new URLSearchParams(location.search);
  var nom=params.get('nom');
  if(!nom){
    document.getElementById('state-msg').textContent='NOM番号が指定されていません。';
    return;
  }

  Promise.all([
    db.collection('distilleries').doc(nom).get(),
    db.collection('locations').get(),
    db.collection('districts').get(),
    db.collection('brands').where('distilleryId','==',nom).get()
  ]).then(function(results){
    var disSnap=results[0];
    if(!disSnap.exists){
      document.getElementById('state-msg').textContent='NOM '+nom+' の蒸留所データが見つかりません。';
      return;
    }
    var dis=Object.assign({id:disSnap.id},disSnap.data());
    var locMap={};
    results[1].docs.forEach(function(d){locMap[d.id]=d.data();});
    var distMap={};
    results[2].docs.forEach(function(d){distMap[d.id]=d.data();});
    var loc=dis.locationId?locMap[dis.locationId]:null;
    var dist=dis.districtId?distMap[dis.districtId]:null;
    var brands=results[3].docs.map(function(d){return Object.assign({id:d.id},d.data());});
    render(dis,loc,dist,brands);
  }).catch(function(e){
    document.getElementById('state-msg').textContent='読み込み失敗: '+e.message;
  });
}

var _authDone=false;
auth.onAuthStateChanged(function(user){
  if(_authDone) return; _authDone=true;
  if(user){loadDistillery();return;}
  auth.signInAnonymously().then(loadDistillery).catch(loadDistillery);
});
</script>
</body>
</html>
