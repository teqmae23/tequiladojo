<style>
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --cream:#F1EFE8;--cream2:#E8E4D8;--cream3:#DDD8C8;
  --red:#b03020;--teal:#1a6e58;
  --c-dis:#7a4010;--c-brand:#1a6e58;--c-bottle:#1252a0;--c-bdata:#c8860a;
  --sans:'Noto Sans JP',sans-serif;--serif:'Cormorant Garamond',serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:var(--sans);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#login-screen{display:none;align-items:center;justify-content:center;height:100vh;background:var(--cream);}
.lcard{background:#fff;border:1px solid var(--cream3);border-radius:10px;padding:32px 28px;width:100%;max-width:360px;box-shadow:0 4px 20px rgba(0,0,0,.08);}
.lcard h2{font-family:var(--serif);font-size:22px;color:var(--gold-d);margin-bottom:4px;}
.lcard .lsub{font-size:12px;color:var(--ink3);margin-bottom:20px;}
.lcard label{display:block;font-size:11px;color:var(--ink3);margin-bottom:4px;margin-top:14px;}
.lcard input{width:100%;padding:9px 11px;border:1px solid var(--cream3);border-radius:5px;font-size:13px;box-sizing:border-box;font-family:var(--sans);}
.lcard input:focus{outline:none;border-color:var(--gold);}
#lerr{font-size:12px;color:var(--red);margin-top:8px;min-height:16px;}
.lcard .lbtn{width:100%;margin-top:18px;padding:10px;background:var(--gold-d);color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;font-family:var(--sans);}
.lcard .lbtn:hover{background:var(--gold);}
#app{display:none;flex-direction:column;height:100vh;}
/* Header */
.hdr{background:var(--ink);padding:0 16px;display:flex;align-items:center;gap:12px;height:48px;flex-shrink:0;}
.hdr-logo{font-family:var(--serif);font-size:16px;color:var(--gold-l);letter-spacing:.04em;}
.hdr-sub{font-size:11px;color:var(--ink3);margin-left:4px;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.hdr-user{font-size:11px;color:var(--ink3);font-family:var(--mono);}
.hdr-btn{padding:4px 10px;border:1px solid rgba(255,255,255,.2);border-radius:5px;background:transparent;color:var(--gold-l);font-size:11px;cursor:pointer;font-family:var(--sans);}
.hdr-link{color:var(--gold-l);font-size:12px;text-decoration:none;opacity:.7;}
.hdr-link:hover{opacity:1;}
/* Controls */
.ctrl{background:var(--cream2);border-bottom:1px solid var(--cream3);padding:8px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.ctrl input[type=text]{padding:5px 9px;border:1px solid var(--cream3);border-radius:5px;background:#fff;font-family:var(--mono);font-size:12px;width:120px;}
.ctrl input:focus{outline:none;border-color:var(--gold);}
.cbtn{padding:4px 10px;border:1px solid var(--cream3);border-radius:5px;background:#fff;color:var(--ink2);font-size:12px;cursor:pointer;font-family:var(--sans);}
.cbtn:hover{border-color:var(--gold);}
.cbtn.active{background:var(--ink);color:var(--cream);border-color:var(--ink);}
#ctrl-count{font-size:11px;color:var(--ink3);margin-left:auto;}
#loading-msg{font-size:12px;color:var(--ink3);}
/* Column settings */
#col-panel{background:#fff;border-bottom:1px solid var(--cream3);padding:10px 14px;display:none;flex-shrink:0;max-height:220px;overflow-y:auto;}
.col-panel-inner{display:flex;gap:20px;flex-wrap:wrap;}
.col-group{min-width:200px;}
.col-group-title{font-size:11px;font-weight:600;color:var(--ink2);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.col-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.col-item{display:flex;align-items:center;gap:5px;margin-bottom:3px;font-size:12px;color:var(--ink);cursor:pointer;user-select:none;}
.col-item input{cursor:pointer;accent-color:var(--gold-d);}
/* Tree */
#tree-wrap{flex:1;overflow-y:auto;padding:10px 14px 30px;}
.tree-node{margin-bottom:1px;}
.tree-row{display:flex;align-items:center;gap:6px;padding:4px 7px;border-radius:5px;transition:background .1s;}
.tree-row:hover{background:rgba(180,140,50,.09);}
.tree-toggle{width:18px;height:18px;border:none;background:none;cursor:pointer;color:var(--ink3);font-size:11px;padding:0;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:3px;}
.tree-toggle:hover:not(.leaf){background:var(--cream3);color:var(--ink);}
.tree-toggle.leaf{cursor:default;color:var(--cream3);}
.level-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;color:#fff;flex-shrink:0;letter-spacing:.04em;}
.tree-id{font-family:var(--mono);font-size:11px;color:var(--ink3);flex-shrink:0;}
.tree-row-info{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.lvl-brand .tree-row-info,.lvl-bottle .tree-row-info,.lvl-bdata .tree-row-info{width:460px;overflow:hidden;}
.tree-name{font-size:12px;font-weight:500;color:var(--ink);white-space:nowrap;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;}
.tree-name2{font-size:11px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex-shrink:1;}
.tree-opts{display:flex;gap:4px;flex-wrap:wrap;margin-left:2px;flex:1;min-width:0;}
.opt-cell{font-size:11px;color:var(--ink2);background:var(--cream2);border-radius:3px;padding:1px 6px;white-space:nowrap;cursor:pointer;border:1px solid transparent;transition:border-color .15s;}
.opt-cell:hover{border-color:var(--gold);background:#fff;}
.opt-lbl{font-size:10px;color:var(--ink3);margin-right:2px;}
.opt-cell input,.opt-cell select{font-size:11px;padding:0 2px;border:none;outline:none;background:transparent;font-family:var(--sans);min-width:40px;max-width:110px;}
.tree-acts{display:flex;gap:4px;align-items:center;flex-shrink:0;margin-left:4px;}
.act-link{font-size:10px;color:var(--gold-d);text-decoration:none;padding:2px 6px;border:1px solid var(--cream3);border-radius:3px;white-space:nowrap;cursor:pointer;background:#fff;}
.act-link:hover{border-color:var(--gold-d);}
.act-dup{font-size:10px;color:var(--teal);padding:2px 6px;border:1px solid var(--cream3);border-radius:3px;white-space:nowrap;cursor:pointer;background:#fff;}
.act-dup:hover{border-color:var(--teal);}
.act-del{font-size:10px;color:var(--red);padding:2px 6px;border:1px solid var(--cream3);border-radius:3px;white-space:nowrap;cursor:pointer;background:#fff;}
.act-del:hover{border-color:var(--red);}
.act-amm{font-size:10px;color:#2e7d32;padding:2px 6px;border:1px solid var(--cream3);border-radius:3px;white-space:nowrap;cursor:pointer;background:#fff;}
.act-amm:hover{border-color:#2e7d32;}
.act-amm.matched{background:#e6f4e6;border-color:#8fca8f;}
/* AMM突合モーダル */
#amm-modal{display:none;position:fixed;inset:0;background:rgba(24,17,10,.5);z-index:1000;align-items:center;justify-content:center;padding:16px;}
#amm-modal.open{display:flex;}
.amm-panel{background:#fff;border-radius:10px;width:100%;max-width:560px;max-height:86vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.3);}
.amm-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--cream3);position:sticky;top:0;background:#fff;}
.amm-title{font-size:15px;font-weight:600;color:var(--ink);flex:1;}
.amm-close{border:1px solid var(--cream3);background:#fff;border-radius:5px;padding:4px 10px;font-size:12px;cursor:pointer;}
.amm-body{padding:14px 16px;}
.amm-sub{font-size:12px;color:var(--ink3);margin-bottom:10px;line-height:1.6;}
.amm-cand{display:block;border:1px solid var(--cream3);border-radius:6px;padding:9px 11px;margin-bottom:7px;cursor:pointer;font-size:12px;}
.amm-cand:hover{border-color:var(--gold);background:var(--cream2);}
.amm-cand input{margin-right:8px;}
.amm-cand-name{font-weight:600;color:var(--ink);}
.amm-cand-meta{font-size:11px;color:var(--ink3);margin-top:3px;}
.amm-cand-taken{color:var(--red);font-weight:500;}
.amm-none{font-size:12px;color:var(--ink3);padding:10px;text-align:center;}
.amm-foot{display:flex;gap:8px;justify-content:flex-end;padding:12px 16px;border-top:1px solid var(--cream3);position:sticky;bottom:0;background:#fff;}
.amm-btn{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--cream3);background:#fff;}
.amm-btn-primary{background:var(--gold-d);color:#fff;border-color:var(--gold-d);}
.amm-btn-clear{color:var(--red);border-color:#e0a89e;}
.amm-msg{font-size:12px;color:var(--ink3);margin-right:auto;align-self:center;}
.tree-children{padding-left:22px;border-left:1px dashed var(--cream3);margin-left:9px;}
.lvl-dis>.tree-row{background:rgba(122,64,16,.04);}
.lvl-brand>.tree-row{background:rgba(26,110,88,.03);}
.lvl-dis .level-badge{background:var(--c-dis);}
.lvl-brand .level-badge{background:var(--c-brand);}
.lvl-bottle .level-badge{background:var(--c-bottle);}
.lvl-bdata .level-badge{background:var(--c-bdata);}
/* 整合性チェック */
#audit-panel{background:#fff;border-bottom:1px solid var(--cream3);padding:10px 14px;display:none;flex-shrink:0;max-height:320px;overflow-y:auto;}
.audit-summary{font-size:12px;color:var(--ink2);margin-bottom:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.audit-chip{font-size:11px;padding:2px 9px;border-radius:11px;font-weight:600;}
.audit-chip.err{background:#fbe4e0;color:var(--red);border:1px solid #e0a89e;}
.audit-chip.warn{background:#fdf1d8;color:#8a6010;border:1px solid #e8c980;}
.audit-chip.ok{background:#e0f2e8;color:var(--teal);border:1px solid #9ccdb8;}
.audit-note{font-size:11px;color:var(--ink3);}
.audit-list{display:flex;flex-direction:column;gap:3px;}
.audit-item{display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 8px;border-radius:4px;background:var(--cream2);}
.audit-item.err{border-left:3px solid var(--red);}
.audit-item.warn{border-left:3px solid #d8a020;}
.audit-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;color:#fff;flex-shrink:0;letter-spacing:.03em;}
.audit-badge.dis{background:var(--c-dis);}
.audit-badge.brand{background:var(--c-brand);}
.audit-badge.bottle{background:var(--c-bottle);}
.audit-badge.bdata{background:var(--c-bdata);}
.audit-id{font-family:var(--mono);font-size:11px;color:var(--ink3);flex-shrink:0;}
.audit-msg{flex:1;min-width:0;color:var(--ink);}
.audit-acts{display:flex;gap:4px;flex-shrink:0;}
.audit-jump,.audit-editl{font-size:10px;color:var(--gold-d);cursor:pointer;border:1px solid var(--cream3);border-radius:3px;padding:2px 6px;background:#fff;white-space:nowrap;text-decoration:none;}
.audit-jump:hover,.audit-editl:hover{border-color:var(--gold-d);}
</style>
</head>
<body>

<div id="login-screen">
  <div class="lcard">
    <h2>テキーラ道場</h2>
    <div class="lsub">スタッフとしてログインしてください</div>
    <label>メールアドレス</label>
    <input id="l-email" type="email" autocomplete="username">
    <label>パスワード</label>
    <input id="l-pass" type="password" autocomplete="current-password">
    <div id="lerr"></div>
    <button class="lbtn" id="l-btn">ログイン</button>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-logo">テキーラ道場</div>
    <div class="hdr-sub">蒸留所ツリー管理</div>
    <div class="hdr-right">
      <span class="hdr-user" id="hdr-user"></span>
      <button class="hdr-btn" id="btn-logout">ログアウト</button>
      <a class="hdr-link" href="admin_amm_tree.html">🌵 AMMツリー →</a>
      <a class="hdr-link" href="admin_tequila.html" style="margin-left:4px;">テキーラ管理 →</a>
      <a class="hdr-link" href="admin_distillery.html" style="margin-left:4px;">蒸留所管理 →</a>
    </div>
  </div>

  <div class="ctrl">
    <label style="font-size:12px;color:var(--ink2);">NOM</label>
    <input type="text" id="nom-filter" placeholder="例: 1079" maxlength="4">
    <button class="cbtn" id="btn-search">検索</button>
    <button class="cbtn" id="btn-clear">クリア</button>
    <span style="width:1px;height:20px;background:var(--cream3);display:inline-block;"></span>
    <button class="cbtn" id="btn-expand-all">全展開</button>
    <button class="cbtn" id="btn-collapse-all">全折り畳み</button>
    <span style="width:1px;height:20px;background:var(--cream3);display:inline-block;"></span>
    <button class="cbtn" id="btn-col-toggle">列設定 ▼</button>
    <button class="cbtn" id="btn-audit" title="参照整合性チェック">🔍 整合性チェック</button>
    <button class="cbtn" id="btn-reload" title="データ再読み込み">↺ 再読込</button>
    <span id="loading-msg"></span>
    <span id="ctrl-count"></span>
  </div>

  <div id="col-panel">
    <div class="col-panel-inner" id="col-panel-inner"></div>
  </div>

  <div id="audit-panel">
    <div class="audit-summary" id="audit-summary"></div>
    <div class="audit-list" id="audit-list"></div>
  </div>

  <div id="tree-wrap"><div id="tree-root"></div></div>
</div>

<!-- AMM製法 突合モーダル -->
<div id="amm-modal">
  <div class="amm-panel">
    <div class="amm-head">
      <span class="amm-title" id="amm-title">AMM製法の突合</span>
      <button class="amm-close" onclick="closeAmmMatch()">閉じる</button>
    </div>
    <div class="amm-body">
      <div class="amm-sub" id="amm-sub"></div>
      <div id="amm-cand-list"></div>
    </div>
    <div class="amm-foot">
      <span class="amm-msg" id="amm-msg"></span>
      <button class="amm-btn amm-btn-clear" id="amm-btn-clear" onclick="doAmmClear()">突合を解除</button>
      <button class="amm-btn amm-btn-primary" onclick="doAmmMatch()">確定</button>
    </div>
  </div>
</div>

<script>
if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
var auth=firebase.auth();
var db=firebase.firestore();

// ── フィールド定義 ──────────────────────────────────────────────────
// type: 'text'|'number'|'url'|'select'|'readonly'
// options: [[value, label], ...]
var LEVELS=[
  {
    key:'dis', label:'蒸留所', badge:'蒸留所', collection:'distilleries',
    idField:'id', nameFields:['nomEs'],
    editUrl:function(r){ return 'admin_distillery.html?nom='+encodeURIComponent(r.nom||r.id); },
    canDup:false, canDel:false,
    optFields:[
      {field:'nomJa',       label:'名称(J)',   type:'text'},
      {field:'nomEs',       label:'名称(E)',   type:'text'},
      {field:'introduced',  label:'導入',      type:'select', options:[['0','未導入'],['1','導入']], fmt:function(v){return v===1||v==='1'?'✓導入':'—';}},
      {field:'salesCategory',label:'販売区分', type:'select', options:[['0','国内'],['1','海外']], fmt:function(v){return (v===0||v==='0')?'国内':'海外';}},
      {field:'districtId',  label:'地区ID',    type:'readonly'},
      {field:'locationId',  label:'所在地ID',  type:'readonly'},
      {field:'latitude',    label:'緯度',      type:'number'},
      {field:'longitude',   label:'経度',      type:'number'},
      {field:'elevation',   label:'標高',      type:'number', fmt:function(v){return v!=null?v+'m':'—';}},
      {field:'ammUrl',      label:'AMM URL',   type:'url'},
      {field:'webUrl',      label:'HP URL',    type:'url'},
      {field:'mapUrl',      label:'地図URL',   type:'url'},
    ]
  },
  {
    key:'brand', label:'ブランド', badge:'BR', collection:'brands',
    idField:'id', nameFields:['brandEs','brandJa'],
    editUrl:function(r){ return 'admin_tequila.html?tab=brands&edit='+encodeURIComponent(r.id); },
    canDup:true, canDel:true,
    optFields:[
      {field:'brandEs',     label:'名称(E)',   type:'text'},
      {field:'brandJa',     label:'名称(J)',   type:'text'},
      {field:'distilleryId',label:'NOM',       type:'readonly'},
      {field:'brandType',   label:'種別',      type:'select', options:[['0','蒸留'],['1','委託']], fmt:function(v){return v==='0'?'蒸留':'委託';}},
      {field:'brandStatus', label:'状態',      type:'select', options:[['0','稼働'],['1','終了'],['2','移行']], fmt:function(v){return v==='0'?'稼働':v==='1'?'終了':'移行';}},
      {field:'salesCategory',label:'販売区分', type:'select', options:[['0','国内'],['1','海外']], fmt:function(v){return (v===0||v==='0')?'国内':'海外';}},
      {field:'foundedYear', label:'創設年',    type:'number'},
      {field:'infoUrl',     label:'HP URL',    type:'url'},
      {field:'ammUrl',      label:'AMM URL',   type:'url'},
      {field:'annUrl',      label:'ANN URL',   type:'url'},
    ]
  },
  {
    key:'bottle', label:'ボトル', badge:'BT', collection:'bottles',
    idField:'id', nameFields:['bottleEs','bottleJa'],
    editUrl:function(r){ return 'admin_tequila.html?tab=bottles&edit='+encodeURIComponent(r.id); },
    canDup:true, canDel:true,
    optFields:[
      {field:'bottleEs',    label:'名称(E)',   type:'text'},
      {field:'bottleJa',    label:'名称(J)',   type:'text'},
      {field:'bottleEsBase',label:'基本名(E)', type:'text'},
      {field:'bottleJaBase',label:'基本名(J)', type:'text'},
      {field:'suffix',      label:'追記',      type:'text'},
      {field:'brandId',     label:'ブランドID',type:'readonly'},
      {field:'classId',     label:'クラスID',  type:'readonly'},
      {field:'abv',         label:'ABV',       type:'number', fmt:function(v){return v!=null?parseFloat(v).toFixed(1)+'%':'—';}},
      {field:'production',  label:'生産区分',  type:'select', options:[['0','定番品'],['1','限定品']], fmt:function(v){return v==='0'?'定番':'限定';}},
      {field:'filtration',  label:'色素濾過',  type:'select', options:[['0','なし'],['1','あり']], fmt:function(v){return v==='1'?'あり':'なし';}},
      {field:'serviceStatus',label:'提供',     type:'select', options:[['0','OP'],['1','CL']], fmt:function(v){return v==='0'?'OP':'CL';}},
      // AMM製法（ammBottleDetailsから突合表示・読み取り専用）
      {field:'_ammMatched',     label:'AMM紐付',    type:'readonly'},
      {field:'_ammAgaveType',   label:'AMMアガベ',   type:'readonly'},
      {field:'_ammCooking',     label:'AMM糖化',     type:'readonly'},
      {field:'_ammExtraction',  label:'AMM搾汁',     type:'readonly'},
      {field:'_ammFermentation',label:'AMM発酵',     type:'readonly'},
      {field:'_ammDistillation',label:'AMM蒸留回数', type:'readonly'},
      {field:'_ammStill',       label:'AMM蒸留器',   type:'readonly'},
      {field:'_ammAging',       label:'AMM熟成',     type:'readonly'},
      {field:'_ammWaterSource', label:'AMM水源',     type:'readonly'},
      {field:'_ammAbvProof',    label:'AMM度数',     type:'readonly'},
      {field:'_ammUrl',         label:'AMM製品',     type:'readonly'},
    ]
  },
  {
    key:'bdata', label:'ボトルデータ', badge:'BD', collection:'bottleData',
    idField:'id', nameFields:['bottleEs','bottleJa'],
    editUrl:function(r){ return 'admin_tequila.html?tab=bdata&edit='+encodeURIComponent(r.id); },
    canDup:true, canDel:true,

var rawDis=[], rawBrands=[], rawBottles=[], rawBdata=[], rawAmmBottle=[];
var tree={};

function buildTree(){
  tree={};
  rawDis.forEach(function(d){
    var nom=String(d.nom||d.id);
    tree[nom]={dis:d, brands:{}};
  });
  rawBrands.forEach(function(b){
    var nom=String(b.id).slice(0,4);
    if(!tree[nom]) tree[nom]={dis:null, brands:{}};
    tree[nom].brands[b.id]={brand:b, bottles:{}};
  });
  rawBottles.forEach(function(b){
    var nom=String(b.id).slice(0,4);
    var brandId=String(b.brandId||b.id.slice(0,7));
    if(!tree[nom]) return;
    if(!tree[nom].brands[brandId]) tree[nom].brands[brandId]={brand:null, bottles:{}};
    tree[nom].brands[brandId].bottles[b.id]={bottle:b, bdatas:[]};
  });
  rawBdata.forEach(function(bd){
    var nom=String(bd.brandId||'').slice(0,4)||String(bd.bottleId||'').slice(0,4);
    var brandId=String(bd.brandId||'').slice(0,7);
    var bottleId=bd.bottleId||'';
    if(!nom||!brandId||!bottleId) return;
    if(!tree[nom]||!tree[nom].brands[brandId]||!tree[nom].brands[brandId].bottles[bottleId]) return;
    tree[nom].brands[brandId].bottles[bottleId].bdatas.push(bd);
  });
}

function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtVal(f, v){
  if(v===undefined||v===null||v==='') return '—';
  return f.fmt ? f.fmt(v) : String(v);
}

function activateEdit(cell, col, docId, rec, f){
  var origVal=rec[f.field];
  var input;
  if(f.type==='select'){
    input=document.createElement('select');
    input.style.cssText='font-size:11px;padding:1px 3px;border:1px solid var(--gold);border-radius:3px;background:#fff;font-family:var(--sans);';
    (f.options||[]).forEach(function(opt){
      var o=document.createElement('option');
      o.value=opt[0]; o.textContent=opt[1];
      if(String(origVal)===String(opt[0])) o.selected=true;
      input.appendChild(o);
    });
  } else {
    input=document.createElement('input');
    input.type=f.type==='number'?'number':'text';
    input.value=origVal!=null?origVal:'';
    input.style.cssText='font-size:11px;padding:1px 4px;border:1px solid var(--gold);border-radius:3px;background:#fff;font-family:var(--sans);width:100px;';
  }
  var lbl=document.createElement('span');
  lbl.className='opt-lbl';
  lbl.textContent=f.label;
  cell.innerHTML='';
  cell.appendChild(lbl);
  cell.appendChild(input);
  input.focus();
  if(input.select&&f.type!=='select') input.select();

  var done=false;
  function save(){
    if(done) return; done=true;
    var raw=input.value;
    var newVal=f.type==='number'?(raw===''?null:Number(raw)):raw||null;
    var upd={}; upd[f.field]=newVal;
    db.collection(col).doc(docId).update(upd)
      .then(function(){
        rec[f.field]=newVal;
        renderCell(cell, col, docId, rec, f);
      })
      .catch(function(e){
        alert('保存失敗: '+e.message);
        renderCell(cell, col, docId, rec, f);
      });
  }
  input.addEventListener('blur',save);
  input.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&f.type!=='select'){ input.blur(); }
    if(e.key==='Escape'){ done=true; renderCell(cell, col, docId, rec, f); }
  });
  if(f.type==='select') input.addEventListener('change',function(){ input.blur(); });
}

function renderCell(cell, col, docId, rec, f){
  cell.innerHTML='<span class="opt-lbl">'+escH(f.label)+'</span>'+escH(fmtVal(f, rec[f.field]));
  if(f.type!=='readonly'){
    cell.style.cursor='pointer';
    cell.addEventListener('click',function(){ activateEdit(cell, col, docId, rec, f); },{once:true});
  } else {
    cell.style.cursor='default';
  }
}

// ── 複製 ─────────────────────────────────────────────────────────────
function duplicateBrand(brand){
  var nom=brand.id.slice(0,4);
  var max=0;
  rawBrands.forEach(function(b){ if(b.id.slice(0,4)===nom){ var s=parseInt(b.id.slice(4,7))||0; if(s>max) max=s; } });
  var newId=nom+String(max+1).padStart(3,'0');
  var doc=Object.assign({},brand,{id:newId,brandId:newId,distilleryId:nom}); delete doc.id;
  db.collection('brands').doc(newId).set(doc).then(function(){
    rawBrands.push(Object.assign({id:newId},doc)); buildTree(); renderTree();
  }).catch(function(e){ alert('複製失敗: '+e.message); });
}
function duplicateBottle(bottle){
  var prefix=bottle.id.slice(0,9);
  var max=0;
  rawBottles.forEach(function(b){ if(b.id.slice(0,9)===prefix){ var s=parseInt(b.id.slice(9,12))||0; if(s>max) max=s; } });
  var newId=prefix+String(max+1).padStart(3,'0');
  var doc=Object.assign({},bottle,{bottleId:newId}); delete doc.id;
  // 表示用の派生フィールド(_amm*)はFirestoreに保存しない
  Object.keys(doc).forEach(function(k){ if(k.charAt(0)==='_') delete doc[k]; });
  db.collection('bottles').doc(newId).set(doc).then(function(){
    rawBottles.push(Object.assign({id:newId},doc)); buildTree(); renderTree();
  }).catch(function(e){ alert('複製失敗: '+e.message); });
}
function duplicateBdata(bd){
  var max=0;
  rawBdata.forEach(function(d){ if(d.id&&d.id[0]==='T'){ var s=parseInt(d.id.slice(1))||0; if(s>max) max=s; } });
  var newId='T'+String(max+1).padStart(5,'0');
  var doc=Object.assign({},bd,{bottleDataId:newId,seq:newId}); delete doc.id;
  db.collection('bottleData').doc(newId).set(doc).then(function(){
    rawBdata.push(Object.assign({id:newId},doc)); buildTree(); renderTree();
  }).catch(function(e){ alert('複製失敗: '+e.message); });
}

// ── 削除 ─────────────────────────────────────────────────────────────
function deleteRecord(col, docId, label){
  if(!confirm('「'+docId+'」('+label+') を削除しますか？\nこの操作は取り消せません。')) return;
  db.collection(col).doc(docId).delete().then(function(){
    var arr=getArr(col);
    var idx=arr.findIndex(function(r){return r.id===docId;});
    if(idx>=0) arr.splice(idx,1);
    buildTree(); renderTree();
  }).catch(function(e){ alert('削除失敗: '+e.message); });
}

function renderTree(){
  var root=document.getElementById('tree-root');
  root.innerHTML='';
  var noms=Object.keys(tree).sort();
  if(nomFilterVal) noms=noms.filter(function(n){ return n.indexOf(nomFilterVal)===0; });

  var disLv=LEVELS[0], brandLv=LEVELS[1], bottleLv=LEVELS[2], bdataLv=LEVELS[3];
  var disCount=0;

  noms.forEach(function(nom){
    var entry=tree[nom]; if(!entry) return;
    var dis=entry.dis||{id:nom};
    disCount++;
    var brandIds=Object.keys(entry.brands).sort();
    var disKey='dis:'+nom;
    var disNode=makeRow(disLv, dis, disKey, brandIds.length>0);

    if(brandIds.length>0 && openState[disKey]!==false){
      var disC=document.createElement('div'); disC.className='tree-children';
      brandIds.forEach(function(brandId){
        var be=entry.brands[brandId];
        var brand=be.brand||{id:brandId};
        var bottleIds=Object.keys(be.bottles).sort();
        var brandKey='brand:'+brandId;
        var brandNode=makeRow(brandLv, brand, brandKey, bottleIds.length>0);

        if(bottleIds.length>0 && openState[brandKey]!==false){
          var brC=document.createElement('div'); brC.className='tree-children';
          bottleIds.forEach(function(bottleId){
            var boe=be.bottles[bottleId];
            var bottle=boe.bottle||{id:bottleId};
            var bdatas=boe.bdatas||[];
            var bottleKey='bottle:'+bottleId;
            var bottleNode=makeRow(bottleLv, bottle, bottleKey, bdatas.length>0);

            if(bdatas.length>0 && openState[bottleKey]!==false){
              var btC=document.createElement('div'); btC.className='tree-children';
              bdatas.sort(function(a,b){return (a.id||'').localeCompare(b.id||'');}).forEach(function(bd){
                btC.appendChild(makeRow(bdataLv, bd, 'bd:'+bd.id, false));
              });
              bottleNode.appendChild(btC);
            }
            brC.appendChild(bottleNode);
          });
          brandNode.appendChild(brC);
        }
        disC.appendChild(brandNode);
      });
      disNode.appendChild(disC);
    }
    root.appendChild(disNode);
  });

  document.getElementById('ctrl-count').textContent='蒸留所: '+disCount+'件 / 全'+Object.keys(tree).length+'件';
}

// ── 整合性チェック ────────────────────────────────────────────────────
// 蒸留所-ブランド-ボトル-ボトルデータの参照整合性を検査する。
// 特に bottleData は buildTree() で参照先が無いと黙って除外されるため、
// ここで拾わないと存在に気付けない。
function runAudit(){
  var disSet={}, brandSet={}, bottleSet={};
  rawDis.forEach(function(d){ disSet[String(d.nom||d.id)]=d; });
  rawBrands.forEach(function(b){ brandSet[String(b.id)]=b; });
  rawBottles.forEach(function(b){ bottleSet[String(b.id)]=b; });
  // 空判定用の集計（O(n^2)回避）
  var brandNomCount={}, bottleBrandCount={};
  rawBrands.forEach(function(b){ var nom=String(b.id).slice(0,4); brandNomCount[nom]=(brandNomCount[nom]||0)+1; });
  rawBottles.forEach(function(bt){ var bid=String(bt.brandId||String(bt.id).slice(0,7)); bottleBrandCount[bid]=(bottleBrandCount[bid]||0)+1; });

  var issues=[]; // {sev, badge, id, col, nom, msg}
  function add(sev,badge,id,col,nom,msg){ issues.push({sev:sev,badge:badge,id:id,col:col,nom:nom,msg:msg}); }

  // ブランド → 蒸留所
  rawBrands.forEach(function(b){
    var id=String(b.id), nom=id.slice(0,4);
    if(!disSet[nom]) add('err','brand',id,'brands',nom,'蒸留所 NOM '+nom+' が存在しません');
    if(b.distilleryId && String(b.distilleryId)!==nom) add('warn','brand',id,'brands',nom,'distilleryId('+b.distilleryId+') とID接頭辞('+nom+')が不一致');
    var nm=getName(b,['brandEs','brandJa']); if(!nm||nm==='—') add('warn','brand',id,'brands',nom,'名称が未設定です');
    if(bottleBrandCount[id]===undefined) add('warn','brand',id,'brands',nom,'ボトルが1件もありません');
  });

  // ボトル → ブランド / 蒸留所
  rawBottles.forEach(function(b){
    var id=String(b.id), nom=id.slice(0,4);
    var brandId=String(b.brandId||id.slice(0,7));
    if(!brandSet[brandId]) add('err','bottle',id,'bottles',nom,'ブランド '+brandId+' が存在しません');
    if(!disSet[nom]) add('err','bottle',id,'bottles',nom,'蒸留所 NOM '+nom+' が存在しません');
    if(b.brandId && String(b.brandId)!==id.slice(0,7)) add('warn','bottle',id,'bottles',nom,'brandId('+b.brandId+') とID接頭辞('+id.slice(0,7)+')が不一致');
    var nm=getName(b,['bottleEs','bottleJa']); if(!nm||nm==='—') add('warn','bottle',id,'bottles',nom,'名称が未設定です');
  });

  // ボトルデータ → ボトル / ブランド（参照先が無いとツリー未表示になる）
  rawBdata.forEach(function(bd){
    var id=String(bd.id);
    var brandId=String(bd.brandId||'');
    var bottleId=String(bd.bottleId||'');
    var nom=(brandId.slice(0,4))||(bottleId.slice(0,4))||'';
    if(!brandId||!bottleId){
      add('err','bdata',id,'bottleData',nom,'brandId/bottleId が未設定のためツリーに表示されません');
      return;
    }
    if(!bottleSet[bottleId]) add('err','bdata',id,'bottleData',nom,'ボトル '+bottleId+' が存在しません（ツリー未表示）');
    if(!brandSet[brandId]) add('err','bdata',id,'bottleData',nom,'ブランド '+brandId+' が存在しません');
    if(bottleSet[bottleId]){
      var expBrand=String(bottleSet[bottleId].brandId||bottleId.slice(0,7));
      if(brandId!==expBrand) add('warn','bdata',id,'bottleData',nom,'brandId('+brandId+') がボトルのブランド('+expBrand+')と不一致');
    }
  });

  // 重要度順（err→warn）、その後 NOM 順
  var order={err:0,warn:1};
  issues.sort(function(a,b){ return (order[a.sev]-order[b.sev])||String(a.nom).localeCompare(String(b.nom))||String(a.id).localeCompare(String(b.id)); });
  return issues;
}

var BADGE_LABEL={dis:'蒸留所',brand:'BR',bottle:'BT',bdata:'BD'};
function renderAudit(){
  var issues=runAudit();
  var errN=issues.filter(function(i){return i.sev==='err';}).length;
  var warnN=issues.length-errN;
  var sum=document.getElementById('audit-summary');
  sum.innerHTML='';
  if(!issues.length){
    sum.innerHTML='<span class="audit-chip ok">✓ 不整合なし</span>'
      +'<span class="audit-note">蒸留所'+rawDis.length+' / ブランド'+rawBrands.length+' / ボトル'+rawBottles.length+' / ボトルデータ'+rawBdata.length+' 件を検査</span>';
    document.getElementById('audit-list').innerHTML='';
    return;
  }
  sum.innerHTML='<span class="audit-chip err">エラー '+errN+'</span>'
    +'<span class="audit-chip warn">警告 '+warnN+'</span>'
    +'<span class="audit-note">エラー=参照切れ/データ欠落（要修正）、警告=不一致や未設定。行の「該当表示」でNOMを絞り込み、「編集」で該当マスタへ。</span>';
  var list=document.getElementById('audit-list');
  list.innerHTML='';
  issues.forEach(function(it){
    var row=document.createElement('div');
    row.className='audit-item '+it.sev;
    var _tabByCol={brands:'brands',bottles:'bottles',bottleData:'bdata',classes:'classes'};
    var editHref;
    if(it.col==='distilleries'){ editHref='admin_distillery.html?nom='+encodeURIComponent(it.nom||it.id); }
    else if(_tabByCol[it.col]){ editHref='admin_tequila.html?tab='+_tabByCol[it.col]+'&edit='+encodeURIComponent(it.id); }
    else { editHref='admin_tequila.html'; }
    row.innerHTML='<span class="audit-badge '+it.badge+'">'+escH(BADGE_LABEL[it.badge]||it.badge)+'</span>'
      +'<span class="audit-id">'+escH(it.id)+'</span>'
      +'<span class="audit-msg">'+escH(it.msg)+'</span>'
      +'<span class="audit-acts">'
      +'<a class="audit-jump" data-nom="'+escH(it.nom||'')+'">該当表示</a>'
      +'<a class="audit-editl" href="'+escH(editHref)+'" target="_blank" rel="noopener">編集</a>'
      +'</span>';
    list.appendChild(row);
  });
  Array.prototype.forEach.call(list.querySelectorAll('.audit-jump'),function(a){
    a.addEventListener('click',function(){
      var nom=this.getAttribute('data-nom')||'';
      document.getElementById('nom-filter').value=nom;
      nomFilterVal=nom;
      renderTree();
      var tw=document.getElementById('tree-wrap'); if(tw) tw.scrollTop=0;
    });
  });
}

document.getElementById('btn-audit').addEventListener('click',function(){
  var p=document.getElementById('audit-panel');
  var open=p.style.display==='block';
  if(open){ p.style.display='none'; this.classList.remove('active'); }
  else{
    // 列設定パネルは閉じる
    document.getElementById('col-panel').style.display='none';
    document.getElementById('btn-col-toggle').textContent='列設定 ▼';
    renderAudit();
    p.style.display='block';
    this.classList.add('active');
  }
});

document.getElementById('btn-search').addEventListener('click',function(){

  renderTree();
});
document.getElementById('nom-filter').addEventListener('keydown',function(e){

document.getElementById('btn-expand-all').addEventListener('click',function(){ openState={}; renderTree(); });

  Object.keys(tree).forEach(function(nom){

    Object.keys(tree[nom].brands).forEach(function(bid){

document.getElementById('btn-reload').addEventListener('click',function(){ loadAll(); });

// ── データ読み込み ────────────────────────────────────────────────────
function loadAll(){
  var msg=document.getElementById('loading-msg');
  msg.textContent='読み込み中...';
  document.getElementById('tree-root').innerHTML='';
  Promise.all([
    db.collection('distilleries').get(),
    db.collection('brands').get(),
    db.collection('bottles').get(),
    db.collection('bottleData').get(),
    db.collection('ammBottleDetails').get().catch(function(){return {docs:[]};})
  ]).then(function(res){
    rawDis=res[0].docs.map(function(d){return Object.assign({id:d.id},d.data());});
    rawBrands=res[1].docs.map(function(d){return Object.assign({id:d.id},d.data());});
    rawBottles=res[2].docs.map(function(d){return Object.assign({id:d.id},d.data());});
    rawBdata=res[3].docs.map(function(d){return Object.assign({id:d.id},d.data());});
    rawAmmBottle=res[4].docs.map(function(d){return Object.assign({id:d.id},d.data());});
    mergeAmmBottle(rawAmmBottle);
    msg.textContent='';
    buildTree(); buildColPanel(); renderTree();
    if(document.getElementById('audit-panel').style.display==='block') renderAudit();
  }).catch(function(e){ msg.textContent='読み込み失敗: '+e.message; });
}

// ammBottleDetails を突合済みボトルにマージ（読み取り専用の _amm* フィールド）
function mergeAmmBottle(ammDocs){
  var byBottle={};
  ammDocs.forEach(function(a){ if(a.matchedBottleId) byBottle[String(a.matchedBottleId)]=a; });
  rawBottles.forEach(function(b){
    var a=byBottle[String(b.id)];
    if(!a){
      b._ammMatched=b._ammAgaveType=b._ammCooking=b._ammExtraction=b._ammFermentation=
      b._ammDistillation=b._ammStill=b._ammAging=b._ammWaterSource=b._ammAbvProof=b._ammUrl='';
      return;
    }
    b._ammMatched=a.ammProductId||'✓';
    b._ammAgaveType=a.agaveType||'';
    b._ammCooking=a.cooking||'';
    b._ammExtraction=a.extraction||'';
    b._ammFermentation=a.fermentation||'';
    b._ammDistillation=a.distillation||'';
    b._ammStill=a.still||'';
    b._ammAging=a.aging||'';
    b._ammWaterSource=a.waterSource||'';
    b._ammAbvProof=a.abvProof||'';
    b._ammUrl=a.sourceUrl||'';
  });
}

// ── AMM製法 突合 ─────────────────────────────────────────────────────
function _mNorm(s){ return String(s||'').toLowerCase().replace(/tequila|100%|agave/g,'').replace(/[^a-z0-9]/g,''); }
var _ammMatchBottle=null;

function openAmmMatch(bottle){
  _ammMatchBottle=bottle;
  var nom=String(bottle.id).slice(0,4);
  var brand=rawBrands.filter(function(x){return x.id===String(bottle.brandId||String(bottle.id).slice(0,7));})[0];
  var brName=brand?(brand.brandEs||brand.brandJa||''):'';
  document.getElementById('amm-title').textContent='AMM製法の突合';
  document.getElementById('amm-sub').innerHTML='ボトル: <b>'+escH(bottle.bottleEs||bottle.bottleJa||bottle.id)+'</b>（'+escH(bottle.id)+'）<br>NOM '+escH(nom)+(brName?' / ブランド: '+escH(brName):'')+' の未突合の製品候補から選んでください。'
    +'<label style="display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11px;color:var(--ink3);cursor:pointer;"><input type="checkbox" id="amm-show-taken"> 他ボトルに突合確定済みも表示</label>';
  var nb=_mNorm(brName);
  var allCands=rawAmmBottle.filter(function(a){return String(a.nom)===nom;});
  allCands.sort(function(a,b){
    var sa=(nb&&_mNorm(a.brandName).indexOf(nb)>=0)?0:1;
    var sb=(nb&&_mNorm(b.brandName).indexOf(nb)>=0)?0:1;
    return sa-sb || String(a.productName||'').localeCompare(String(b.productName||''));
  });
  function renderCands(){
    var showTaken=document.getElementById('amm-show-taken').checked;
    var wrap=document.getElementById('amm-cand-list');
    if(!allCands.length){
      wrap.innerHTML='<div class="amm-none">NOM '+escH(nom)+' のAMM製品データがありません。<br>先に「AMMインポート」→「★ Algoliaから全製品を取込」を実行してください。</div>';
      return;
    }
    // 突合確定済み（他ボトルに紐付済み）は既定で除外。このボトル自身の突合は常に表示。
    var cands=allCands.filter(function(a){
      var takenOther=a.matchedBottleId&&String(a.matchedBottleId)!==String(bottle.id);
      return showTaken || !takenOther;
    });
    if(!cands.length){
      wrap.innerHTML='<div class="amm-none">未突合の候補がありません（NOM '+escH(nom)+' の製品は全て他ボトルへ突合確定済み）。<br>上の「他ボトルに突合確定済みも表示」で確認・付け替えできます。</div>';
      return;
    }
    wrap.innerHTML=cands.map(function(a){
      var taken=a.matchedBottleId&&String(a.matchedBottleId)!==String(bottle.id);
      var takenName='';
      if(taken){ var tb=rawBottles.filter(function(x){return x.id===String(a.matchedBottleId);})[0]; takenName=tb?(tb.bottleEs||tb.bottleJa||tb.id):a.matchedBottleId; }
      var checked=(String(a.matchedBottleId)===String(bottle.id))?' checked':'';
      return '<label class="amm-cand"><input type="radio" name="amm-cand" value="'+escH(a.ammProductId||a.id)+'"'+checked+'>'
        +'<span class="amm-cand-name">'+escH(a.productName||a.ammProductId||a.id)+'</span>'
        +'<div class="amm-cand-meta">'+escH(a.brandName||'')
        +(a.abvProof?' ・ '+escH(a.abvProof):'')
        +(a.aging?' ・熟成: '+escH(String(a.aging).split('\n')[0]):'')
        +(taken?' ・<span class="amm-cand-taken">既に「'+escH(takenName)+'」へ突合確定済</span>':'')
        +'</div></label>';
    }).join('');
  }
  document.getElementById('amm-show-taken').addEventListener('change', renderCands);
  renderCands();
  document.getElementById('amm-msg').textContent='';
  document.getElementById('amm-btn-clear').style.display=bottle._ammMatched?'':'none';
  document.getElementById('amm-modal').classList.add('open');
}
function closeAmmMatch(){ document.getElementById('amm-modal').classList.remove('open'); _ammMatchBottle=null; }

function doAmmMatch(){
  if(!_ammMatchBottle) return;
  var sel=document.querySelector('input[name="amm-cand"]:checked');
  if(!sel){ document.getElementById('amm-msg').textContent='製品を選択してください'; return; }
  var pid=sel.value;
  var a=rawAmmBottle.filter(function(x){return String(x.ammProductId||x.id)===String(pid);})[0];
  if(!a) return;
  var bottle=_ammMatchBottle;
  document.getElementById('amm-msg').textContent='保存中...';
  var ops=[];
  // このボトルに紐付いていた別のAMM製品を解除
  rawAmmBottle.forEach(function(x){
    if(String(x.matchedBottleId)===String(bottle.id)&&String(x.ammProductId||x.id)!==String(pid)){
      ops.push(db.collection('ammBottleDetails').doc(String(x.id)).set({matchedBottleId:''},{merge:true}).then(function(){ x.matchedBottleId=''; }));
    }
  });
  ops.push(db.collection('ammBottleDetails').doc(String(a.id)).set({matchedBottleId:String(bottle.id)},{merge:true}).then(function(){ a.matchedBottleId=String(bottle.id); }));
  ops.push(db.collection('bottles').doc(String(bottle.id)).set({ammProductId:String(pid),ammUrl:a.sourceUrl||''},{merge:true}).then(function(){ bottle.ammProductId=String(pid); bottle.ammUrl=a.sourceUrl||''; }));
  Promise.all(ops).then(function(){ mergeAmmBottle(rawAmmBottle); renderTree(); closeAmmMatch(); })
    .catch(function(e){ document.getElementById('amm-msg').textContent='保存失敗: '+e.message; });
}

function doAmmClear(){
  if(!_ammMatchBottle) return;
  var bottle=_ammMatchBottle;
  document.getElementById('amm-msg').textContent='解除中...';
  var ops=[];
  rawAmmBottle.forEach(function(x){
    if(String(x.matchedBottleId)===String(bottle.id)){
      ops.push(db.collection('ammBottleDetails').doc(String(x.id)).set({matchedBottleId:''},{merge:true}).then(function(){ x.matchedBottleId=''; }));
    }
  });
  ops.push(db.collection('bottles').doc(String(bottle.id)).set({ammProductId:'',ammUrl:''},{merge:true}).then(function(){ bottle.ammProductId=''; bottle.ammUrl=''; }));
  Promise.all(ops).then(function(){ mergeAmmBottle(rawAmmBottle); renderTree(); closeAmmMatch(); })
    .catch(function(e){ document.getElementById('amm-msg').textContent='解除失敗: '+e.message; });
}
