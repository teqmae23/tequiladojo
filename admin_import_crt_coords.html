<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>CRT座標インポート</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;font-size:13px;background:#faf9f6;color:#3a2e20;padding:20px}
h1{font-size:18px;margin-bottom:16px}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px}
.btn-primary{background:#c8860a;color:#fff}
.btn-secondary{background:#e8e0d4;color:#3a2e20}
.status{margin:12px 0;padding:10px;border-radius:6px;font-size:12px}
.status.info{background:#e8f4fd;border:1px solid #90caf9}
.status.ok{background:#e8f5e9;border:1px solid #a5d6a7}
.status.err{background:#ffebee;border:1px solid #ef9a9a}
table{width:100%;border-collapse:collapse;margin-top:12px;font-size:12px}
th,td{border:1px solid #ddd;padding:5px 8px;text-align:left}
th{background:#f0ebe0;font-weight:600}
tr.update{background:#fff8e1}
tr.create{background:#e3f2fd}
tr.same{background:#fff;color:#aaa}
tr.done{background:#e8f5e9}
.controls{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
#log{max-height:200px;overflow-y:auto;font-size:11px;font-family:monospace;background:#1a1a1a;color:#ccc;padding:10px;border-radius:6px;margin-top:12px}
.legend{display:flex;gap:16px;font-size:11px;margin-bottom:8px}
.legend span{padding:2px 8px;border-radius:3px}
</style>
</head>
<body>
<h1>CRT座標インポート（fabricas → Firestore）</h1>

<div class="controls">
  <button class="btn btn-primary" id="btn-load">① データ読み込み</button>
  <button class="btn btn-secondary" id="btn-import" disabled>② Firestoreに一括書き込み</button>
  <span id="summary"></span>
</div>
<div class="legend">
  <span style="background:#fff8e1;border:1px solid #ddd">🟡 更新</span>
  <span style="background:#e3f2fd;border:1px solid #ddd">🔵 新規作成</span>
  <span style="background:#fff;border:1px solid #ddd;color:#aaa">⬜ 変化なし</span>
</div>

<div id="status-area"></div>
<div id="table-area"></div>
<div id="log"></div>

<script>
var FIREBASE_CONFIG = {
  apiKey:            "AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain:        "tequiladojo.firebaseapp.com",
  projectId:         "tequiladojo",
  storageBucket:     "tequiladojo.firebasestorage.app",
  messagingSenderId: "56663296233",
  appId:             "1:56663296233:web:c8cac2fcbeb4faa09e0878",
};
if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
var fsDb = firebase.firestore();

var DB_URL = "https://raw.githubusercontent.com/teqmae23/tequiladojo/main/data/crt_stats.db";
var planRows = []; // {fab, docId|null, action:'update'|'create'|'same', currentCrtLat, currentCrtLng}

function log(msg) {
  var el = document.getElementById("log");
  el.textContent += msg + "\n";
  el.scrollTop = el.scrollHeight;
}
function setStatus(msg, cls) {
  document.getElementById("status-area").innerHTML = '<div class="status '+cls+'">'+msg+'</div>';
}

document.getElementById("btn-load").addEventListener("click", async function() {
  setStatus("読み込み中…", "info");
  log("=== 開始 ===");
  planRows = [];

  var SQL;
  try {
    SQL = await initSqlJs({ locateFile: function(f){ return "https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/"+f; } });
  } catch(e) { setStatus("sql.js 読み込みエラー: "+e,"err"); return; }

  log("SQLite DB 取得中: "+DB_URL);
  var resp;
  try { resp = await fetch(DB_URL); } catch(e) { setStatus("DB取得エラー: "+e,"err"); return; }
  if(!resp.ok){ setStatus("DB取得失敗: HTTP "+resp.status,"err"); return; }
  var buf = await resp.arrayBuffer();
  var sqlDb = new SQL.Database(new Uint8Array(buf));

  var fabricas = [];
  var res = sqlDb.exec("SELECT NOM, Fabricas, EstadoMunicipio, Latitud, Longitud FROM fabricas WHERE CAST(NOM AS INTEGER) >= 1000 ORDER BY CAST(NOM AS INTEGER)");
  if(res.length) {
    res[0].values.forEach(function(row){
      fabricas.push({ nom: String(row[0]), empresa: String(row[1]), estado: String(row[2]), lat: parseFloat(row[3]), lng: parseFloat(row[4]) });
    });
  }
  log("fabricas (NOM≥1000): "+fabricas.length+" 件");

  log("Firestore distilleries 取得中…");
  var snap;
  try { snap = await fsDb.collection("distilleries").get(); } catch(e){ setStatus("Firestore エラー: "+e,"err"); return; }
  log("Firestore distilleries: "+snap.size+" 件");

  // Build Firestore NOM index from crtDot field
  var fsNomIndex = {}; // nomNum -> {docId, crtLatitude, crtLongitude}
  snap.forEach(function(doc){
    var r = doc.data();
    var dot = String(r.crtDot || "");
    var m = dot.match(/NOM-(\d+)/i);
    if(m) fsNomIndex[m[1]] = { docId: doc.id, crtLatitude: r.crtLatitude, crtLongitude: r.crtLongitude };
  });
  log("FirestoreでcrtDot設定済み: "+Object.keys(fsNomIndex).length+" 件");

  var cntUpdate=0, cntCreate=0, cntSame=0;
  fabricas.forEach(function(fab){
    var existing = fsNomIndex[fab.nom];
    if(existing) {
      var ld = existing.crtLatitude!=null ? Math.abs(existing.crtLatitude-fab.lat) : 1;
      var lgd = existing.crtLongitude!=null ? Math.abs(existing.crtLongitude-fab.lng) : 1;
      var changed = ld>0.000001 || lgd>0.000001;
      planRows.push({ fab:fab, docId:existing.docId, action:changed?'update':'same', currentCrtLat:existing.crtLatitude, currentCrtLng:existing.crtLongitude });
      if(changed) cntUpdate++; else cntSame++;
    } else {
      planRows.push({ fab:fab, docId:null, action:'create', currentCrtLat:null, currentCrtLng:null });
      cntCreate++;
    }
  });

  document.getElementById("summary").textContent = "更新: "+cntUpdate+"件 / 新規作成: "+cntCreate+"件 / 変化なし: "+cntSame+"件";
  log("更新: "+cntUpdate+", 新規: "+cntCreate+", 同じ: "+cntSame);

  var html = '<table><thead><tr><th>NOM</th><th>CRT会社名</th><th>所在地</th><th>現在CRT緯度</th><th>現在CRT経度</th><th>新CRT緯度</th><th>新CRT経度</th><th>アクション</th></tr></thead><tbody>';
  planRows.forEach(function(p){
    if(p.action==='same') return;
    var cls = p.action==='create'?'create':'update';
    var label = p.action==='create'?'🔵 新規':'🟡 更新';
    html += '<tr class="'+cls+'"><td>'+p.fab.nom+'</td><td>'+p.fab.empresa+'</td><td>'+p.fab.estado+'</td>';
    html += '<td>'+(p.currentCrtLat!=null?p.currentCrtLat:'―')+'</td><td>'+(p.currentCrtLng!=null?p.currentCrtLng:'―')+'</td>';
    html += '<td>'+p.fab.lat+'</td><td>'+p.fab.lng+'</td><td>'+label+'</td></tr>';
  });
  html += '</tbody></table>';
  document.getElementById("table-area").innerHTML = html;

  setStatus("読み込み完了。更新 "+cntUpdate+"件 + 新規 "+cntCreate+"件 = 合計 "+(cntUpdate+cntCreate)+"件を書き込みます。", "ok");
  document.getElementById("btn-import").disabled = (cntUpdate+cntCreate===0);
});

document.getElementById("btn-import").addEventListener("click", async function() {
  var toWrite = planRows.filter(function(p){ return p.action!=='same'; });
  if(!toWrite.length){ setStatus("書き込み対象なし","info"); return; }

  this.disabled = true;
  log("=== Firestore 書き込み開始: "+toWrite.length+" 件 ===");
  setStatus("書き込み中… 0/"+toWrite.length, "info");

  var batch = fsDb.batch();
  var count = 0;
  var done = 0;
  for(var i=0; i<toWrite.length; i++) {
    var p = toWrite[i];
    if(p.action==='update') {
      batch.update(fsDb.collection("distilleries").doc(p.docId), {
        crtLatitude: p.fab.lat,
        crtLongitude: p.fab.lng,
      });
    } else {
      // 新規作成: NOMをドキュメントIDとして使用
      var newRef = fsDb.collection("distilleries").doc("NOM"+p.fab.nom);
      batch.set(newRef, {
        nom: "NOM"+p.fab.nom,
        crtDot: "NOM-"+p.fab.nom,
        crtEmpresa: p.fab.empresa,
        crtDireccion: p.fab.estado,
        crtLatitude: p.fab.lat,
        crtLongitude: p.fab.lng,
      }, { merge: true });
    }
    count++; done++;
    if(count===500 || i===toWrite.length-1) {
      try {
        await batch.commit();
        log("  バッチコミット: "+count+"件 (累計"+done+")");
        setStatus("書き込み中… "+done+"/"+toWrite.length, "info");
        batch = fsDb.batch();
        count = 0;
      } catch(e) {
        setStatus("書き込みエラー: "+e, "err");
        log("ERROR: "+e);
        document.getElementById("btn-import").disabled = false;
        return;
      }
    }
  }

  log("=== 完了 ===");
  setStatus("✅ "+toWrite.length+" 件をFirestoreに書き込みました（更新+新規作成）", "ok");
  document.querySelectorAll("table tbody tr").forEach(function(tr){ tr.className="done"; });
});
</script>
</body>
</html>
