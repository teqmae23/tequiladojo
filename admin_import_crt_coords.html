<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>CRT座標インポート</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;font-size:13px;background:#faf9f6;color:#3a2e20;padding:20px}
h1{font-size:18px;margin-bottom:16px}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px}
.btn-primary{background:#c8860a;color:#fff}
.btn-secondary{background:#e8e0d4;color:#3a2e20}
.status{margin:12px 0;padding:10px;border-radius:6px;font-size:12px}
.status.info{background:#e8f4fd;border:1px solid #90caf9}
.status.ok{background:#e8f5e9;border:1px solid #a5d6a7}
.status.err{background:#ffebee;border:1px solid #ef9a9a}
table{width:100%;border-collapse:collapse;margin-top:12px;font-size:12px}
th,td{border:1px solid #ddd;padding:5px 8px;text-align:left;white-space:nowrap}
th{background:#f0ebe0;font-weight:600;cursor:pointer;user-select:none}
th:hover{background:#e0d8c8}
th .sort-icon{margin-left:4px;font-size:10px;opacity:0.5}
th.sort-asc .sort-icon::after{content:'▲';opacity:1}
th.sort-desc .sort-icon::after{content:'▼';opacity:1}
th:not(.sort-asc):not(.sort-desc) .sort-icon::after{content:'⇅'}
tr.register{background:#e8f5e9}
tr.update{background:#fff8e1}
tr.create{background:#e3f2fd}
tr.same{background:#fff;color:#aaa}
tr.done{background:#c8e6c9}
.controls{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
#log{max-height:200px;overflow-y:auto;font-size:11px;font-family:monospace;background:#1a1a1a;color:#ccc;padding:10px;border-radius:6px;margin-top:12px}
.legend{display:flex;gap:12px;font-size:11px;margin-bottom:8px;flex-wrap:wrap}
.legend span{padding:2px 8px;border-radius:3px;border:1px solid #ddd}
.diff-big{color:#d32f2f;font-weight:600}
.loc-mismatch{color:#d32f2f;font-weight:600}
td.diff{font-size:11px;color:#666}
</style>
</head>
<body>
<h1>CRT座標インポート（fabricas → Firestore）</h1>

<div class="controls">
  <button class="btn btn-primary" id="btn-load">① データ読み込み</button>
  <button class="btn btn-secondary" id="btn-import" disabled>② Firestoreに一括書き込み</button>
  <button class="btn btn-secondary" id="btn-check-all" style="display:none">全選択</button>
  <button class="btn btn-secondary" id="btn-uncheck-all" style="display:none">全解除</button>
  <span id="summary"></span>
</div>
<div class="legend">
  <span style="background:#e8f5e9">🟢 登録（レコードあり・CRT未設定）</span>
  <span style="background:#fff8e1">🟡 更新（レコードあり・CRT変化あり）</span>
  <span style="background:#e3f2fd">🔵 新規（レコードなし）</span>
  <span style="background:#fff;color:#aaa">⬜ 変化なし</span>
</div>

<div id="status-area"></div>
<div id="table-area" style="overflow-x:auto"></div>
<div id="log"></div>

<script>
var FIREBASE_CONFIG = {
  apiKey:            "AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain:        "tequiladojo.firebaseapp.com",
  projectId:         "tequiladojo",
  storageBucket:     "tequiladojo.firebasestorage.app",
  messagingSenderId: "56663296233",
  appId:             "1:56663296233:web:c8cac2fcbeb4faa09e0878",
};
if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
var fsDb = firebase.firestore();

var DB_URL = "https://raw.githubusercontent.com/teqmae23/tequiladojo/main/data/crt_stats.db";
var planRows = [];
var sortCol = null, sortDir = 1;

// Column definitions: key for planRows, label, value extractor
var COLS = [
  { key:'nom',           label:'NOM',          val:function(p){ return parseInt(p.fab.nom); } },
  { key:'empresa',       label:'CRT会社名',     val:function(p){ return p.fab.empresa; } },
  { key:'crtEstado',     label:'CRT所在地',     val:function(p){ return p.fab.estado; } },
  { key:'masterDireccion',label:'マスタ所在地', val:function(p){ return p.masterDireccion||''; } },
  { key:'masterLat',     label:'マスタ緯度',    val:function(p){ return p.masterLat; } },
  { key:'masterLng',     label:'マスタ経度',    val:function(p){ return p.masterLng; } },
  { key:'currentCrtLat', label:'現在CRT緯度',   val:function(p){ return p.currentCrtLat; } },
  { key:'currentCrtLng', label:'現在CRT経度',   val:function(p){ return p.currentCrtLng; } },
  { key:'newCrtLat',     label:'新CRT緯度',     val:function(p){ return p.fab.lat; } },
  { key:'newCrtLng',     label:'新CRT経度',     val:function(p){ return p.fab.lng; } },
  { key:'diffLat',       label:'緯度差分',      val:function(p){ return p.fab.lat!=null&&p.masterLat!=null?p.fab.lat-p.masterLat:null; } },
  { key:'diffLng',       label:'経度差分',      val:function(p){ return p.fab.lng!=null&&p.masterLng!=null?p.fab.lng-p.masterLng:null; } },
  { key:'action',        label:'アクション',    val:function(p){ return p.action; } },
];

function log(msg) {
  var el = document.getElementById("log");
  el.textContent += msg + "\n";
  el.scrollTop = el.scrollHeight;
}
function setStatus(msg, cls) {
  document.getElementById("status-area").innerHTML = '<div class="status '+cls+'">'+msg+'</div>';
}
function fmt(v) { return v != null ? Number(v).toFixed(5) : '―'; }
function fmtDiff(d) {
  if(d == null) return '―';
  var s = (d >= 0 ? '+' : '') + d.toFixed(5);
  return Math.abs(d) >= 0.1 ? '<span class="diff-big">'+s+'</span>' : '<span style="color:#666;font-size:11px">'+s+'</span>';
}

function renderTable() {
  var rows = planRows.slice();
  if(sortCol !== null) {
    var fn = COLS[sortCol].val;
    rows.sort(function(a, b){
      var av = fn(a), bv = fn(b);
      if(av == null) return sortDir;
      if(bv == null) return -sortDir;
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });
  }

  var actionLabel = { register:'🟢 登録', update:'🟡 更新', create:'🔵 新規', same:'⬜ 変化なし' };

  var html = '<table id="main-table"><thead><tr><th data-col="-1"><input type="checkbox" id="chk-header" checked></th>';
  COLS.forEach(function(c, i){
    var cls = sortCol===i ? (sortDir===1?'sort-asc':'sort-desc') : '';
    html += '<th class="'+cls+'" data-col="'+i+'">'+c.label+'<span class="sort-icon"></span></th>';
  });
  html += '</tr></thead><tbody>';

  rows.forEach(function(p){
    var origIdx = planRows.indexOf(p);
    var cls = p.action;
    var chk = p.action !== 'same' ? ' checked' : '';
    var dis = p.action === 'same' ? ' disabled' : '';

    // Location comparison: city part of CRT estado (before comma) vs master locationName
    var crtCity = p.fab.estado.split(',')[0].trim().toUpperCase();
    var masterLoc = (p.masterDireccion || '').toUpperCase().trim();
    var locMismatch = masterLoc && crtCity !== masterLoc;
    var locCls = locMismatch ? ' class="loc-mismatch"' : '';

    // Diff values
    var diffLat = (p.fab.lat != null && p.masterLat != null) ? p.fab.lat - p.masterLat : null;
    var diffLng = (p.fab.lng != null && p.masterLng != null) ? p.fab.lng - p.masterLng : null;

    html += '<tr class="'+cls+'" id="row-'+origIdx+'">'
      +'<td><input type="checkbox" class="row-chk" data-idx="'+origIdx+'"'+chk+dis+'></td>'
      +'<td>'+p.fab.nom+'</td>'
      +'<td>'+p.fab.empresa+'</td>'
      +'<td'+locCls+'>'+p.fab.estado+'</td>'
      +'<td'+locCls+'>'+(p.masterDireccion||'―')+'</td>'
      +'<td>'+fmt(p.masterLat)+'</td><td>'+fmt(p.masterLng)+'</td>'
      +'<td>'+fmt(p.currentCrtLat)+'</td><td>'+fmt(p.currentCrtLng)+'</td>'
      +'<td>'+p.fab.lat+'</td><td>'+p.fab.lng+'</td>'
      +'<td>'+fmtDiff(diffLat)+'</td>'
      +'<td>'+fmtDiff(diffLng)+'</td>'
      +'<td>'+actionLabel[p.action]+'</td>'
      +'</tr>';
  });
  html += '</tbody></table>';
  document.getElementById("table-area").innerHTML = html;

  // Sort click
  document.querySelectorAll("#main-table thead th[data-col]").forEach(function(th){
    th.addEventListener("click", function(e){
      if(e.target.type==='checkbox') return;
      var c = parseInt(this.dataset.col);
      if(c < 0) return;
      if(sortCol === c) sortDir = -sortDir;
      else { sortCol = c; sortDir = 1; }
      renderTable();
    });
  });

  // Header checkbox
  var hdr = document.getElementById("chk-header");
  if(hdr) hdr.addEventListener("change", function(){
    var v = this.checked;
    document.querySelectorAll(".row-chk:not(:disabled)").forEach(function(c){ c.checked=v; });
  });
}

document.getElementById("btn-load").addEventListener("click", async function() {
  setStatus("読み込み中…", "info");
  log("=== 開始 ===");
  planRows = []; sortCol = null; sortDir = 1;

  var SQL;
  try {
    SQL = await initSqlJs({ locateFile: function(f){ return "https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/"+f; } });
  } catch(e) { setStatus("sql.js 読み込みエラー: "+e,"err"); return; }

  log("SQLite DB 取得中: "+DB_URL);
  var resp;
  try { resp = await fetch(DB_URL); } catch(e) { setStatus("DB取得エラー: "+e,"err"); return; }
  if(!resp.ok){ setStatus("DB取得失敗: HTTP "+resp.status,"err"); return; }
  var buf = await resp.arrayBuffer();
  var sqlDb = new SQL.Database(new Uint8Array(buf));

  var fabricas = [];
  var res = sqlDb.exec("SELECT NOM, Fabricas, EstadoMunicipio, Latitud, Longitud FROM fabricas WHERE CAST(NOM AS INTEGER) >= 1000 ORDER BY CAST(NOM AS INTEGER)");
  if(res.length) {
    res[0].values.forEach(function(row){
      fabricas.push({ nom: String(parseInt(String(row[0]),10)), empresa: String(row[1]), estado: String(row[2]), lat: parseFloat(row[3]), lng: parseFloat(row[4]) });
    });
  }
  log("fabricas (NOM≥1000): "+fabricas.length+" 件");

  log("Firestore locations 取得中…");
  var locSnap;
  try { locSnap = await fsDb.collection("locations").get(); } catch(e){ setStatus("Firestore locations エラー: "+e,"err"); return; }
  var locMap = {};
  locSnap.forEach(function(doc){ locMap[doc.id] = doc.data().locationName || doc.id; });
  log("locations: "+locSnap.size+" 件");

  log("Firestore distilleries 取得中…");
  var snap;
  try { snap = await fsDb.collection("distilleries").get(); } catch(e){ setStatus("Firestore エラー: "+e,"err"); return; }
  log("Firestore distilleries: "+snap.size+" 件");

  var fsNomIndex = {};
  snap.forEach(function(doc){
    var r = doc.data();
    var nomKey = String(parseInt(doc.id, 10));
    if(!isNaN(nomKey)) fsNomIndex[nomKey] = {
      docId: doc.id,
      masterLat: r.latitude != null ? parseFloat(r.latitude) : null,
      masterLng: r.longitude != null ? parseFloat(r.longitude) : null,
      crtLat: r.crtLatitude != null ? parseFloat(r.crtLatitude) : null,
      crtLng: r.crtLongitude != null ? parseFloat(r.crtLongitude) : null,
      masterDireccion: r.locationId ? (locMap[r.locationId] || r.locationId) : null,
    };
  });
  log("Firestoreインデックス構築: "+Object.keys(fsNomIndex).length+" 件");

  var cntRegister=0, cntUpdate=0, cntCreate=0, cntSame=0;
  fabricas.forEach(function(fab){
    var existing = fsNomIndex[fab.nom];
    var action, docId=null, masterLat=null, masterLng=null, currentCrtLat=null, currentCrtLng=null, masterDireccion=null;
    if(existing) {
      docId = existing.docId;
      masterLat = existing.masterLat;
      masterLng = existing.masterLng;
      currentCrtLat = existing.crtLat;
      currentCrtLng = existing.crtLng;
      masterDireccion = existing.masterDireccion;
      if(currentCrtLat == null && currentCrtLng == null) {
        action = 'register'; cntRegister++;
      } else {
        var ld = Math.abs(currentCrtLat - fab.lat);
        var lgd = Math.abs(currentCrtLng - fab.lng);
        action = (ld > 0.000001 || lgd > 0.000001) ? 'update' : 'same';
        if(action==='update') cntUpdate++; else cntSame++;
      }
    } else {
      action = 'create'; cntCreate++;
    }
    planRows.push({ fab, docId, action, masterLat, masterLng, currentCrtLat, currentCrtLng, masterDireccion });
  });

  document.getElementById("summary").textContent =
    "登録: "+cntRegister+"件 / 更新: "+cntUpdate+"件 / 新規: "+cntCreate+"件 / 変化なし: "+cntSame+"件";
  log("登録: "+cntRegister+", 更新: "+cntUpdate+", 新規: "+cntCreate+", 同じ: "+cntSame);

  renderTable();
  setStatus("読み込み完了。", "ok");
  document.getElementById("btn-import").disabled = false;
  document.getElementById("btn-check-all").style.display = "";
  document.getElementById("btn-uncheck-all").style.display = "";
});

document.getElementById("btn-check-all").addEventListener("click", function(){
  document.querySelectorAll(".row-chk:not(:disabled)").forEach(function(c){ c.checked=true; });
});
document.getElementById("btn-uncheck-all").addEventListener("click", function(){
  document.querySelectorAll(".row-chk:not(:disabled)").forEach(function(c){ c.checked=false; });
});

document.getElementById("btn-import").addEventListener("click", async function() {
  var toWrite = [];
  document.querySelectorAll(".row-chk:checked:not(:disabled)").forEach(function(c){
    toWrite.push(planRows[parseInt(c.dataset.idx)]);
  });
  if(!toWrite.length){ setStatus("書き込み対象なし（チェックなし）","info"); return; }

  this.disabled = true;
  log("=== Firestore 書き込み開始: "+toWrite.length+" 件 ===");
  setStatus("書き込み中… 0/"+toWrite.length, "info");

  var batch = fsDb.batch();
  var count = 0, done = 0;
  for(var i=0; i<toWrite.length; i++) {
    var p = toWrite[i];
    if(p.action==='update' || p.action==='register') {
      batch.update(fsDb.collection("distilleries").doc(p.docId), {
        crtLatitude: p.fab.lat,
        crtLongitude: p.fab.lng,
      });
    } else {
      var newRef = fsDb.collection("distilleries").doc(p.fab.nom);
      batch.set(newRef, {
        nom: p.fab.nom,
        crtEmpresa: p.fab.empresa,
        crtDireccion: p.fab.estado,
        crtLatitude: p.fab.lat,
        crtLongitude: p.fab.lng,
      }, { merge: true });
    }
    count++; done++;
    if(count===500 || i===toWrite.length-1) {
      try {
        await batch.commit();
        log("  バッチコミット: "+count+"件 (累計"+done+")");
        setStatus("書き込み中… "+done+"/"+toWrite.length, "info");
        batch = fsDb.batch();
        count = 0;
      } catch(e) {
        setStatus("書き込みエラー: "+e, "err");
        log("ERROR: "+e);
        document.getElementById("btn-import").disabled = false;
        return;
      }
    }
  }

  log("=== 完了 ===");
  setStatus("✅ "+toWrite.length+" 件をFirestoreに書き込みました", "ok");
  document.querySelectorAll(".row-chk:checked:not(:disabled)").forEach(function(c){
    var row = document.getElementById("row-"+c.dataset.idx);
    if(row) row.className = "done";
  });
  document.getElementById("btn-import").disabled = false;
});
</script>
</body>
</html>
