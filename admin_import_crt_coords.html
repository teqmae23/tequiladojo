<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>CRT座標インポート</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;font-size:13px;background:#faf9f6;color:#3a2e20;padding:20px}
h1{font-size:18px;margin-bottom:16px}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px}
.btn-primary{background:#c8860a;color:#fff}
.btn-secondary{background:#e8e0d4;color:#3a2e20}
.status{margin:12px 0;padding:10px;border-radius:6px;font-size:12px}
.status.info{background:#e8f4fd;border:1px solid #90caf9}
.status.ok{background:#e8f5e9;border:1px solid #a5d6a7}
.status.err{background:#ffebee;border:1px solid #ef9a9a}
table{width:100%;border-collapse:collapse;margin-top:12px;font-size:12px}
th,td{border:1px solid #ddd;padding:5px 8px;text-align:left}
th{background:#f0ebe0;font-weight:600}
tr.match{background:#fff}
tr.mismatch{background:#fff8e1}
tr.no-match{background:#f5f5f5;color:#999}
tr.updated{background:#e8f5e9}
.controls{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
#log{max-height:200px;overflow-y:auto;font-size:11px;font-family:monospace;background:#1a1a1a;color:#ccc;padding:10px;border-radius:6px;margin-top:12px}
</style>
</head>
<body>
<h1>CRT座標インポート（fabricas → Firestore）</h1>

<div class="controls">
  <button class="btn btn-primary" id="btn-load">① データ読み込み</button>
  <button class="btn btn-secondary" id="btn-import" disabled>② Firestoreに一括書き込み</button>
  <span id="summary"></span>
</div>

<div id="status-area"></div>
<div id="table-area"></div>
<div id="log"></div>

<script>
var FIREBASE_CONFIG = {
  apiKey:            "AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain:        "tequiladojo.firebaseapp.com",
  projectId:         "tequiladojo",
  storageBucket:     "tequiladojo.firebasestorage.app",
  messagingSenderId: "56663296233",
  appId:             "1:56663296233:web:c8cac2fcbeb4faa09e0878",
};
if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
var db = firebase.firestore();

var DB_URL = "https://raw.githubusercontent.com/teqmae23/tequiladojo/main/data/crt_stats.db";
var matchRows = [];

function log(msg) {
  var el = document.getElementById("log");
  el.textContent += msg + "\n";
  el.scrollTop = el.scrollHeight;
}
function setStatus(msg, cls) {
  document.getElementById("status-area").innerHTML = '<div class="status '+cls+'">'+msg+'</div>';
}

document.getElementById("btn-load").addEventListener("click", async function() {
  setStatus("読み込み中…", "info");
  log("=== 開始 ===");

  // Load sql.js
  var SQL;
  try {
    SQL = await initSqlJs({ locateFile: function(f){ return "https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/"+f; } });
  } catch(e) { setStatus("sql.js 読み込みエラー: "+e, "err"); return; }

  // Fetch SQLite DB
  log("SQLite DB 取得中: "+DB_URL);
  var resp;
  try { resp = await fetch(DB_URL); } catch(e) { setStatus("DB取得エラー: "+e,"err"); return; }
  if(!resp.ok){ setStatus("DB取得失敗: HTTP "+resp.status,"err"); return; }
  var buf = await resp.arrayBuffer();
  var sqlDb = new SQL.Database(new Uint8Array(buf));

  // Query fabricas (NOM >= 1000 only — actual distilleries)
  var fabricasMap = {};
  var res = sqlDb.exec("SELECT NOM, Fabricas, EstadoMunicipio, Latitud, Longitud FROM fabricas WHERE CAST(NOM AS INTEGER) >= 1000");
  if(res.length) {
    res[0].values.forEach(function(row){
      fabricasMap[String(row[0])] = { nom: row[0], empresa: row[1], estado: row[2], lat: parseFloat(row[3]), lng: parseFloat(row[4]) };
    });
  }
  log("fabricas (NOM≥1000): "+Object.keys(fabricasMap).length+" 件");

  // Load Firestore distilleries
  log("Firestore distilleries 取得中…");
  var snap;
  try { snap = await db.collection("distilleries").get(); } catch(e){ setStatus("Firestore エラー: "+e,"err"); return; }
  log("Firestore distilleries: "+snap.size+" 件");

  // Match
  matchRows = [];
  snap.forEach(function(doc){
    var r = doc.data();
    var dot = String(r.crtDot || "");
    // Extract NOM number from "NOM-XXXX-..." format
    var m = dot.match(/NOM-(\d+)/i);
    var nomNum = m ? m[1] : null;
    var fab = nomNum ? fabricasMap[nomNum] : null;
    matchRows.push({
      docId: doc.id,
      name: r.nom || doc.id,
      crtDot: dot,
      nomNum: nomNum,
      currentLat: r.latitude,
      currentLng: r.longitude,
      currentCrtLat: r.crtLatitude,
      currentCrtLng: r.crtLongitude,
      fab: fab,
    });
  });

  var matched = matchRows.filter(function(r){ return r.fab; });
  var unmatched = matchRows.filter(function(r){ return r.nomNum && !r.fab; });
  var noDot = matchRows.filter(function(r){ return !r.nomNum; });

  document.getElementById("summary").textContent =
    "マッチ: "+matched.length+" 件 / DOTあり未マッチ: "+unmatched.length+" 件 / DOTなし: "+noDot.length+" 件";
  log("マッチ: "+matched.length+", 未マッチ: "+unmatched.length+", DOTなし: "+noDot.length);

  // Render table
  var html = '<table><thead><tr><th>蒸留所</th><th>NOM</th><th>CRT会社名</th><th>現在CRT緯度</th><th>現在CRT経度</th><th>新CRT緯度</th><th>新CRT経度</th><th>変化</th></tr></thead><tbody>';
  matchRows.forEach(function(r){
    if(!r.fab){ return; } // only show matched rows
    var latDiff = r.currentCrtLat != null ? Math.abs(r.currentCrtLat - r.fab.lat) : null;
    var lngDiff = r.currentCrtLng != null ? Math.abs(r.currentCrtLng - r.fab.lng) : null;
    var changed = latDiff == null || latDiff > 0.000001 || lngDiff == null || lngDiff > 0.000001;
    var cls = changed ? "mismatch" : "match";
    html += '<tr class="'+cls+'"><td>'+r.name+'</td><td>'+r.nomNum+'</td><td>'+r.fab.empresa+'</td>';
    html += '<td>'+(r.currentCrtLat!=null?r.currentCrtLat:"―")+'</td><td>'+(r.currentCrtLng!=null?r.currentCrtLng:"―")+'</td>';
    html += '<td>'+r.fab.lat+'</td><td>'+r.fab.lng+'</td>';
    html += '<td>'+(changed?"✏️ 更新":"✓ 同じ")+'</td></tr>';
  });
  html += '</tbody></table>';
  document.getElementById("table-area").innerHTML = html;

  setStatus("読み込み完了。黄色行が更新対象です（"+matched.filter(function(r){ var ld=r.currentCrtLat!=null?Math.abs(r.currentCrtLat-r.fab.lat):1; var lgd=r.currentCrtLng!=null?Math.abs(r.currentCrtLng-r.fab.lng):1; return ld>0.000001||lgd>0.000001; }).length+" 件）", "ok");
  document.getElementById("btn-import").disabled = false;
});

document.getElementById("btn-import").addEventListener("click", async function() {
  var toUpdate = matchRows.filter(function(r){
    if(!r.fab) return false;
    var ld = r.currentCrtLat!=null ? Math.abs(r.currentCrtLat-r.fab.lat) : 1;
    var lgd = r.currentCrtLng!=null ? Math.abs(r.currentCrtLng-r.fab.lng) : 1;
    return ld>0.000001 || lgd>0.000001;
  });
  if(!toUpdate.length){ setStatus("更新対象なし","info"); return; }

  this.disabled = true;
  log("=== Firestore 書き込み開始: "+toUpdate.length+" 件 ===");
  setStatus("書き込み中… 0/"+toUpdate.length, "info");

  var batch = db.batch();
  var count = 0;
  for(var i=0; i<toUpdate.length; i++) {
    var r = toUpdate[i];
    batch.update(db.collection("distilleries").doc(r.docId), {
      crtLatitude: r.fab.lat,
      crtLongitude: r.fab.lng,
    });
    count++;
    if(count === 500 || i === toUpdate.length-1) {
      try {
        await batch.commit();
        log("  バッチコミット: "+count+"件");
        setStatus("書き込み中… "+(i+1)+"/"+toUpdate.length, "info");
        batch = db.batch();
        count = 0;
      } catch(e) {
        setStatus("書き込みエラー: "+e, "err");
        log("ERROR: "+e);
        document.getElementById("btn-import").disabled = false;
        return;
      }
    }
  }

  log("=== 完了 ===");
  setStatus("✅ "+toUpdate.length+" 件のcrtLatitude/crtLongitudeをFirestoreに書き込みました", "ok");
  // Refresh table rows color
  document.querySelectorAll("table tbody tr").forEach(function(tr){ tr.className="updated"; });
});
</script>
</body>
</html>
