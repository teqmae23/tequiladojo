<style>
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --teal:#1a6e58;--teal-l:#e0f0eb;
  --red:#8c2818;--red-l:#fae8e4;
  --cream:#faf7f1;--cream2:#f0ebe0;--cream3:#e4ddd0;--white:#fff;
  --border:rgba(160,130,100,.18);--border2:rgba(160,130,100,.32);
  --shadow:0 1px 12px rgba(24,17,10,.07);--shadow-lg:0 6px 36px rgba(24,17,10,.13);
  --r:8px;--rl:14px;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Noto Sans JP',sans-serif;
  --mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh;-webkit-tap-highlight-color:transparent}
button{cursor:pointer;font-family:var(--sans);border:none}
input{font-family:var(--sans)}

#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse 80% 60% at 30% 60%,rgba(200,146,30,.07),transparent),var(--cream)}
.lcard{width:100%;max-width:360px;background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);padding:40px 28px;box-shadow:var(--shadow-lg)}
.llogo{text-align:center;font-size:40px;margin-bottom:4px}
.lbrand{font-family:var(--serif);font-size:24px;font-weight:600;color:var(--gold-d);letter-spacing:.14em;text-align:center;margin-bottom:2px}
.lsub{text-align:center;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:28px}
.lcard label{display:block;font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;margin-top:12px}
.lcard input{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:var(--r);font-size:14px;background:var(--cream);color:var(--ink)}
.lcard input:focus{outline:none;border-color:var(--gold)}
.lerr{min-height:16px;font-size:12px;color:var(--red);margin-top:8px;text-align:center}
.lbtn{width:100%;margin-top:20px;padding:13px;background:var(--gold-d);color:var(--cream);border:none;border-radius:var(--r);font-size:14px;font-weight:500}

#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--ink);padding:8px 16px 10px;display:flex;flex-direction:column;align-items:stretch;gap:3px;position:sticky;top:0;z-index:100}
.top-back{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:5px 10px;border-radius:var(--r);font-size:11px;text-decoration:none}
.top-back:hover{background:rgba(255,255,255,.2)}
.top-logout{background:none;border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.38);padding:5px 10px;border-radius:var(--r);font-size:11px}

.content{padding:16px;max-width:640px;margin:0 auto;width:100%;flex:1}
.page-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.page-title{font-family:var(--serif);font-size:22px;font-weight:500;color:var(--gold-d)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:var(--r);font-size:13px;font-weight:500;border:none;white-space:nowrap;cursor:pointer;transition:all .15s}
.bp{background:var(--gold-d);color:var(--cream)}.bp:hover{background:var(--gold)}.bp:active{transform:scale(.97)}
.bs{background:var(--cream2);color:var(--ink2);border:1px solid var(--border2)}.bs:hover{background:var(--cream3)}
.bd{background:var(--red-l);color:var(--red);border:1px solid rgba(140,40,24,.2)}
.bt{background:var(--teal);color:#fff}.bt:hover{background:#1a8060}
.sm{padding:5px 10px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed}

.self-card{background:var(--white);border:2px solid var(--gold);border-radius:var(--rl);margin-bottom:16px;overflow:hidden;box-shadow:0 2px 12px rgba(200,146,30,.12)}
.self-card-head{padding:10px 14px 0;font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--gold-d);text-transform:uppercase}
.self-btn-row{display:flex;gap:8px;padding:10px 14px 14px}
.self-btn{flex:1;padding:12px;font-size:15px;font-weight:600;border-radius:var(--r)}
.att-card{background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);margin-bottom:8px;overflow:hidden}
.att-main{display:flex;align-items:center;gap:10px;padding:12px 14px}
.att-name{font-size:15px;font-weight:500;color:var(--ink);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.att-role{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0}
.role-owner{background:#fdf0d0;color:var(--gold-d);border:1px solid rgba(200,146,30,.3)}
.role-staff{background:var(--teal-l);color:var(--teal);border:1px solid rgba(26,110,88,.3)}
.att-status{font-size:12px;font-weight:500;flex-shrink:0;min-width:48px;text-align:right}
.att-time{font-size:11px;color:var(--ink3);font-family:var(--mono);flex-shrink:0}
.att-actions{display:flex;gap:6px;padding:0 14px 12px;justify-content:flex-end}

.status-in{color:var(--teal)}
.status-out{color:var(--ink3)}
.status-none{color:var(--ink3)}

#toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none;width:calc(100% - 32px);max-width:360px}
.toast{padding:11px 16px;border-radius:var(--r);font-size:13px;font-weight:500;text-align:center;box-shadow:var(--shadow-lg)}
.tok{background:var(--teal);color:#fff}
.terr{background:var(--red);color:#fff}
.tinf{background:var(--gold-d);color:var(--cream)}
</style>
</head>
<body>

<div id="login-screen">
  <div class="lcard">
    <div class="llogo">🕐</div>
    <div class="lbrand">テキーラ道場</div>
    <div class="lsub">出退勤管理</div>
    <label>メールアドレス</label>
    <input type="email" id="lemail" placeholder="owner@example.com">
    <label>パスワード</label>
    <input type="password" id="lpass" placeholder="••••••••">
    <div class="lerr" id="lerr"></div>
    <button class="lbtn" id="lbtn">ログイン</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="text-align:center;font-family:var(--serif);font-size:17px;color:var(--gold-l);letter-spacing:.1em">🥃 テキーラ道場</div>
    <div style="display:flex;align-items:center;gap:8px">
      <a href="home.html" class="top-back">← ホーム</a>
      <button class="top-logout" id="btn-logout" style="margin-left:auto">ログアウト</button>
    </div>
  </div>

  <div class="content">
    <div class="page-head">
      <div class="page-title">出退勤</div>
      <div>
        <span id="today-label" style="font-size:12px;color:var(--ink3)"></span>
        <button class="btn bs sm" style="margin-left:8px" onclick="loadAttendance()">🔄 更新</button>
      </div>
    </div>
    <div id="self-card-wrap"></div>
    <div id="att-list">
      <div style="text-align:center;padding:32px;color:var(--ink3);font-size:13px">読み込み中...</div>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script>
if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
var auth = firebase.auth();
var db   = firebase.firestore();

function g(id){return document.getElementById(id);}
function gv(id){var el=g(id);return el?el.value.trim():'';}
function pad(n){return String(n).padStart(2,'0');}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function todayStr6(){
  var d=new Date();
  return String(d.getFullYear()).slice(2)+pad(d.getMonth()+1)+pad(d.getDate());
}
function nowStr(){
  var d=new Date();
  return pad(d.getHours())+pad(d.getMinutes())+pad(d.getSeconds());
}
function fmtTime(t){
  if(!t||t.length<4) return '';
  return t.slice(0,2)+':'+t.slice(2,4);
}

function toast(msg,type){
  var el=document.createElement('div');
  el.className='toast t'+(type||'ok');
  el.textContent=(type==='err'?'✕ ':type==='inf'?'ℹ ':'✓ ')+msg;
  g('toasts').appendChild(el);
  setTimeout(function(){el.remove();},(type==='err'?5000:3000));
}

// ── 認証 ─────────────────────────────────────────────────────────
AuthRole.requireStaff(auth,
  function(user, role){
    currentUser=user;
    currentRole=role;
    g('login-screen').style.display='none';
    g('app').style.display='flex';
    var d=new Date();
    var wdays=['日','月','火','水','木','金','土'];
    g('today-label').textContent=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+wdays[d.getDay()]+'）';
    loadAttendance();
  },
  function(){
    g('login-screen').style.display='flex';
    g('app').style.display='none';
  }
);
g('lbtn').addEventListener('click',function(){
  var email=gv('lemail'), pass=g('lpass').value;
  g('lerr').textContent='';
  if(!email||!pass){g('lerr').textContent='入力してください';return;}
  g('lbtn').textContent='ログイン中...';
  auth.signInWithEmailAndPassword(email,pass)
    .then(function(){g('lbtn').textContent='ログイン';})
    .catch(function(e){g('lerr').textContent='ログイン失敗: '+e.message;g('lbtn').textContent='ログイン';});
});
g('lpass').addEventListener('keydown',function(e){if(e.key==='Enter')g('lbtn').click();});
g('btn-logout').addEventListener('click',function(){auth.signOut();});

// ── データ ───────────────────────────────────────────────────────
var allStaff=[];
var todayAtts={};  // memberId → attendance doc data & id
var currentUser=null;
var currentRole=null;
var selfMemberId=null;

async function loadAttendance(){
  var today=todayStr6();
  var list=g('att-list');
  list.innerHTML='<div style="text-align:center;padding:24px;color:var(--ink3);font-size:13px">読み込み中...</div>';
  try{
    var memSnap=await db.collection('members').where('role','in',['owner','staff']).get();
    var attSnap=await db.collection('attendance').where('date','==',today).get();
    allStaff=memSnap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    allStaff.sort(function(a,b){
      var ra=(a.role||'').toLowerCase()==='owner'?0:1;
      var rb=(b.role||'').toLowerCase()==='owner'?0:1;
      if(ra!==rb)return ra-rb;
      return (a.nickname||a.name||'').localeCompare(b.nickname||b.name||'');
    });
    // ログイン中ユーザーを特定（authUid / uid / email → staffRoles の順で照合）
    selfMemberId=null;
    if(currentUser){
      var selfMatch=allStaff.find(function(m){
        return m.authUid===currentUser.uid || m.uid===currentUser.uid || m.email===currentUser.email;
      });
      if(selfMatch){
        selfMemberId=selfMatch.id||selfMatch.memberId;
      } else {
        // staffRoles/{uid} に memberId が入っている場合のフォールバック
        try{
          var srDoc=await db.collection('staffRoles').doc(currentUser.uid).get();
          if(srDoc.exists&&srDoc.data().memberId) selfMemberId=srDoc.data().memberId;
        }catch(e){}
      }
    }
    todayAtts={};
    attSnap.docs.forEach(function(d){
      var dd=d.data();
      todayAtts[dd.memberId]={id:d.id,data:dd};
    });
    renderSelfCard();
    renderList();
  }catch(e){
    list.innerHTML='<div style="color:var(--red);padding:16px">読み込み失敗: '+esc(e.message)+'</div>';
  }
}

function renderSelfCard(){
  var wrap=g('self-card-wrap');
  if(!selfMemberId){wrap.innerHTML='';return;}
  var selfMem=allStaff.find(function(m){return (m.id||m.memberId)===selfMemberId;});
  var name=selfMem?(selfMem.nickname||selfMem.name||selfMemberId):(currentUser&&currentUser.email?currentUser.email:selfMemberId);
  var att=todayAtts[selfMemberId];
  var aData=att?att.data:null;
  var statusHtml,btnHtml;
  if(aData&&aData.checkInTime&&!aData.checkOutTime){
    var inT=fmtTime(aData.checkInTime);
    statusHtml='<span style="color:var(--teal);font-size:13px;font-weight:500">出勤中</span>'
      +'<span style="color:var(--ink3);font-size:12px;font-family:var(--mono);margin-left:6px">'+esc(inT)+'〜</span>';
    btnHtml='<button class="btn bs self-btn" onclick="checkOut(\''+esc(selfMemberId)+'\');renderSelfCard()">退勤する</button>';
  }else if(aData&&aData.checkOutTime){
    var inT2=fmtTime(aData.checkInTime),outT=fmtTime(aData.checkOutTime);
    statusHtml='<span style="color:var(--ink3);font-size:13px;font-weight:500">退勤済</span>'
      +'<span style="color:var(--ink3);font-size:12px;font-family:var(--mono);margin-left:6px">'+esc(inT2)+'→'+esc(outT)+'</span>';
    btnHtml='<button class="btn bt self-btn" onclick="reCheckIn(\''+esc(selfMemberId)+'\')">再出勤する</button>';
  }else{
    statusHtml='<span style="color:var(--ink3);font-size:13px">未出勤</span>';
    btnHtml='<button class="btn bt self-btn" onclick="checkIn(\''+esc(selfMemberId)+'\');renderSelfCard()">出勤する</button>';
  }
  wrap.innerHTML='<div class="self-card">'
    +'<div class="self-card-head">👤 '+esc(name)+'　'+statusHtml+'</div>'
    +'<div class="self-btn-row">'+btnHtml+'</div>'
    +'</div>';
}

function renderList(){
  var list=g('att-list');
  var isOwner=currentRole==='owner';
  if(!allStaff.length){
    list.innerHTML='<div style="text-align:center;padding:32px;color:var(--ink3)">スタッフが登録されていません</div>';
    return;
  }
  var header=isOwner
    ?'<div style="font-size:11px;color:var(--ink3);margin-bottom:8px;padding-left:2px">スタッフ全員の出退勤を管理できます</div>'
    :'<div style="font-size:11px;color:var(--ink3);margin-bottom:8px;padding-left:2px">本日の出勤状況（自分の操作は上のカードから）</div>';
  list.innerHTML=header+allStaff.map(function(m){
    var mid=m.id||m.memberId;
    var isSelf=mid===selfMemberId;
    var name=m.nickname||m.name||mid;
    var roleLabel=(m.role||'').toLowerCase()==='owner'?'OWNER':'STAFF';
    var roleClass=(m.role||'').toLowerCase()==='owner'?'role-owner':'role-staff';
    var att=todayAtts[mid];
    var aData=att?att.data:null;
    var status, statusClass, inTime='', outTime='';
    if(aData&&aData.checkInTime&&!aData.checkOutTime){
      status='出勤中';statusClass='status-in';
      inTime=fmtTime(aData.checkInTime);
    }else if(aData&&aData.checkOutTime){
      status='退勤済';statusClass='status-out';
      inTime=fmtTime(aData.checkInTime);
      outTime=fmtTime(aData.checkOutTime);
    }else{
      status='未出勤';statusClass='status-none';
    }
    var timeStr='';
    if(inTime&&outTime) timeStr=inTime+'→'+outTime;
    else if(inTime) timeStr=inTime+'〜';

    // ownerは全員操作可能、staffは自分以外操作不可
    var actions='';
    if(isOwner||isSelf){
      if(!aData||(!aData.checkInTime)){
        actions='<button class="btn bt sm" onclick="checkIn(\''+esc(mid)+'\')">出勤</button>';
      }else if(!aData.checkOutTime){
        actions='<button class="btn bs sm" onclick="checkOut(\''+esc(mid)+'\')">退勤</button>';
      }else{
        actions='<button class="btn bs sm" onclick="reCheckIn(\''+esc(mid)+'\')">再出勤</button>';
      }
    }else{
      actions='<span style="font-size:11px;color:var(--ink3)">—</span>';
    }

    return '<div class="att-card">'
      +'<div class="att-main">'
        +'<span class="att-name">'+esc(name)+'</span>'
        +'<span class="att-role '+roleClass+'">'+roleLabel+'</span>'
        +(timeStr?'<span class="att-time">'+esc(timeStr)+'</span>':'')
        +'<span class="att-status '+statusClass+'">'+status+'</span>'
      +'</div>'
      +(actions?'<div class="att-actions">'+actions+'</div>':'')
      +'</div>';
  }).join('');
}

async function checkIn(memberId){
  var today=todayStr6();
  var now=nowStr();
  var docId=memberId+'_'+today;
  var staffVisitId=today+'S'+memberId;
  try{
    await db.collection('attendance').doc(docId).set({
      memberId:memberId,
      date:today,
      checkInTime:now,
      checkOutTime:null
    });
    // 来場者一覧に表示されない隠しセッションを作成（奢られ注文受け取り用）
    var existingVisit=await db.collection('visits').doc(staffVisitId).get();
    if(existingVisit.exists){
      await db.collection('visits').doc(staffVisitId).update({visitTime:now,checkoutTime:null});
    }else{
      await db.collection('visits').doc(staffVisitId).set({
        visitDate:today,visitTime:now,seq:0,memberId:memberId,
        isStaff:true,tequilaAmount:0,amount:0,checkoutTime:null,
        checkoutPayTime:null,receiptIssued:'0'
      });
    }
    todayAtts[memberId]={id:docId,data:{memberId:memberId,date:today,checkInTime:now,checkOutTime:null}};
    renderSelfCard();
    renderList();
    toast('出勤しました（'+fmtTime(now)+'）');
  }catch(e){toast('出勤処理失敗: '+e.message,'err');}
}

async function checkOut(memberId){
  var att=todayAtts[memberId];
  if(!att){toast('出勤記録がありません','err');return;}
  var today=todayStr6();
  var now=nowStr();
  var staffVisitId=today+'S'+memberId;
  try{
    await db.collection('attendance').doc(att.id).update({checkOutTime:now});
    todayAtts[memberId].data.checkOutTime=now;
    // 隠しセッションをクローズ
    await db.collection('visits').doc(staffVisitId).update({checkoutTime:now}).catch(function(){});
    renderSelfCard();
    renderList();
    toast('退勤しました（'+fmtTime(now)+'）');
  }catch(e){toast('退勤処理失敗: '+e.message,'err');}
}

async function reCheckIn(memberId){
  var att=todayAtts[memberId];
  if(!att){toast('出退勤記録がありません','err');return;}
  var today=todayStr6();
  var now=nowStr();
  var staffVisitId=today+'S'+memberId;
  try{
    await db.collection('attendance').doc(att.id).update({checkInTime:now,checkOutTime:null});
    todayAtts[memberId].data.checkInTime=now;
    todayAtts[memberId].data.checkOutTime=null;
    // 隠しセッションを再オープン
    var existingVisit=await db.collection('visits').doc(staffVisitId).get();
    if(existingVisit.exists){
      await db.collection('visits').doc(staffVisitId).update({visitTime:now,checkoutTime:null});
    }else{
      await db.collection('visits').doc(staffVisitId).set({
        visitDate:today,visitTime:now,seq:0,memberId:memberId,
        isStaff:true,tequilaAmount:0,amount:0,checkoutTime:null,
        checkoutPayTime:null,receiptIssued:'0'
      });
    }
    renderSelfCard();
    renderList();
    toast('再出勤しました（'+fmtTime(now)+'）');
  }catch(e){toast('再出勤処理失敗: '+e.message,'err');}
}
</script>
</body>
</html>
