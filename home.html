<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#18110a; --ink2:#4a3820; --ink3:#9a8470;
  --gold:#c8921e; --gold-l:#e8b84a; --gold-d:#7a5610;
  --teal:#1a6e58; --teal-l:#e0f0eb;
  --red:#8c2818; --red-l:#fae8e4;
  --cream:#faf7f1; --cream2:#f0ebe0; --cream3:#e4ddd0; --white:#fff;
  --border:rgba(160,130,100,.18); --border2:rgba(160,130,100,.32);
  --shadow:0 1px 12px rgba(24,17,10,.07); --shadow-lg:0 6px 36px rgba(24,17,10,.13);
  --r:6px; --rl:12px;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Noto Sans JP',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh}
button{cursor:pointer;font-family:var(--sans)}
input{font-family:var(--sans)}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 30% 60%,rgba(200,146,30,.07),transparent),var(--cream)}
.lcard{width:100%;max-width:380px;background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);padding:44px 36px;box-shadow:var(--shadow-lg)}
.llogo{text-align:center;font-size:44px;margin-bottom:6px}
.lbrand{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--gold-d);letter-spacing:.14em;text-align:center;margin-bottom:2px}
.lsub{text-align:center;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:32px}
.lcard label{display:block;font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;margin-top:14px}
.lcard input{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--cream);color:var(--ink)}
.lcard input:focus{outline:none;border-color:var(--gold)}
.lerr{min-height:16px;font-size:12px;color:var(--red);margin-top:8px;text-align:center}
.lbtn{width:100%;margin-top:22px;padding:13px;background:var(--gold-d);color:var(--cream);border:none;border-radius:var(--r);font-size:13px;font-weight:500}
.lbtn:hover{background:var(--gold)}
#app{display:none}
.topbar{background:var(--ink);padding:8px 16px 10px;display:flex;flex-direction:column;align-items:stretch;gap:3px}
.home-body{padding:40px 24px;max-width:960px;margin:0 auto}
.home-title{font-family:var(--serif);font-size:26px;font-weight:500;color:var(--ink);margin-bottom:8px;text-align:center}
.home-sub{font-size:12px;color:var(--ink3);text-align:center;margin-bottom:36px}
.tile-section{margin-bottom:32px}
.tile-section-label{font-size:11px;font-weight:500;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;padding-left:4px}
.home-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px}
.home-tile{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:28px 16px;text-align:center;cursor:pointer;transition:box-shadow .15s,transform .1s;display:flex;flex-direction:column;align-items:center;gap:10px;text-decoration:none;color:inherit}
.home-tile:hover{box-shadow:0 4px 18px rgba(24,17,10,.12);transform:translateY(-2px)}
.home-tile.disabled{opacity:.35;cursor:default;pointer-events:none}
.tile-icon{font-size:34px;line-height:1}
.tile-label{font-size:13px;font-weight:500;color:var(--ink);line-height:1.4}
.tile-desc{font-size:10px;color:var(--ink3)}

/* ── オーナー専用セクション ── */
.owner-only{display:none}
.role-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.06em;margin-left:8px}
.badge-owner{background:#7a5610;color:#e8b84a}
.badge-staff{background:#1a4a3a;color:#7adf7a}
/* スタッフ管理モーダル */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--white);border-radius:var(--rl);padding:28px 24px;width:90%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal-title{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.staff-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.staff-row:last-child{border-bottom:none}
.staff-email{flex:1;color:var(--ink2)}
.staff-role-sel{padding:5px 8px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;background:var(--cream);cursor:pointer}
.btn-sm{padding:5px 12px;border-radius:var(--r);font-size:12px;border:none;cursor:pointer;font-weight:500}
.btn-danger{background:#fae8e4;color:var(--red)}
.btn-primary-sm{background:var(--gold-d);color:var(--cream)}
.fi-sm{padding:8px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;background:var(--cream);width:100%}
.add-staff-form{background:var(--cream2);border-radius:var(--r);padding:14px;margin-top:12px}
</style>
</head>
<body>

<div id="login-screen">
  <div class="lcard">
    <div class="llogo">🥃</div>
    <div class="lbrand">テキーラ道場</div>
    <div class="lsub">Admin Console</div>
    <label>メールアドレス</label>
    <input type="email" id="lemail" placeholder="owner@example.com">
    <label>パスワード</label>
    <input type="password" id="lpass" placeholder="••••••••">
    <div class="lerr" id="lerr"></div>
    <button class="lbtn" id="lbtn">ログイン</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="text-align:center;font-family:var(--serif);font-size:19px;color:var(--gold-l);letter-spacing:.12em">🥃 テキーラ道場</div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:11px;color:rgba(255,255,255,.4)" id="user-email"></span>
      <span id="role-badge" class="role-badge" style="display:none"></span>
      <button id="btn-logout" style="margin-left:auto;padding:5px 12px;border:1px solid rgba(255,255,255,.14);border-radius:6px;background:none;color:rgba(255,255,255,.38);font-size:11px">ログアウト</button>
    </div>
  </div>

  <div class="home-body">
    <div class="home-sub" id="today-label"></div>

    <div class="tile-section">
      <div class="tile-section-label">日常業務</div>
      <div class="home-grid">
        <a href="openclose.html" class="home-tile">
          <div class="tile-icon">🏮</div>
          <div class="tile-label">開店・閉店</div>
          <div class="tile-desc">セッション管理</div>
        </a>
        <a href="checkin.html" class="home-tile">
          <div class="tile-icon">👥</div>
          <div class="tile-label">来場者一覧</div>
          <div class="tile-desc">来場者の登録・管理</div>
        </a>
        <a href="home_order.html" class="home-tile">
          <div class="tile-icon">📋</div>
          <div class="tile-label">注文登録</div>
          <div class="tile-desc">注文の受付・登録</div>
        </a>
        <a href="attendance.html" class="home-tile">
          <div class="tile-icon">🕐</div>
          <div class="tile-label">出退勤</div>
          <div class="tile-desc">スタッフの出勤・退勤</div>
        </a>

      </div>
    </div>

    <div class="tile-section owner-only" id="section-admin">
      <div class="tile-section-label">マスタ管理・カレンダー</div>
      <div class="home-grid">
        <a href="admin.html" class="home-tile">
          <div class="tile-icon">⚙️</div>
          <div class="tile-label">マスタ管理</div>
          <div class="tile-desc">ボトル・顧客・座席など</div>
        </a>
        <a href="admin.html#calendar" class="home-tile">
          <div class="tile-icon">🗓</div>
          <div class="tile-label">営業カレンダー</div>
          <div class="tile-desc">予定・記念日・予約</div>
        </a>
        <a href="reservations.html" class="home-tile">
          <div class="tile-icon">📅</div>
          <div class="tile-label">予約管理</div>
          <div class="tile-desc">予約の登録・確認</div>
        </a>
        <div class="home-tile" onclick="openStaffModal()" style="cursor:pointer">
          <div class="tile-icon">👤</div>
          <div class="tile-label">スタッフ管理</div>
          <div class="tile-desc">権限・アカウント管理</div>
        </div>
      </div>
    </div>
  </div>
<!-- スタッフ管理モーダル（ownerのみ） -->
<div class="modal-overlay" id="modal-staff">
  <div class="modal-box">
    <div class="modal-title">👤 スタッフ管理
      <button onclick="closeStaffModal()" style="margin-left:auto;background:none;border:none;font-size:18px;cursor:pointer;color:var(--ink3)">✕</button>
    </div>
    <div id="staff-list-area" style="min-height:60px;color:var(--ink3);font-size:13px">読み込み中...</div>
    <div class="add-staff-form" style="margin-top:16px">
      <div style="font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px">新しいスタッフを追加</div>
      <div style="font-size:11px;color:var(--ink3);margin-bottom:8px">登録済みの本会員（active）のメールアドレスを指定してください</div>
      <label style="font-size:11px;color:var(--ink3);display:block;margin-bottom:4px">メールアドレス</label>
      <input type="email" class="fi-sm" id="new-staff-email" placeholder="staff@example.com" style="margin-bottom:8px">
      <label style="font-size:11px;color:var(--ink3);display:block;margin-bottom:4px">役割</label>
      <select class="fi-sm" id="new-staff-role" style="margin-bottom:12px">
        <option value="staff">staff（スタッフ）</option>
        <option value="owner">owner（オーナー）</option>
      </select>
      <div id="add-staff-err" style="font-size:12px;color:var(--red);min-height:14px;margin-bottom:8px"></div>
      <button class="btn-sm btn-primary-sm" onclick="addStaff()" style="width:100%;padding:10px">追加する</button>
    </div>
  </div>
</div>

</div>

<script>
if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
var auth      = firebase.auth();
var functions = firebase.app().functions('asia-northeast1');
var db        = firebase.firestore();

// 今日の日付
(function(){
  var d=new Date(), wdays=["日","月","火","水","木","金","土"];
  var el=document.getElementById("today-label");
  if(el) el.textContent=d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日（"+wdays[d.getDay()]+"）";
})();

// ── 認証（他の日常業務ページと同じ staff/owner ガード） ─────────
AuthRole.requireStaff(auth,
  function(user, role){
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("user-email").textContent=user.email;
    var badge=document.getElementById("role-badge");
    if(badge){
      badge.style.display="inline-block";
      badge.textContent=role==="owner"?"OWNER":"STAFF";
      badge.className="role-badge "+(role==="owner"?"badge-owner":"badge-staff");
    }
    if(role==="owner"){
      document.querySelectorAll(".owner-only").forEach(function(el){el.style.display="block";});
    }
  },
  function(){
    document.getElementById("login-screen").style.display="flex";
    document.getElementById("app").style.display="none";
  }
);

// ログインボタン
document.getElementById("lbtn").addEventListener("click", function(){
  var email=document.getElementById("lemail").value.trim();
  var pass=document.getElementById("lpass").value;
  var err=document.getElementById("lerr");
  err.textContent="";
  if(!email||!pass){ err.textContent="入力してください"; return; }
  this.textContent="ログイン中...";
  var self=this;
  auth.signInWithEmailAndPassword(email,pass)
    .then(function(){ self.textContent="ログイン"; })
    .catch(function(e){ err.textContent="ログイン失敗: "+e.message; self.textContent="ログイン"; });
});
document.getElementById("lpass").addEventListener("keydown",function(e){ if(e.key==="Enter") document.getElementById("lbtn").click(); });
document.getElementById("btn-logout").addEventListener("click",function(){ auth.signOut(); });

// ── スタッフ管理 ───────────────────────────────────────────────
function openStaffModal(){ document.getElementById("modal-staff").classList.add("open"); loadStaffList(); }
function closeStaffModal(){ document.getElementById("modal-staff").classList.remove("open"); }
document.getElementById("modal-staff").addEventListener("click",function(e){ if(e.target===this) closeStaffModal(); });

async function loadStaffList(){
  var area=document.getElementById("staff-list-area");
  area.textContent="読み込み中...";
  try{
    var result=await functions.httpsCallable("getStaffList")({});
    var list=result.data.staff||[];
    if(!list.length){ area.innerHTML='<div style="color:var(--ink3);padding:12px 0">スタッフが登録されていません</div>'; return; }
    area.innerHTML=list.map(function(s){
      return '<div class="staff-row">'+
        '<span class="staff-email">'+esc(s.email||s.uid)+'</span>'+
        '<select class="staff-role-sel" data-uid="'+esc(s.uid)+'" onchange="updateStaffRole(this)">'+
          '<option value="staff"'+(s.role==="staff"?" selected":"")+'>staff</option>'+
          '<option value="owner"'+(s.role==="owner"?" selected":"")+'>owner</option>'+
        '</select>'+
        '<button class="btn-sm btn-danger" data-uid="'+esc(s.uid)+'" data-email="'+esc(s.email||'')+'" onclick="removeStaffByAttr(this)">削除</button>'+
      '</div>';
    }).join('');
  }catch(e){ area.innerHTML='<div style="color:var(--red)">読み込み失敗: '+esc(e.message)+'</div>'; }
}
async function updateStaffRole(sel){
  try{ await functions.httpsCallable("setUserRole")({uid:sel.dataset.uid,role:sel.value}); showToast("変更しました"); }
  catch(e){ showToast("失敗: "+e.message,true); loadStaffList(); }
}
function removeStaffByAttr(btn){ removeStaff(btn.dataset.uid,btn.dataset.email); }
async function removeStaff(uid,email){
  if(!confirm((email||uid)+" をスタッフから削除しますか？")) return;
  try{ await functions.httpsCallable("setUserRole")({uid:uid,role:null}); showToast("削除しました"); loadStaffList(); }
  catch(e){ showToast("失敗: "+e.message,true); }
}
async function addStaff(){
  var email=document.getElementById("new-staff-email").value.trim();
  var role=document.getElementById("new-staff-role").value;
  var err=document.getElementById("add-staff-err");
  err.textContent="";
  if(!email){ err.textContent="メールアドレスを入力してください"; return; }
  try{
    // 本登録アカウント（status:'active'）のみスタッフ設定可
    var memSnap=await db.collection("members").where("email","==",email).limit(1).get();
    if(memSnap.empty){
      err.textContent="このメールアドレスの会員が見つかりません。先に会員登録を完了してください。";
      return;
    }
    var mem=memSnap.docs[0].data();
    if(mem.status!=="active"){
      err.textContent="スタッフ登録は本会員（active）のみ可能です。先に会員登録を完了してください。";
      return;
    }
    if(!mem.authUid){
      err.textContent="この会員にはログインアカウントが連携されていません。";
      return;
    }
    await functions.httpsCallable("setUserRole")({uid:mem.authUid,role:role});
    document.getElementById("new-staff-email").value="";
    showToast(email+" を "+role+" として追加しました");
    loadStaffList();
  }catch(e){ err.textContent="失敗: "+e.message; }
}
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function showToast(msg,isErr){
  var t=document.createElement("div");
  t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;"+(isErr?"background:#3a1a1a;color:#df7a7a;border:1px solid #6a2d2d":"background:#1a3a1a;color:#7adf7a;border:1px solid #2d6a2d");
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); },3000);
}
</script>
