<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テキーラ道場 — 360°動画</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
var FIREBASE_CONFIG={
  apiKey:"AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain:"tequiladojo.firebaseapp.com",
  projectId:"tequiladojo",
  storageBucket:"tequiladojo.firebasestorage.app",
  messagingSenderId:"56663296233",
  appId:"1:56663296233:web:c8cac2fcbeb4faa09e0878",
  measurementId:"G-KMS18946JQ"
};
</script>
<script src="/auth-role.js?v=20260714"></script>
<style>
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --cream:#faf7f1;--cream2:#f0ebe0;--cream3:#e4ddd0;--white:#fff;
  --border:rgba(160,130,100,.18);--border2:rgba(160,130,100,.32);
  --shadow:0 1px 12px rgba(24,17,10,.07);--shadow-lg:0 6px 36px rgba(24,17,10,.13);
  --r:8px;--rl:14px;
  --serif:'Hiragino Mincho ProN','Yu Mincho',serif;
  --sans:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  --mono:'SFMono-Regular',Consolas,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh}
button{cursor:pointer;font-family:var(--sans)}
/* login */
#login-screen{display:none;min-height:100vh;align-items:center;justify-content:center;padding:24px}
.lcard{width:100%;max-width:360px;background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);padding:40px 30px;box-shadow:var(--shadow-lg)}
.llogo{text-align:center;font-size:40px;margin-bottom:6px}
.lbrand{font-family:var(--serif);font-size:22px;color:var(--gold-d);letter-spacing:.1em;text-align:center}
.lsub{text-align:center;font-size:10px;letter-spacing:.18em;color:var(--ink3);margin-bottom:24px}
.lcard label{display:block;font-size:10px;color:var(--ink3);letter-spacing:.06em;margin:12px 0 4px}
.lcard input{width:100%;padding:11px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--cream)}
.lerr{min-height:16px;font-size:12px;color:#b03020;margin-top:8px;text-align:center}
.lbtn{width:100%;margin-top:18px;padding:12px;background:var(--gold-d);color:var(--cream);border:none;border-radius:var(--r);font-size:13px}
/* header */
.hdr{background:var(--ink);padding:0 16px;height:56px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:40}
.hdr-title{font-family:var(--serif);font-size:18px;color:var(--gold-l);letter-spacing:.06em}
.hdr-right{margin-left:auto}
.hdr-nav{padding:6px 11px;border:1px solid rgba(255,255,255,.16);border-radius:6px;color:var(--gold-l);font-size:11px;text-decoration:none}
#app{display:none}
.wrap{max-width:1000px;margin:0 auto;padding:16px 14px 60px}
/* toolbar */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.tcount{font-size:12px;color:var(--ink2);font-weight:600}
.viewtoggle{margin-left:auto;display:flex;border:1px solid var(--cream3);border-radius:20px;overflow:hidden;background:var(--white)}
.viewtoggle button{padding:6px 14px;border:none;background:transparent;color:var(--ink3);font-size:12px;display:flex;align-items:center;gap:5px}
.viewtoggle button.on{background:var(--gold-d);color:var(--cream)}
/* grid */
#grid.tile{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
#grid.list{display:flex;flex-direction:column;gap:10px}
/* tile card */
.tile .vcard{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s,box-shadow .12s}
.tile .vcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.tile .vthumb{position:relative;width:100%;padding-bottom:56.25%;background:#000 center/cover no-repeat}
.tile .vbody{padding:12px 14px 16px}
.tile .vtitle{font-size:15px;font-weight:600;line-height:1.35;margin-bottom:6px}
.tile .vdesc{font-size:12px;color:var(--ink3);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
/* list card */
.list .vcard{display:flex;gap:12px;background:var(--white);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--shadow);cursor:pointer}
.list .vthumb{position:relative;flex-shrink:0;width:150px;min-height:84px;align-self:stretch;background:#000 center/cover no-repeat}
.list .vbody{padding:10px 14px 10px 4px;min-width:0;flex:1;display:flex;flex-direction:column;justify-content:center}
.list .vtitle{font-size:14px;font-weight:600;line-height:1.35;margin-bottom:3px}
.list .vdesc{font-size:11px;color:var(--ink3);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
/* common thumb bits */
.vthumb .thumb-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:34px;color:rgba(255,255,255,.35);background:linear-gradient(135deg,#2a2018,#4a3820)}
.vthumb .vplay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;background:rgba(24,17,10,.6);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;padding-left:3px}
.list .vthumb .vplay{width:34px;height:34px;font-size:13px}
.vdur{position:absolute;right:6px;bottom:6px;background:rgba(24,17,10,.78);color:#fff;font-size:11px;font-family:var(--mono);padding:1px 6px;border-radius:4px}
.badge360{position:absolute;left:6px;top:6px;background:rgba(200,146,30,.92);color:#fff;font-size:10px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:4px}
.empty{text-align:center;color:var(--ink3);padding:60px 20px;font-size:14px}
/* player modal */
.pmbg{position:fixed;inset:0;background:rgba(10,7,4,.86);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.pmbg.open{display:flex}
.pmodal{width:100%;max-width:900px}
.pm-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pm-title{color:#fff;font-size:15px;font-weight:600;flex:1;min-width:0}
.pm-x{background:rgba(255,255,255,.12);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;flex-shrink:0}
.pm-frame{position:relative;width:100%;padding-bottom:56.25%;background:#000;border-radius:var(--rl);overflow:hidden}
.pm-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.pm-note{color:rgba(255,255,255,.5);font-size:11px;margin-top:8px;text-align:center}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="lcard">
    <div class="llogo">🎥</div>
    <div class="lbrand">テキーラ道場</div>
    <div class="lsub">360°動画 — 会員専用</div>
    <label>メールアドレス</label>
    <input type="email" id="lemail" autocomplete="username">
    <label>パスワード</label>
    <input type="password" id="lpass" autocomplete="current-password">
    <div class="lerr" id="lerr"></div>
    <button class="lbtn" id="lbtn">ログイン</button>
  </div>
</div>

<!-- アプリ -->
<div id="app">
  <div class="hdr">
    <div class="hdr-title">🎥 360°動画</div>
    <div class="hdr-right"><a class="hdr-nav" href="/member.html">マイページ</a></div>
  </div>
  <div class="wrap">
    <div class="toolbar">
      <span class="tcount" id="count"></span>
      <div class="viewtoggle" id="viewtoggle">
        <button data-view="tile" class="on">▦ タイル</button>
        <button data-view="list">☰ リスト</button>
      </div>
    </div>
    <div id="grid" class="tile"></div>
    <div class="empty" id="empty" style="display:none;">公開中の360°動画はまだありません。</div>
  </div>
</div>

<!-- 再生モーダル -->
<div class="pmbg" id="player">
  <div class="pmodal">
    <div class="pm-head">
      <div class="pm-title" id="pm-title"></div>
      <button class="pm-x" id="pm-x">✕</button>
    </div>
    <div class="pm-frame" id="pm-frame"></div>
    <div class="pm-note">スマホは端末を動かす／ドラッグで360°見回せます</div>
  </div>
</div>

<script>
firebase.initializeApp(FIREBASE_CONFIG);
var auth=firebase.auth(), db=firebase.firestore();
function g(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Vimeo ID 抽出（URL or 数字ID 両対応）
function vimeoIdOf(raw){
  var s=String(raw||'').trim();
  var m=s.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if(m) return m[1];
  m=s.match(/(\d{6,})/);
  return m?m[1]:'';
}

var videos=[], viewMode='tile';

AuthRole.requireMember(auth, function(user){
  g('app').style.display='block';
  // 保存済みの表示モード
  try{ var v=localStorage.getItem('v360_view'); if(v==='list'||v==='tile') viewMode=v; }catch(e){}
  setView(viewMode);
  loadVideos();
}, function(){
  g('login-screen').style.display='flex';
});
g('lbtn').addEventListener('click',function(){
  auth.signInWithEmailAndPassword((g('lemail').value||'').trim(),g('lpass').value).catch(function(e){ g('lerr').textContent=e.message; });
});
g('lpass').addEventListener('keydown',function(e){ if(e.key==='Enter') g('lbtn').click(); });

function loadVideos(){
  db.collection('videos360').get().then(function(snap){
    videos=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());})
      .filter(function(v){ var x=v.visibility; return x==='0'||x===0||x===undefined||x===null||x===false; });
    videos.sort(function(a,b){
      var ao=(a.order==null?9999:Number(a.order)), bo=(b.order==null?9999:Number(b.order));
      if(ao!==bo) return ao-bo;
      var at=a.createdAt&&a.createdAt.seconds?a.createdAt.seconds:0, bt=b.createdAt&&b.createdAt.seconds?b.createdAt.seconds:0;
      return bt-at;
    });
    render();
  }).catch(function(e){
    g('grid').innerHTML=''; g('empty').style.display='block';
    g('empty').textContent='読み込みに失敗しました: '+esc(e.message);
  });
}

function render(){
  var grid=g('grid');
  g('count').textContent=videos.length?videos.length+'件':'';
  if(!videos.length){ grid.innerHTML=''; g('empty').style.display='block'; return; }
  g('empty').style.display='none';
  grid.innerHTML=videos.map(function(v,i){
    var thumb=v.thumbUrl
      ? '<div class="vthumb" style="background-image:url(\''+esc(v.thumbUrl)+'\')">'
      : '<div class="vthumb"><div class="thumb-ph">🎥</div>';
    thumb+='<div class="badge360">360°</div>';
    thumb+='<div class="vplay">▶</div>';
    if(v.duration) thumb+='<div class="vdur">'+esc(v.duration)+'</div>';
    thumb+='</div>';
    return '<div class="vcard" data-i="'+i+'">'+thumb
      +'<div class="vbody">'
      +'<div class="vtitle">'+esc(v.title||'(無題)')+'</div>'
      +(v.description?'<div class="vdesc">'+esc(v.description)+'</div>':'')
      +'</div></div>';
  }).join('');
  Array.prototype.forEach.call(grid.querySelectorAll('.vcard'),function(el){
    el.addEventListener('click',function(){ playVideo(videos[Number(el.dataset.i)]); });
  });
}

function setView(mode){
  viewMode=mode;
  g('grid').className=mode;
  Array.prototype.forEach.call(g('viewtoggle').querySelectorAll('button'),function(b){
    b.classList.toggle('on', b.dataset.view===mode);
  });
  try{ localStorage.setItem('v360_view',mode); }catch(e){}
}
Array.prototype.forEach.call(g('viewtoggle').querySelectorAll('button'),function(b){
  b.addEventListener('click',function(){ setView(b.dataset.view); });
});

function playVideo(v){
  var id=vimeoIdOf(v.vimeoId);
  g('pm-title').textContent=v.title||'';
  if(id){
    g('pm-frame').innerHTML='<iframe src="https://player.vimeo.com/video/'+encodeURIComponent(id)
      +'?title=0&byline=0&portrait=0" title="'+esc(v.title||'360動画')
      +'" allow="autoplay; fullscreen; picture-in-picture; gyroscope; accelerometer" allowfullscreen></iframe>';
  } else {
    g('pm-frame').innerHTML='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;text-align:center;padding:20px;">動画IDが未設定です</div>';
  }
  g('player').classList.add('open');
}
function closePlayer(){ g('player').classList.remove('open'); g('pm-frame').innerHTML=''; }
g('pm-x').addEventListener('click',closePlayer);
g('player').addEventListener('click',function(e){ if(e.target===g('player')) closePlayer(); });
document.addEventListener('keydown',function(e){ if(e.key==='Escape'&&g('player').classList.contains('open')) closePlayer(); });
</script>
</body>
</html>
