<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>試飲ログ - テキーラ道場</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Barlow+Condensed:wght@400;600;700&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-d:#7a5610;
  --teal:#0d6b5a;--teal-l:#d0f0e8;--teal-d:#084d40;
  --border:#e8ddd0;--border2:#d0c4b0;
  --cream:#faf8f4;--cream2:#f2ece0;
  --sans:'Noto Sans JP',sans-serif;
  --mono:'DM Mono',monospace;
}
body{background:var(--cream);color:var(--ink);font-family:var(--sans);font-size:14px;min-height:100vh;}
.top-bar{background:#1a1008;padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.back-btn{color:rgba(255,255,255,.7);text-decoration:none;font-size:13px;}
.back-btn:hover{color:#fff;}
.top-title{color:#fff;font-size:15px;font-weight:700;flex:1;}
.logout-btn{background:none;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;}

/* ログイン */
#login-wrap{display:flex;align-items:center;justify-content:center;min-height:80vh;padding:20px;}
.login-box{background:#fff;border-radius:12px;padding:28px;max-width:360px;width:100%;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,.08);}
.login-box h2{font-size:17px;margin-bottom:16px;}
.login-box input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-bottom:8px;font-size:14px;}
.login-box .lbtn{width:100%;background:var(--gold-d);color:#fff;border:none;padding:11px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;}

/* メイン */
#main-wrap{padding:16px;max-width:640px;margin:0 auto;}
.page-title{font-size:18px;font-weight:700;padding:4px 0 14px;border-bottom:2px solid var(--border2);margin-bottom:14px;}

/* 達成率 */
.ach-bar{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;}
.ach-count{font-size:26px;font-weight:700;color:var(--teal);font-family:var(--mono);}
.ach-right{flex:1;}
.ach-label{font-size:12px;color:var(--ink3);margin-bottom:5px;}
.ach-prog-bg{background:var(--cream2);border-radius:4px;height:8px;overflow:hidden;}
.ach-prog-fill{background:var(--teal);height:8px;border-radius:4px;transition:width .4s;}
.ach-pct{font-size:14px;font-weight:700;color:var(--teal-d);margin-top:4px;text-align:right;}

/* フィルター */
.filter-wrap{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px;}
.frow{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:4px;}
.frow:last-child{margin-bottom:0;}
.fl{font-size:10px;font-weight:700;color:var(--ink3);flex-shrink:0;}
.fi{padding:4px 6px;border:1px solid var(--border2);border-radius:5px;font-size:11px;background:var(--cream);color:var(--ink);}
.fis{padding:2px 2px;width:auto;min-width:0;}
input.nom-fi{width:50px;font-family:var(--mono);}
.cls-btn{padding:2px 7px;font-size:11px;font-weight:700;border-radius:3px;cursor:pointer;border:1.5px solid var(--gold-d);background:var(--cream2);color:var(--gold-d);}
.cls-btn.on{background:var(--gold-d);color:#fff;}

/* グリッド */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px;}
.list-view .card{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;}
.list-view .card .name{flex:1;font-size:13px;margin:0;}
.list-view .card .sub{font-size:10px;white-space:nowrap;}
.list-view .card .chk{margin:0;}
.view-btn{padding:3px 8px;font-size:11px;border:1px solid var(--border2);border-radius:4px;background:var(--cream);color:var(--ink2);cursor:pointer;}
.view-btn.on{background:var(--gold-d);color:#fff;border-color:var(--gold-d);}
/* クラス別カード色 */
.card{border-radius:8px;padding:6px 8px;border:none;border-left:3px solid transparent;background:var(--cream2);}
.card.cls-01{background:#f8f8f8;border-left-color:transparent;}
.card.cls-02{background:#fff3e8;border-left-color:transparent;}
.card.cls-03{background:#ffe8d0;border-left-color:transparent;}
.card.cls-04{background:#ffd4a0;border-left-color:transparent;}
.card.cls-05{background:#e8c8a0;border-left-color:transparent;color:#3a2000;}
/* 試飲済み：外枠あり・左線5px太 */
.card.drunk{border:1.5px solid;border-left:5px solid;}
.card.drunk.cls-01{border-color:#aaa;border-left-color:#888;}
.card.drunk.cls-02{border-color:#e8a050;border-left-color:#c07020;}
.card.drunk.cls-03{border-color:#d07830;border-left-color:#a05000;}
.card.drunk.cls-04{border-color:#b85a00;border-left-color:#804000;}
.card.drunk.cls-05{border-color:#5a3000;border-left-color:#3a1800;}
/* クラスバッジ色 */
.cls-badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;margin-right:4px;vertical-align:middle;}
.cls-badge.b01{background:#e0e0e0;color:#555;}
.cls-badge.b02{background:#f5c89a;color:#7a3800;}
.cls-badge.b03{background:#f0a060;color:#5a2000;}
.cls-badge.b04{background:#e07820;color:#fff;}
.cls-badge.b05{background:#8b5e2a;color:#fff;box-shadow:0 0 0 2px #fff,0 0 0 3.5px #8b5e2a;}
.card .name{font-size:12px;font-weight:300;color:#aaa;line-height:1.4;word-break:break-word;font-family:'Barlow Condensed','Noto Sans JP',sans-serif;letter-spacing:.01em;}
.card.cls-05 .name{color:#3a2000;}
.card.drunk .name{font-weight:700;color:var(--ink);}
.card .sub{font-size:10px;color:var(--ink3);margin-top:1px;}
.card.drunk .sub{color:#2a7a68;}
.card .chk{float:right;font-size:13px;}
.empty{text-align:center;color:var(--ink3);padding:32px;grid-column:1/-1;}
.loading-msg{text-align:center;color:var(--ink3);padding:40px;}
</style>
</head>
<body>

<div class="top-bar">
  <a class="back-btn" href="/mypage.html">← マイページ</a>
  <span class="top-title">🥃 試飲ログ</span>
  <button class="logout-btn" onclick="firebase.auth().signOut()">ログアウト</button>
</div>

<!-- ログイン -->
<div id="login-wrap">
  <div class="login-box">
    <h2>ログインしてください</h2>
    <input id="l-em" type="email" placeholder="メールアドレス">
    <input id="l-pw" type="password" placeholder="パスワード">
    <button class="lbtn" onclick="doLogin()">ログイン</button>
    <div id="l-err" style="color:red;font-size:12px;margin-top:8px;"></div>
  </div>
</div>

<!-- メイン -->
<div id="main-wrap" style="display:none">
  <div class="page-title">🥃 試飲ログ</div>

  <div class="ach-bar">
    <div>
      <div class="ach-count"><span id="ac-n">—</span><span style="font-size:14px;color:var(--ink3);"> / </span><span id="ac-t" style="font-size:14px;color:var(--ink3);">—</span><span style="font-size:12px;color:var(--ink3);"> 本</span></div>
    </div>
    <div class="ach-right">
      <div class="ach-label">達成率</div>
      <div class="ach-prog-bg"><div class="ach-prog-fill" id="ac-prog" style="width:0%"></div></div>
      <div class="ach-pct" id="ac-pct">0%</div>
    </div>
  </div>

  <div style="display:flex;justify-content:flex-end;margin-bottom:6px;gap:4px;">
    <button class="view-btn on" id="btn-grid" onclick="setView('grid')">⊞ グリッド</button>
    <button class="view-btn" id="btn-list" onclick="setView('list')">☰ リスト</button>
  </div>
  <div class="filter-wrap">
    <!-- ソートKEY行 -->
    <div class="frow">
      <span class="fl">KEY1</span>
      <select class="fi fis" id="f-k1" onchange="render()">
        <option value="nom">NOM</option>
        <option value="cls">クラス</option>
        <option value="brand">ブランド</option>
        <option value="abv">度数</option>
        <option value="price">単価</option>
      </select>
      <span class="fl">K2</span>
      <select class="fi fis" id="f-k2" onchange="render()">
        <option value="brand">ブランド</option>
        <option value="nom">NOM</option>
        <option value="cls">クラス</option>
        <option value="abv">度数</option>
        <option value="price">単価</option>
      </select>
      <span class="fl">K3</span>
      <select class="fi fis" id="f-k3" onchange="render()">
        <option value="cls">クラス</option>
        <option value="nom">NOM</option>
        <option value="brand">ブランド</option>
        <option value="abv">度数</option>
        <option value="price">単価</option>
      </select>
    </div>
    <!-- NOM・クラス行 -->
    <div class="frow">
      <span class="fl">NOM</span>
      <input class="fi nom-fi" id="f-nom" placeholder="1079" maxlength="4" oninput="render()">
      <span class="fl" style="margin-left:4px">クラス</span>
      <button class="cls-btn on" data-c="01" onclick="toggleCls(this)">B</button>
      <button class="cls-btn on" data-c="02" onclick="toggleCls(this)">J</button>
      <button class="cls-btn on" data-c="03" onclick="toggleCls(this)">R</button>
      <button class="cls-btn on" data-c="04" onclick="toggleCls(this)">A</button>
      <button class="cls-btn on" data-c="05" onclick="toggleCls(this)">X</button>
    </div>
    <!-- 絞り込み行 -->
    <div class="frow">
      <span class="fl">度数</span>
      <select class="fi fis" id="f-abv" onchange="render()">
        <option value="">全</option>
        <option value="n">通常</option>
        <option value="h">HP</option>
      </select>
      <span class="fl">添</span>
      <select class="fi fis" id="f-add" onchange="render()">
        <option value="">－</option>
        <option value="0">無</option>
        <option value="1">有</option>
      </select>
      <span class="fl">試飲</span>
      <select class="fi fis" id="f-drunk" onchange="render()">
        <option value="">全</option>
        <option value="0">未</option>
        <option value="1">済</option>
      </select>
      <label style="display:flex;align-items:center;gap:3px;font-size:11px;color:var(--ink2);margin-left:4px;cursor:pointer;white-space:nowrap;">
        <input type="checkbox" id="f-japan" onchange="render()">国内
      </label>
    </div>
  </div>

  <div class="grid" id="grid"><div class="loading-msg">読み込み中...</div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain:"tequiladojo.firebaseapp.com",
  projectId:"tequiladojo",
  storageBucket:"tequiladojo.firebasestorage.app",
  messagingSenderId:"56663296233",
  appId:"1:56663296233:web:c8cac2fcbeb4faa09e0878"
});
var auth=firebase.auth();
var db=firebase.firestore();

var bottles=[], brands={}, drunkIds=new Set(), japanIds=new Set();
var CLS={'01':'B','02':'J','03':'R','04':'A','05':'X'};
var activeCls=new Set(['01','02','03','04','05']);

function doLogin(){
  var em=document.getElementById('l-em').value;
  var pw=document.getElementById('l-pw').value;
  auth.signInWithEmailAndPassword(em,pw).catch(function(e){
    document.getElementById('l-err').textContent='ログイン失敗: '+e.message;
  });
}

auth.onAuthStateChanged(async function(user){
  if(!user){
    document.getElementById('login-wrap').style.display='flex';
    document.getElementById('main-wrap').style.display='none';
    return;
  }
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('main-wrap').style.display='block';
  document.getElementById('grid').innerHTML='<div class="loading-msg">読み込み中...</div>';
  try{ await load(user); }
  catch(e){ document.getElementById('grid').innerHTML='<div class="empty">エラー: '+e.message+'</div>'; }
});

async function load(user){
  var email=user.email||'';
  var mid=null;
  if(email.indexOf('@tequiladojo.member')>=0){
    mid=email.replace('@tequiladojo.member','');
  }else{
    try{
      var s=await db.collection('memberIndex').where('email','==',email).limit(1).get();
      if(!s.empty) mid=s.docs[0].id;
    }catch(e){
      var s2=await db.collection('members').where('email','==',email).limit(1).get();
      if(!s2.empty) mid=s2.docs[0].id;
    }
  }
  if(!mid){ document.getElementById('grid').innerHTML='<div class="empty">会員情報が見つかりません</div>'; return; }

  // ボトルマスタ（定番品）
  var bsnap=await db.collection('bottles').where('production','==','0').get();
  bottles=bsnap.docs.map(function(d){return Object.assign({id:d.id},d.data());})
    .filter(function(b){return b.servingStatus!==1&&b.servingStatus!=='1';})
    .sort(function(a,b){
      var ca=String(a.classId||'9'),cb=String(b.classId||'9');
      if(ca!==cb)return ca.localeCompare(cb);
      return (a.bottleEs||'').localeCompare(b.bottleEs||'');
    });

  // ブランド
  var brsnap=await db.collection('brands').get();
  brsnap.forEach(function(d){brands[d.id]=d.data();});

  // 来場
  var vsnap=await db.collection('visits').where('memberId','==',mid).get();
  var vids=vsnap.docs.map(function(d){return d.id;});

  // 注文→bottleDataId収集
  var bdIds=new Set();
  if(vids.length){
    for(var i=0;i<vids.length;i+=10){
      var chunk=vids.slice(i,i+10);
      try{
        var os=await db.collection('orders').where('visitKey','in',chunk).get();
        os.forEach(function(d){
          var o=d.data();
          if((o.productType==='tequila'||o.productType==='other')&&(o.productCode||o.productId))
            bdIds.add(o.productCode||o.productId);
        });
      }catch(e){}
    }
  }

  // bottleData全件→drunkIds + japanIds
  drunkIds=new Set();
  japanIds=new Set();
  // 全bottleDataを取得してjapanIds（importType==="0"）を収集
  try{
    var allBdSnap=await db.collection('bottleData').get();
    allBdSnap.forEach(function(d){
      var bd=d.data();
      if(!bd.bottleId) return;
      if(String(bd.importType||'0')==='0') japanIds.add(bd.bottleId);
    });
  }catch(e){}
  // drunkIds
  if(bdIds.size){
    var arr=[...bdIds];
    for(var j=0;j<arr.length;j+=10){
      try{
        var bds=await db.collection('bottleData').where(firebase.firestore.FieldPath.documentId(),'in',arr.slice(j,j+10)).get();
        bds.forEach(function(d){if(d.data().bottleId) drunkIds.add(d.data().bottleId);});
      }catch(e){}
    }
  }

  render();
}

function setView(v){
  var grid=document.getElementById('grid');
  document.getElementById('btn-grid').classList.toggle('on',v==='grid');
  document.getElementById('btn-list').classList.toggle('on',v==='list');
  if(v==='list') grid.style.gridTemplateColumns='1fr';
  else grid.style.gridTemplateColumns='';
  grid.classList.toggle('list-view',v==='list');
}
function toggleCls(btn){
  var c=btn.dataset.c;
  if(activeCls.has(c)){activeCls.delete(c);btn.classList.remove('on');}
  else{activeCls.add(c);btn.classList.add('on');}
  render();
}

function render(){
  var nom=(document.getElementById('f-nom').value||'').trim();
  var abv=document.getElementById('f-abv').value;
  var add=document.getElementById('f-add').value;
  var drunkF=document.getElementById('f-drunk').value;
  var japan=document.getElementById('f-japan').checked;
  var k1=document.getElementById('f-k1').value;
  var k2=document.getElementById('f-k2').value;
  var k3=document.getElementById('f-k3').value;

  var list=bottles.slice();
  if(nom) list=list.filter(function(b){return (b.brandId||'').startsWith(nom);});
  if(activeCls.size<5) list=list.filter(function(b){return activeCls.has(String(b.classId||''));});
  if(abv==='n') list=list.filter(function(b){return parseFloat(b.abv||0)<=40;});
  if(abv==='h') list=list.filter(function(b){return parseFloat(b.abv||0)>=41;});
  if(add!=='') list=list.filter(function(b){return String(b.additive||'0')===add;});
  if(japan) list=list.filter(function(b){return japanIds.has(b.id);});

  // 達成率（試飲フィルター前）
  var drunkCount=list.filter(function(b){return drunkIds.has(b.id);}).length;
  var tot=list.length;
  var pct=tot?Math.round(drunkCount/tot*100):0;
  document.getElementById('ac-n').textContent=drunkCount;
  document.getElementById('ac-t').textContent=tot;
  document.getElementById('ac-prog').style.width=pct+'%';
  document.getElementById('ac-pct').textContent=pct+'%';

  // 試飲フィルター
  if(drunkF==='0') list=list.filter(function(b){return !drunkIds.has(b.id);});
  if(drunkF==='1') list=list.filter(function(b){return drunkIds.has(b.id);});

  // ソートキー値取得
  function keyVal(b,key){
    if(key==='nom') return (b.brandId||'').slice(0,4);
    if(key==='cls') return String(b.classId||'9');
    if(key==='brand') return (brands[b.brandId]&&(brands[b.brandId].brandEs||brands[b.brandId].brandJa))||'';
    if(key==='abv') return String(parseFloat(b.abv||0)+1000);
    if(key==='price') return String(parseFloat(b.price||b.unitPrice||0)+100000);
    return '';
  }
  list.sort(function(a,b){
    var v=keyVal(a,k1).localeCompare(keyVal(b,k1));
    if(v) return v;
    v=keyVal(a,k2).localeCompare(keyVal(b,k2));
    if(v) return v;
    return keyVal(a,k3).localeCompare(keyVal(b,k3));
  });

  var grid=document.getElementById('grid');
  if(!list.length){grid.innerHTML='<div class="empty">該当なし</div>';return;}

  grid.innerHTML=list.map(function(b){
    var d=drunkIds.has(b.id);
    var clsCode=String(b.classId||'');
    var cl=CLS[clsCode]||'?';
    var badgeCls='cls-badge b'+clsCode;
    var br=brands[b.brandId];
    var brName=br?(br.brandEs||br.brandJa||''):'';
    var nom4=(b.brandId||'').slice(0,4);
    var abvS=b.abv?parseFloat(b.abv).toFixed(1)+'%':'';
    var addS=String(b.additive||'0')==='0'?'無添加':(String(b.additive)==='1'?'添加':'');
    var meta=[abvS,addS].filter(Boolean).join(' · ');
    var es=b.bottleEs||b.bottleJa||b.id;
    return '<div class="card'+(d?' drunk':'')+' cls-'+clsCode+'">'
      +'<div class="name"><span class="'+badgeCls+'">'+cl+'</span>'+esc(es)+(d?' ✓':'')+'</div>'
      +(brName?'<div class="sub">'+esc(brName)+(nom4?' NOM'+nom4:'')+'</div>':'')
      +(meta?'<div class="sub">'+esc(meta)+'</div>':'')
    +'</div>';
  }).join('');
}


function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
