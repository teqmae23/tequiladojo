<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>試飲ログ - テキーラ道場</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --green:#1a6640;--green-l:#e4f5ec;
  --teal:#0d6b5a;--teal-l:#d0f0e8;--teal-d:#084d40;
  --border:#e8ddd0;--border2:#d0c4b0;
  --cream:#faf8f4;--cream2:#f2ece0;
  --serif:'Cormorant Garamond','Noto Serif JP',serif;
  --sans:'Noto Sans JP',sans-serif;
  --mono:'DM Mono','Fira Code',monospace;
  --r:8px;
}
body{background:var(--cream);color:var(--ink);font-family:var(--sans);min-height:100vh;}

/* ヘッダー */
.top-bar{background:#1a1008;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.back-btn{color:rgba(255,255,255,.7);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:4px;}
.back-btn:hover{color:#fff;}
.top-title{color:#fff;font-size:15px;font-weight:700;letter-spacing:.06em;flex:1;}
.top-logout{background:none;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.6);padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;}
.top-logout:hover{border-color:rgba(255,255,255,.5);color:#fff;}

/* ログイン画面 */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px;padding:24px;}
.login-box{background:#fff;border-radius:12px;padding:28px;max-width:360px;width:100%;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,.08);}
.login-box h2{font-size:18px;margin-bottom:16px;color:var(--ink);}
.lbtn{background:var(--gold-d);color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:14px;cursor:pointer;width:100%;font-weight:600;}
.lbtn:hover{background:var(--gold);}

/* メイン */
#main-screen{padding:16px;max-width:640px;margin:0 auto;}
.page-title{font-size:18px;font-weight:700;color:var(--ink);padding:4px 0 14px;border-bottom:2px solid var(--border2);margin-bottom:14px;display:flex;align-items:center;gap:8px;}

/* 達成率バー */
.achievement-bar{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;}
.ach-nums{flex-shrink:0;}
.ach-count{font-size:26px;font-weight:700;color:var(--teal);font-family:var(--mono);}
.ach-total{font-size:13px;color:var(--ink3);}
.ach-right{flex:1;}
.ach-label{font-size:12px;color:var(--ink3);margin-bottom:5px;}
.ach-prog-bg{background:var(--cream2);border-radius:4px;height:8px;overflow:hidden;}
.ach-prog-fill{background:linear-gradient(90deg,var(--teal),var(--teal-d));height:8px;border-radius:4px;transition:width .4s ease;}
.ach-pct{font-size:14px;font-weight:700;color:var(--teal-d);margin-top:4px;text-align:right;}

/* フィルターバー */
.filter-wrap{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px;}
.filter-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:4px;}
.filter-row:last-child{margin-bottom:0;}
.fl{font-size:10px;font-weight:700;color:var(--ink3);flex-shrink:0;}
.fi{padding:4px 6px;border:1px solid var(--border2);border-radius:5px;font-size:11px;background:var(--cream);color:var(--ink);font-family:var(--sans);}
.fi:focus{outline:none;border-color:var(--teal);}
input.fi{width:80px;}
input.fi.nom-fi{width:52px;font-family:var(--mono);}
/* クラスボタン */
.cls-btn{padding:2px 7px;font-size:11px;font-weight:700;border-radius:3px;cursor:pointer;border:1.5px solid var(--gold-d);background:var(--cream2);color:var(--gold-d);transition:.12s;line-height:1.5;}
.cls-btn.active{background:var(--gold-d);color:#fff;}
.filter-check{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--ink2);cursor:pointer;}
.filter-check input{accent-color:var(--teal);}

/* ボトルグリッド */
.bottle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px;}
.bottle-card{border-radius:8px;padding:10px 10px 8px;border:1.5px solid transparent;cursor:default;transition:.15s;}
.bottle-card.drunk{background:var(--teal-l);border-color:#6ecfb8;}
.bottle-card.undone{background:var(--cream2);border-color:var(--border);}
.bottle-card .bc-cls{font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;display:inline-block;margin-bottom:4px;}
.drunk .bc-cls{background:var(--teal-d);color:#fff;}
.undone .bc-cls{background:#ccc;color:#666;}
.bottle-card .bc-name{font-size:12px;font-weight:600;line-height:1.35;margin-bottom:3px;word-break:break-word;}
.drunk .bc-name{color:var(--teal-d);}
.undone .bc-name{color:#888;}
.bottle-card .bc-brand{font-size:10px;color:var(--ink3);}
.drunk .bc-brand{color:#2a7a68;}
.bottle-card .bc-meta{font-size:9.5px;margin-top:4px;color:var(--ink3);}
.drunk .bc-meta{color:#3a9078;}
.bottle-card .bc-check{font-size:14px;float:right;margin-top:-2px;}

/* 空・ロード */
.empty-msg{text-align:center;color:var(--ink3);font-size:13px;padding:32px 0;}
.loading{text-align:center;color:var(--ink3);font-size:13px;padding:32px 0;}

/* CLS_MAP */
/* CLASS: 1=B, 2=J, 3=R, 4=A, 5=X */
</style>
</head>
<body>
<style id="auth-hide-style">
  #main-screen { visibility: hidden; }
</style>

<div class="top-bar">
  <a class="back-btn" href="/mypage.html">← マイページ</a>
  <span class="top-title">🥃 試飲ログ</span>
  <button class="top-logout" onclick="doLogout()">ログアウト</button>
</div>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-box">
    <h2>ログインしてください</h2>
    <button class="lbtn" onclick="doLogin()">ログイン</button>
  </div>
</div>

<!-- メイン画面 -->
<div id="main-screen">
  <div class="page-title">🥃 試飲ログ</div>

  <!-- 達成率バー -->
  <div class="achievement-bar">
    <div class="ach-nums">
      <span class="ach-count" id="ach-count">—</span>
      <span class="ach-total" id="ach-total"> / — 本</span>
    </div>
    <div class="ach-right">
      <div class="ach-label">達成率（フィルター適用中）</div>
      <div class="ach-prog-bg"><div class="ach-prog-fill" id="ach-prog" style="width:0%"></div></div>
      <div class="ach-pct" id="ach-pct">0%</div>
    </div>
  </div>

  <!-- フィルター -->
  <div class="filter-wrap">
    <div class="filter-row">
      <span class="fl">NOM</span>
      <input class="fi nom-fi" id="f-nom" placeholder="1079" maxlength="4" oninput="renderList()">
      <span class="fl" style="margin-left:6px;">クラス</span>
      <button class="cls-btn active" data-cls="01" onclick="toggleCls(this)">B</button>
      <button class="cls-btn active" data-cls="02" onclick="toggleCls(this)">J</button>
      <button class="cls-btn active" data-cls="03" onclick="toggleCls(this)">R</button>
      <button class="cls-btn active" data-cls="04" onclick="toggleCls(this)">A</button>
      <button class="cls-btn active" data-cls="05" onclick="toggleCls(this)">X</button>
    </div>
    <div class="filter-row">
      <span class="fl">度数</span>
      <select class="fi" id="f-abv" onchange="renderList()">
        <option value="">全件</option>
        <option value="normal">通常(≤40%)</option>
        <option value="hp">HP(≥41%)</option>
      </select>
      <span class="fl" style="margin-left:6px;">添加</span>
      <select class="fi" id="f-add" onchange="renderList()">
        <option value="">全件</option>
        <option value="0">無添加</option>
        <option value="1">添加あり</option>
      </select>
      <label class="filter-check" style="margin-left:8px;">
        <input type="checkbox" id="f-only-undone" onchange="renderList()">
        <span>未飲のみ</span>
      </label>
    </div>
  </div>

  <!-- ボトルリスト -->
  <div class="bottle-grid" id="bottle-grid">
    <div class="loading">読み込み中...</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="/auth-role.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain:"tequiladojo.firebaseapp.com",
  projectId:"tequiladojo",
  storageBucket:"tequiladojo.firebasestorage.app",
  messagingSenderId:"56663296233",
  appId:"1:56663296233:web:c8cac2fcbeb4faa09e0878"
});
const auth=firebase.auth();
const db=firebase.firestore();

// ── データ ────────────────────────────────────────────────────
var allBottles=[];   // 定番品マスタ（production==="0"）
var allBrands={};    // brandId → brand object
var drunkIds=new Set();  // 飲んだことがあるbottleId（ordersのproductId）
var drunkNames=new Set();// 飲んだことがあるproductName（名前ベース照合用）
var activeCls=new Set(['01','02','03','04','05']);

const CLS_LABELS={'01':'B','02':'J','03':'R','04':'A','05':'X'};
const CLS_NAMES={'01':'Blanco','02':'Joven','03':'Reposado','04':'Añejo','05':'Extra Añejo'};

// ── 認証 ────────────────────────────────────────────────────
AuthRole.requireMember(auth,
  async function(user, role){
    // 認証OK・画面表示はrequireMemberが自動でやってくれる
    await initTasting(user);
  },
  function(){
    // 未ログイン時はrequireMemberがログイン画面を表示
  }
);

function doLogin(){
  var p=document.createElement('div');
  p.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
  var box=document.createElement('div');
  box.style.cssText='background:#fff;border-radius:12px;padding:24px;max-width:340px;width:100%;';
  var h=document.createElement('h3');
  h.style.cssText='margin-bottom:16px;font-size:16px;';
  h.textContent='メールアドレスでログイン';
  var em=document.createElement('input');
  em.type='email'; em.id='_em'; em.placeholder='メールアドレス';
  em.style.cssText='width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-bottom:8px;font-size:14px;';
  var pw=document.createElement('input');
  pw.type='password'; pw.id='_pw'; pw.placeholder='パスワード';
  pw.style.cssText='width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-bottom:12px;font-size:14px;';
  var btnLogin=document.createElement('button');
  btnLogin.textContent='ログイン';
  btnLogin.style.cssText='width:100%;background:#7a5610;color:#fff;border:none;padding:12px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;';
  btnLogin.onclick=doLoginSubmit;
  var btnCancel=document.createElement('button');
  btnCancel.textContent='キャンセル';
  btnCancel.style.cssText='width:100%;margin-top:8px;background:none;border:1px solid #ddd;padding:8px;border-radius:6px;font-size:13px;cursor:pointer;';
  btnCancel.onclick=function(){p.remove();};
  box.appendChild(h); box.appendChild(em); box.appendChild(pw);
  box.appendChild(btnLogin); box.appendChild(btnCancel);
  p.appendChild(box); document.body.appendChild(p);
}
function doLoginSubmit(){
  var em=document.getElementById('_em').value,pw=document.getElementById('_pw').value;
  auth.signInWithEmailAndPassword(em,pw).catch(function(e){alert('ログイン失敗: '+e.message);});
}
function doLogout(){auth.signOut();}

// ── 初期化 ──────────────────────────────────────────────────
async function initTasting(user){
  var grid=document.getElementById('bottle-grid');

  // removed step log
  try{
    // 1. memberId取得
    var email=user.email||'';
    var memberId=null;
    if(email.endsWith('@tequiladojo.member')){
      memberId=email.replace('@tequiladojo.member','');
    }else if(email){
      // removed step log
      try{
        var idxSnap=await db.collection('memberIndex').where('email','==',email).limit(1).get();
        if(!idxSnap.empty) memberId=idxSnap.docs[0].id;
      }catch(e2){
        try{
          var mSnap=await db.collection('members').where('email','==',email).limit(1).get();
          if(!mSnap.empty) memberId=mSnap.docs[0].id;
        }catch(e3){}
      }
    }
    if(!memberId){
      grid.innerHTML='<div class="empty-msg">会員情報が見つかりませんでした（'+esc(email)+'）</div>';
      return;
    }
    // removed step log

    // 2. 定番品マスタ取得（bottlesコレクション, production==="0"）
    var bSnap=await db.collection('bottles').where('production','==','0').get();
    allBottles=bSnap.docs.map(function(d){return Object.assign({id:d.id},d.data());})
      .filter(function(b){return b.servingStatus!==1&&b.servingStatus!=='1';})
      .sort(function(a,b){
        var ca=String(a.classId||'9'),cb=String(b.classId||'9');
        if(ca!==cb)return ca.localeCompare(cb);
        var na=a.bottleEs||a.bottleJa||'',nb=b.bottleEs||b.bottleJa||'';
        return na.localeCompare(nb);
      });

    // removed step log

    // 3. ブランドマスタ取得
    var brSnap=await db.collection('brands').get();
    brSnap.forEach(function(d){allBrands[d.id]=d.data();});

    // 4. 会員のvisits取得
    var vSnap=await db.collection('visits').where('memberId','==',memberId).get();
    var visitIds=vSnap.docs.map(function(d){return d.id;});

    // removed step log
    // 5. orders取得（visitIdsが空の場合はスキップ）
    var orders=[];
    if(visitIds.length>0){
      // visitKeyで取得
      var chunks=[];
      for(var i=0;i<visitIds.length;i+=10) chunks.push(visitIds.slice(i,i+10));
      for(var ci=0;ci<chunks.length;ci++){
        try{
          var oSnap=await db.collection('orders').where('visitKey','in',chunks[ci]).get();
          oSnap.forEach(function(d){orders.push(Object.assign({id:d.id},d.data()));});
        }catch(_e){}
      }
      // visitIdでも取得（重複除外）
      for(var cj=0;cj<chunks.length;cj++){
        try{
          var oSnap2=await db.collection('orders').where('visitId','in',chunks[cj]).get();
          oSnap2.forEach(function(d){
            if(!orders.find(function(o){return o.id===d.id;}))
              orders.push(Object.assign({id:d.id},d.data()));
          });
        }catch(_e){}
      }
    }

    // 6. ordersのproductId（=bottleDataId）を収集
    var bdIds=new Set();
    orders.filter(function(o){
      return (o.productType==='tequila'||o.productType==='other');
    }).forEach(function(o){
      // productIdまたはproductCode（旧フィールド名）を使用
      var pid=o.productId||o.productCode;
      if(pid) bdIds.add(pid);
    });

    // 7. bottleData経由でbottleIdに変換（productId = bottleDataId）
    drunkIds=new Set();
    drunkNames=new Set();
    if(bdIds.size>0){
      var bdIdArr=[...bdIds];
      var bdChunks=[];
      for(var bi=0;bi<bdIdArr.length;bi+=10) bdChunks.push(bdIdArr.slice(bi,bi+10));
      for(var bc=0;bc<bdChunks.length;bc++){
        try{
          // doc.idがbottleDataId
          var bdSnap=await db.collection('bottleData').where(firebase.firestore.FieldPath.documentId(),'in',bdChunks[bc]).get();
          bdSnap.forEach(function(d){
            var bd=d.data();
            if(bd.bottleId) drunkIds.add(bd.bottleId);
          });
        }catch(_e){}
      }
    }

    // removed step log
    renderList();
  }catch(e){
    console.error('[tastinglog] initTasting error:',e);
    document.getElementById('bottle-grid').innerHTML='<div class="empty-msg">読み込みエラー: '+esc(e.message||String(e))+'<br><small>コンソールを確認してください</small></div>';
  }
}

// ── ボトル名表示 ──────────────────────────────────────────────
function bName(b){
  return b.bottleEs||b.bottleJa||b.name||b.id||'';
}
function bNameJa(b){
  return b.bottleJa||b.bottleEs||b.name||b.id||'';
}

// ── 飲んだかどうか判定 ────────────────────────────────────────
function isDrunk(b){
  // bottleDataのbottleIdで直接照合
  return drunkIds.has(b.id);
}

// ── クラスフィルタートグル ────────────────────────────────────
function toggleCls(btn){
  var code=btn.dataset.cls;
  if(activeCls.has(code)) activeCls.delete(code);
  else activeCls.add(code);
  btn.classList.toggle('active',activeCls.has(code));
  renderList();
}

// ── リスト描画 ────────────────────────────────────────────────
function renderList(){
  var nom=(document.getElementById('f-nom').value||'').trim();
  var abv=document.getElementById('f-abv').value;
  var add=document.getElementById('f-add').value;
  var onlyUndone=document.getElementById('f-only-undone').checked;

  var items=allBottles.slice();

  if(nom) items=items.filter(function(b){return (b.brandId||'').startsWith(nom)||(b.nom||'').startsWith(nom);});
  if(activeCls.size>0&&activeCls.size<5)
    items=items.filter(function(b){return activeCls.has(String(b.classId||''));});
  if(abv==='normal') items=items.filter(function(b){return (parseFloat(b.abv)||0)<=40;});
  else if(abv==='hp') items=items.filter(function(b){return (parseFloat(b.abv)||0)>=41;});
  if(add!=='') items=items.filter(function(b){return String(b.additive||'0')===add;});

  var drunkInFilter=items.filter(function(b){return isDrunk(b);}).length;
  var total=items.length;
  var pct=total?Math.round(drunkInFilter/total*100):0;
  document.getElementById('ach-count').textContent=drunkInFilter;
  document.getElementById('ach-total').textContent=' / '+total+' 本';
  document.getElementById('ach-prog').style.width=pct+'%';
  document.getElementById('ach-pct').textContent=pct+'%';

  if(onlyUndone) items=items.filter(function(b){return !isDrunk(b);});

  var grid=document.getElementById('bottle-grid');
  if(!items.length){
    grid.innerHTML='<div class="empty-msg" style="grid-column:1/-1;">該当なし</div>';
    return;
  }

  grid.innerHTML=items.map(function(b){
    var drunk=isDrunk(b);
    var clsCode=String(b.classId||'');
    var clsLabel=CLS_LABELS[clsCode]||'?';
    var nom4=b.brandId?b.brandId.slice(0,4):'';
    var brand=nom4&&allBrands[b.brandId]?(allBrands[b.brandId].brandEs||allBrands[b.brandId].brandJa||''):'';
    var abvStr=b.abv?(parseFloat(b.abv).toFixed(1)+'%'):'';
    var addStr=b.additive==='0'||b.additive===0?'無添加':(b.additive==='1'||b.additive===1?'添加':'');
    var nameEs=bName(b);
    var nameJa=bNameJa(b);
    return '<div class="bottle-card '+(drunk?'drunk':'undone')+'">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">'
        +'<span class="bc-cls">'+clsLabel+'</span>'
        +(drunk?'<span class="bc-check">✓</span>':'')
      +'</div>'
      +'<div class="bc-name">'+esc(nameEs)+'</div>'
      +(nameJa&&nameJa!==nameEs?'<div class="bc-name" style="font-size:11px;">'+esc(nameJa)+'</div>':'')
      +(brand?'<div class="bc-brand">'+esc(brand)+(nom4?' NOM'+nom4:'')+'</div>':'')
      +'<div class="bc-meta">'+(abvStr||'')+(abvStr&&addStr?' · ':'')+( addStr||'')+'</div>'
    +'</div>';
  }).join('');
}


function esc(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
