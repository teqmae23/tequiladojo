<style>
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --teal:#1a6e58;--teal-l:#e0f0eb;
  --red:#8c2818;--red-l:#fae8e4;
  --cream:#faf7f1;--cream2:#f0ebe0;--cream3:#e4ddd0;--white:#fff;
  --border:rgba(160,130,100,.18);--border2:rgba(160,130,100,.32);
  --shadow:0 1px 12px rgba(24,17,10,.07);--shadow-lg:0 6px 36px rgba(24,17,10,.13);
  --r:6px;--rl:12px;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Noto Sans JP',sans-serif;
  --mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh}
button{cursor:pointer;font-family:var(--sans)}
input,select,textarea{font-family:var(--sans)}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 30% 60%,rgba(200,146,30,.07),transparent),var(--cream)}
.lcard{width:100%;max-width:380px;background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);padding:44px 36px;box-shadow:var(--shadow-lg)}
.llogo{text-align:center;font-size:44px;margin-bottom:6px}
.lbrand{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--gold-d);letter-spacing:.14em;text-align:center;margin-bottom:2px}
.lsub{text-align:center;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:32px}
.lcard label{display:block;font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;margin-top:14px}
.lcard input{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--cream);color:var(--ink)}
.lcard input:focus{outline:none;border-color:var(--gold)}
.lerr{min-height:16px;font-size:12px;color:var(--red);margin-top:8px;text-align:center}
.lbtn{width:100%;margin-top:22px;padding:13px;background:var(--gold-d);color:var(--cream);border:none;border-radius:var(--r);font-size:13px;font-weight:500}
.lbtn:hover{background:var(--gold)}
.topbar{background:var(--ink);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.top-title{color:rgba(255,255,255,.9);font-size:13px;font-weight:500}
.top-back{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:5px 10px;border-radius:var(--r);font-size:11px;text-decoration:none}
.top-back:hover{background:rgba(255,255,255,.2)}
.main{max-width:1000px;margin:0 auto;padding:20px 16px 60px}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:20px;margin-bottom:20px;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:8px;flex-wrap:wrap}
.card-title{font-size:15px;font-weight:500;color:var(--ink2)}
table{width:100%;border-collapse:collapse}
th,td{padding:7px 10px;text-align:left;border-bottom:1px solid var(--border)}
th{font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;background:var(--cream2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(200,146,30,.04)}
.mono{font-family:var(--mono);font-size:12px}
.dim{color:var(--ink3)}
.ec{text-align:center;color:var(--ink3);padding:24px}
.btn{border:none;border-radius:var(--r);padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn.bs{background:var(--cream2);color:var(--ink2);border:1px solid var(--border2)}
.btn.bs:hover{background:var(--cream3)}
.btn.bp{background:var(--teal);color:var(--white)}
.btn.bp:hover{opacity:.85}
.btn.bd{background:var(--red-l);color:var(--red);border:1px solid rgba(140,40,24,.2)}
.btn.bd:hover{background:#f3cfc8}
.btn.bg{background:var(--gold-d);color:var(--cream)}
.btn.bg:hover{opacity:.85}
.btn.sm{padding:4px 10px;font-size:11px}
.btn:disabled{opacity:.5;cursor:default}
.acts{display:flex;gap:6px;flex-wrap:wrap}
.frow{margin-bottom:14px}
.frow label{display:block;font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.frow input,.frow select,.frow textarea{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--cream);color:var(--ink)}
.frow input:focus,.frow select:focus,.frow textarea:focus{outline:none;border-color:var(--gold)}
.frow textarea{resize:vertical;min-height:60px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.badge-grid{display:flex;flex-wrap:wrap;gap:10px;padding-top:4px}
.badge-chip{background:var(--cream2);border:2px solid var(--gold);border-radius:var(--r);padding:8px 12px;display:flex;flex-direction:column;gap:4px;min-width:130px}
.badge-chip .bi{font-size:22px;line-height:1}
.badge-chip .bn{font-size:12px;font-weight:500;color:var(--ink2)}
.badge-chip .bm{font-size:10px;color:var(--ink3)}
.mbg{position:fixed;inset:0;background:rgba(24,17,10,.45);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.mbg.open{display:flex}
.mbox{background:var(--white);border-radius:var(--rl);width:100%;max-width:600px;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.mbox.wide{max-width:800px}
.mhead{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mhead h3{font-size:15px;font-weight:500}
.mbody{padding:18px 20px;overflow-y:auto;flex:1}
.mfoot{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.mclose{background:none;border:none;font-size:20px;color:var(--ink3);cursor:pointer;padding:2px 6px}
#toast-wrap{position:fixed;bottom:20px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:999}
.toast{background:var(--ink);color:#fff;padding:10px 16px;border-radius:var(--r);font-size:12px;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;max-width:340px}
.toast.show{opacity:1;transform:none}
.toast.err{background:var(--red)}
.toast.inf{background:var(--teal)}
/* Badge form */
.medal-sel{display:flex;gap:6px;flex-wrap:wrap}
.medal-opt{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border:2px solid var(--border2);border-radius:var(--r);cursor:pointer;font-size:22px;transition:border-color .15s}
.medal-opt input{display:none}
.medal-opt:has(input:checked){border-color:var(--gold);background:rgba(200,146,30,.08)}
.type-section{margin-top:0}
/* Selected bottles list */
.sel-bottle-list{border:1px solid var(--border2);border-radius:var(--r);max-height:150px;overflow-y:auto;background:var(--cream)}
.sel-bottle-list.empty{background:transparent;border-style:dashed;padding:10px;text-align:center;color:var(--ink3);font-size:11px}
.sel-row{display:flex;align-items:center;gap:8px;padding:5px 10px;border-bottom:1px solid var(--border);font-size:12px}
.sel-row:last-child{border-bottom:none}
.sel-row .sr-cls{font-size:10px;font-weight:700;color:var(--white);background:var(--teal);border-radius:3px;padding:1px 4px;flex-shrink:0}
.sel-row .sr-nom{font-size:10px;color:var(--ink3);flex-shrink:0;font-family:var(--mono)}
.sel-row .sr-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sel-row .sr-del{background:none;border:none;color:var(--ink3);cursor:pointer;font-size:14px;padding:0 2px;flex-shrink:0}
.sel-row .sr-del:hover{color:var(--red)}
/* BJRAX filter */
.bjrax-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.bjrax-chk{display:flex;align-items:center;gap:3px;cursor:pointer;font-size:12px;font-weight:700;padding:3px 8px;border:1px solid var(--border2);border-radius:var(--r);background:var(--cream2)}
.bjrax-chk:has(input:checked){background:var(--teal);color:var(--white);border-color:var(--teal)}
.bjrax-chk input{display:none}
/* Available bottles */
.avail-list{border:1px solid var(--border2);border-radius:var(--r);max-height:200px;overflow-y:auto;background:var(--cream)}
.avail-row{display:flex;align-items:center;gap:8px;padding:5px 10px;border-bottom:1px solid var(--border);font-size:12px}
.avail-row:last-child{border-bottom:none}
.avail-row:hover{background:var(--cream2)}
.avail-row .ar-cls{font-size:10px;font-weight:700;color:var(--white);background:var(--ink3);border-radius:3px;padding:1px 4px;flex-shrink:0}
.avail-row .ar-nom{font-size:10px;color:var(--ink3);flex-shrink:0;font-family:var(--mono)}
.avail-row .ar-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.avail-row .ar-add{background:none;border:1px solid var(--border2);border-radius:var(--r);color:var(--teal);cursor:pointer;font-size:11px;padding:1px 8px;flex-shrink:0}
.avail-row .ar-add:hover{background:var(--teal);color:var(--white)}
/* note box */
.note-box{font-size:11px;color:var(--ink3);padding:8px 10px;background:var(--cream2);border-radius:var(--r);margin-top:4px}
</style>
</head>
<body>

<div id="login-screen" style="display:none">
  <div class="lcard">
    <div class="llogo">🎖️</div>
    <div class="lbrand">TEQUILA DOJO</div>
    <div class="lsub">Badge Master</div>
    <label>メールアドレス</label>
    <input type="email" id="lemail" placeholder="staff@example.com">
    <label>パスワード</label>
    <input type="password" id="lpass">
    <div class="lerr" id="lerr"></div>
    <button class="lbtn" id="lbtn">ログイン</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <a href="index.html" class="top-back">← メニュー</a>
    <span class="top-title">🎖️ バッジマスタ管理</span>
  </div>
  <div class="main">

    <!-- バッジマスタ -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">バッジマスタ</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn bg" id="btn-rejudge">🔄 全会員再判定</button>
          <button class="btn bp" id="btn-add-badge">＋ 新規バッジ</button>
        </div>
      </div>
      <table>
        <thead><tr>
          <th>アイコン</th><th>ID</th><th>バッジ名</th><th>種別</th>
          <th style="text-align:center">ボトル数</th><th>状態</th><th>操作</th>
        </tr></thead>
        <tbody id="tb-badges"></tbody>
      </table>
    </div>

    <!-- メンバーバッジ管理 -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">メンバーバッジ管理</span>
      </div>
      <div class="frow" style="margin-bottom:16px">
        <label>会員選択</label>
        <select id="sel-member" style="max-width:360px">
          <option value="">-- 会員を選択 --</option>
        </select>
      </div>
      <div id="member-badge-area" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="font-size:12px;color:var(--ink3)" id="member-badge-label"></span>
          <div style="display:flex;gap:8px">
            <button class="btn bs sm" id="btn-rejudge-member">🔄 この会員を再判定</button>
            <button class="btn bp sm" id="btn-award">＋ バッジ付与</button>
          </div>
        </div>
        <div class="badge-grid" id="member-badge-grid"></div>
        <div id="member-badge-empty" style="display:none;color:var(--ink3);font-size:12px;padding:8px 0">取得済みバッジはありません</div>
      </div>
    </div>

  </div>
</div>

<!-- Modal: バッジ編集 -->
<div class="mbg" id="m-badge">
  <div class="mbox wide">
    <div class="mhead">
      <h3 id="mt-badge">バッジ登録</h3>
      <button class="mclose" data-close="m-badge">✕</button>
    </div>
    <div class="mbody">

      <!-- Row 1: ID + 種別 -->
      <div class="grid2">
        <div class="frow">
          <label>バッジID <span style="color:var(--ink3);font-weight:400">(種別1桁+連番3桁)</span></label>
          <input type="text" id="badge-id" placeholder="例: 1001" maxlength="4">
        </div>
        <div class="frow">
          <label>種別</label>
          <select id="badge-type">
            <option value="1">1 — ブランド制覇</option>
            <option value="2">2 — エリア制覇</option>
            <option value="3">3 — クラス制覇</option>
            <option value="4">4 — イベント制覇</option>
            <option value="5">5 — 来場・紹介等</option>
            <option value="6">6 — ブラインド</option>
          </select>
        </div>
      </div>

      <!-- Row 2: バッジ名 + 略称 -->
      <div style="display:grid;grid-template-columns:1fr 90px;gap:0 12px">
        <div class="frow">
          <label>バッジ名</label>
          <input type="text" id="badge-name" placeholder="例: ブランコ制覇">
        </div>
        <div class="frow">
          <label>略称 <span style="color:var(--ink3);font-weight:400">(3文字)</span></label>
          <input type="text" id="badge-abbr" placeholder="BLC" maxlength="3"
            style="text-align:center;font-family:var(--mono);text-transform:uppercase">
        </div>
      </div>

      <!-- メダル選択 -->
      <div class="frow">
        <label>アイコン (メダル)</label>
        <div class="medal-sel" id="medal-sel">
          <label class="medal-opt"><input type="radio" name="badge-medal" value="🥇">🥇</label>
          <label class="medal-opt"><input type="radio" name="badge-medal" value="🥈">🥈</label>
          <label class="medal-opt"><input type="radio" name="badge-medal" value="🥉">🥉</label>
          <label class="medal-opt"><input type="radio" name="badge-medal" value="🏅">🏅</label>
          <label class="medal-opt"><input type="radio" name="badge-medal" value="🎖️">🎖️</label>
          <label class="medal-opt"><input type="radio" name="badge-medal" value="🏆">🏆</label>
        </div>
      </div>

      <!-- 説明 + 有効 -->
      <div class="frow">
        <label>説明</label>
        <textarea id="badge-desc" placeholder="バッジの説明（コレクション画面に表示）"></textarea>
      </div>
      <div class="frow" style="margin-bottom:16px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none;letter-spacing:0;font-size:13px;font-weight:400">
          <input type="checkbox" id="badge-active" checked style="width:14px;height:14px;accent-color:var(--teal)">
          有効（閉店時バッジ判定の対象にする）
        </label>
      </div>

      <!-- Type 1: ブランド制覇 -->
      <div id="type-section-1" class="type-section">
        <div class="frow" style="margin-bottom:8px">
          <label>選択済みボトル <span id="sel-count" style="color:var(--teal);font-size:11px">(0本)</span></label>
          <div class="sel-bottle-list empty" id="sel-bottle-list">ボトルを追加してください</div>
        </div>
        <div class="bjrax-bar">
          <span style="font-size:10px;color:var(--ink3);font-weight:500;flex-shrink:0">BJRAX:</span>
          <label class="bjrax-chk"><input type="checkbox" class="bjrax-filter" value="B" checked>B</label>
          <label class="bjrax-chk"><input type="checkbox" class="bjrax-filter" value="J" checked>J</label>
          <label class="bjrax-chk"><input type="checkbox" class="bjrax-filter" value="R" checked>R</label>
          <label class="bjrax-chk"><input type="checkbox" class="bjrax-filter" value="A" checked>A</label>
          <label class="bjrax-chk"><input type="checkbox" class="bjrax-filter" value="X" checked>X</label>
          <button class="btn bs sm" id="btn-bjrax-reset" type="button">リセット</button>
          <input type="text" id="avail-search" placeholder="NOM / ボトル名…"
            style="flex:1;min-width:80px;padding:3px 8px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;background:var(--cream)">
          <select id="avail-sort" style="padding:3px 8px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;background:var(--cream)">
            <option value="id">ID順</option>
            <option value="bjrax">BJRAX順</option>
          </select>
        </div>
        <div class="avail-list" id="avail-list"></div>
      </div>

      <!-- Type 2: エリア制覇 -->
      <div id="type-section-2" class="type-section" style="display:none">
        <div class="frow">
          <label>エリア</label>
          <select id="badge-area">
            <option value="valles">Valles</option>
            <option value="altos">Los Altos</option>
            <option value="tequila">Tequila</option>
            <option value="exjalisco">Ex-Jalisco</option>
          </select>
        </div>
        <div class="note-box">エリア制覇の詳細設定は後日対応予定です。</div>
      </div>

      <!-- Type 3: クラス制覇 -->
      <div id="type-section-3" class="type-section" style="display:none">
        <div class="frow">
          <label>対象クラス</label>
          <div style="display:flex;gap:12px;flex-wrap:wrap;padding:6px 0">
            <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" class="class-filter" value="B">Blanco (B)</label>
            <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" class="class-filter" value="J">Joven (J)</label>
            <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" class="class-filter" value="R">Reposado (R)</label>
            <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" class="class-filter" value="A">Añejo (A)</label>
            <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" class="class-filter" value="X">Extra Añejo (X)</label>
          </div>
        </div>
        <div class="note-box">クラス制覇の詳細設定は後日対応予定です。</div>
      </div>

      <!-- Type 4: イベント制覇 -->
      <div id="type-section-4" class="type-section" style="display:none">
        <div class="frow">
          <label>イベント名</label>
          <input type="text" id="badge-event-name" placeholder="例: 2026春テイスティングイベント">
        </div>
        <div class="note-box">イベント制覇バッジは手動付与のみ対応しています。</div>
      </div>

      <!-- Type 5: 来場・紹介等 -->
      <div id="type-section-5" class="type-section" style="display:none">
        <div class="frow">
          <label>メトリクス</label>
          <select id="badge-metric">
            <option value="visit">来場回数</option>
            <option value="referral">紹介回数</option>
            <option value="tasting_count">試飲数</option>
            <option value="tasting_variety">試飲酒類</option>
            <option value="login">ログイン数</option>
          </select>
        </div>
        <div class="frow">
          <label>閾値</label>
          <input type="number" id="badge-threshold" placeholder="例: 10" min="1">
        </div>
        <div class="note-box">来場・紹介等バッジの詳細設定は後日対応予定です。</div>
      </div>

      <!-- Type 6: ブラインド -->
      <div id="type-section-6" class="type-section" style="display:none">
        <div class="frow">
          <label>メトリクス</label>
          <select id="badge-blind-metric">
            <option value="count">ブラインド回数</option>
            <option value="correct">正解数</option>
            <option value="correct_rate">正解率</option>
          </select>
        </div>
        <div class="frow">
          <label>閾値</label>
          <input type="number" id="badge-blind-threshold" placeholder="例: 5" min="1">
        </div>
        <div class="note-box">ブラインドバッジの詳細設定は後日対応予定です。</div>
      </div>

    </div>
    <div class="mfoot">
      <button class="btn bs" data-close="m-badge">キャンセル</button>
      <button class="btn bp" id="btn-save-badge">保存</button>
    </div>
  </div>
</div>

<!-- Modal: バッジ手動付与 -->
<div class="mbg" id="m-award">
  <div class="mbox">
    <div class="mhead">
      <h3>バッジ手動付与</h3>
      <button class="mclose" data-close="m-award">✕</button>
    </div>
    <div class="mbody">
      <div class="frow">
        <label>付与するバッジ</label>
        <select id="award-badge-sel"></select>
      </div>
      <div style="font-size:12px;color:var(--ink3);margin-top:4px;min-height:20px" id="award-badge-desc2"></div>
    </div>
    <div class="mfoot">
      <button class="btn bs" data-close="m-award">キャンセル</button>
      <button class="btn bp" id="btn-confirm-award">付与する</button>
    </div>
  </div>
</div>

<div id="toast-wrap"></div>

<script>
firebase.initializeApp(FIREBASE_CONFIG);
var auth=firebase.auth(), db=firebase.firestore(), storage=firebase.storage();
var cache={badges:[],bottles:[],members:[],memberBadges:[]};
var editBadgeId=null, curMemberId=null;
var nomMap={};         // distilleryId → nom
var selectedBottleIds=[];  // type-1 bottle picker state

function g(id){return document.getElementById(id);}
function gv(id){var e=g(id);return e?e.value:'';}
function sv(id,v){var e=g(id);if(e)e.value=v;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg,type){
  var w=g('toast-wrap'),el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');el.textContent=msg;
  w.appendChild(el);
  requestAnimationFrame(function(){requestAnimationFrame(function(){el.classList.add('show');});});
  setTimeout(function(){el.classList.remove('show');setTimeout(function(){el.remove();},300);},3500);
}

// ── Auth ──────────────────────────────────────────────────────
AuthRole.requireOwner(auth,function(){
  g('app').style.display='block';
  loadAll();
},function(){
  g('login-screen').style.display='flex';
});
g('lbtn').addEventListener('click',function(){
  auth.signInWithEmailAndPassword(gv('lemail'),gv('lpass')).catch(function(e){g('lerr').textContent=e.message;});
});

// ── Loaders ───────────────────────────────────────────────────
async function loadAll(){
  await Promise.all([loadBadges(),loadBottles(),loadMembers(),loadMemberBadges(),loadDistilleries()]);
}
async function loadBadges(){
  var snap=await db.collection('badges').get();
  cache.badges=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
  cache.badges.sort(function(a,b){return a.id.localeCompare(b.id);});
  renderBadges();
}
async function loadBottles(){
  var snap=await db.collection('bottles').get();
  cache.bottles=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
  cache.bottles.sort(function(a,b){return a.id.localeCompare(b.id);});
}
async function loadMembers(){
  var snap=await db.collection('members').get();
  cache.members=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
  cache.members.sort(function(a,b){return (a.memberId||a.id).localeCompare(b.memberId||b.id);});
  renderMemberSelect();
}
async function loadMemberBadges(){
  var snap=await db.collection('memberBadges').get();
  cache.memberBadges=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
}
async function loadDistilleries(){
  var snap=await db.collection('distilleries').get();
  snap.docs.forEach(function(d){nomMap[d.id]=d.data().nom||'';});
}

// ── Bottle helpers ────────────────────────────────────────────
var BJRAX_MAP={'1':'B','2':'J','3':'R','4':'A','5':'X'};
function getBottleClass(b){
  var ci=String(b.classId||'');
  return BJRAX_MAP[ci.slice(-1)]||'?';
}
function getBottleNom(b){
  var brandId=String(b.brandId||'');
  var distId=brandId.slice(0,4);
  return distId?nomMap[distId]||'':'';
}

// ── Badge list ────────────────────────────────────────────────
var TYPE_NAMES={1:'ブランド制覇',2:'エリア制覇',3:'クラス制覇',4:'イベント制覇',5:'来場・紹介等',6:'ブラインド'};

function renderBadges(){
  var tb=g('tb-badges');
  if(!cache.badges.length){tb.innerHTML='<tr><td colspan="7" class="ec">バッジがありません</td></tr>';return;}
  tb.innerHTML=cache.badges.map(function(b){
    var iconCell='<div style="display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1">'
      +'<span style="font-size:20px">'+(b.icon||'🎖️')+'</span>'
      +(b.abbr?'<span style="font-size:9px;font-family:var(--mono);color:var(--ink3);letter-spacing:.05em">'+esc(b.abbr)+'</span>':'')
    +'</div>';
    var typeName=TYPE_NAMES[parseInt(b.type)]||('type:'+b.type);
    var bottleCount=(b.type==='1'||b.type===1)?((b.bottleIds||[]).length):'—';
    return '<tr>'
      +'<td>'+iconCell+'</td>'
      +'<td class="mono">'+esc(b.id)+'</td>'
      +'<td>'+esc(b.name||'—')+'</td>'
      +'<td class="dim" style="font-size:11px">'+esc(typeName)+'</td>'
      +'<td class="mono dim" style="text-align:center">'+bottleCount+'</td>'
      +'<td style="font-size:11px;color:'+(b.active?'var(--teal)':'var(--ink3)')+'">'+( b.active?'有効':'無効')+'</td>'
      +'<td><div class="acts">'
        +'<button class="btn bs sm" data-edit-badge="'+esc(b.id)+'">編集</button>'
        +'<button class="btn bd sm" data-del-badge="'+esc(b.id)+'">削除</button>'
      +'</div></td></tr>';
  }).join('');
}

// ── Type-1 bottle picker ──────────────────────────────────────
function renderSelectedList(){
  var list=g('sel-bottle-list');
  var cnt=g('sel-count');
  if(cnt)cnt.textContent='('+selectedBottleIds.length+'本)';
  if(!selectedBottleIds.length){
    list.className='sel-bottle-list empty';
    list.innerHTML='ボトルを追加してください';
    renderAvailList();
    return;
  }
  list.className='sel-bottle-list';
  list.innerHTML=selectedBottleIds.map(function(bid){
    var b=cache.bottles.find(function(x){return x.id===bid;})||{id:bid};
    var cls=getBottleClass(b);
    var nom=getBottleNom(b);
    var nm=b.bottleJa||b.bottleEs||bid;
    return '<div class="sel-row">'
      +'<span class="sr-cls">'+esc(cls)+'</span>'
      +(nom?'<span class="sr-nom">NOM '+esc(nom)+'</span>':'')
      +'<span class="sr-name">'+esc(nm)+'</span>'
      +'<button class="sr-del" data-remove-bottle="'+esc(bid)+'" type="button">×</button>'
    +'</div>';
  }).join('');
  renderAvailList();
}

function renderAvailList(){
  var list=g('avail-list');if(!list)return;
  var q=(gv('avail-search')||'').toLowerCase();
  var checkedBjrax=Array.from(document.querySelectorAll('.bjrax-filter:checked')).map(function(c){return c.value;});
  var sort=gv('avail-sort')||'id';
  var selSet=new Set(selectedBottleIds);

  var filtered=cache.bottles.filter(function(b){
    if(selSet.has(b.id))return false;
    var cls=getBottleClass(b);
    if(checkedBjrax.indexOf(cls)<0)return false;
    if(q){
      var nom=String(getBottleNom(b));
      var nm=(b.bottleJa||b.bottleEs||'').toLowerCase();
      return nm.indexOf(q)>=0||nom.indexOf(q)>=0||b.id.toLowerCase().indexOf(q)>=0;
    }
    return true;
  });

  if(sort==='bjrax'){
    var order={B:0,J:1,R:2,A:3,X:4};
    filtered.sort(function(a,b2){
      var ca=order[getBottleClass(a)]; if(ca===undefined)ca=99;
      var cb=order[getBottleClass(b2)]; if(cb===undefined)cb=99;
      if(ca!==cb)return ca-cb;
      return (a.bottleJa||a.bottleEs||a.id).localeCompare(b2.bottleJa||b2.bottleEs||b2.id,'ja');
    });
  } else {
    filtered.sort(function(a,b2){return a.id.localeCompare(b2.id);});
  }

  if(!filtered.length){
    list.innerHTML='<div class="avail-row" style="justify-content:center;color:var(--ink3);cursor:default">該当ボトルなし</div>';
    return;
  }
  list.innerHTML=filtered.map(function(b){
    var cls=getBottleClass(b);
    var nom=getBottleNom(b);
    var nm=b.bottleJa||b.bottleEs||b.id;
    return '<div class="avail-row">'
      +'<span class="ar-cls">'+esc(cls)+'</span>'
      +(nom?'<span class="ar-nom">NOM '+esc(nom)+'</span>':'')
      +'<span class="ar-name">'+esc(nm)+'</span>'
      +'<button class="ar-add" data-add-bottle="'+esc(b.id)+'" type="button">＋</button>'
    +'</div>';
  }).join('');
}

function addBottle(id){
  if(selectedBottleIds.indexOf(id)<0){
    selectedBottleIds.push(id);
    renderSelectedList();
  }
}
function removeBottle(id){
  selectedBottleIds=selectedBottleIds.filter(function(x){return x!==id;});
  renderSelectedList();
}

// Filter / sort event listeners for avail list
g('avail-search').addEventListener('input',renderAvailList);
g('avail-sort').addEventListener('change',renderAvailList);
document.querySelectorAll('.bjrax-filter').forEach(function(c){c.addEventListener('change',renderAvailList);});
g('btn-bjrax-reset').addEventListener('click',function(){
  document.querySelectorAll('.bjrax-filter').forEach(function(c){c.checked=true;});
  renderAvailList();
});

// Badge type change: show/hide sections, auto-update ID prefix
g('badge-type').addEventListener('change',function(){
  onBadgeTypeChange();
  var idEl=g('badge-id');
  if(idEl&&idEl.dataset.autoId==='1'){
    idEl.value=nextBadgeId(this.value);
  }
});

function onBadgeTypeChange(){
  var type=gv('badge-type');
  for(var t=1;t<=6;t++){
    var el=g('type-section-'+t);
    if(el)el.style.display=(String(t)===type)?'':'none';
  }
}

// ── Badge edit modal ──────────────────────────────────────────
function nextBadgeId(type){
  var prefix=String(type);
  var max=cache.badges.filter(function(b){return String(b.id).charAt(0)===prefix;})
    .reduce(function(m,b){return Math.max(m,parseInt(String(b.id).slice(1))||0);},0);
  return prefix+String(max+1).padStart(3,'0');
}

function openBadgeModal(id){
  editBadgeId=id||null;
  g('mt-badge').textContent=id?'バッジ編集':'バッジ登録';
  var b=id?cache.badges.find(function(x){return x.id===id;})||{}:{};
  var type=String(b.type||'1');

  var idEl=g('badge-id');
  idEl.value=id||nextBadgeId(type);
  idEl.dataset.autoId=id?'0':'1';
  idEl.readOnly=!!id;
  idEl.style.opacity=id?'.6':'1';

  sv('badge-type',type);
  sv('badge-name',b.name||'');
  sv('badge-abbr',b.abbr||'');
  sv('badge-desc',b.description||'');
  g('badge-active').checked=b.active!==false;

  // Medal
  var medal=b.icon||'🎖️';
  var radios=document.querySelectorAll('input[name="badge-medal"]');
  radios.forEach(function(r){r.checked=(r.value===medal);});
  if(!Array.from(radios).some(function(r){return r.checked;})){
    var def=Array.from(radios).find(function(r){return r.value==='🎖️';});
    if(def)def.checked=true;
  }

  // Show correct type section
  onBadgeTypeChange();

  // Type 1: bottles
  selectedBottleIds=(b.bottleIds||[]).slice();
  sv('avail-search','');
  sv('avail-sort','id');
  document.querySelectorAll('.bjrax-filter').forEach(function(c){c.checked=true;});
  renderSelectedList();

  // Type 2
  if(b.area)sv('badge-area',b.area);
  // Type 3
  document.querySelectorAll('.class-filter').forEach(function(c){
    c.checked=b.targetClasses?b.targetClasses.indexOf(c.value)>=0:false;
  });
  // Type 4
  sv('badge-event-name',b.eventName||'');
  // Type 5
  if(b.metric)sv('badge-metric',b.metric);
  sv('badge-threshold',b.threshold||'');
  // Type 6
  if(b.blindMetric)sv('badge-blind-metric',b.blindMetric);
  sv('badge-blind-threshold',b.blindThreshold||'');

  g('m-badge').classList.add('open');
}
g('btn-add-badge').addEventListener('click',function(){openBadgeModal(null);});

g('btn-save-badge').addEventListener('click',async function(){
  var id=gv('badge-id').trim();
  var name=gv('badge-name').trim();
  var type=gv('badge-type');
  if(!id||id.length<2||id.length>4){toast('バッジIDは2〜4桁で入力してください','err');return;}
  if(!name){toast('バッジ名は必須です','err');return;}
  if(!editBadgeId&&cache.badges.some(function(b){return b.id===id;})){toast('バッジID「'+id+'」は既に存在します','err');return;}

  var medal=document.querySelector('input[name="badge-medal"]:checked');
  var icon=medal?medal.value:'🎖️';
  var abbr=gv('badge-abbr').trim().toUpperCase().slice(0,3)||null;

  var data={
    type:type,name:name,abbr:abbr,icon:icon,
    description:gv('badge-desc')||null,
    active:g('badge-active').checked,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  };

  if(type==='1'){
    data.bottleIds=selectedBottleIds;
  }else if(type==='2'){
    data.area=gv('badge-area')||null;
  }else if(type==='3'){
    data.targetClasses=Array.from(document.querySelectorAll('.class-filter:checked')).map(function(c){return c.value;});
  }else if(type==='4'){
    data.eventName=gv('badge-event-name').trim()||null;
  }else if(type==='5'){
    data.metric=gv('badge-metric')||null;
    var thr=Number(gv('badge-threshold'));
    data.threshold=thr||null;
  }else if(type==='6'){
    data.blindMetric=gv('badge-blind-metric')||null;
    var bthr=Number(gv('badge-blind-threshold'));
    data.blindThreshold=bthr||null;
  }

  try{
    await db.collection('badges').doc(editBadgeId||id).set(data,{merge:true});
    toast(editBadgeId?'バッジを更新しました':'バッジを登録しました');
    g('m-badge').classList.remove('open');
    await loadBadges();
  }catch(e){toast('保存失敗: '+e.message,'err');}
});

// ── Member select & badge display ─────────────────────────────
function renderMemberSelect(){
  var opts=['<option value="">-- 会員を選択 --</option>'];
  cache.members.forEach(function(m){
    var mid=m.memberId||m.id;
    var label=esc((m.nickname||m.name||mid)+' ['+mid+']');
    opts.push('<option value="'+esc(mid)+'">'+label+'</option>');
  });
  g('sel-member').innerHTML=opts.join('');
}
function renderMemberBadges(memberId){
  curMemberId=memberId;
  var area=g('member-badge-area');
  if(!memberId){area.style.display='none';return;}
  area.style.display='block';
  var earned=cache.memberBadges.filter(function(mb){return mb.memberId===memberId;});
  g('member-badge-label').textContent=earned.length+'個のバッジを取得済み';
  var grid=g('member-badge-grid');
  var empty=g('member-badge-empty');
  if(!earned.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  grid.innerHTML=earned.map(function(mb){
    var badge=cache.badges.find(function(b){return b.id===mb.badgeId;})||{};
    var dt=mb.earnedAt?(mb.earnedAt.toDate?mb.earnedAt.toDate():new Date(mb.earnedAt)).toLocaleDateString('ja-JP'):'';
    return '<div class="badge-chip">'
      +'<div class="bi" style="display:flex;flex-direction:column;align-items:flex-start;gap:2px">'
        +'<span style="font-size:22px">'+(badge.icon||'🎖️')+'</span>'
        +(badge.abbr?'<span style="font-size:9px;font-family:var(--mono);color:var(--ink3)">'+esc(badge.abbr)+'</span>':'')
      +'</div>'
      +'<div class="bn">'+esc(badge.name||mb.badgeId)+'</div>'
      +'<div class="bm">'+(mb.source==='manual'?'手動':'自動')+(dt?' · '+dt:'')+'</div>'
      +'<div style="margin-top:6px"><button class="btn bd sm" data-revoke="'+esc(mb.id)+'">剥奪</button></div>'
    +'</div>';
  }).join('');
}
g('sel-member').addEventListener('change',function(){renderMemberBadges(this.value);});

// ── 静的コレクションページ再生成 ────────────────────────────────
function esc2(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function genCollectionHtml(memberName, allBadgesArg, earnedMap){
  var now=new Date().toLocaleDateString('ja-JP');
  var earnedCount=allBadgesArg.filter(function(b){return !!earnedMap[b.id];}).length;
  var rows=allBadgesArg.map(function(b){
    var mb=earnedMap[b.id]; var earned=!!mb;
    var dt=mb&&mb.earnedAt?(mb.earnedAt.toDate?mb.earnedAt.toDate():new Date(mb.earnedAt)).toLocaleDateString('ja-JP'):'';
    var iconHtml='<div style="font-size:30px;line-height:1">'+(b.icon||'🎖️')+'</div>'
      +(b.abbr?'<div style="font-size:9px;font-family:monospace;letter-spacing:.05em;color:#9a8470">'+esc2(b.abbr)+'</div>':'');
    return '<div style="border:2px solid '+(earned?'#c8921e':'#d0c8bc')+';border-radius:10px;padding:14px 10px;'
      +'display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;'
      +'background:'+(earned?'rgba(200,146,30,.06)':'#fff')+(earned?'':';opacity:.45;filter:grayscale(.5)')+';">'
      +iconHtml
      +'<div style="font-size:12px;font-weight:600;color:#4a3820">'+esc2(b.name)+'</div>'
      +(b.description?'<div style="font-size:10px;color:#9a8470;line-height:1.4">'+esc2(b.description)+'</div>':'')
      +(earned?'<div style="font-size:10px;color:#1a6e58;margin-top:2px">取得: '+dt+'</div>'
               :'<div style="font-size:10px;color:#9a8470;margin-top:2px">🔒</div>')
    +'</div>';
  }).join('');
  return '<!DOCTYPE html>\n<html lang="ja"><head><meta charset="UTF-8">'
    +'<meta name="viewport" content="width=device-width,initial-scale=1">'
    +'<title>'+esc2(memberName)+' のバッジコレクション — テキーラ道場</title>'
    +'<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">'
    +'<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:"Noto Sans JP",sans-serif;background:#faf7f1;color:#18110a;min-height:100vh}'
    +'.hero{background:#18110a;padding:28px 20px 22px;text-align:center}'
    +'.brand{font-family:"Cormorant Garamond",serif;font-size:22px;color:rgba(255,255,255,.9);letter-spacing:.12em}'
    +'.sub{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:3px}'
    +'.name{font-size:18px;color:#e8b84a;font-weight:500;margin-top:12px}'
    +'.cnt{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}'
    +'.main{max-width:700px;margin:0 auto;padding:20px 16px 50px}'
    +'.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}'
    +'.foot{text-align:center;font-size:10px;color:#9a8470;margin-top:30px}'
    +'</style></head><body>'
    +'<div class="hero"><div class="brand">TEQUILA DOJO</div><div class="sub">Badge Collection</div>'
    +'<div class="name">'+esc2(memberName)+'</div>'
    +'<div class="cnt">'+earnedCount+' / '+allBadgesArg.length+' バッジ取得済み</div></div>'
    +'<div class="main"><div class="grid">'+rows+'</div>'
    +'<div class="foot">Generated: '+now+' — テキーラ道場</div></div></body></html>';
}

async function regenerateCollectionIfPublic(memberId){
  var mem=cache.members.find(function(m){return (m.memberId||m.id)===memberId;});
  if(!mem||!mem.badgePublic)return;
  var memberName=mem.nickname||mem.name||memberId;
  var memberDocId=mem.id;
  var earnedMap={};
  cache.memberBadges.filter(function(mb){return mb.memberId===memberId;})
    .forEach(function(mb){earnedMap[mb.badgeId]=mb;});
  var html=genCollectionHtml(memberName, cache.badges.filter(function(b){return b.active;}), earnedMap);
  var blob=new Blob([html],{type:'text/html;charset=utf-8'});
  var ref=storage.ref('public/collections/'+memberId+'.html');
  await ref.put(blob,{contentType:'text/html;charset=utf-8',cacheControl:'no-cache'});
  var url=await ref.getDownloadURL();
  await db.collection('members').doc(memberDocId).update({badgeCollectionUrl:url});
}

async function deleteCollectionIfPublic(memberId){
  var mem=cache.members.find(function(m){return (m.memberId||m.id)===memberId;});
  if(!mem||!mem.badgePublic)return;
  try{
    await storage.ref('public/collections/'+memberId+'.html').delete();
    await db.collection('members').doc(mem.id).update({badgePublic:false,badgeCollectionUrl:null});
    mem.badgePublic=false; mem.badgeCollectionUrl=null;
  }catch(e){if(e.code!=='storage/object-not-found')console.warn('静的ページ削除失敗:',e);}
}

// ── Award ─────────────────────────────────────────────────────
g('btn-award').addEventListener('click',function(){
  if(!curMemberId){toast('会員を選択してください','err');return;}
  var earned=new Set(cache.memberBadges.filter(function(mb){return mb.memberId===curMemberId;}).map(function(mb){return mb.badgeId;}));
  var avail=cache.badges.filter(function(b){return b.active&&!earned.has(b.id);});
  if(!avail.length){toast('付与できるバッジがありません','inf');return;}
  var sel=g('award-badge-sel');
  sel.innerHTML=avail.map(function(b){return '<option value="'+esc(b.id)+'">'+(b.icon||'🎖️')+' '+esc(b.name)+' ['+esc(b.id)+']</option>';}).join('');
  sel.onchange=function(){var b=cache.badges.find(function(x){return x.id===sel.value;})||{};g('award-badge-desc2').textContent=b.description||'';};
  sel.onchange();
  g('m-award').classList.add('open');
});
g('btn-confirm-award').addEventListener('click',async function(){
  var badgeId=gv('award-badge-sel');
  if(!badgeId||!curMemberId)return;
  try{
    await db.collection('memberBadges').doc(curMemberId+'_'+badgeId).set({
      memberId:curMemberId,badgeId:badgeId,
      earnedAt:firebase.firestore.FieldValue.serverTimestamp(),
      source:'manual'
    });
    toast('バッジを付与しました');
    g('m-award').classList.remove('open');
    await loadMemberBadges();
    renderMemberBadges(curMemberId);
    regenerateCollectionIfPublic(curMemberId).catch(function(e){console.warn('静的ページ再生成失敗:',e);});
  }catch(e){toast('付与失敗: '+e.message,'err');}
});

// ── Click delegation ──────────────────────────────────────────
document.addEventListener('click',function(e){
  var btn=e.target.closest('button');if(!btn)return;
  var dc=btn.dataset.close;if(dc){g(dc).classList.remove('open');return;}
  if(btn.dataset.editBadge){openBadgeModal(btn.dataset.editBadge);return;}
  if(btn.dataset.addBottle){addBottle(btn.dataset.addBottle);return;}
  if(btn.dataset.removeBottle){removeBottle(btn.dataset.removeBottle);return;}
  if(btn.dataset.delBadge){
    var bid=btn.dataset.delBadge;
    if(!confirm('バッジ「'+bid+'」を削除しますか？\n（取得済み会員のデータは残ります）'))return;
    db.collection('badges').doc(bid).delete()
      .then(function(){toast('削除しました');loadBadges();})
      .catch(function(e){toast('削除失敗: '+e.message,'err');});
    return;
  }
  if(btn.dataset.revoke){
    if(!confirm('このバッジを剥奪しますか？'))return;
    var revokeTarget=curMemberId;
    db.collection('memberBadges').doc(btn.dataset.revoke).delete()
      .then(function(){
        toast('剥奪しました');
        return loadMemberBadges().then(function(){
          renderMemberBadges(revokeTarget);
          regenerateCollectionIfPublic(revokeTarget).catch(function(e){console.warn('静的ページ再生成失敗:',e);});
        });
      })
      .catch(function(e){toast('剥奪失敗: '+e.message,'err');});
    return;
  }
});

// ── Badge judge engine ────────────────────────────────────────
async function runBadgeJudge(targetMemberIds){
  var activeBadges=cache.badges.filter(function(b){return b.active&&(b.type==='1'||b.type===1)&&(b.bottleIds||[]).length;});
  if(!activeBadges.length)return{awarded:0};

  var thresholds={};
  cache.bottles.forEach(function(b){thresholds[b.id]=(b.minTasting===1||b.minTasting==='1')?5:10;});

  var mbSnap=await db.collection('memberBadges').get();
  var existSet=new Set(mbSnap.docs.map(function(d){var dd=d.data();return dd.memberId+'|'+dd.badgeId;}));

  var mems=targetMemberIds
    ?cache.members.filter(function(m){return targetMemberIds.indexOf(m.memberId||m.id)>=0;})
    :cache.members;

  var awarded=0;
  for(var mi=0;mi<mems.length;mi++){
    var mem=mems[mi];
    var mid=mem.memberId||mem.id;if(!mid)continue;

    var visSnap=await db.collection('visits').where('memberId','==',mid).get().catch(function(){return{docs:[]};});
    var vkeys=visSnap.docs.map(function(d){return d.id;});
    if(!vkeys.length)continue;

    // 注文をvisitKeyで集約（bottleDataId→qty）
    var bdQty={};
    for(var i=0;i<vkeys.length;i+=30){
      var chunk=vkeys.slice(i,i+30);
      var ordSnap=await db.collection('orders').where('visitKey','in',chunk).get().catch(function(){return{docs:[]};});
      ordSnap.docs.forEach(function(d){
        var o=d.data();
        if(o.deleted===1||o.served===0||!o.productCode)return;
        if(o.productType==='tequila'||o.productType==='other'){
          bdQty[o.productCode]=(bdQty[o.productCode]||0)+(o.qty||0);
        }
      });
    }

    // bottleDataId→bottleId変換
    var bdIds=Object.keys(bdQty);
    var bottleQty={};
    for(var j=0;j<bdIds.length;j+=30){
      var bdChunk=bdIds.slice(j,j+30);
      var bdSnap=await db.collection('bottleData')
        .where(firebase.firestore.FieldPath.documentId(),'in',bdChunk).get().catch(function(){return{docs:[]};});
      bdSnap.docs.forEach(function(d){
        var bd=d.data();
        if(bd.bottleId&&bdQty[d.id]) bottleQty[bd.bottleId]=(bottleQty[bd.bottleId]||0)+bdQty[d.id];
      });
    }

    // バッジ判定
    var batch=db.batch();var cnt=0;
    for(var bi=0;bi<activeBadges.length;bi++){
      var badge=activeBadges[bi];
      if(existSet.has(mid+'|'+badge.id))continue;
      var ok=(badge.bottleIds||[]).every(function(bid){
        return (bottleQty[bid]||0)>=(thresholds[bid]!==undefined?thresholds[bid]:10);
      });
      if(ok){
        batch.set(db.collection('memberBadges').doc(mid+'_'+badge.id),{
          memberId:mid,badgeId:badge.id,
          earnedAt:firebase.firestore.FieldValue.serverTimestamp(),
          source:'auto'
        });
        existSet.add(mid+'|'+badge.id);
        cnt++;awarded++;
      }
    }
    if(cnt>0)await batch.commit();
  }
  return{awarded:awarded};
}

// 全会員再判定ボタン
g('btn-rejudge').addEventListener('click',async function(){
  if(!confirm('全会員を対象にバッジ条件を再判定します（時間がかかります）。続けますか？'))return;
  var btn=this;btn.disabled=true;btn.textContent='判定中…';
  try{
    await loadAll();
    var r=await runBadgeJudge(null);
    toast('再判定完了: '+r.awarded+'件付与',r.awarded>0?'inf':'');
    await loadMemberBadges();
    if(curMemberId)renderMemberBadges(curMemberId);
  }catch(e){toast('再判定失敗: '+e.message,'err');}
  btn.disabled=false;btn.textContent='🔄 全会員再判定';
});

// この会員を再判定ボタン
g('btn-rejudge-member').addEventListener('click',async function(){
  if(!curMemberId)return;
  var btn=this;btn.disabled=true;btn.textContent='判定中…';
  try{
    await loadAll();
    var r=await runBadgeJudge([curMemberId]);
    toast('再判定完了: '+r.awarded+'件付与',r.awarded>0?'inf':'');
    await loadMemberBadges();
    renderMemberBadges(curMemberId);
  }catch(e){toast('再判定失敗: '+e.message,'err');}
  btn.disabled=false;btn.textContent='🔄 この会員を再判定';
});
