<style>
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --cream:#F1EFE8;--cream2:#E8E4D8;--cream3:#DDD8C8;
  --red:#b03020;--teal:#1a6e58;
  --sans:'Noto Sans JP',sans-serif;--serif:'Cormorant Garamond',serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:var(--sans);height:100vh;display:flex;flex-direction:column;}

/* ── Header ── */
.hdr{background:var(--ink);padding:0 16px;display:flex;align-items:center;gap:12px;height:52px;flex-shrink:0;}
.hdr-logo{font-family:var(--serif);font-size:17px;color:var(--gold-l);letter-spacing:.04em;}
.hdr-sub{font-size:11px;color:var(--ink3);margin-top:1px;}
.hdr-back{margin-left:auto;color:var(--gold-l);font-size:12px;text-decoration:none;opacity:.8;}
.hdr-back:hover{opacity:1;}

/* ── Controls bar ── */
.ctrl-bar{background:var(--cream2);border-bottom:1px solid var(--cream3);padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0;}
.ctrl-bar select,.ctrl-bar input{padding:5px 9px;border:1px solid var(--cream3);border-radius:5px;background:#fff;color:var(--ink);font-family:var(--sans);font-size:12px;}
.ctrl-bar select:focus,.ctrl-bar input:focus{outline:none;border-color:var(--gold);}
#map-count{font-size:11px;color:var(--ink3);margin-left:auto;}
.ctrl-btn{padding:5px 11px;border:1px solid var(--cream3);border-radius:5px;background:#fff;color:var(--ink2);font-family:var(--sans);font-size:12px;cursor:pointer;transition:.15s;}
.ctrl-btn.on{background:var(--ink);color:var(--cream);border-color:var(--ink);}
.ctrl-btn:hover{border-color:var(--gold);}

/* ── Legend ── */
.legend{position:absolute;bottom:28px;right:10px;z-index:999;background:rgba(241,239,232,.92);backdrop-filter:blur(4px);border:1px solid var(--cream3);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--ink2);}
.legend-item{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.legend-item:last-child{margin-bottom:0;}
.legend-dot{width:10px;height:10px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.3);flex-shrink:0;}

/* ── Loading overlay ── */
#map-loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1000;background:rgba(24,17,10,.8);color:var(--cream);padding:10px 22px;border-radius:8px;font-size:13px;pointer-events:none;}

/* ── Map ── */
#map{flex:1;position:relative;}

/* ── Popup ── */
.dis-pop{font-family:var(--sans);min-width:190px;line-height:1.5;}
.dis-pop .p-nom{font-family:var(--mono);font-size:10px;color:var(--ink3);letter-spacing:.05em;}
.dis-pop .p-ja{font-size:14px;font-weight:500;color:var(--ink);margin:2px 0 1px;}
.dis-pop .p-es{font-size:11px;color:var(--ink3);margin-bottom:5px;}
.dis-pop .p-loc{font-size:11px;color:var(--ink2);margin-bottom:8px;}
.dis-pop .p-btn{display:inline-block;background:var(--ink);color:var(--cream);font-size:11px;padding:4px 11px;border-radius:4px;text-decoration:none;font-family:var(--sans);}
.dis-pop .p-btn:hover{background:var(--gold-d);}
.dis-pop .p-shared{font-size:10px;color:var(--gold-d);margin-bottom:6px;font-weight:500;}
.leaflet-popup-content-wrapper{border-radius:8px!important;}

/* ── Pin labels ── */
.dis-label{
  background:rgba(241,239,232,.88);
  border:1px solid var(--cream3);
  border-radius:3px;
  color:var(--ink);
  font-family:var(--sans);
  font-size:11px;
  padding:2px 6px;
  box-shadow:0 1px 3px rgba(0,0,0,.18);
  white-space:nowrap;
}
.dis-label.leaflet-tooltip-right::before{border-right-color:var(--cream3);}
#map.labels-off .dis-label{display:none!important;}

/* ── Elevation legend ── */
.legend-grade{height:8px;width:86px;border-radius:3px;margin-bottom:3px;border:1px solid var(--cream3);}
.legend-scale{display:flex;justify-content:space-between;font-size:10px;width:86px;color:var(--ink3);}

/* ── DOT境界ステータスパネル ── */
.dot-sp{position:absolute;top:10px;left:10px;z-index:998;background:rgba(241,239,232,.97);border:1px solid var(--cream3);border-radius:6px;width:268px;max-height:calc(100vh - 130px);overflow-y:auto;font-size:11px;color:var(--ink2);display:none;box-shadow:0 3px 14px rgba(0,0,0,.18);}
.dot-sp.open{display:block;}
.dot-sp-head{background:var(--ink);color:var(--cream);padding:8px 12px;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:space-between;border-radius:5px 5px 0 0;position:sticky;top:0;z-index:1;}
.dot-sp-head button{background:none;border:none;color:rgba(241,239,232,.7);cursor:pointer;font-size:18px;line-height:1;padding:0 0 1px 0;}
.dot-sp-head button:hover{color:var(--cream);}
.dot-sp-state{padding:6px 10px 2px;margin-top:2px;font-weight:500;color:var(--ink);display:flex;align-items:center;gap:5px;}
.dot-sp-row{display:flex;align-items:center;gap:5px;padding:2px 10px 2px 20px;line-height:1.5;}
.dot-sp-ok{color:#2e7d32;}
.dot-sp-err{color:#b03020;}
.dot-sp-sub{padding:1px 10px 3px 20px;color:var(--ink3);font-size:10px;}
.dot-sp-retry{padding:1px 7px;font-size:10px;border:1px solid var(--cream3);border-radius:3px;background:#fff;cursor:pointer;color:var(--ink2);flex-shrink:0;}
.dot-sp-retry:hover{border-color:var(--gold);}
.dot-sp-retry:disabled{opacity:.5;cursor:default;}
.dot-sp-name{cursor:pointer;flex:1;border-radius:3px;padding:0 2px;transition:background .2s;}
.dot-sp-name:hover{background:rgba(180,140,50,.18);}
@keyframes dot-name-flash{0%,100%{background:transparent}20%{background:rgba(255,200,0,.5)}}
.dot-sp-name.flash{animation:dot-name-flash 1.4s ease;}
</style>

  <button id="btn-labels" class="ctrl-btn" onclick="toggleLabels()">名前 OFF</button>

<script>
if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
var auth=firebase.auth();
var db=firebase.firestore();

var map=L.map('map').setView([20.5,-103.5],8);

var layerOSM=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom:18
});
var layerTerrain=L.tileLayer('https://tiles.stadiamaps.com/tiles/stamen_terrain/{z}/{x}/{y}{r}.png?api_key=378e3626-20aa-4634-8172-c2efd21fbd3c',{
  attribution:'© <a href="https://stadiamaps.com/">Stadia Maps</a> © <a href="https://stamen.com">Stamen Design</a> © <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom:18
});
layerOSM.addTo(map);

function toggleTopo(){
  var btn=document.getElementById('btn-topo');
  if(map.hasLayer(layerTerrain)){
    map.removeLayer(layerTerrain);
    layerOSM.addTo(map);
    btn.textContent='地形 OFF';
    btn.classList.remove('on');
  } else {
    map.removeLayer(layerOSM);
    layerTerrain.addTo(map);
    btn.textContent='地形 ON';
    btn.classList.add('on');
  }
}

function makeIcon(color){
  return L.divIcon({
    html:'<div style="width:11px;height:11px;border-radius:50%;background:'+color+';border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.45)"></div>',
    iconSize:[16,16],iconAnchor:[8,8],className:''
  });
}

var DISTRICT_COLORS={
  '11':'#2e7d32','12':'#c62828','13':'#e91e8c','14':'#795548',
  '21':'#7b1fa2','31':'#e65100','41':'#f9a825','51':'#1565c0'
};
var DISTRICT_LABELS={
  '11':'Jalisco (Valles)','12':'Jalisco (Los Altos)','13':'Jalisco (Central)',
  '14':'Jalisco (Other)','21':'Guanajuato','31':'Michoacan',
  '41':'Nayarit','51':'Tamaulipas'
};
var colorMode='district';
var elevSettings={stops:[{elev:0,color:'#ffffff'},{elev:2500,color:'#e53935'}]};
var isAdmin=false;

async function loadElevSettings(){
  try{
    var doc=await db.collection('settings').doc('map').get();
    if(doc.exists){
      var d=doc.data();
      if(d.elevStops&&d.elevStops.length>=2){
        elevSettings.stops=d.elevStops.slice().sort(function(a,b){return a.elev-b.elev;});
      } else if(d.elevMinM!=null&&d.elevMaxM!=null){
        elevSettings.stops=[{elev:Number(d.elevMinM),color:'#ffffff'},{elev:Number(d.elevMaxM),color:'#e53935'}];
      }
    }
  }catch(e){}
}
async function checkAdmin(user){
  if(!user||user.isAnonymous) return false;
  try{
    var snap=await db.collection('staffRoles').doc(user.uid).get();
    var role=snap.exists?snap.data().role:null;
    return role==='owner'||role==='staff';
  }catch(e){return false;}
}

function hexToRgb(hex){
  var m=(hex||'').replace('#','').match(/.{2}/g);
  return m?{r:parseInt(m[0],16),g:parseInt(m[1],16),b:parseInt(m[2],16)}:{r:255,g:255,b:255};
}
function lerpColor(c1,c2,t){
  var a=hexToRgb(c1),b=hexToRgb(c2);
  return 'rgb('+Math.round(a.r+(b.r-a.r)*t)+','+Math.round(a.g+(b.g-a.g)*t)+','+Math.round(a.b+(b.b-a.b)*t)+')';
}
function stopsToGradientCss(stops){
  if(!stops||stops.length===0) return '#ffffff';
  if(stops.length===1) return stops[0].color;
  var min=stops[0].elev,max=stops[stops.length-1].elev,range=max-min||1;
  return 'linear-gradient(to right,'+stops.map(function(s){
    return s.color+' '+Math.round((s.elev-min)/range*100)+'%';
  }).join(',')+')';
}
function elevationColor(elev){
  if(elev==null||isNaN(elev)) return '#ffffff';
  var stops=elevSettings.stops;
  if(!stops||stops.length===0) return '#ffffff';
  if(stops.length===1) return stops[0].color;
  if(elev<=stops[0].elev) return stops[0].color;
  if(elev>=stops[stops.length-1].elev) return stops[stops.length-1].color;
  for(var i=0;i<stops.length-1;i++){
    if(elev>=stops[i].elev&&elev<=stops[i+1].elev){
      var t=(elev-stops[i].elev)/((stops[i+1].elev-stops[i].elev)||1);
      return lerpColor(stops[i].color,stops[i+1].color,t);
    }
  }
  return '#ffffff';
}
function getMarkerColor(dis){
  if(colorMode==='elevation') return elevationColor(dis.elevation!=null?Number(dis.elevation):null);
  return DISTRICT_COLORS[dis.districtId]||'#c8921e';
}
function updateLegend(){
  var el=document.getElementById('legend-content'); if(!el) return;
  if(colorMode==='district'){
    el.innerHTML=Object.keys(DISTRICT_COLORS).map(function(id){
      return '<div class="legend-item"><div class="legend-dot" style="background:'+DISTRICT_COLORS[id]+'"></div>'+DISTRICT_LABELS[id]+'</div>';
    }).join('')+'<div class="legend-item"><div class="legend-dot" style="background:#c8921e"></div>その他</div>';
  } else {
    var stops=elevSettings.stops;
    var firstStop=stops&&stops.length?stops[0]:null;
    var lastStop=stops&&stops.length?stops[stops.length-1]:null;
    var gradCss=stopsToGradientCss(stops);
    el.innerHTML='<div style="font-size:10px;color:var(--ink3);margin-bottom:4px;">標高</div>'
      +'<div class="legend-grade" style="background:'+gradCss+'"></div>'
      +'<div class="legend-scale"><span>'+(firstStop?firstStop.elev+'m':'')+'</span><span>'+(lastStop?lastStop.elev+'m':'')+'</span></div>'
      +'<div class="legend-item" style="margin-top:4px;"><div class="legend-dot" style="background:#fff;border:1px solid var(--cream3);"></div>未設定</div>';
  }
  // DOT原産地呼称境界（州ごとの色）
  if(dotLayer){
    el.innerHTML+='<div style="margin-top:7px;padding-top:6px;border-top:1px solid var(--cream3);">'
      +'<div style="font-size:10px;color:var(--ink3);margin-bottom:4px;">DOT原産地呼称</div>'
      +DOT_STATES.map(function(s){
        return '<div class="legend-item">'
          +'<div style="width:14px;height:10px;border:2px solid '+s.color+';border-radius:2px;background:'+s.color+'22;flex-shrink:0;box-sizing:border-box;"></div>'
          +s.state+'</div>';
      }).join('')
      +'<div style="font-size:10px;color:var(--ink3);margin:5px 0 3px;">州境界</div>'
      +DOT_STATES.map(function(s){
        return '<div class="legend-item">'
          +'<div style="width:14px;height:0;border-top:3px solid '+s.color+';margin-top:5px;flex-shrink:0;"></div>'
          +s.state+'</div>';
      }).join('')
      +'</div>';
  }
  // オーバーレイ凡例（ラベルのある図形のみ）
  var overlayItems=overlayData.filter(function(o){return o.label;});
  if(overlayItems.length){
    el.innerHTML+='<div style="margin-top:7px;padding-top:6px;border-top:1px solid var(--cream3);font-size:10px;color:var(--ink3);margin-bottom:4px;">図形</div>'
      +overlayItems.map(function(o){
        var isLine=o.type==='polyline';
        var color=o.color||'#1565c0';
        var fill=o.fillColor||color;
        var fr=hexToRgb(fill);
        var icon=isLine
          ?'<div style="width:16px;height:3px;background:'+color+';border-radius:1px;flex-shrink:0;margin:3px 0;"></div>'
          :'<div style="width:14px;height:10px;background:rgba('+fr.r+','+fr.g+','+fr.b+',0.45);border:2px solid '+color+';border-radius:2px;flex-shrink:0;box-sizing:border-box;"></div>';
        return '<div class="legend-item">'+icon+'<span style="opacity:1;">'+o.label+'</span></div>';
      }).join('');
  }
}
function recolorMarkers(){
  allMarkers.forEach(function(m){ m.marker.setIcon(makeIcon(getMarkerColor(m.dis))); });
  updateLegend();
}
function toggleColorMode(){
  colorMode=colorMode==='district'?'elevation':'district';
  var btn=document.getElementById('btn-color-mode');
  btn.textContent=colorMode==='elevation'?'色: 標高':'色: 地区';
  btn.classList.toggle('on',colorMode==='elevation');
  recolorMarkers();
}

var allMarkers=[], districtNames={};

// ── 名前ラベル オンオフ ─────────────────────────────────────────
function toggleLabels(){
  var mapEl=document.getElementById('map');
  var btn=document.getElementById('btn-labels');
  var off=mapEl.classList.toggle('labels-off');
  btn.textContent=off?'名前 OFF':'名前 ON';
  btn.classList.toggle('on',!off);
}

function buildDistrictFilter(dists){
  var sel=document.getElementById('filter-district');
  Object.keys(dists).sort().forEach(function(id){
    var o=document.createElement('option');
    o.value=id; o.textContent=dists[id]; sel.appendChild(o);
  });
}

function applyFilters(){
  var distFilter=document.getElementById('filter-district').value;
  var salesFilter=document.getElementById('filter-sales').value;
  var visible=0;
  allMarkers.forEach(function(m){
    var show=!distFilter||m.dis.districtId===distFilter;
    if(salesFilter==='1') show=show&&m.dis.introduced===1;
    if(salesFilter==='2') show=show&&m.dis.salesCategory===0;
    if(show){ m.marker.addTo(map); visible++; }
    else { map.removeLayer(m.marker); }
  });
  document.getElementById('map-count').textContent='表示中: '+visible+' / '+allMarkers.length+' 蒸留所';
}

document.getElementById('filter-district').addEventListener('change',applyFilters);
document.getElementById('filter-sales').addEventListener('change',applyFilters);

function loadData(){
  Promise.all([
    db.collection('distilleries').get(),
    db.collection('locations').get(),
    db.collection('districts').get()
  ]).then(function(results){
    var distilleries=results[0].docs.map(function(d){return Object.assign({id:d.id},d.data());});
    var locMap={};
    results[1].docs.forEach(function(d){locMap[d.id]=d.data();});
    var distMap={};
    results[2].docs.forEach(function(d){distMap[d.id]=d.data(); districtNames[d.id]=d.data().districtName||d.id;});

    buildDistrictFilter(districtNames);

    // ── 同座標グループ化 ──────────────────────────────────────────
    // 同じ座標を持つ蒸留所を小さな円形に分散して全件クリック可能にする
    var coordGroups={};
    distilleries.forEach(function(dis){
      var lat=parseFloat(dis.latitude);
      var lng=parseFloat(dis.longitude);
      if(!lat||!lng) return;
      var key=lat.toFixed(5)+','+lng.toFixed(5);
      if(!coordGroups[key]) coordGroups[key]={lat:lat,lng:lng,items:[]};
      coordGroups[key].items.push(dis);
    });

    Object.keys(coordGroups).forEach(function(key){
      var group=coordGroups[key];
      var n=group.items.length;
      // 半径 ~55m のオフセット（1件の場合はそのまま）
      var R=0.0005;

      group.items.forEach(function(dis,i){
        var lat=group.lat, lng=group.lng;
        if(n>1){
          var angle=(2*Math.PI*i)/n - Math.PI/2;
          lat+=R*Math.cos(angle);
          lng+=R*Math.sin(angle);
        }

        var loc=dis.locationId?locMap[dis.locationId]:null;
        var dist=dis.districtId?distMap[dis.districtId]:null;
        var locName=loc?loc.locationName:'';
        var distName=dist?dist.districtName:'';
        var marker=L.marker([lat,lng],{icon:makeIcon(getMarkerColor(dis))});

        var sharedNote=n>1?'<div class="p-shared">📌 同所在地に '+n+' 件</div>':'';
        var coordStr=(dis.latitude&&dis.longitude)?dis.latitude.toFixed(5)+', '+dis.longitude.toFixed(5):'';
        var elevStr=dis.elevation!=null?dis.elevation+'m':'—';
        var pop='<div class="dis-pop">'
          +'<div class="p-nom">NOM '+(dis.nom||dis.id)+'</div>'
          +'<div class="p-ja">'+(dis.nomJa||'—')+'</div>'
          +'<div class="p-es">'+(dis.nomEs||'—')+'</div>'
          +((locName||distName)?'<div class="p-loc">📍 '+[locName,distName].filter(Boolean).join(' / ')+'</div>':'')
          +(coordStr?'<div class="p-loc" style="font-family:var(--mono);font-size:10px;">'+coordStr+(dis.elevation!=null?' / ▲'+elevStr:'')+'</div>':'')
          +sharedNote
          +'<a class="p-btn" href="distillery.html?nom='+encodeURIComponent(dis.nom||dis.id)+'">詳細を見る →</a>'
          +'</div>';
        marker.bindPopup(pop,{maxWidth:260,minWidth:200});
        if(dis.nomEs) marker.bindTooltip(dis.nomEs,{permanent:true,direction:'right',offset:[6,0],className:'dis-label'});

        allMarkers.push({marker:marker,dis:dis});
      });
    });

    applyFilters();
    updateLegend();

    var loading=document.getElementById('map-loading');
    if(loading) loading.style.display='none';

    if(allMarkers.length===0){
      if(loading){loading.textContent='座標が登録された蒸留所がありません';loading.style.display='block';}
    }
  }).catch(function(e){
    var loading=document.getElementById('map-loading');
    if(loading){loading.textContent='読み込み失敗: '+e.message;loading.style.display='block';}
  });
}

// ── マップオーバーレイ ──────────────────────────────────
var overlayLayers=[], overlayData=[];

function smoothChaikin(pts, iter){
  if(!iter||iter<1) return pts;
  var r=pts;
  for(var k=0;k<iter;k++){
    var n=[];
    for(var i=0;i<r.length;i++){
      var p0=r[i], p1=r[(i+1)%r.length];
      n.push([p0[0]*0.75+p1[0]*0.25, p0[1]*0.75+p1[1]*0.25]);
      n.push([p0[0]*0.25+p1[0]*0.75, p0[1]*0.25+p1[1]*0.75]);
    }
    r=n;
  }
  return r;
}

function generateEllipsePoints(lat, lng, radiusX, radiusY, rotation){
  var n=64, R=6371000;
  var rad=(rotation||0)*Math.PI/180;
  var cosR=Math.cos(rad), sinR=Math.sin(rad);
  var latR=lat*Math.PI/180;
  var pts=[];
  for(var i=0;i<n;i++){
    var a=2*Math.PI*i/n;
    var dx=radiusX*Math.cos(a), dy=radiusY*Math.sin(a);
    var rx=dx*cosR-dy*sinR, ry=dx*sinR+dy*cosR;
    pts.push([lat+ry/R*(180/Math.PI), lng+rx/(R*Math.cos(latR))*(180/Math.PI)]);
  }
  return pts;
}

function drawOverlay(o){
  var layer;
  var opts={color:o.color||'#1565c0',weight:o.weight||2,fillColor:o.fillColor||o.color||'#1565c0',fillOpacity:o.fillOpacity!=null?o.fillOpacity:0.08};
  var latlngs=(o.coords||[]).map(function(c){return Array.isArray(c)?[c[0],c[1]]:[c.lat,c.lng];});
  if(o.type==='polygon'){
    if(o.smooth>0) latlngs=smoothChaikin(latlngs,o.smooth);
    layer=L.polygon(latlngs,opts);
  } else if(o.type==='polyline'){
    layer=L.polyline(latlngs,{color:opts.color,weight:opts.weight,dashArray:o.dashArray||null});
  } else if(o.type==='circle'){
    layer=L.circle(latlngs[0],Object.assign({radius:o.radius||10000},opts));
  } else if(o.type==='ellipse'&&latlngs.length){
    var epts=generateEllipsePoints(latlngs[0][0],latlngs[0][1],o.radiusX||10000,o.radiusY||5000,o.rotation||0);
    layer=L.polygon(epts,opts);
  }
  if(!layer) return;
  if(o.label) layer.bindTooltip(o.label,{sticky:true,className:'dis-label'});
  layer.addTo(map);
  overlayLayers.push(layer);
}
function loadOverlays(){
  db.collection('mapOverlays').where('active','==',true).get().then(function(snap){
    overlayLayers.forEach(function(l){map.removeLayer(l);}); overlayLayers=[];
    overlayData=snap.docs.map(function(d){return d.data();});
    overlayData.forEach(function(o){ drawOverlay(o); });
    updateLegend();
  }).catch(function(){});
}

// ── DOT原産地呼称自治区オーバーレイ ─────────────────────────────
var DOT_STATES=[
  {state:'Jalisco',   iso:'MX-JAL',stateLevel:true,   color:'#2e7d32'},
  {state:'Guanajuato',iso:'MX-GUA',color:'#7b1fa2',municipios:['Abasolo','Ciudad Manuel Doblado','Cuerámaro','Huanímaro','Pénjamo','Purísima del Rincón','Romita']},
  {state:'Michoacán', iso:'MX-MIC',color:'#e65100',municipios:['Briseñas de Matamoros','Chavinda','Chilchota','Churintzio','Cotija','Ecuandureo','Jacona','Jiquilpan','Maravatío','Marcos Castellanos','Nuevo Parangaricutiro','Numarán','Pajacuarán','Peribán','La Piedad','Régules','Los Reyes','Sahuayo','Tancítaro','Tangamandapio','Tangancícuaro','Tanhuato','Tingüindín','Tocumbo','Venustiano Carranza','Villa Mar','Vista Hermosa','Yurécuaro','Zamora','Zináparo']},
  {state:'Nayarit',   iso:'MX-NAY',color:'#f9a825',municipios:['Ahuacatlán','Amatlán de Cañas','Ixtlán del Río','Jala','Xalisco','San Pedro Lagunillas','Santa María del Oro','Tepic']},
  {state:'Tamaulipas',iso:'MX-TAM',color:'#1565c0',municipios:['Aldama','Altamira','Antiguo Morelos','Gómez Farías','González','Llera','El Mante','Nuevo Morelos','Ocampo','Tula','Xicotencatl']}
];

var OVERPASS_ENDPOINTS=[
  'https://overpass-api.de/api/interpreter',
  'https://overpass.kumi.systems/api/interpreter',
  'https://lz4.overpass-api.de/api/interpreter'
];

var dotLayer=null, dotLoading=false, dotGJ=null, dotFetchStatus=null, dotFirestoreSnap=null;
var dotLayerMap={}; // origName → Leaflet layer (for click-to-highlight)
// stateLevel州（Jalisco）の色セット — スタイル判別用
var _dotStateLevelColors=new Set(DOT_STATES.filter(function(s){return s.stateLevel;}).map(function(s){return s.color;}));

// Firestore doc ID ヘルパー
function dotDocId(sq,name){
  if(sq.stateLevel) return sq.iso+'_dotState';
  if(!name) return sq.iso+'_stateBoundary';
  return sq.iso+'_municipio_'+name.replace(/\s+/g,'_');
}

// Firestoreスナップから取得状況を派生
function deriveDotFetchStatusFromFirestore(snap){
  var fetchedSet=new Set();
  snap.docs.forEach(function(doc){ if(doc.data().geomJson) fetchedSet.add(doc.id); });
  return DOT_STATES.map(function(sq){
    if(sq.stateLevel){
      return {state:sq.state,iso:sq.iso,color:sq.color,stateLevel:true,
        stateBoundaryOk:fetchedSet.has(dotDocId(sq)),municipioResults:null};
    } else {
      return {state:sq.state,iso:sq.iso,color:sq.color,stateLevel:false,
        stateBoundaryOk:fetchedSet.has(dotDocId(sq)),
        municipioResults:sq.municipios.map(function(m){
          return {name:m,ok:fetchedSet.has(dotDocId(sq,m))};
        })};
    }
  });
}

// Firestore から取得状況のみ読み込み（起動時）
async function loadDotStatusFromFirestore(){
  try{
    var snap=await db.collection('dotMunicipios').get();
    dotFirestoreSnap=snap;
    dotFetchStatus=deriveDotFetchStatusFromFirestore(snap);
  }catch(e){}
  buildStatusPanel();
}

async function overpassFetch(query, timeoutMs){
  timeoutMs=timeoutMs||45000;
  var lastErr;
  for(var i=0;i<OVERPASS_ENDPOINTS.length;i++){
    try{
      var ctrl=new AbortController();
      var tid=setTimeout(function(){ctrl.abort();},timeoutMs);
      var resp=await fetch(OVERPASS_ENDPOINTS[i],{method:'POST',body:'data='+encodeURIComponent(query),signal:ctrl.signal});
      clearTimeout(tid);
      if(resp.status===429){
        // レートリミット → 3秒待って次のエンドポイントへ
        await new Promise(function(r){setTimeout(r,3000);});
        throw new Error('429');
      }
      if(!resp.ok) throw new Error('HTTP '+resp.status);
      return await resp.json();
    }catch(e){ lastErr=e; }
  }
  throw lastErr;
}

var _nrmFn=function(s){return s.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().trim();};

async function fetchStateGeoJSON(sq){
  var query;
  if(sq.stateLevel){
    query='[out:json][timeout:25];rel["ISO3166-2"="'+sq.iso+'"]["admin_level"="4"];out geom qt;';
  } else {
    // 全自治区を取得してクライアント側でフィルタ（特殊文字・表記揺れ対応）
    query='[out:json][timeout:60];area["ISO3166-2"="'+sq.iso+'"]->.s;rel["admin_level"="6"](area.s);out geom qt;';
  }
  var json=await overpassFetch(query, sq.stateLevel ? 25000 : 65000);
  var features=osmtogeojson(json).features;
  var unmatched=[];

  if(!sq.stateLevel && sq.municipios){
    var allowed=sq.municipios.map(_nrmFn);
    var matchedNames=new Set();
    features=features.filter(function(f){
      var nm=_nrmFn((f.properties&&(f.properties.name||f.properties['name:es']))||'');
      if(!nm) return false;
      for(var i=0;i<allowed.length;i++){
        var a=allowed[i];
        if(a===nm||(nm.length>=4&&(a.indexOf(nm)===0||nm.indexOf(a)===0))){
          matchedNames.add(sq.municipios[i]);
          f.properties._municipioName=sq.municipios[i];
          return true;
        }
      }
      return false;
    });
    unmatched=sq.municipios.filter(function(m){return !matchedNames.has(m);});
  }
  features.forEach(function(f){
    f.properties=f.properties||{};
    f.properties._dotColor=sq.color;
  });
  return {features:features, unmatched:unmatched};
}

async function fetchStateBoundaryGeoJSON(sq){
  var query='[out:json][timeout:25];rel["ISO3166-2"="'+sq.iso+'"]["admin_level"="4"];out geom qt;';
  var json=await overpassFetch(query, 25000);
  var features=osmtogeojson(json).features;
  features=features.filter(function(f){ var t=f.geometry&&f.geometry.type; return t&&t!=='Point'&&t!=='MultiPoint'; });
  features.forEach(function(f){
    f.properties=f.properties||{};
    f.properties._dotColor=sq.color;
    f.properties._isStateOutline=true;
  });
  return features;
}

// ── 自治区1件取得（管理者用リトライ）─────────────────────────────
async function fetchSingleMunicipio(iso,color,name){
  var stopWords=/^(de|del|el|la|los|las|san|santa|nuevo|nueva|general)$/i;
  var kw=_nrmFn(name).split(/\s+/).find(function(w){return w.length>3&&!stopWords.test(w);})||_nrmFn(name);
  var query='[out:json][timeout:30];area["ISO3166-2"="'+iso+'"]->.s;rel["admin_level"="6"]["name"~"'+kw+'",i](area.s);out geom qt;';
  var json=await overpassFetch(query,35000);
  var feats=osmtogeojson(json).features.filter(function(f){
    var t=f.geometry&&f.geometry.type; return t&&t!=='Point'&&t!=='MultiPoint';
  });
  if(!feats.length) return null;
  var feat=feats[0];
  feat.properties=feat.properties||{};
  feat.properties._dotColor=color;
  feat.properties._municipioName=name;
  return feat;
}

// ── DOTレイヤースタイル ──────────────────────────────────────────
function dotLayerStyle(f){
  var c=(f.properties&&f.properties._dotColor)||'#2e7d32';
  if(f.properties&&f.properties._isStateOutline){
    // 非Jalisco州境界ライン: 太い実線・塗りなし
    return {color:c,weight:3,fillOpacity:0,opacity:0.9};
  }
  if(_dotStateLevelColors.has(c)){
    // Jalisco DOT（州全体=DOT自治区）: 太い実線ボーダー＋薄い塗り
    return {color:c,weight:3,fillColor:c,fillOpacity:0.06,opacity:0.9};
  }
  // DOT自治区境界: 極細線
  return {color:c,weight:0.6,fillColor:c,fillOpacity:0.07,opacity:0.7};
}

async function toggleDOT(){
  var btn=document.getElementById('btn-dot');
  if(dotLayer){
    map.removeLayer(dotLayer); dotLayer=null; dotGJ=null; dotLayerMap={};
    btn.classList.remove('on'); btn.textContent='DOT境界';
    document.getElementById('dot-sp').classList.remove('open');
    buildStatusPanel(); updateLegend(); return;
  }
  if(dotLoading) return;
  dotLoading=true; btn.disabled=true; btn.textContent='読み込み中...';
  try{
    var snap=await db.collection('dotMunicipios').get();
    dotFirestoreSnap=snap;
    dotFetchStatus=deriveDotFetchStatusFromFirestore(snap);

    var features=[];
    snap.docs.forEach(function(doc){
      var d=doc.data(); if(!d.geomJson) return;
      try{
        var geom=JSON.parse(d.geomJson);
        // _displayName: popup text (saved name or fallback)
        var nm=d.entryType==='municipio'?d.name:(d.entryType==='dotState'?(d.name||d.state):null);
        // _mapKey: key into dotLayerMap — use original name from docId for consistent panel matching
        var mOrig=doc.id.match(/_municipio_(.+)$/);
        var mapKey=mOrig?(mOrig[1].replace(/_/g,' ')):(d.entryType==='dotState'?d.state:null);
        features.push({type:'Feature',geometry:geom,properties:{
          _dotColor:d.color,
          _municipioName:mapKey,
          _isStateOutline:d.entryType==='stateBoundary',
          _displayName:nm,
          _mapKey:mapKey
        }});
      }catch(e){}
    });

    dotGJ={type:'FeatureCollection',features:features};
    if(features.length){
      dotLayerMap={};
      dotLayer=L.geoJSON(dotGJ,{
        filter:function(f){ var t=f.geometry&&f.geometry.type; return t&&t!=='Point'&&t!=='MultiPoint'; },
        style:dotLayerStyle,
        onEachFeature:function(f,layer){
          var nm=f.properties&&f.properties._displayName;
          var mk=f.properties&&f.properties._mapKey;
          if(nm) layer.bindPopup('<div style="font-family:var(--sans);padding:4px 6px;font-size:13px;font-weight:500;">'+nm+'</div>',{maxWidth:200});
          if(mk){
            dotLayerMap[mk]=layer;
            layer.on('click',function(){dotHighlightPanelEntry(mk);});
          }
        }
      }).addTo(map);
      btn.classList.add('on'); btn.textContent='DOT境界 ON';
    } else {
      btn.textContent='DOT境界';
    }
    buildStatusPanel();
    document.getElementById('dot-sp').classList.add('open');
    updateLegend();
  }catch(e){
    alert('DOT境界の読み込みに失敗しました:\n'+e.message);
    btn.textContent='DOT境界';
  }finally{
    btn.disabled=false; dotLoading=false;
  }
}

// ── DOT境界ステータスパネル ──────────────────────────────────────
function toggleDotStatus(){
  document.getElementById('dot-sp').classList.toggle('open');
}

function buildStatusPanel(){
  var body=document.getElementById('dot-sp-body');
  var status=dotFetchStatus||DOT_STATES.map(function(sq){
    return {state:sq.state,iso:sq.iso,color:sq.color,stateLevel:!!sq.stateLevel,
      stateBoundaryOk:false,
      municipioResults:sq.stateLevel?null:sq.municipios.map(function(m){return {name:m,ok:false};})};
  });
  var html='';
  status.forEach(function(st,si){
    html+='<div class="dot-sp-state">'
      +'<span style="width:9px;height:9px;border-radius:50%;background:'+st.color+';display:inline-block;flex-shrink:0"></span>'
      +'<strong>'+st.state+'</strong></div>';
    if(st.stateLevel){
      html+='<div class="dot-sp-row">'
        +(st.stateBoundaryOk?'<span class="dot-sp-ok">✓</span>':'<span class="dot-sp-err">✗</span>')
        +' <span class="dot-sp-name" data-dot-name="'+st.state+'">DOT境界</span>';
      if(!st.stateBoundaryOk&&isAdmin) html+=' <button class="dot-sp-retry" data-retry-bnd data-si="'+si+'">再取得</button>';
      html+='</div>';
    } else {
      html+='<div class="dot-sp-row">'
        +(st.stateBoundaryOk?'<span class="dot-sp-ok">✓</span>':'<span class="dot-sp-err">✗</span>')
        +' 州境界';
      if(!st.stateBoundaryOk&&isAdmin) html+=' <button class="dot-sp-retry" data-retry-bnd data-si="'+si+'">再取得</button>';
      html+='</div>';
      if(st.municipioResults){
        var okN=st.municipioResults.filter(function(m){return m.ok;}).length;
        html+='<div class="dot-sp-sub">DOT自治区 '+okN+' / '+st.municipioResults.length+'</div>';
        st.municipioResults.forEach(function(m,mi){
          html+='<div class="dot-sp-row">'
            +(m.ok?'<span class="dot-sp-ok">✓</span>':'<span class="dot-sp-err">✗</span>')
            +' <span class="dot-sp-name" data-dot-name="'+m.name+'">'+m.name+'</span>';
          if(!m.ok&&isAdmin) html+='<button class="dot-sp-retry" data-retry-muni data-si="'+si+'" data-mi="'+mi+'">再取得</button>';
          html+='</div>';
        });
      }
    }
  });
  body.innerHTML=html;
  body.querySelectorAll('[data-retry-bnd]').forEach(function(btn){
    var si=parseInt(btn.dataset.si);
    btn.addEventListener('click',function(){retryStateBoundary(btn,status[si].iso);});
  });
  body.querySelectorAll('[data-retry-muni]').forEach(function(btn){
    var si=parseInt(btn.dataset.si),mi=parseInt(btn.dataset.mi);
    btn.addEventListener('click',function(){
      var st=status[si]; retryMunicipio(btn,st.iso,st.color,st.municipioResults[mi].name);
    });
  });
  body.querySelectorAll('.dot-sp-name').forEach(function(span){
    span.addEventListener('click',function(){ dotHighlightMapLayer(this.dataset.dotName); });
  });
}

// ── DOT 相互ハイライト ────────────────────────────────────────────
function dotHighlightMapLayer(nm){
  var layer=dotLayerMap[nm];
  if(!layer||!dotLayer) return;
  try{ map.fitBounds(layer.getBounds(),{padding:[20,20],maxZoom:12}); }catch(e){}
  layer.setStyle({weight:4,fillOpacity:0.35,opacity:1});
  setTimeout(function(){ if(dotLayer) dotLayer.resetStyle(layer); },2000);
}
function dotHighlightPanelEntry(nm){
  var el=document.querySelector('.dot-sp-name[data-dot-name="'+nm.replace(/"/g,'\\"')+'"]');
  if(!el) return;
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
  el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
}

// ── 自治区 個別再取得（管理者用・Firestoreに保存）─────────────────
async function retryMunicipio(btn,iso,color,name){
  btn.disabled=true; btn.textContent='取得中...';
  try{
    var feat=await fetchSingleMunicipio(iso,color,name);
    if(!feat){btn.textContent='見つからず';btn.disabled=false;return;}
    var sq=DOT_STATES.find(function(s){return s.iso===iso;});
    feat.properties._displayName=name;
    feat.properties._mapKey=name;
    await db.collection('dotMunicipios').doc(dotDocId(sq,name)).set({
      state:sq?sq.state:iso,iso:iso,name:name,color:color,entryType:'municipio',
      geomJson:JSON.stringify(feat.geometry),
      fetchedAt:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true});
    if(dotLayer) dotLayer.addData(feat);
    if(dotGJ) dotGJ.features.push(feat);
    var snap=await db.collection('dotMunicipios').get();
    dotFirestoreSnap=snap; dotFetchStatus=deriveDotFetchStatusFromFirestore(snap);
    buildStatusPanel();
  }catch(e){
    btn.textContent='再取得'; btn.disabled=false;
    console.warn('retryMunicipio failed:',name,e.message);
  }
}

// ── 州境界 再取得（管理者用・Firestoreに保存）─────────────────────
async function retryStateBoundary(btn,iso){
  btn.disabled=true; btn.textContent='取得中...';
  var sq=DOT_STATES.find(function(s){return s.iso===iso;});
  if(!sq){btn.disabled=false;btn.textContent='再取得';return;}
  try{
    var feats,docId,entryType,displayName;
    if(sq.stateLevel){
      var r=await fetchStateGeoJSON(sq); feats=r.features;
      docId=dotDocId(sq); entryType='dotState'; displayName=sq.state;
    } else {
      feats=await fetchStateBoundaryGeoJSON(sq);
      docId=dotDocId(sq); entryType='stateBoundary'; displayName=null;
    }
    if(!feats.length){btn.textContent='見つからず';btn.disabled=false;return;}
    var geom=feats[0].geometry;
    await db.collection('dotMunicipios').doc(docId).set({
      state:sq.state,iso:iso,name:displayName,color:sq.color,entryType:entryType,
      geomJson:JSON.stringify(geom),
      fetchedAt:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true});
    var stateMapKey=entryType==='dotState'?sq.state:null;
    feats.forEach(function(f){f.properties._displayName=displayName;f.properties._mapKey=stateMapKey;});
    if(dotLayer) dotLayer.addData({type:'FeatureCollection',features:feats});
    if(dotGJ) dotGJ.features=dotGJ.features.concat(feats);
    var snap=await db.collection('dotMunicipios').get();
    dotFirestoreSnap=snap; dotFetchStatus=deriveDotFetchStatusFromFirestore(snap);
    buildStatusPanel();
  }catch(e){
    btn.textContent='再取得'; btn.disabled=false;
    console.warn('retryStateBoundary failed:',iso,e.message);
  }
}
