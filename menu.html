<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オンラインメニュー — テキーラ道場</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --cream:#F1EFE8;--cream2:#E8E4D8;--cream3:#DDD8C8;
  --red:#b03020;--teal:#1a6e58;
  --sans:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  --serif:'Hiragino Mincho ProN','Yu Mincho',serif;
  --mono:'SFMono-Regular',Consolas,monospace;
}
html,body{height:100%;}
body{background:var(--cream);color:var(--ink);font-family:var(--sans);display:flex;flex-direction:column;min-height:100vh;}

/* ヘッダー */
.hdr{background:var(--ink);padding:0 14px;display:flex;align-items:center;gap:10px;height:56px;flex-shrink:0;position:sticky;top:0;z-index:50;}
.hdr-logo{font-family:var(--serif);font-size:16px;color:var(--gold-l);letter-spacing:.04em;white-space:nowrap;}
.hdr-sub{font-size:10px;color:var(--ink3);margin-top:1px;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.hdr-nav{display:flex;align-items:center;justify-content:center;padding:5px 10px;border:1px solid var(--cream3);border-radius:6px;color:var(--gold-l);font-size:11px;text-decoration:none;white-space:nowrap;background:transparent;}
.hdr-nav:active{background:rgba(255,255,255,.08);}

/* ローディング/ログインゲート */
#gate{flex:1;display:flex;align-items:center;justify-content:center;color:var(--ink2);font-size:14px;padding:24px;text-align:center;}

/* パンくず/戻る */
.crumb{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--cream2);border-bottom:1px solid var(--cream3);flex-wrap:wrap;position:sticky;top:56px;z-index:40;}
.crumb-back{background:transparent;border:1px solid var(--cream3);border-radius:6px;color:var(--ink2);font-size:12px;padding:5px 10px;cursor:pointer;}
.crumb-title{font-family:var(--serif);font-size:15px;color:var(--ink);}
.crumb-path{font-size:11px;color:var(--ink3);}

#app{flex:1;display:none;flex-direction:column;}
.view{display:none;padding:16px 14px 40px;max-width:960px;margin:0 auto;width:100%;}
.view.on{display:block;}

/* メニュートップ：大分類カード */
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.cat-card{background:#fff;border:1px solid var(--cream3);border-radius:14px;padding:22px 16px;text-align:center;cursor:pointer;transition:.15s;box-shadow:0 1px 4px rgba(20,15,8,.05);}
.cat-card:active{transform:scale(.98);}
.cat-card .ci{font-size:34px;line-height:1;margin-bottom:10px;}
.cat-card .cn{font-family:var(--serif);font-size:17px;color:var(--ink);letter-spacing:.03em;}
.cat-card .cd{font-size:11px;color:var(--ink3);margin-top:4px;}
.cat-card.soon{opacity:.55;}
.badge-soon{display:inline-block;font-size:9px;background:var(--cream3);color:var(--ink3);border-radius:4px;padding:1px 6px;margin-top:6px;}
@media(min-width:560px){.cat-grid{grid-template-columns:repeat(3,1fr);}}

/* テキーラ サブナビ */
.subnav{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;}
.subnav button{flex-shrink:0;padding:7px 12px;border:1px solid var(--cream3);border-radius:20px;background:#fff;color:var(--ink2);font-size:12px;cursor:pointer;white-space:nowrap;}
.subnav button.on{background:var(--gold-d);color:var(--cream);border-color:var(--gold-d);}

/* ツールバー（検索・フィルタ・並び替え） */
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px;}
.toolbar input[type=text],.toolbar select{padding:7px 10px;border:1px solid var(--cream3);border-radius:8px;background:#fff;color:var(--ink);font-size:13px;font-family:var(--sans);}
.toolbar .tsearch{flex:1;min-width:150px;}
.tcount{font-size:11px;color:var(--ink3);margin-left:auto;white-space:nowrap;}

/* ボトル一覧（1ボトル1行） */
.blist{display:flex;flex-direction:column;background:#fff;border:1px solid var(--cream3);border-radius:12px;overflow:hidden;}
.brow{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--cream2);}
.brow:last-child{border-bottom:none;}
.binfo{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.clschip{display:inline-block;font-size:10px;font-weight:700;min-width:16px;text-align:center;padding:1px 5px;border-radius:4px;background:#fff;color:var(--gold-d);border:1px solid rgba(122,86,16,.35);margin-right:6px;vertical-align:middle;}
.brow .bmeta{background:transparent;}
.bn{font-size:14px;font-weight:600;color:var(--ink);}
.bmeta{font-size:11px;color:var(--ink3);margin-left:6px;}
.babv{flex-shrink:0;font-family:var(--mono);font-size:11px;color:var(--ink3);white-space:nowrap;}
.bp{flex-shrink:0;font-family:var(--mono);font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;min-width:52px;text-align:right;}
.bp.none{font-size:11px;color:var(--ink3);font-weight:400;}
.price-note{font-size:11px;color:var(--ink3);margin:0 2px 8px;}
.empty{text-align:center;color:var(--ink3);padding:40px 0;font-size:13px;}
.soon-box{text-align:center;color:var(--ink3);padding:48px 16px;font-size:14px;}
.soon-box .si{font-size:40px;margin-bottom:10px;}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-logo">テキーラ道場</div>
    <div class="hdr-sub">オンラインメニュー</div>
  </div>
  <div class="hdr-right">
    <a class="hdr-nav" href="/member.html">マイページ</a>
  </div>
</div>

<div id="gate">読み込み中…</div>

<div id="app">
  <!-- パンくず -->
  <div class="crumb" id="crumb" style="display:none;">
    <button class="crumb-back" id="crumb-back">← 戻る</button>
    <div>
      <div class="crumb-title" id="crumb-title"></div>
      <div class="crumb-path" id="crumb-path"></div>
    </div>
  </div>

  <!-- メニュートップ -->
  <div class="view on" id="view-top">
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <!-- テキーラ -->
  <div class="view" id="view-teq">
    <div class="subnav" id="teq-subnav">
      <button data-mode="list" class="on">一覧</button>
      <button data-mode="distillery">蒸留所</button>
      <button data-mode="brand">ブランド</button>
      <button data-mode="map">地図</button>
    </div>
    <!-- 一覧モード -->
    <div id="teq-list-wrap">
      <div class="toolbar">
        <input type="text" class="tsearch" id="q" placeholder="ボトル名・ブランド・NOMで検索…">
        <select id="f-class"><option value="">全クラス</option></select>
        <select id="f-sort">
          <option value="name">名前順</option>
          <option value="nom">NOM順</option>
          <option value="price">価格が安い順</option>
          <option value="price_desc">価格が高い順</option>
          <option value="abv">度数順</option>
        </select>
        <span class="tcount" id="teq-count"></span>
      </div>
      <div class="price-note">※ 価格はすべて10ml単位です</div>
      <div class="blist" id="teq-list"><div class="empty">読み込み中…</div></div>
    </div>
    <!-- 準備中モード -->
    <div id="teq-soon" style="display:none;">
      <div class="soon-box"><div class="si">🚧</div><div id="teq-soon-label">準備中</div><div style="font-size:12px;margin-top:6px;">この表示モードは近日公開予定です。</div></div>
    </div>
  </div>

  <!-- 他カテゴリ（準備中） -->
  <div class="view" id="view-soon">
    <div class="soon-box"><div class="si">🚧</div><div id="soon-label">準備中</div><div style="font-size:12px;margin-top:6px;">このメニューは近日公開予定です。</div></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain:"tequiladojo.firebaseapp.com",
  projectId:"tequiladojo",
  storageBucket:"tequiladojo.firebasestorage.app",
  messagingSenderId:"56663296233",
  appId:"1:56663296233:web:c8cac2fcbeb4faa09e0878"
});
var auth=firebase.auth(), db=firebase.firestore();

var SERVING_ML=10; // 価格表示の基準ml（10ml単位）
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function yen(n){return '¥'+Math.round(n).toLocaleString();}

// 大分類定義
var CATEGORIES=[
  {key:'tequila', icon:'🥃', name:'テキーラ',   desc:'一覧・蒸留所・ブランド・地図', ready:true},
  {key:'other',   icon:'🍶', name:'その他種類', desc:'メスカル等のアガベ蒸留酒', ready:false},
  {key:'cocktail',icon:'🍸', name:'カクテル',   desc:'テキーラベース等', ready:false},
  {key:'set',     icon:'🍽', name:'セット',     desc:'飲み比べ・お得なセット', ready:false},
  {key:'misc',    icon:'🍫', name:'その他',     desc:'フード・ソフトドリンク', ready:false},
  {key:'goods',   icon:'🛍', name:'物販',       desc:'ボトル販売・グッズ', ready:false}
];

// データキャッシュ
var bottles=[], brandMap={}, classMap={};

auth.onAuthStateChanged(function(user){
  if(user){
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='flex';
    renderTop();
    loadData();
  } else {
    // 会員ログイン必須：未ログインは会員ページへ
    location.replace('/member.html');
  }
});

function loadData(){
  Promise.all([
    db.collection('bottleData').get(),
    db.collection('brands').get().catch(function(){return {docs:[]};}),
    db.collection('classes').get().catch(function(){return {docs:[]};})
  ]).then(function(res){
    brandMap={}; res[1].docs.forEach(function(d){ brandMap[d.id]=d.data(); });
    classMap={}; res[2].docs.forEach(function(d){ classMap[d.id]=d.data(); });
    // 掲載対象: home_order と同じく visibility が 0/false/未設定 のものを表示
    bottles=res[0].docs.map(function(d){return Object.assign({id:d.id},d.data());})
      .filter(function(b){ var v=b.visibility; return v==='0'||v===0||v===false||v===undefined||v===null; });
    buildClassFilter();
    renderTeqList();
  }).catch(function(e){
    document.getElementById('teq-list').innerHTML='<div class="empty">読み込み失敗: '+esc(e.message)+'</div>';
  });
}

/* ── 名称解決 ──
   bottleData のドキュメントIDは連番(bottleDataId)で、12桁のbottleIdは別フィールド。
   NOM(蒸留所4桁)・brandId(7桁)・classId(2桁)は bottleId から導出できる:
   bottleId = 蒸留所ID4 + ブランド連番3 + classId2 + 連番3 (= brandId7 + classId2 + seq3)。 */
function bidOf(b){ return String(b.bottleId||''); }
function brandIdOf(b){ if(b.brandId) return String(b.brandId); var s=bidOf(b); return s.length>=7?s.slice(0,7):''; }
// ブランド名は brands コレクション（brandEs/brandJa）で解決。IDは出さない。
function brandOf(b){
  var m=brandMap[brandIdOf(b)];
  return m?(m.brandJa||m.brandEs||''):'';
}
// クラス: classId は2桁（カテゴリ+クラス）。2桁目でB/J/R/A/X判定（home_order準拠）
var CLS_MAP={B:'1',J:'2',R:'3',A:'4',X:'5'};
var CLS_ORDER=['B','J','R','A','X'];
var CLS_NAME={B:'Blanco',J:'Joven/Gold',R:'Reposado',A:'Añejo',X:'Extra Añejo'};
var CLS_COLOR={B:'#fcfbf7',J:'#fbf1d5',R:'#f5e6c0',A:'#eed7a8',X:'#e3c48f'};
function clsDigit(b){
  if(b.classId!=null&&b.classId!==''){ var c=String(b.classId); return c.length>=2?c.charAt(1):c; }
  var s=bidOf(b); return s.length>=9?s.charAt(8):'';
}
function clsLetterOf(b){
  var d=clsDigit(b);
  return CLS_ORDER.find(function(k){return CLS_MAP[k]===d;})||'';
}
// NOM(蒸留所4桁): 明示フィールドが無ければ bottleId の先頭4桁を使う
function nomOf(b){
  if(b.nom!=null&&b.nom!=='') return String(b.nom);
  var s=bidOf(b); return s.length>=4?s.slice(0,4):'';
}
function nameOf(b){ return b.bottleEs||b.bottleEn||b.bottleJa||b.name||'(名称未設定)'; }
// 10ml単価: bottleData の price が 10ml 単価（フォールバック unitPrice / price10）
function price10(b){ return parseFloat(b.price!=null?b.price:(b.unitPrice!=null?b.unitPrice:b.price10))||0; }

/* ── メニュートップ ── */
function renderTop(){
  document.getElementById('cat-grid').innerHTML=CATEGORIES.map(function(c){
    return '<div class="cat-card'+(c.ready?'':' soon')+'" onclick="openCategory(\''+c.key+'\')">'
      +'<div class="ci">'+c.icon+'</div>'
      +'<div class="cn">'+esc(c.name)+'</div>'
      +'<div class="cd">'+esc(c.desc)+'</div>'
      +(c.ready?'':'<div class="badge-soon">準備中</div>')
      +'</div>';
  }).join('');
}

function showView(id){
  ['view-top','view-teq','view-soon'].forEach(function(v){
    document.getElementById(v).classList.toggle('on', v===id);
  });
  document.getElementById('crumb').style.display = (id==='view-top')?'none':'flex';
  window.scrollTo(0,0);
}

function openCategory(key){
  var c=CATEGORIES.find(function(x){return x.key===key;});
  if(key==='tequila'){
    setCrumb('テキーラ','メニュートップ ＞ テキーラ');
    setTeqMode('list');
    showView('view-teq');
  } else {
    document.getElementById('soon-label').textContent=(c?c.name:'')+' メニュー';
    setCrumb((c?c.name:''),'メニュートップ ＞ '+(c?c.name:''));
    showView('view-soon');
  }
}

function setCrumb(title,path){
  document.getElementById('crumb-title').textContent=title;
  document.getElementById('crumb-path').textContent=path;
}
document.getElementById('crumb-back').addEventListener('click',function(){ showView('view-top'); });

/* ── テキーラ サブモード ── */
document.querySelectorAll('#teq-subnav button').forEach(function(btn){
  btn.addEventListener('click',function(){ setTeqMode(btn.dataset.mode); });
});
function setTeqMode(mode){
  document.querySelectorAll('#teq-subnav button').forEach(function(b){ b.classList.toggle('on', b.dataset.mode===mode); });
  var isList=(mode==='list');
  document.getElementById('teq-list-wrap').style.display=isList?'':'none';
  document.getElementById('teq-soon').style.display=isList?'none':'';
  if(!isList){
    var lbl={distillery:'蒸留所メニュー',brand:'ブランドメニュー',map:'地図メニュー'}[mode]||'準備中';
    document.getElementById('teq-soon-label').textContent=lbl;
  }
}

/* ── テキーラ一覧 ── */
function buildClassFilter(){
  var used={};
  bottles.forEach(function(b){ var l=clsLetterOf(b); if(l) used[l]=1; });
  var sel=document.getElementById('f-class');
  sel.innerHTML='<option value="">全クラス</option>'+CLS_ORDER.filter(function(l){return used[l];}).map(function(l){
    return '<option value="'+l+'">'+esc(l+' — '+CLS_NAME[l])+'</option>';
  }).join('');
}
['q','f-class','f-sort'].forEach(function(id){
  document.getElementById(id).addEventListener('input',renderTeqList);
  document.getElementById(id).addEventListener('change',renderTeqList);
});
function renderTeqList(){
  var q=(document.getElementById('q').value||'').toLowerCase().trim();
  var fc=document.getElementById('f-class').value;
  var sort=document.getElementById('f-sort').value;
  var list=bottles.filter(function(b){
    if(fc && clsLetterOf(b)!==fc) return false;
    if(q){
      if(/^\d+$/.test(q)){
        // 数字はNOMで絞り込み（前方・部分一致）
        if(nomOf(b).indexOf(q)<0) return false;
      } else {
        var hay=(nameOf(b)+' '+(b.bottleJa||'')+' '+brandOf(b)).toLowerCase();
        if(hay.indexOf(q)<0) return false;
      }
    }
    return true;
  });
  list.sort(function(a,b){
    if(sort==='nom') return String(nomOf(a)).localeCompare(String(nomOf(b)),undefined,{numeric:true});
    if(sort==='price') return price10(a)-price10(b);
    if(sort==='price_desc') return price10(b)-price10(a);
    if(sort==='abv') return (parseFloat(b.abv)||0)-(parseFloat(a.abv)||0);
    return nameOf(a).localeCompare(nameOf(b),'ja');
  });
  document.getElementById('teq-count').textContent=list.length+' 種';
  if(!list.length){ document.getElementById('teq-list').innerHTML='<div class="empty">該当するボトルがありません</div>'; return; }
  document.getElementById('teq-list').innerHTML=list.map(function(b){
    var p=price10(b), letter=clsLetterOf(b), nom=nomOf(b), abv=b.abv, brand=brandOf(b);
    var bg=CLS_COLOR[letter]||'#fff';
    var meta=[brand, nom?('NOM'+nom):''].filter(Boolean).join(' / ');
    return '<div class="brow" style="background:'+bg+'">'
      +'<div class="binfo">'
        +(letter?'<span class="clschip" title="'+esc(CLS_NAME[letter])+'">'+letter+'</span>':'')
        +'<span class="bn">'+esc(nameOf(b))+'</span>'
        +(meta?'<span class="bmeta">'+esc(meta)+'</span>':'')
      +'</div>'
      +(abv?'<span class="babv">'+esc(abv)+'%</span>':'')
      +(p>0?'<div class="bp">'+yen(p)+'</div>':'<div class="bp none">—</div>')
    +'</div>';
  }).join('');
}
</script>
</body>
</html>
