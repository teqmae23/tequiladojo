<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オンラインメニュー — テキーラ道場</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --cream:#F1EFE8;--cream2:#E8E4D8;--cream3:#DDD8C8;
  --red:#b03020;--teal:#1a6e58;
  --sans:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  --serif:'Hiragino Mincho ProN','Yu Mincho',serif;
  --mono:'SFMono-Regular',Consolas,monospace;
}
html,body{height:100%;}
body{background:var(--cream);color:var(--ink);font-family:var(--sans);display:flex;flex-direction:column;min-height:100vh;}

/* ヘッダー */
.hdr{background:var(--ink);padding:0 14px;display:flex;align-items:center;gap:10px;height:56px;flex-shrink:0;position:sticky;top:0;z-index:50;}
.hdr-logo{font-family:var(--serif);font-size:16px;color:var(--gold-l);letter-spacing:.04em;white-space:nowrap;}
.hdr-sub{font-size:10px;color:var(--ink3);margin-top:1px;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.hdr-nav{display:flex;align-items:center;justify-content:center;padding:5px 10px;border:1px solid var(--cream3);border-radius:6px;color:var(--gold-l);font-size:11px;text-decoration:none;white-space:nowrap;background:transparent;}
.hdr-nav:active{background:rgba(255,255,255,.08);}

/* ローディング/ログインゲート */
#gate{flex:1;display:flex;align-items:center;justify-content:center;color:var(--ink2);font-size:14px;padding:24px;text-align:center;}

/* パンくず/戻る */
.crumb{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--cream2);border-bottom:1px solid var(--cream3);flex-wrap:wrap;position:sticky;top:56px;z-index:40;}
.crumb-back{background:transparent;border:1px solid var(--cream3);border-radius:6px;color:var(--ink2);font-size:12px;padding:5px 10px;cursor:pointer;}
.crumb-title{font-family:var(--serif);font-size:15px;color:var(--ink);}
.crumb-path{font-size:11px;color:var(--ink3);}

#app{flex:1;display:none;flex-direction:column;}
.view{display:none;padding:16px 14px 40px;max-width:960px;margin:0 auto;width:100%;}
.view.on{display:block;}

/* メニュートップ：大分類カード */
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.cat-card{background:#fff;border:1px solid var(--cream3);border-radius:14px;padding:22px 16px;text-align:center;cursor:pointer;transition:.15s;box-shadow:0 1px 4px rgba(20,15,8,.05);}
.cat-card:active{transform:scale(.98);}
.cat-card .ci{font-size:34px;line-height:1;margin-bottom:10px;}
.cat-card .cn{font-family:var(--serif);font-size:17px;color:var(--ink);letter-spacing:.03em;}
.cat-card .cd{font-size:11px;color:var(--ink3);margin-top:4px;}
.cat-card.soon{opacity:.55;}
.badge-soon{display:inline-block;font-size:9px;background:var(--cream3);color:var(--ink3);border-radius:4px;padding:1px 6px;margin-top:6px;}
@media(min-width:560px){.cat-grid{grid-template-columns:repeat(3,1fr);}}

/* テキーラ サブナビ */
.subnav{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;}
.subnav button{flex-shrink:0;padding:7px 12px;border:1px solid var(--cream3);border-radius:20px;background:#fff;color:var(--ink2);font-size:12px;cursor:pointer;white-space:nowrap;}
.subnav button.on{background:var(--gold-d);color:var(--cream);border-color:var(--gold-d);}

/* ツールバー（検索・フィルタ・並び替え） */
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px;}
.toolbar input[type=text],.toolbar select{padding:7px 10px;border:1px solid var(--cream3);border-radius:8px;background:#fff;color:var(--ink);font-size:13px;font-family:var(--sans);}
.toolbar .tsearch{flex:1;min-width:150px;}
.tcount{font-size:12px;color:var(--ink2);font-weight:600;white-space:nowrap;}
.list-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin:0 2px 8px;}

/* ボトル一覧（1ボトル1行） */
.blist{display:flex;flex-direction:column;background:#fff;border:1px solid var(--cream3);border-radius:12px;overflow:hidden;}
.brow{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--cream2);}
.brow:last-child{border-bottom:none;}
.binfo{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.clschip{display:inline-block;font-size:10px;font-weight:700;min-width:16px;text-align:center;padding:1px 5px;border-radius:4px;background:#fff;color:var(--gold-d);border:1px solid rgba(122,86,16,.35);margin-right:6px;vertical-align:middle;}
.brow .bmeta{background:transparent;}
.bn{font-size:14px;font-weight:600;color:var(--ink);}
.bmeta{font-size:11px;color:var(--ink3);margin-left:6px;}
.babv{flex-shrink:0;font-family:var(--mono);font-size:11px;color:var(--ink3);white-space:nowrap;}
.bp{flex-shrink:0;font-family:var(--mono);font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;min-width:52px;text-align:right;}
.bp.none{font-size:11px;color:var(--ink3);font-weight:400;}
.price-note{font-size:11px;color:var(--ink3);text-align:right;}
.empty{text-align:center;color:var(--ink3);padding:40px 0;font-size:13px;}
.soon-box{text-align:center;color:var(--ink3);padding:48px 16px;font-size:14px;}
.soon-box .si{font-size:40px;margin-bottom:10px;}

/* 蒸留所一覧 */
.dlist{display:flex;flex-direction:column;background:#fff;border:1px solid var(--cream3);border-radius:12px;overflow:hidden;}
.drow{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--cream2);cursor:pointer;}
.drow:last-child{border-bottom:none;}
.drow:active{background:var(--cream2);}
.dinfo{flex:1;min-width:0;}
.dname{display:block;font-size:15px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dnom{display:block;font-size:11px;color:var(--ink3);font-family:var(--mono);margin-top:1px;}
.dcount{flex-shrink:0;font-size:12px;color:var(--gold-d);font-weight:600;white-space:nowrap;}
.dchev{flex-shrink:0;font-size:18px;color:var(--ink3);}
.drank{flex-shrink:0;min-width:34px;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--gold-d);text-align:center;}
.dstat{flex-shrink:0;text-align:center;min-width:36px;}
.dstat-v{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--ink);line-height:1.1;}
.dstat-l{font-size:9px;color:var(--ink3);}
.dir-sel{padding-left:8px!important;padding-right:8px!important;}
/* 蒸留所詳細（ブランド別） */
.dist-detail-head{margin-bottom:14px;}
.dist-detail-name{font-family:var(--serif);font-size:20px;color:var(--ink);}
.dist-detail-nom{font-size:12px;color:var(--ink3);font-family:var(--mono);margin-top:2px;}
.brand-group{margin-bottom:16px;}
.brand-head{display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:700;color:var(--gold-d);letter-spacing:.02em;padding:4px 2px 6px;border-bottom:2px solid var(--cream3);margin-bottom:6px;cursor:pointer;}
.brand-head-more{font-size:11px;color:var(--ink3);font-weight:400;}
/* ブランド詳細 */
.brand-detail-head{background:#fff;border:1px solid var(--cream3);border-radius:12px;padding:14px 16px;margin-bottom:14px;}
.brand-detail-es{font-family:var(--serif);font-size:20px;color:var(--ink);}
.brand-detail-ja{font-size:13px;color:var(--ink3);margin-top:2px;}
.brand-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.bbadge{font-size:11px;background:var(--cream2);color:var(--ink2);border-radius:6px;padding:3px 9px;}
.brand-dist{display:inline-flex;align-items:center;gap:4px;margin-top:12px;font-size:13px;color:var(--gold-d);cursor:pointer;}
.brand-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.ext-link{font-size:12px;color:var(--gold-d);text-decoration:none;border:1px solid var(--cream3);border-radius:8px;padding:5px 10px;}
.ext-link:active{background:var(--cream2);}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-logo">テキーラ道場</div>
    <div class="hdr-sub">オンラインメニュー</div>
  </div>
  <div class="hdr-right">
    <a class="hdr-nav" href="/member.html">マイページ</a>
  </div>
</div>

<div id="gate">読み込み中…</div>

<div id="app">
  <!-- パンくず -->
  <div class="crumb" id="crumb" style="display:none;">
    <button class="crumb-back" id="crumb-back">← 戻る</button>
    <div>
      <div class="crumb-title" id="crumb-title"></div>
      <div class="crumb-path" id="crumb-path"></div>
    </div>
  </div>

  <!-- メニュートップ -->
  <div class="view on" id="view-top">
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <!-- テキーラ -->
  <div class="view" id="view-teq">
    <div class="subnav" id="teq-subnav">
      <button data-mode="list" class="on">一覧</button>
      <button data-mode="distillery">蒸留所</button>
      <button data-mode="brand">ブランド</button>
      <button data-mode="map">地図</button>
    </div>
    <!-- 一覧モード -->
    <div id="teq-list-wrap">
      <div class="toolbar">
        <input type="text" class="tsearch" id="q" placeholder="ボトル名・ブランド・NOMで検索…">
        <select id="f-class"><option value="">全クラス</option></select>
        <select id="f-sort">
          <option value="nom" selected>NOM</option>
          <option value="name">名前</option>
          <option value="class">クラス順</option>
          <option value="price">価格</option>
          <option value="abv">度数</option>
        </select>
        <select id="f-dir" class="dir-sel">
          <option value="asc">↑</option>
          <option value="desc">↓</option>
        </select>
      </div>
      <div class="list-head">
        <span class="tcount" id="teq-count"></span>
        <span class="price-note">※ 価格はすべて10ml単位です</span>
      </div>
      <div class="blist" id="teq-list"><div class="empty">読み込み中…</div></div>
    </div>
    <!-- 蒸留所モード -->
    <div id="teq-dist-wrap" style="display:none;">
      <div id="dist-list-view">
        <div class="toolbar">
          <input type="text" class="tsearch" id="dq" placeholder="蒸留所名・NOMで検索…">
          <select id="d-sort">
            <option value="nom" selected>NOM</option>
            <option value="name">名前</option>
            <option value="score">スコア</option>
            <option value="ratings">評価数</option>
          </select>
          <select id="d-dir" class="dir-sel">
            <option value="asc">↑</option>
            <option value="desc">↓</option>
          </select>
        </div>
        <div class="list-head"><span class="tcount" id="dist-count"></span></div>
        <div class="dlist" id="dist-list"></div>
      </div>
      <div id="dist-detail-view" style="display:none;">
        <button class="crumb-back" id="dist-back" style="margin-bottom:12px;">← 蒸留所一覧へ</button>
        <div id="dist-detail"></div>
      </div>
    </div>

    <!-- ブランドモード -->
    <div id="teq-brand-wrap" style="display:none;">
      <div id="brand-list-view">
        <div class="toolbar">
          <input type="text" class="tsearch" id="bq" placeholder="ブランド名・蒸留所・NOMで検索…">
        </div>
        <div class="list-head"><span class="tcount" id="brand-count"></span></div>
        <div class="dlist" id="brand-list"></div>
      </div>
      <div id="brand-detail-view" style="display:none;">
        <button class="crumb-back" id="brand-back" style="margin-bottom:12px;">← ブランド一覧へ</button>
        <div id="brand-detail"></div>
      </div>
    </div>

    <!-- 準備中モード -->
    <div id="teq-soon" style="display:none;">
      <div class="soon-box"><div class="si">🚧</div><div id="teq-soon-label">準備中</div><div style="font-size:12px;margin-top:6px;">この表示モードは近日公開予定です。</div></div>
    </div>
  </div>

  <!-- 他カテゴリ（準備中） -->
  <div class="view" id="view-soon">
    <div class="soon-box"><div class="si">🚧</div><div id="soon-label">準備中</div><div style="font-size:12px;margin-top:6px;">このメニューは近日公開予定です。</div></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain:"tequiladojo.firebaseapp.com",
  projectId:"tequiladojo",
  storageBucket:"tequiladojo.firebasestorage.app",
  messagingSenderId:"56663296233",
  appId:"1:56663296233:web:c8cac2fcbeb4faa09e0878"
});
var auth=firebase.auth(), db=firebase.firestore();

var SERVING_ML=10; // 価格表示の基準ml（10ml単位）
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function yen(n){return '¥'+Math.round(n).toLocaleString();}

// 大分類定義
var CATEGORIES=[
  {key:'tequila', icon:'🥃', name:'テキーラ',   desc:'一覧・蒸留所・ブランド・地図', ready:true},
  {key:'other',   icon:'🍶', name:'その他種類', desc:'メスカル等のアガベ蒸留酒', ready:false},
  {key:'cocktail',icon:'🍸', name:'カクテル',   desc:'テキーラベース等', ready:false},
  {key:'set',     icon:'🍽', name:'セット',     desc:'飲み比べ・お得なセット', ready:false},
  {key:'misc',    icon:'🍫', name:'その他',     desc:'フード・ソフトドリンク', ready:false},
  {key:'goods',   icon:'🛍', name:'物販',       desc:'ボトル販売・グッズ', ready:false}
];

// データキャッシュ
var bottles=[], brandMap={}, classMap={}, distMap={}, ptdMap={};
// PTD(AMM) 蒸留所データ: nom別に順位/スコア/評価数
function _numOr(o){ if(!o) return null; for(var i=1;i<arguments.length;i++){ var v=o[arguments[i]]; if(v!==undefined&&v!==null&&v!==''&&!isNaN(parseFloat(v))) return parseFloat(v); } return null; }
function ptdRank(nom){ return _numOr(ptdMap[nom],'rank'); }
function ptdScore(nom){ return _numOr(ptdMap[nom],'avgRating','average_rating'); }
function ptdRatings(nom){ return _numOr(ptdMap[nom],'ratingCount','ratings_count'); }

auth.onAuthStateChanged(function(user){
  if(user){
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='flex';
    renderTop();
    loadData();
  } else {
    // 会員ログイン必須：未ログインは会員ページへ
    location.replace('/member.html');
  }
});

function loadData(){
  Promise.all([
    db.collection('bottleData').get(),
    db.collection('brands').get().catch(function(){return {docs:[]};}),
    db.collection('classes').get().catch(function(){return {docs:[]};}),
    db.collection('distilleries').get().catch(function(){return {docs:[]};}),
    db.collection('ammDistilleries').get().catch(function(){return {docs:[]};})
  ]).then(function(res){
    brandMap={}; res[1].docs.forEach(function(d){ brandMap[d.id]=d.data(); });
    classMap={}; res[2].docs.forEach(function(d){ classMap[d.id]=d.data(); });
    distMap={}; res[3].docs.forEach(function(d){ distMap[d.id]=d.data(); });
    ptdMap={}; res[4].docs.forEach(function(d){ ptdMap[d.id]=d.data(); });
    // 掲載対象: home_order と同じく visibility が 0/false/未設定 のものを表示
    bottles=res[0].docs.map(function(d){return Object.assign({id:d.id},d.data());})
      .filter(function(b){ var v=b.visibility; return v==='0'||v===0||v===false||v===undefined||v===null; });
    buildClassFilter();
    renderTeqList();
  }).catch(function(e){
    document.getElementById('teq-list').innerHTML='<div class="empty">読み込み失敗: '+esc(e.message)+'</div>';
  });
}

/* ── 名称解決 ──
   bottleData のドキュメントIDは連番(bottleDataId)で、12桁のbottleIdは別フィールド。
   NOM(蒸留所4桁)・brandId(7桁)・classId(2桁)は bottleId から導出できる:
   bottleId = 蒸留所ID4 + ブランド連番3 + classId2 + 連番3 (= brandId7 + classId2 + seq3)。 */
function bidOf(b){ return String(b.bottleId||''); }
function brandIdOf(b){ if(b.brandId) return String(b.brandId); var s=bidOf(b); return s.length>=7?s.slice(0,7):''; }
// ブランド名は brands コレクション（brandEs/brandJa）で解決。IDは出さない。
function brandOf(b){
  var m=brandMap[brandIdOf(b)];
  return m?(m.brandJa||m.brandEs||''):'';
}
// クラス: classId は2桁（カテゴリ+クラス）。2桁目でB/J/R/A/X判定（home_order準拠）
var CLS_MAP={B:'1',J:'2',R:'3',A:'4',X:'5'};
var CLS_ORDER=['B','J','R','A','X'];
var CLS_NAME={B:'Blanco',J:'Joven/Gold',R:'Reposado',A:'Añejo',X:'Extra Añejo'};
var CLS_COLOR={B:'#fcfbf7',J:'#fbf1d5',R:'#f5e6c0',A:'#eed7a8',X:'#e3c48f'};
function clsDigit(b){
  if(b.classId!=null&&b.classId!==''){ var c=String(b.classId); return c.length>=2?c.charAt(1):c; }
  var s=bidOf(b); return s.length>=9?s.charAt(8):'';
}
function clsLetterOf(b){
  var d=clsDigit(b);
  return CLS_ORDER.find(function(k){return CLS_MAP[k]===d;})||'';
}
// NOM(蒸留所4桁): 明示フィールドが無ければ bottleId の先頭4桁を使う
function nomOf(b){
  if(b.nom!=null&&b.nom!=='') return String(b.nom);
  var s=bidOf(b); return s.length>=4?s.slice(0,4):'';
}
function nameOf(b){ return b.bottleEs||b.bottleEn||b.bottleJa||b.name||'(名称未設定)'; }
// 10ml単価: bottleData の price が 10ml 単価（フォールバック unitPrice / price10）
function price10(b){ return parseFloat(b.price!=null?b.price:(b.unitPrice!=null?b.unitPrice:b.price10))||0; }

/* ── メニュートップ ── */
function renderTop(){
  document.getElementById('cat-grid').innerHTML=CATEGORIES.map(function(c){
    return '<div class="cat-card'+(c.ready?'':' soon')+'" onclick="openCategory(\''+c.key+'\')">'
      +'<div class="ci">'+c.icon+'</div>'
      +'<div class="cn">'+esc(c.name)+'</div>'
      +'<div class="cd">'+esc(c.desc)+'</div>'
      +(c.ready?'':'<div class="badge-soon">準備中</div>')
      +'</div>';
  }).join('');
}

function showView(id){
  ['view-top','view-teq','view-soon'].forEach(function(v){
    document.getElementById(v).classList.toggle('on', v===id);
  });
  document.getElementById('crumb').style.display = (id==='view-top')?'none':'flex';
  window.scrollTo(0,0);
}

function openCategory(key){
  var c=CATEGORIES.find(function(x){return x.key===key;});
  if(key==='tequila'){
    setCrumb('テキーラ','メニュートップ ＞ テキーラ');
    setTeqMode('list');
    showView('view-teq');
  } else {
    document.getElementById('soon-label').textContent=(c?c.name:'')+' メニュー';
    setCrumb((c?c.name:''),'メニュートップ ＞ '+(c?c.name:''));
    showView('view-soon');
  }
}

function setCrumb(title,path){
  document.getElementById('crumb-title').textContent=title;
  document.getElementById('crumb-path').textContent=path;
}
document.getElementById('crumb-back').addEventListener('click',function(){ showView('view-top'); });

/* ── テキーラ サブモード ── */
document.querySelectorAll('#teq-subnav button').forEach(function(btn){
  btn.addEventListener('click',function(){ setTeqMode(btn.dataset.mode); });
});
function setTeqMode(mode){
  document.querySelectorAll('#teq-subnav button').forEach(function(b){ b.classList.toggle('on', b.dataset.mode===mode); });
  var isList=(mode==='list'), isDist=(mode==='distillery'), isBrand=(mode==='brand');
  document.getElementById('teq-list-wrap').style.display=isList?'':'none';
  document.getElementById('teq-dist-wrap').style.display=isDist?'':'none';
  document.getElementById('teq-brand-wrap').style.display=isBrand?'':'none';
  document.getElementById('teq-soon').style.display=(isList||isDist||isBrand)?'none':'';
  if(isDist){ backToDistList(); renderDistList(); }
  if(isBrand){ backToBrandList(); renderBrandList(); }
  if(!isList&&!isDist&&!isBrand){
    document.getElementById('teq-soon-label').textContent='地図メニュー';
  }
}
document.getElementById('dq').addEventListener('input',renderDistList);
document.getElementById('d-sort').addEventListener('change',renderDistList);
document.getElementById('d-dir').addEventListener('change',renderDistList);
document.getElementById('dist-back').addEventListener('click',backToDistList);
document.getElementById('bq').addEventListener('input',renderBrandList);
document.getElementById('brand-back').addEventListener('click',backToBrandList);

/* ── テキーラ一覧 ── */
function buildClassFilter(){
  // クラスは常に B/J/R/A/X の5種を固定表示（該当ボトルの有無に依存しない）
  var sel=document.getElementById('f-class');
  sel.innerHTML='<option value="">全クラス</option>'+CLS_ORDER.map(function(l){
    return '<option value="'+l+'">'+esc(l+' — '+CLS_NAME[l])+'</option>';
  }).join('');
}
['q','f-class','f-sort','f-dir'].forEach(function(id){
  document.getElementById(id).addEventListener('input',renderTeqList);
  document.getElementById(id).addEventListener('change',renderTeqList);
});
function renderTeqList(){
  var q=(document.getElementById('q').value||'').toLowerCase().trim();
  var fc=document.getElementById('f-class').value;
  var sort=document.getElementById('f-sort').value;
  var dir=document.getElementById('f-dir').value==='desc'?-1:1;
  var list=bottles.filter(function(b){
    if(fc && clsLetterOf(b)!==fc) return false;
    if(q){
      if(/^\d+$/.test(q)){
        // 数字はNOMで絞り込み（前方・部分一致）
        if(nomOf(b).indexOf(q)<0) return false;
      } else {
        var hay=(nameOf(b)+' '+(b.bottleJa||'')+' '+brandOf(b)).toLowerCase();
        if(hay.indexOf(q)<0) return false;
      }
    }
    return true;
  });
  list.sort(function(a,b){
    var c;
    if(sort==='nom') c=String(nomOf(a)).localeCompare(String(nomOf(b)),undefined,{numeric:true});
    else if(sort==='price') c=price10(a)-price10(b);
    else if(sort==='abv') c=(parseFloat(a.abv)||0)-(parseFloat(b.abv)||0);
    else if(sort==='class'){
      var ra=CLS_ORDER.indexOf(clsLetterOf(a)); if(ra<0)ra=99;
      var rb=CLS_ORDER.indexOf(clsLetterOf(b)); if(rb<0)rb=99;
      c=ra-rb; if(c===0) c=nameOf(a).localeCompare(nameOf(b),'ja');
    }
    else c=nameOf(a).localeCompare(nameOf(b),'ja');
    return c*dir;
  });
  document.getElementById('teq-count').textContent=list.length+' 種';
  if(!list.length){ document.getElementById('teq-list').innerHTML='<div class="empty">該当するボトルがありません</div>'; return; }
  document.getElementById('teq-list').innerHTML=list.map(function(b){ return bottleRowHtml(b,true); }).join('');
}

// ボトル1行のHTML。showMeta=true でブランド/NOMを表示（蒸留所別ではブランドが見出しなので抑制）
function bottleRowHtml(b, showMeta){
  var p=price10(b), letter=clsLetterOf(b), nom=nomOf(b), abv=b.abv;
  var bg=CLS_COLOR[letter]||'#fff';
  var meta=showMeta?[brandOf(b), nom?('NOM'+nom):''].filter(Boolean).join(' / '):'';
  return '<div class="brow" style="background:'+bg+'">'
    +'<div class="binfo">'
      +(letter?'<span class="clschip" title="'+esc(CLS_NAME[letter])+'">'+letter+'</span>':'')
      +'<span class="bn">'+esc(nameOf(b))+'</span>'
      +(meta?'<span class="bmeta">'+esc(meta)+'</span>':'')
    +'</div>'
    +(abv?'<span class="babv">'+esc(abv)+'%</span>':'')
    +(p>0?'<div class="bp">'+yen(p)+'</div>':'<div class="bp none">—</div>')
  +'</div>';
}

/* ── 蒸留所メニュー ── */
function distNameOf(nom){ var m=distMap[nom]; return m?(m.nomJa||m.nomEs||m.name||''):''; }

function renderDistList(){
  var groups={};
  bottles.forEach(function(b){ var n=nomOf(b); if(!n) return; (groups[n]=groups[n]||[]).push(b); });
  var noms=Object.keys(groups);
  var dq=(document.getElementById('dq').value||'').toLowerCase().trim();
  if(dq){
    noms=noms.filter(function(n){
      if(/^\d+$/.test(dq)) return n.indexOf(dq)>=0;
      return distNameOf(n).toLowerCase().indexOf(dq)>=0;
    });
  }
  // 並び替え（既定: NOM昇順）。スコア/評価数は未取得(null)を末尾へ
  var key=document.getElementById('d-sort').value;
  var dir=document.getElementById('d-dir').value==='desc'?-1:1;
  function nn(v){ return v==null?(dir===1?Infinity:-Infinity):v; }
  noms.sort(function(a,b){
    var c;
    if(key==='name') c=distNameOf(a).localeCompare(distNameOf(b),'ja');
    else if(key==='score') c=nn(ptdScore(a))-nn(ptdScore(b));
    else if(key==='ratings') c=nn(ptdRatings(a))-nn(ptdRatings(b));
    else c=a.localeCompare(b,undefined,{numeric:true}); // NOM
    if(c===0) c=a.localeCompare(b,undefined,{numeric:true});
    return c*dir;
  });
  document.getElementById('dist-count').textContent=noms.length+' 蒸留所';
  if(!noms.length){ document.getElementById('dist-list').innerHTML='<div class="empty">該当する蒸留所がありません</div>'; return; }
  document.getElementById('dist-list').innerHTML=noms.map(function(n){
    var nm=distNameOf(n)||'(名称未登録)';
    var rk=ptdRank(n), sc=ptdScore(n), rt=ptdRatings(n);
    return '<div class="drow" onclick="openDistillery(\''+n+'\')">'
      +'<span class="drank">'+(rk!=null?'#'+rk:'—')+'</span>'
      +'<div class="dinfo"><span class="dname">'+esc(nm)+'</span>'
        +'<span class="dnom">NOM '+esc(n)+' ・ '+groups[n].length+'種</span></div>'
      +'<div class="dstat"><div class="dstat-v">'+(sc!=null?sc:'—')+'</div><div class="dstat-l">スコア</div></div>'
      +'<div class="dstat"><div class="dstat-v">'+(rt!=null?rt:'—')+'</div><div class="dstat-l">評価</div></div>'
      +'<span class="dchev">›</span>'
    +'</div>';
  }).join('');
}

function openDistillery(nom){
  document.getElementById('dist-list-view').style.display='none';
  document.getElementById('dist-detail-view').style.display='';
  var mine=bottles.filter(function(b){ return nomOf(b)===nom; });
  // ブランドでグループ化
  var bg={};
  mine.forEach(function(b){ var bid=brandIdOf(b); (bg[bid]=bg[bid]||[]).push(b); });
  var brandIds=Object.keys(bg).sort();
  var nm=distNameOf(nom)||'(名称未登録)';
  var html='<div class="dist-detail-head"><div class="dist-detail-name">'+esc(nm)+'</div><div class="dist-detail-nom">NOM '+esc(nom)+' ／ '+mine.length+'種</div></div>';
  brandIds.forEach(function(bid){
    var bm=brandMap[bid];
    var bname=bm?(bm.brandJa||bm.brandEs||''):'';
    // ブランド内はクラス順→名前
    var items=bg[bid].slice().sort(function(a,b){
      var ra=CLS_ORDER.indexOf(clsLetterOf(a)); if(ra<0)ra=99;
      var rb=CLS_ORDER.indexOf(clsLetterOf(b)); if(rb<0)rb=99;
      return ra-rb||nameOf(a).localeCompare(nameOf(b),'ja');
    });
    html+='<div class="brand-group">'
      +'<div class="brand-head" onclick="openBrand(\''+esc(bid)+'\')">'+esc(bname||'(ブランド未登録)')+'<span class="brand-head-more">詳細 ›</span></div>'
      +'<div class="blist">'+items.map(function(b){ return bottleRowHtml(b,false); }).join('')+'</div>'
    +'</div>';
  });
  document.getElementById('dist-detail').innerHTML=html;
  window.scrollTo(0,0);
}
function backToDistList(){
  document.getElementById('dist-detail-view').style.display='none';
  document.getElementById('dist-list-view').style.display='';
}

/* ── ブランドメニュー ── */
var BRAND_STATUS={0:'稼働中',1:'終売',2:'移転'};
var BRAND_TYPE={0:'蒸留所ブランド',1:'委託ブランド'};
function brandNameOf(bid){ var m=brandMap[bid]; return m?(m.brandJa||m.brandEs||''):''; }

function renderBrandList(){
  var groups={};
  bottles.forEach(function(b){ var id=brandIdOf(b); if(!id) return; (groups[id]=groups[id]||[]).push(b); });
  var ids=Object.keys(groups);
  var bq=(document.getElementById('bq').value||'').toLowerCase().trim();
  ids.sort(function(a,b){ return (brandNameOf(a)||a).localeCompare(brandNameOf(b)||b,'ja'); });
  if(bq){
    ids=ids.filter(function(id){
      var hay=((brandNameOf(id))+' '+(brandMap[id]?brandMap[id].brandEs||'':'')+' '+distNameOf(String(id).slice(0,4))+' '+String(id).slice(0,4)).toLowerCase();
      return hay.indexOf(bq)>=0;
    });
  }
  document.getElementById('brand-count').textContent=ids.length+' ブランド';
  if(!ids.length){ document.getElementById('brand-list').innerHTML='<div class="empty">該当するブランドがありません</div>'; return; }
  document.getElementById('brand-list').innerHTML=ids.map(function(id){
    var nm=brandNameOf(id)||'(名称未登録)';
    var dnm=distNameOf(String(id).slice(0,4));
    return '<div class="drow" onclick="openBrand(\''+esc(id)+'\')">'
      +'<div class="dinfo"><span class="dname">'+esc(nm)+'</span><span class="dnom">'+esc(dnm||('NOM '+String(id).slice(0,4)))+'</span></div>'
      +'<span class="dcount">'+groups[id].length+'種</span>'
      +'<span class="dchev">›</span>'
    +'</div>';
  }).join('');
}

function openBrand(brandId){
  setTeqMode('brand');
  document.getElementById('brand-list-view').style.display='none';
  document.getElementById('brand-detail-view').style.display='';
  var m=brandMap[brandId]||{};
  var nom=String(brandId).slice(0,4);
  var mine=bottles.filter(function(b){ return brandIdOf(b)===brandId; }).sort(function(a,b){
    var ra=CLS_ORDER.indexOf(clsLetterOf(a)); if(ra<0)ra=99;
    var rb=CLS_ORDER.indexOf(clsLetterOf(b)); if(rb<0)rb=99;
    return ra-rb||nameOf(a).localeCompare(nameOf(b),'ja');
  });
  var html='<div class="brand-detail-head">';
  html+='<div class="brand-detail-es">'+esc(m.brandEs||brandNameOf(brandId)||'(名称未登録)')+'</div>';
  if(m.brandJa) html+='<div class="brand-detail-ja">'+esc(m.brandJa)+'</div>';
  html+='<div class="brand-badges">';
  html+='<span class="bbadge">'+esc(BRAND_TYPE[String(m.brandType||'0')]||'—')+'</span>';
  html+='<span class="bbadge">'+esc(BRAND_STATUS[String(m.brandStatus||'0')]||'—')+'</span>';
  if(m.foundedYear) html+='<span class="bbadge">創設 '+esc(String(m.foundedYear))+'年</span>';
  html+='</div>';
  // 蒸留所リンク
  var dnm=distNameOf(nom);
  html+='<div class="brand-dist" onclick="openDistilleryFromBrand(\''+esc(nom)+'\')">🏭 '+esc(dnm||('NOM '+nom))+' <span class="dchev">›</span></div>';
  // 外部リンク
  var links='';
  if(m.infoUrl) links+='<a class="ext-link" href="'+esc(m.infoUrl)+'" target="_blank" rel="noopener">🔗 詳細情報</a>';
  if(m.ammUrl) links+='<a class="ext-link" href="'+esc(m.ammUrl)+'" target="_blank" rel="noopener">🌵 Agave Matchmaker</a>';
  if(m.annUrl) links+='<a class="ext-link" href="'+esc(m.annUrl)+'" target="_blank" rel="noopener">📋 ANN</a>';
  if(links) html+='<div class="brand-links">'+links+'</div>';
  html+='</div>';
  html+='<div class="list-head"><span class="tcount">'+mine.length+' 種</span><span class="price-note">※ 価格はすべて10ml単位です</span></div>';
  html+='<div class="blist">'+(mine.length?mine.map(function(b){ return bottleRowHtml(b,false); }).join(''):'<div class="empty">提供中のボトルがありません</div>')+'</div>';
  document.getElementById('brand-detail').innerHTML=html;
  window.scrollTo(0,0);
}
function backToBrandList(){
  document.getElementById('brand-detail-view').style.display='none';
  document.getElementById('brand-list-view').style.display='';
}
// ブランド詳細から蒸留所メニューへ
function openDistilleryFromBrand(nom){ setTeqMode('distillery'); openDistillery(nom); }
</script>
