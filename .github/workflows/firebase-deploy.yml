name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        id: auth
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          token_format: 'access_token'
      - name: Deploy Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project tequiladojo --non-interactive
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
      - name: Deploy Firestore rules
        if: always()
        run: |
          RULES=$(python3 -c "import sys,json; print(json.dumps(open('firestore.rules').read()))")
          RULESET=$(curl -sf -X POST \
            -H "Authorization: Bearer ${GOOGLE_OAUTH_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"source\":{\"files\":[{\"name\":\"firestore.rules\",\"content\":${RULES}}]}}" \
            "https://firebaserules.googleapis.com/v1/projects/tequiladojo/rulesets")
          RULESET_NAME=$(echo "$RULESET" | python3 -c "import sys,json; print(json.load(sys.stdin)['name'])")
          echo "Created ruleset: $RULESET_NAME"
          PATCH_RESP=$(curl -s -X PATCH \
            -H "Authorization: Bearer ${GOOGLE_OAUTH_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"projects/tequiladojo/releases/cloud.firestore\",\"ruleset_name\":\"${RULESET_NAME}\"}" \
            "https://firebaserules.googleapis.com/v1/projects/tequiladojo/releases/cloud.firestore?updateMask=ruleset_name")
          echo "Release update response: $PATCH_RESP"
          echo "$PATCH_RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); assert 'ruleset_name' in r or 'rulesetName' in r, 'PATCH failed: ' + str(r); print('Firestore rules deployed:', r.get('ruleset_name', r.get('rulesetName')))"
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
