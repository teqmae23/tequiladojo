name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        id: auth
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          token_format: 'access_token'
      - name: Deploy Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project tequiladojo --non-interactive 2>&1 | tee /tmp/fb_out.txt
          EXIT=${PIPESTATUS[0]}
          grep -q "is the current active version" /tmp/fb_out.txt && exit 0 || exit $EXIT
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
      # Firestoreルールは storage と分離してデプロイする。
      # storage を一緒に指定すると serviceusage の 403（firebasestorage.googleapis.com
      # の権限確認に失敗）でコマンド全体が落ち、Firestoreルールまでデプロイされない。
      # ルール単体なら Firestore API は有効なため確実にデプロイできる。
      - name: Deploy Firestore rules
        run: |
          firebase deploy --only firestore:rules --project tequiladojo --non-interactive
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
      # storage ルールはサービスアカウントの権限不足（serviceusage 403）で失敗する
      # ことがあるため、失敗してもジョブ全体は止めない（警告を出す）。
      # 失敗した場合はオーナーがCloud Shellで
      #   firebase deploy --only storage --project tequiladojo
      # を実行するか、サービスアカウントに roles/serviceusage.serviceUsageConsumer を付与する。
      - name: Deploy Storage rules (best effort)
        run: |
          firebase deploy --only storage --project tequiladojo --non-interactive \
            || echo "::warning::Storageルールのデプロイに失敗しました。Cloud Shellから firebase deploy --only storage を実行してください"
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
