name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: tequiladojo
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
      - name: Deploy Firestore rules
        if: always()
        run: |
          npm install -g firebase-tools
          printf '%s' "$FIREBASE_SA_JSON" > /tmp/sa.json
          echo '{"firestore":{"rules":"firestore.rules"}}' > /tmp/firebase-rules.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json firebase deploy --only firestore:rules --config /tmp/firebase-rules.json --project tequiladojo --non-interactive
          rm -f /tmp/sa.json /tmp/firebase-rules.json
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
