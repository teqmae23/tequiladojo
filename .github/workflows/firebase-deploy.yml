name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        id: auth
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          token_format: 'access_token'
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: tequiladojo
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
      - name: Deploy Firestore rules
        if: always()
        run: |
          RULES=$(python3 -c "import sys,json; print(json.dumps(open('firestore.rules').read()))")
          RULESET=$(curl -sf -X POST \
            -H "Authorization: Bearer ${GOOGLE_OAUTH_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"source\":{\"files\":[{\"name\":\"firestore.rules\",\"content\":${RULES}}]}}" \
            "https://firebaserules.googleapis.com/v1/projects/tequiladojo/rulesets")
          RULESET_NAME=$(echo "$RULESET" | python3 -c "import sys,json; print(json.load(sys.stdin)['name'])")
          echo "Created ruleset: $RULESET_NAME"
          curl -sf -X PATCH \
            -H "Authorization: Bearer ${GOOGLE_OAUTH_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"projects/tequiladojo/releases/cloud.firestore\",\"rulesetName\":\"${RULESET_NAME}\"}" \
            "https://firebaserules.googleapis.com/v1/projects/tequiladojo/releases/cloud.firestore"
          echo "Firestore rules deployed"
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
