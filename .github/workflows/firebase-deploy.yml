name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        id: auth
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          token_format: 'access_token'
      - name: Deploy Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project tequiladojo --non-interactive 2>&1 | tee /tmp/fb_out.txt
          EXIT=${PIPESTATUS[0]}
          grep -q "is the current active version" /tmp/fb_out.txt && exit 0 || exit $EXIT
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
      # Firestoreルールは firebase CLI ではなく Rules REST API 経由でデプロイする。
      # `firebase deploy --only firestore:rules` は事前に serviceusage.googleapis.com へ
      # 「firestore.googleapis.com が有効か」を問い合わせる（ensureApiEnabled）が、CIの
      # サービスアカウントは serviceusage.services.get 権限を持たないため 403 で失敗し、
      # ルール本体まで到達しない（会員パーミッションエラーの真因）。
      # Rules REST API には serviceusage の事前チェックが無いため確実に反映できる。
      - name: Deploy Firestore rules (REST API)
        run: python3 scripts/deploy_firestore_rules.py
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          FIREBASE_PROJECT: tequiladojo
          RULES_FILE: firestore.rules
          RULES_RELEASE: cloud.firestore
      # storage ルールも同じ serviceusage 403 で CLI デプロイが失敗するため、
      # 失敗してもジョブ全体は止めない（警告を出す）。恒久対応が必要なら
      # サービスアカウントに roles/serviceusage.serviceUsageConsumer を付与する。
      - name: Deploy Storage rules (best effort)
        run: |
          firebase deploy --only storage --project tequiladojo --non-interactive \
            || echo "::warning::Storageルールのデプロイに失敗しました。Cloud Shellから firebase deploy --only storage を実行してください"
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
