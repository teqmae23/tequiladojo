name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        id: auth
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          token_format: 'access_token'
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: tequiladojo
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
      - name: Deploy Firestore rules
        if: always()
        run: |
          npm install -g firebase-tools
          echo '{"firestore":{"rules":"firestore.rules"}}' > /tmp/firebase-rules.json
          firebase deploy --only firestore:rules --config /tmp/firebase-rules.json --project tequiladojo --non-interactive
          rm -f /tmp/firebase-rules.json
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
