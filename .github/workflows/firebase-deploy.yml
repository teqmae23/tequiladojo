name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        id: auth
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          token_format: 'access_token'
      - name: Deploy Firebase Hosting and Firestore rules
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting,firestore:rules,storage --project tequiladojo --non-interactive 2>&1 | tee /tmp/fb_out.txt
          EXIT=${PIPESTATUS[0]}
          grep -q "is the current active version" /tmp/fb_out.txt && exit 0 || exit $EXIT
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
