name: CRT輸出統計取得

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        default: 'dump'
        type: choice
        options:
          - dump
          - discover
          - fetch
      country:
        description: '国名フィルタ（fetchモード、例: Japón、空白=全カ国）'
        required: false
        default: ''
  schedule:
    # 毎月1日 9:00 JST (0:00 UTC) に自動実行
    - cron: '0 0 1 * *'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリインストール
        run: pip install requests python-dateutil

      - name: カラム探索（discoverモード）
        if: github.event.inputs.mode == 'discover'
        run: python3 tools/crt_fetch.py --discover

      - name: 生レスポンスダンプ（dumpモード）
        if: github.event.inputs.mode == 'dump'
        run: python3 tools/crt_fetch.py --dump

      - name: 全期間初回構築（fetchモード・手動）
        if: github.event.inputs.mode == 'fetch'
        run: |
          ARGS="--output sqlite"
          if [ -n "${{ github.event.inputs.country }}" ]; then
            ARGS="$ARGS --country \"${{ github.event.inputs.country }}\""
          fi
          eval python3 tools/crt_fetch.py $ARGS
          ls -la data/ 2>/dev/null || echo "dataディレクトリなし"

      - name: 月次更新（スケジュール）
        if: github.event_name == 'schedule'
        run: |
          python3 - <<'PYEOF'
          import subprocess, sys
          from datetime import datetime, timezone
          from dateutil.relativedelta import relativedelta

          now = datetime.now(timezone.utc)
          # 2ヶ月前 = 新規追加ターゲット
          t_new  = now - relativedelta(months=2)
          # 3ヶ月前 = 比較・更新ターゲット
          t_prev = now - relativedelta(months=3)

          def run(year, month, extra=""):
              cmd = f"python3 tools/crt_fetch.py --output sqlite --year {year} --month {month} {extra}"
              print(f">> {cmd}")
              r = subprocess.run(cmd, shell=True)
              if r.returncode != 0:
                  sys.exit(r.returncode)

          print(f"=== {t_prev.year}/{t_prev.month:02d} 比較・更新 ===")
          run(t_prev.year, t_prev.month)

          print(f"=== {t_new.year}/{t_new.month:02d} 新規追加 ===")
          run(t_new.year, t_new.month)
          PYEOF


      - name: SQLite をリポジトリにコミット
        if: github.event.inputs.mode == 'fetch' || github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add data/crt_exports.db
          git diff --cached --quiet || git commit -m "data: CRT輸出統計DB更新 $(date +'%Y-%m-%d')"
          git push
