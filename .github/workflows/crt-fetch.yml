name: CRT輸出統計取得

on:
  workflow_dispatch:
    inputs:
      country:
        description: '国名（例: Japón、空白=全カ国）'
        required: false
        default: 'Japón'
      year:
        description: '年（例: 2026、空白=全年）'
        required: false
        default: '2026'
      month:
        description: '月（1-12、空白=全月）'
        required: false
        default: '5'
      discover:
        description: 'カラム名確認モード（trueにするとカラム一覧を表示）'
        required: false
        default: 'false'
  schedule:
    # 毎月2日 0:00 UTC（9:00 JST）に前月分を自動取得
    - cron: '0 0 2 * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリインストール
        run: pip install requests

      - name: カラム名確認（discoverモード）
        if: github.event.inputs.discover == 'true'
        run: python3 tools/crt_fetch.py --discover

      - name: データ取得
        if: github.event.inputs.discover != 'true'
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # スケジュール実行：前月を自動取得
            YEAR=$(date -d "1 month ago" +%Y)
            MONTH=$(date -d "1 month ago" +%-m)
            echo "スケジュール実行: ${YEAR}年${MONTH}月"
            python3 tools/crt_fetch.py --year "$YEAR" --month "$MONTH" --output csv
          else
            # 手動実行：入力値を使用
            ARGS=""
            [ -n "${{ github.event.inputs.country }}" ] && ARGS="$ARGS --country \"${{ github.event.inputs.country }}\""
            [ -n "${{ github.event.inputs.year }}"    ] && ARGS="$ARGS --year ${{ github.event.inputs.year }}"
            [ -n "${{ github.event.inputs.month }}"   ] && ARGS="$ARGS --month ${{ github.event.inputs.month }}"
            eval python3 tools/crt_fetch.py $ARGS --output csv
          fi

      - name: CSV をアーティファクトとして保存
        uses: actions/upload-artifact@v4
        if: github.event.inputs.discover != 'true'
        with:
          name: crt-export-${{ github.event.inputs.year || 'auto' }}-${{ github.event.inputs.month || 'auto' }}
          path: '*.csv'
          retention-days: 365
