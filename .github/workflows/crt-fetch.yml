name: CRT輸出統計取得

on:
  workflow_dispatch:
    inputs:
      country:
        description: '国名（例: Japón、空白=全カ国）'
        required: false
        default: 'Japón'
      year:
        description: '年（例: 2026、空白=全年）'
        required: false
        default: '2026'
      month:
        description: '月（1-12、空白=全月）'
        required: false
        default: ''
  schedule:
    # 毎月1日 9:00 JST (0:00 UTC) に自動実行
    - cron: '0 0 1 * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリインストール
        run: pip install requests

      - name: データ取得
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.country }}" ]; then
            ARGS="$ARGS --country \"${{ github.event.inputs.country }}\""
          fi
          if [ -n "${{ github.event.inputs.year }}" ]; then
            ARGS="$ARGS --year ${{ github.event.inputs.year }}"
          fi
          if [ -n "${{ github.event.inputs.month }}" ]; then
            ARGS="$ARGS --month ${{ github.event.inputs.month }}"
          fi
          # スケジュール実行の場合は前月を自動取得
          if [ "${{ github.event_name }}" = "schedule" ]; then
            YEAR=$(date -d "1 month ago" +%Y)
            MONTH=$(date -d "1 month ago" +%-m)
            ARGS="--year $YEAR --month $MONTH"
            echo "スケジュール実行: ${YEAR}年${MONTH}月"
          fi
          eval python3 tools/crt_fetch.py $ARGS --output csv
          ls -la *.csv 2>/dev/null || echo "CSVファイルなし"

      - name: CSV をアーティファクトとして保存
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crt-export-data
          path: '*.csv'
          retention-days: 90
