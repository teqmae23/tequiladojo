name: CRT輸出統計取得

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        default: 'dump'
        type: choice
        options:
          - dump
          - discover
          - fetch
      country:
        description: '国名フィルタ（fetchモード、例: Japón、空白=全カ国）'
        required: false
        default: ''
  schedule:
    # 毎月1日 9:00 JST (0:00 UTC) に自動実行
    - cron: '0 0 1 * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリインストール
        run: pip install requests

      - name: カラム探索（discoverモード）
        if: github.event.inputs.mode == 'discover'
        run: python3 tools/crt_fetch.py --discover

      - name: 生レスポンスダンプ（dumpモード）
        if: github.event.inputs.mode == 'dump'
        run: python3 tools/crt_fetch.py --dump

      - name: データ取得（fetchモード・スケジュール）
        if: github.event.inputs.mode == 'fetch' || github.event_name == 'schedule'
        run: |
          ARGS="--output csv"
          if [ -n "${{ github.event.inputs.country }}" ]; then
            ARGS="$ARGS --country \"${{ github.event.inputs.country }}\""
          fi
          eval python3 tools/crt_fetch.py $ARGS
          ls -la *.csv 2>/dev/null || echo "CSVファイルなし"

      - name: CSV をアーティファクトとして保存
        uses: actions/upload-artifact@v4
        if: github.event.inputs.mode == 'fetch' || github.event_name == 'schedule'
        with:
          name: crt-export-data
          path: '*.csv'
          retention-days: 90
