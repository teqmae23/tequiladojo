<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テキーラ道場 — 有料セミナー</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
<script>
var FIREBASE_CONFIG={
  apiKey:"AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain:"tequiladojo.firebaseapp.com",
  projectId:"tequiladojo",
  storageBucket:"tequiladojo.firebasestorage.app",
  messagingSenderId:"56663296233",
  appId:"1:56663296233:web:c8cac2fcbeb4faa09e0878",
  measurementId:"G-KMS18946JQ"
};
</script>
<script src="/auth-role.js?v=20260714"></script>
<script src="/member-plan.js?v=20260722"></script>
<style>
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --cream:#faf7f1;--cream2:#f0ebe0;--cream3:#e4ddd0;--white:#fff;
  --red:#b03020;--teal:#1a6e58;
  --border:rgba(160,130,100,.18);--border2:rgba(160,130,100,.32);
  --shadow:0 1px 12px rgba(24,17,10,.07);--shadow-lg:0 6px 36px rgba(24,17,10,.13);
  --r:8px;--rl:14px;
  --serif:'Hiragino Mincho ProN','Yu Mincho',serif;
  --sans:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  --mono:'SFMono-Regular',Consolas,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh}
button{cursor:pointer;font-family:var(--sans)}
#login-screen{display:none;min-height:100vh;align-items:center;justify-content:center;padding:24px}
.lcard{width:100%;max-width:360px;background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);padding:40px 30px;box-shadow:var(--shadow-lg)}
.llogo{text-align:center;font-size:40px;margin-bottom:6px}
.lbrand{font-family:var(--serif);font-size:22px;color:var(--gold-d);letter-spacing:.1em;text-align:center}
.lsub{text-align:center;font-size:10px;letter-spacing:.18em;color:var(--ink3);margin-bottom:24px}
.lcard label{display:block;font-size:10px;color:var(--ink3);margin:12px 0 4px}
.lcard input{width:100%;padding:11px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--cream)}
.lerr{min-height:16px;font-size:12px;color:var(--red);margin-top:8px;text-align:center}
.lbtn{width:100%;margin-top:18px;padding:12px;background:var(--gold-d);color:var(--cream);border:none;border-radius:var(--r);font-size:13px}
.hdr{background:var(--ink);padding:0 16px;height:56px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:40}
.hdr-title{font-family:var(--serif);font-size:18px;color:var(--gold-l);letter-spacing:.06em}
.hdr-right{margin-left:auto}
.hdr-nav{padding:6px 11px;border:1px solid rgba(255,255,255,.16);border-radius:6px;color:var(--gold-l);font-size:11px;text-decoration:none}
#app{display:none}
.wrap{max-width:1000px;margin:0 auto;padding:16px 14px 60px}
.banner{border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:16px}
.banner.ok{background:#e5f2ec;color:var(--teal);border:1px solid #b7dccb}
.banner.warn{background:#fbf1d5;color:var(--gold-d);border:1px solid #ecd9a0}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.scard{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
.sthumb{position:relative;width:100%;padding-bottom:56.25%;background:#000 center/cover no-repeat}
.sthumb .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:34px;color:rgba(255,255,255,.35);background:linear-gradient(135deg,#2a2018,#4a3820)}
.sdur{position:absolute;right:6px;bottom:6px;background:rgba(24,17,10,.78);color:#fff;font-size:11px;font-family:var(--mono);padding:1px 6px;border-radius:4px}
.slock{position:absolute;left:6px;top:6px;background:rgba(24,17,10,.7);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.sbody{padding:12px 14px 16px;display:flex;flex-direction:column;flex:1}
.stitle{font-size:15px;font-weight:600;line-height:1.35;margin-bottom:5px}
.sdesc{font-size:12px;color:var(--ink3);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:12px}
.sprice{font-family:var(--mono);font-size:15px;color:var(--gold-d);font-weight:700;margin-bottom:10px}
.sbtn{margin-top:auto;padding:10px;border-radius:var(--r);border:none;font-size:13px;font-weight:600}
.sbtn.buy{background:var(--gold-d);color:var(--cream)}
.sbtn.view{background:var(--teal);color:#fff}
.sbtn.locked{background:var(--cream2);color:var(--ink3);cursor:default}
.owned-badge{display:inline-block;font-size:10px;font-weight:700;color:#fff;background:var(--teal);border-radius:10px;padding:2px 8px;margin-bottom:6px}
.empty{text-align:center;color:var(--ink3);padding:60px 20px;font-size:14px}
.note{font-size:11px;color:var(--ink3);margin-top:16px;line-height:1.7}
/* player */
.pmbg{position:fixed;inset:0;background:rgba(10,7,4,.88);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.pmbg.open{display:flex}
.pmodal{width:100%;max-width:960px}
.pm-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pm-title{color:#fff;font-size:15px;font-weight:600;flex:1;min-width:0}
.pm-x{background:rgba(255,255,255,.12);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;flex-shrink:0}
.pm-frame{position:relative;width:100%;padding-bottom:56.25%;background:#000;border-radius:var(--rl);overflow:hidden}
.pm-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
#toasts{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--ink);color:#fff;font-size:12px;padding:9px 14px;border-radius:8px;box-shadow:var(--shadow-lg);opacity:0;transform:translateY(8px);transition:.25s}
.toast.show{opacity:1;transform:none} .toast.err{background:var(--red)}
</style>
</head>
<body>

<div id="login-screen">
  <div class="lcard">
    <div class="llogo">🎓</div>
    <div class="lbrand">テキーラ道場</div>
    <div class="lsub">有料セミナー — 会員専用</div>
    <label>メールアドレス</label>
    <input type="email" id="lemail" autocomplete="username">
    <label>パスワード</label>
    <input type="password" id="lpass" autocomplete="current-password">
    <div class="lerr" id="lerr"></div>
    <button class="lbtn" id="lbtn">ログイン</button>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-title">🎓 有料セミナー</div>
    <div class="hdr-right"><a class="hdr-nav" href="/member.html">マイページ</a></div>
  </div>
  <div class="wrap">
    <div id="banner"></div>
    <div id="grid"></div>
    <div class="empty" id="empty" style="display:none;">公開中のセミナーはまだありません。</div>
    <div class="note">
      ・購入・視聴にはログインが必要です。動画は購入者・視聴権のある会員のみ再生できます。<br>
      ・お支払い・返金の詳細は<a href="/tokushoho.html" style="color:var(--gold-d)">特定商取引法に基づく表記</a>をご確認ください。
    </div>
  </div>
</div>

<div class="pmbg" id="player">
  <div class="pmodal">
    <div class="pm-head"><div class="pm-title" id="pm-title"></div><button class="pm-x" id="pm-x">✕</button></div>
    <div class="pm-frame" id="pm-frame"></div>
  </div>
</div>

<div id="toasts"></div>

<script>
firebase.initializeApp(FIREBASE_CONFIG);
var auth=firebase.auth(), db=firebase.firestore(), fns=firebase.app().functions();
function g(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,type){var el=document.createElement('div');el.className='toast'+(type?' '+type:'');el.textContent=msg;g('toasts').appendChild(el);requestAnimationFrame(function(){requestAnimationFrame(function(){el.classList.add('show');});});setTimeout(function(){el.classList.remove('show');setTimeout(function(){el.remove();},300);},3200);}
function errMsg(e){ return (e&&e.message)?e.message:'エラーが発生しました'; }

var myMember={}, plans=[], seminars=[], purchasedIds=[];

(function(){
  var p=new URLSearchParams(location.search).get('purchase');
  if(p==='success') g('banner').innerHTML='<div class="banner ok">✓ ご購入ありがとうございます。反映まで少し時間がかかる場合があります。「視聴する」でご覧いただけます。</div>';
  else if(p==='cancel') g('banner').innerHTML='<div class="banner warn">お手続きはキャンセルされました。</div>';
})();

AuthRole.requireMember(auth, function(user){ g('app').style.display='block'; init(user); }, function(){ g('login-screen').style.display='flex'; });
g('lbtn').addEventListener('click',function(){ auth.signInWithEmailAndPassword((g('lemail').value||'').trim(),g('lpass').value).catch(function(e){ g('lerr').textContent=e.message; }); });
g('lpass').addEventListener('keydown',function(e){ if(e.key==='Enter') g('lbtn').click(); });

async function init(user){
  try{
    var msnap=await db.collection('members').where('authUid','==',user.uid).limit(1).get();
    myMember=msnap.empty?{}:Object.assign({id:msnap.docs[0].id},msnap.docs[0].data());
    plans=await MemberPlan.loadPlans(db);
    var ssnap=await db.collection('seminars').get();
    seminars=ssnap.docs.map(function(d){return Object.assign({id:d.id},d.data());})
      .filter(function(s){ var v=s.visibility; return v==='0'||v===0||v==null||v===false; });
    seminars.sort(function(a,b){ var ao=(a.order==null?9999:Number(a.order)),bo=(b.order==null?9999:Number(b.order)); return ao-bo; });
    try{ var pr=await fns.httpsCallable('getMyPurchasedSeminars')({}); purchasedIds=(pr.data&&pr.data.ids)||[]; }catch(e){ purchasedIds=[]; }
    render();
  }catch(e){ toast('読み込み失敗: '+errMsg(e),'err'); }
}

function gradeAccess(s){
  if(s.accessMode!=='grade'&&s.accessMode!=='both') return false;
  var eff=MemberPlan.effectivePlan(myMember, plans);
  return MemberPlan.hasFeature(eff, s.requiredFeature||'seminar');
}
function accessible(s){ return gradeAccess(s) || purchasedIds.indexOf(s.id)>=0; }

function render(){
  var grid=g('grid');
  if(!seminars.length){ grid.innerHTML=''; g('empty').style.display='block'; return; }
  g('empty').style.display='none';
  grid.innerHTML=seminars.map(function(s,i){
    var canView=accessible(s);
    var owned=purchasedIds.indexOf(s.id)>=0;
    var thumb=s.thumbUrl?'<div class="sthumb" style="background-image:url(\''+esc(s.thumbUrl)+'\')">':'<div class="sthumb"><div class="ph">🎓</div>';
    if(!canView) thumb+='<div class="slock">🔒 '+(s.accessMode==='grade'?'グレード限定':'未購入')+'</div>';
    if(s.duration) thumb+='<div class="sdur">'+esc(s.duration)+'</div>';
    thumb+='</div>';
    var action;
    if(canView){ action='<button class="sbtn view" data-act="view" data-i="'+i+'">▶ 視聴する</button>'; }
    else if(s.accessMode==='grade'){ action='<button class="sbtn locked" disabled>グレード会員限定</button>'; }
    else { action='<button class="sbtn buy" data-act="buy" data-i="'+i+'">'+esc(s.priceLabel||'購入する')+'</button>'; }
    return '<div class="scard">'+thumb+'<div class="sbody">'
      +(owned?'<span class="owned-badge">購入済み</span>':'')
      +'<div class="stitle">'+esc(s.title||'(無題)')+'</div>'
      +(s.description?'<div class="sdesc">'+esc(s.description)+'</div>':'')
      +((!canView&&s.accessMode!=='grade'&&s.priceLabel)?'<div class="sprice">'+esc(s.priceLabel)+'</div>':'')
      +action
    +'</div></div>';
  }).join('');
  Array.prototype.forEach.call(grid.querySelectorAll('[data-act]'),function(b){
    b.addEventListener('click',function(){
      var s=seminars[Number(b.dataset.i)];
      if(b.dataset.act==='view') playSeminar(s);
      else buySeminar(s,b);
    });
  });
}

function playSeminar(s){
  g('pm-title').textContent=s.title||'';
  g('pm-frame').innerHTML='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px">読み込み中…</div>';
  g('player').classList.add('open');
  fns.httpsCallable('getSeminarVideo')({seminarId:s.id}).then(function(res){
    var d=res.data||{};
    if(d.locked){ g('pm-frame').innerHTML='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;text-align:center;padding:20px">視聴権がありません。</div>'; return; }
    if(!d.vimeoId){ g('pm-frame').innerHTML='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px">動画が未設定です。</div>'; return; }
    g('pm-frame').innerHTML='<iframe src="https://player.vimeo.com/video/'+encodeURIComponent(d.vimeoId)
      +'?title=0&byline=0&portrait=0" title="'+esc(s.title||'セミナー')
      +'" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>';
  }).catch(function(e){ g('pm-frame').innerHTML='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;text-align:center;padding:20px">'+esc(errMsg(e))+'</div>'; });
}
function closePlayer(){ g('player').classList.remove('open'); g('pm-frame').innerHTML=''; }
g('pm-x').addEventListener('click',closePlayer);
g('player').addEventListener('click',function(e){ if(e.target===g('player')) closePlayer(); });
document.addEventListener('keydown',function(e){ if(e.key==='Escape'&&g('player').classList.contains('open')) closePlayer(); });

function buySeminar(s,btn){
  if(btn){ btn.disabled=true; btn.textContent='処理中…'; }
  fns.httpsCallable('createSeminarCheckout')({seminarId:s.id, origin:location.origin})
    .then(function(res){ if(res.data&&res.data.url) location.href=res.data.url; else { toast('セッション作成に失敗しました','err'); if(btn){btn.disabled=false;btn.textContent=s.priceLabel||'購入する';} } })
    .catch(function(e){ toast(errMsg(e),'err'); if(btn){btn.disabled=false;btn.textContent=s.priceLabel||'購入する';} });
}
</script>
</body>
</html>
